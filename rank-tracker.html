function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function timeAgo(iso) {
  const diffMin = Math.floor((Date.now() - new Date(iso).getTime()) / 60000);
  if (diffMin < 1) return "방금";
  if (diffMin < 60) return diffMin + "분 전";
  const hr = Math.floor(diffMin / 60);
  if (hr < 24) return hr + "시간 전";
  return Math.floor(hr / 24) + "일 전";
}

async function fetchHistory(store) {
  const base = `${SUPABASE_URL}/rest/v1/keyword_rank_history?store_name=eq.${encodeURIComponent(store)}`;
  const order = `&order=collected_date.desc,checked_at.desc`;
  const headers = { "apikey": SUPABASE_ANON_KEY, "Authorization": "Bearer " + SUPABASE_ANON_KEY };
  const selects = [
    `&select=keyword,main_keyword,is_sub,rank,max_rank,product_code,product_name,product_image,product_link,product_price,search_volume_pc,search_volume_mobile,search_volume_total,collected_date,checked_at`,
    `&select=keyword,main_keyword,is_sub,rank,max_rank,product_code,product_name,product_image,product_link,product_price,collected_date,checked_at`,
    `&select=keyword,main_keyword,is_sub,rank,max_rank,product_code,product_name,product_image,collected_date,checked_at`,
    `&select=keyword,main_keyword,is_sub,rank,max_rank,product_code,product_name,collected_date,checked_at`,
  ];
  for (const select of selects) {
    const first = await fetch(base + select + order + `&offset=0&limit=1000`, { headers });
    if (!first.ok) {
      if (first.status === 400) continue; // 없는 컬럼이면 다음 select로 재시도
      throw new Error("조회 실패 (" + first.status + ")");
    }
    // Supabase는 요청당 최대 1,000행만 주므로 페이지를 돌며 최대 6,000행까지 수집
    const rows = await first.json();
    for (let page = 1; page < 6 && rows.length === page * 1000; page++) {
      const res = await fetch(base + select + order + `&offset=${page * 1000}&limit=1000`, { headers });
      if (!res.ok) break;
      const more = await res.json();
      rows.push(...more);
      if (more.length < 1000) break;
    }
    return rows;
  }
  throw new Error("조회 실패 (컬럼 불일치)");
}

async function fetchProductMasters() {
  const url = `${SUPABASE_URL}/rest/v1/product_rankings?select=code,keyword,category_tab,image_url,name,memo,is_checked`;
  const headers = { "apikey": SUPABASE_ANON_KEY, "Authorization": "Bearer " + SUPABASE_ANON_KEY };
  const rows = [];
  for (let page = 0; page < 10; page++) {
    const res = await fetch(url + `&offset=${page * 1000}&limit=1000`, { headers });
    if (!res.ok) throw new Error("상품 마스터 조회 실패 (" + res.status + ")");
    const more = await res.json();
    rows.push(...more);
    if (more.length < 1000) break;
  }
  return rows;
}

function deltaHtml(delta) {
  if (delta == null) return `<span class="rank-delta same">-</span>`;
  if (delta > 0) return `<span class="rank-delta up">▲${delta}</span>`;
  if (delta < 0) return `<span class="rank-delta down">▼${Math.abs(delta)}</span>`;
  return `<span class="rank-delta same">-</span>`;
}

function rankSortValue(rank) {

function rankPage(rank) {

}

function formatProductPrice(price) {

  return Number.isFinite(value) && value > 0 ? value.toLocaleString() + "원" : "";
}

function rankBadgeHtml(rank) {

function productUrl(product) {

function keywordUrl(keyword) {

}

function productThumbHtml(product) {

    : `<img class="product-thumb" src="${esc(product.image)}" loading="lazy" alt="">`;

function rankDate(row) {
  return row.collected_date || row.checked_at.slice(0, 10);
}

function keywordSortIndex(row) {
  if (row?.keyword && ETC_MAIN_KEYWORDS.includes(row.keyword)) {
    return 800000 + ETC_MAIN_KEYWORDS.indexOf(row.keyword) * 1000;
  }
  if (row?.main_keyword && ETC_MAIN_KEYWORDS.includes(row.main_keyword)) {
    return 800000 + ETC_MAIN_KEYWORDS.indexOf(row.main_keyword) * 1000 + 1;
  }
  const mainIdx = KW_TREE.findIndex(g => g.main === row.main_keyword);
  if (mainIdx < 0) return 9999;
  const group = KW_TREE[mainIdx];
  if (!row.is_sub) return mainIdx * 1000;
  const subIdx = group.subs.indexOf(row.keyword);
  return mainIdx * 1000 + 1 + (subIdx < 0 ? 500 : subIdx);
}

function normalizeCategory(category) {
  return getTrackerCategories().includes(category) ? category : "기타";
}

function inferCategoryFromKeywords(keywords) {
  const tokens = new Set();
  const keywordTokens = new Set();
  const mainKeywordTokens = new Set();
  keywords.forEach(k => {
    if (k.keyword) {
      tokens.add(k.keyword);
      keywordTokens.add(k.keyword);
      if (!k.is_sub) mainKeywordTokens.add(k.keyword);
    }
    if (k.main_keyword) tokens.add(k.main_keyword);
  });
  if (HARD_ETC_MAIN_KEYWORDS.some(keyword => mainKeywordTokens.has(keyword))) return "기타";
  const displayGroups = STORE_CATEGORY_DISPLAY_KEYWORDS[selectedStore];
  if (displayGroups) {
    for (const category of getTrackerCategories()) {
      const displayKeywords = displayGroups[category] || [];
      if (displayKeywords.some(keyword => keywordTokens.has(keyword))) return category;
    }
    return "기타";
  }
  for (const category of getTrackerCategories()) {
    if (category === "기타") continue;
    if (CATEGORY_MAIN_KEYWORD[category] && keywordTokens.has(CATEGORY_MAIN_KEYWORD[category])) {
      return category;
    }
  }
  if (SOFT_ETC_MAIN_KEYWORDS.some(keyword => mainKeywordTokens.has(keyword))) return "기타";
  if (HARD_ETC_KEYWORDS.some(keyword => tokens.has(keyword))) return "기타";
  if (ETC_MAIN_KEYWORDS.some(keyword => tokens.has(keyword))) return "기타";
  if (FORCE_ETC_KEYWORDS.some(keyword => tokens.has(keyword))) return "기타";
  for (const category of getTrackerCategories()) {
    if (category === "기타") continue;
    if ((CATEGORY_KEYWORD_GROUPS[category] || []).some(keyword => tokens.has(keyword))) {
      return category;
    }
  }
  return "기타";
}

function hasMainKeyword(keywords, keywordList) {
  return keywords.some(k => !k.is_sub && keywordList.includes(k.keyword));
}

function resolveProductCategory(product) {
  if (PRODUCT_CATEGORY_OVERRIDES[product.code]) return PRODUCT_CATEGORY_OVERRIDES[product.code];
  if (selectedStore === "에너가드컴퍼니") return inferCategoryFromKeywords(product.keywords);
  if (hasMainKeyword(product.keywords, HARD_ETC_MAIN_KEYWORDS)) return "기타";
  const normalized = normalizeCategory(product.category);
  if (normalized !== "기타") return normalized;
  return inferCategoryFromKeywords(product.keywords);
}

function normalizeText(value) {
  return String(value || "").replace(/\s+/g, " ").trim();
}

function parseMemos(raw) {
  if (!raw) return [];
  if (Array.isArray(raw)) return raw;
  try {
    const parsed = JSON.parse(String(raw));
    return Array.isArray(parsed) ? parsed : [];
  } catch (_) {
    return [];
  }
}

function nowMemoDate() {
  const d = new Date();
  const pad = n => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function buildMasterMaps(masters) {
  const byCodeKeyword = new Map();
  const byCode = new Map();
  const byNameKeyword = new Map();
  const byName = new Map();

  masters.forEach(master => {
    const code = normalizeText(master.code);
    const keyword = normalizeText(master.keyword);
    const name = normalizeText(master.name);
    const normalized = {
      code,
      category: normalizeCategory(master.category_tab),
      image: master.image_url || "",
      name: master.name || "",
      memos: parseMemos(master.memo),
      isChecked: master.is_checked === true,
    };
    if (code && keyword) byCodeKeyword.set(code + "|" + keyword, normalized);
    if (code && !byCode.has(code)) byCode.set(code, normalized);
    if (name && keyword) byNameKeyword.set(name + "|" + keyword, normalized);
    if (name && !byName.has(name)) byName.set(name, normalized);
  });

  return { byCodeKeyword, byCode, byNameKeyword, byName };
}

function findProductMaster(row, masterMaps) {
  if (!masterMaps) return null;
  const code = normalizeText(row.product_code);
  const keyword = normalizeText(row.keyword);
  const name = normalizeText(row.product_name);
  return masterMaps.byCodeKeyword.get(code + "|" + keyword)
    || masterMaps.byCode.get(code)
    || masterMaps.byNameKeyword.get(name + "|" + keyword)
    || masterMaps.byName.get(name)
    || null;
}

function buildProducts(rows, masterMaps) {
  const latestDate = rows[0]?.collected_date || rows[0]?.checked_at?.slice(0, 10) || "";
  const latestRows = rows.filter(r => rankDate(r) === latestDate && r.rank != null && r.product_code);
  const previousByProductKeyword = new Map();

  rows.forEach(row => {
    if (!row.product_code || row.rank == null || rankDate(row) === latestDate) return;
    const key = row.product_code + "|" + row.keyword;
    if (!previousByProductKeyword.has(key)) previousByProductKeyword.set(key, row);
  });

  const byProduct = new Map();
  latestRows.forEach(row => {
    const code = row.product_code;
    const master = findProductMaster(row, masterMaps);
    if (!byProduct.has(code)) {
      byProduct.set(code, {
        code,
        name: master?.name || row.product_name || "(상품명 없음)",
        image: master?.image || row.product_image || "",
        link: row.product_link || "",
        price: Number(row.product_price) || 0,
        category: master?.category || "기타",
        masterCode: master?.code || code,
        memos: master?.memos || [],
        isChecked: master?.isChecked || false,
        checkedAt: row.checked_at,
        keywords: [],
      });
    }
    const product = byProduct.get(code);
    if (product.category === "기타" && master?.category) product.category = master.category;
    if (!product.masterCode && master?.code) product.masterCode = master.code;
    if (!product.isChecked && master?.isChecked) product.isChecked = true;
    if ((!product.memos || !product.memos.length) && master?.memos?.length) product.memos = master.memos;
    if (!product.image && (master?.image || row.product_image)) product.image = master?.image || row.product_image;
    if (!product.link && row.product_link) product.link = row.product_link;
    if (!product.price && row.product_price) product.price = Number(row.product_price) || 0;
    if (master?.name && product.name === "(상품명 없음)") product.name = master.name;
    if (row.product_name && product.name === "(상품명 없음)") product.name = row.product_name;
    if (new Date(row.checked_at) > new Date(product.checkedAt)) product.checkedAt = row.checked_at;
    const prev = previousByProductKeyword.get(code + "|" + row.keyword);
    const delta = prev && prev.rank != null && row.rank != null ? prev.rank - row.rank : null;
    product.keywords.push({ ...row, delta });
  });

  return [...byProduct.values()].map(product => {
    product.keywords.sort((a, b) => Number(a.is_sub) - Number(b.is_sub) || rankSortValue(a.rank) - rankSortValue(b.rank) || keywordSortIndex(a) - keywordSortIndex(b));
    product.bestRank = product.keywords[0]?.rank ?? null;
    product.mainBestRank = product.keywords.filter(k => !k.is_sub).sort((a, b) => rankSortValue(a.rank) - rankSortValue(b.rank) || keywordSortIndex(a) - keywordSortIndex(b))[0]?.rank ?? null;
    product.mainKeywordCount = product.keywords.filter(k => !k.is_sub).length;
    return product;
  }).sort((a, b) => (a.mainBestRank ?? 9999) - (b.mainBestRank ?? 9999) || (a.bestRank ?? 9999) - (b.bestRank ?? 9999) || b.keywords.length - a.keywords.length || a.name.localeCompare(b.name, "ko"));
}

function categorySortIndex(categoryName) {
  const idx = getTrackerCategories().findIndex(category => category === categoryName);
  return idx < 0 ? 9999 : idx;
}

function getCategoryLeadKeyword(product, categoryName) {
  const displayKeywords = getDisplayKeywords(categoryName);
  if (displayKeywords) {
    const detailKeywords = getDetailKeywords(categoryName) || displayKeywords;
    return getVisibleKeywords(product, categoryName)
      .sort((a, b) =>
        Number(a.rank == null) - Number(b.rank == null)
        || detailKeywords.indexOf(a.keyword) - detailKeywords.indexOf(b.keyword)
        || (a.rank ?? 9999) - (b.rank ?? 9999)
      )[0] || null;
  }
  if (categoryName === "기타") {
    const etcMain = product.keywords
      .filter(k => !k.is_sub && ETC_MAIN_KEYWORDS.includes(k.keyword))
      .sort((a, b) => ETC_MAIN_KEYWORDS.indexOf(a.keyword) - ETC_MAIN_KEYWORDS.indexOf(b.keyword) || rankSortValue(a.rank) - rankSortValue(b.rank))[0];
    if (etcMain) return etcMain;
    const etcGrouped = product.keywords
      .filter(k => ETC_MAIN_KEYWORDS.includes(k.main_keyword))
      .sort((a, b) => ETC_MAIN_KEYWORDS.indexOf(a.main_keyword) - ETC_MAIN_KEYWORDS.indexOf(b.main_keyword) || Number(a.is_sub) - Number(b.is_sub) || rankSortValue(a.rank) - rankSortValue(b.rank))[0];
    if (etcGrouped) return etcGrouped;
  }
  const preferred = CATEGORY_MAIN_KEYWORD[categoryName];
  if (preferred) {
    const exact = product.keywords.find(k => k.keyword === preferred);
    if (exact) return exact;
  }
  return product.keywords.find(k => !k.is_sub) || product.keywords[0] || null;
}

function categoryProductSort(categoryName) {
  return (a, b) => {
    const aLead = getCategoryLeadKeyword(a, categoryName);
    const bLead = getCategoryLeadKeyword(b, categoryName);
    const displayKeywords = getDisplayKeywords(categoryName);
    if (displayKeywords) {
      return displayKeywords.indexOf(aLead?.keyword) - displayKeywords.indexOf(bLead?.keyword)
        || (aLead?.rank ?? 9999) - (bLead?.rank ?? 9999)
        || a.name.localeCompare(b.name, "ko");
    }
    return keywordSortIndex(aLead || {}) - keywordSortIndex(bLead || {})
      || (aLead?.rank ?? 9999) - (bLead?.rank ?? 9999)
      || (a.mainBestRank ?? 9999) - (b.mainBestRank ?? 9999)
      || (a.bestRank ?? 9999) - (b.bestRank ?? 9999)
      || b.keywords.length - a.keywords.length
      || a.name.localeCompare(b.name, "ko");
  };
}

function buildCategorySections(products) {
  const byCategory = new Map();
  const allowedCategories = getTrackerCategories();
  const displayGroups = STORE_CATEGORY_DISPLAY_KEYWORDS[selectedStore];

  products.forEach(product => {
    if (displayGroups) {
      allowedCategories.forEach(categoryName => {
        if (isBlockedFromCategory(product, categoryName)) return;
        if (!getVisibleKeywords(product, categoryName).length) return;
        if (!byCategory.has(categoryName)) byCategory.set(categoryName, []);
        byCategory.get(categoryName).push(product);
      });
      return;
    }
    const categoryName = resolveProductCategory(product);
    if (!allowedCategories.includes(categoryName)) return;
    if (!byCategory.has(categoryName)) byCategory.set(categoryName, []);
    byCategory.get(categoryName).push(product);
  });

  return [...byCategory.entries()].map(([name, categoryProducts]) => {
    categoryProducts.sort(categoryProductSort(name));
    return {
      name,
      products: categoryProducts,
      keywordCount: categoryProducts.reduce((sum, product) => sum + getVisibleKeywords(product, name).length, 0),
    };
  }).sort((a, b) => categorySortIndex(a.name) - categorySortIndex(b.name) || a.name.localeCompare(b.name, "ko"));
}

function renderProductCard(product, categoryName) {
  const mainKeyword = getCategoryLeadKeyword(product, categoryName);
  const visibleKeywords = getVisibleKeywords(product, categoryName);
  const subCount = Math.max(0, visibleKeywords.length - 1);
  const itemUrl = productUrl(product);
  const productPrice = formatProductPrice(product.price);
  const priceHtml = productPrice ? ` · <span class="product-price-inline">판매가 ${esc(productPrice)}</span>` : "";
  const productNameHtml = itemUrl
    ? `<a class="product-name" href="${esc(itemUrl)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="${esc(product.name)}">${esc(product.name)}</a>`
    : `<span class="product-name" title="${esc(product.name)}">${esc(product.name)}</span>`;
  const memos = parseMemos(product.memos);
  const memoTip = memos.length ? `<div class="memo-tip">${
    [...memos].slice(-3).reverse().map(m => `
      <div class="memo-tip-item">
        <div class="memo-tip-date">${esc(m.date || "")}</div>
        <div>${esc(m.text || "")}</div>
      </div>`).join("")
  }</div>` : "";
  const keywordRows = visibleKeywords.map(k => `
    <div class="keyword-rank-row">
      <span class="keyword-type${k.is_sub ? "" : " main"}">${k.is_sub ? "보조" : "메인"}</span>
      <a class="keyword-name" href="${esc(keywordUrl(k.keyword))}" title="${esc(k.keyword)}" onclick="event.stopPropagation()">${esc(k.keyword)}</a>
      <span class="keyword-main" title="${esc(k.main_keyword)}">${esc(k.is_sub ? k.main_keyword : "메인 키워드")}</span>
      ${rankBadgeHtml(k.rank)}
      ${deltaHtml(k.delta)}
      ${volumeHtml(k.search_volume_total)}
    </div>`).join("");

  const isCategoryExpanded = expandedCategories.has(categoryName);

  return `<div class="product-group${product.isChecked ? " checked" : ""}${isCategoryExpanded ? " open" : ""}">
    <div class="product-main-row" onclick="this.parentElement.classList.toggle('open')">
      <button type="button" class="expand-btn" aria-label="키워드 상세 보기"></button>
      ${productThumbHtml(product)}
      <div class="product-info">
        ${productNameHtml}
        <div class="product-sub"><span class="product-code-inline">${esc(product.code)}</span>${priceHtml} · ${esc(categoryName)} · 키워드 ${visibleKeywords.length}개</div>
      </div>
      <span class="main-keyword-cell"><span>${esc(mainKeyword?.keyword || "-")}</span></span>
      ${rankBadgeHtml(mainKeyword?.rank ?? null)}
      ${deltaHtml(mainKeyword?.delta ?? null)}
      <span class="product-count">보조 ${subCount}개</span>
      <span class="product-actions">
        <button type="button" class="action-btn${memos.length ? " has-memo" : ""}" onclick="openMemoModal(event, '${esc(product.code)}')" aria-label="메모">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/></svg>
          ${memoTip}
        </button>
        <button type="button" class="action-btn${product.isChecked ? " checked" : ""}" onclick="toggleProductCheck(event, '${esc(product.code)}')" aria-label="중요 체크">
          <svg viewBox="0 0 24 24" fill="${product.isChecked ? "currentColor" : "none"}" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </button>
      </span>
    </div>
    <div class="product-keywords">${keywordRows}</div>
  </div>`;
}

function renderProducts(products) {
  const target = document.getElementById("productGroups");
  if (!products.length) {
    target.innerHTML = `<div class="empty">수집된 상품 데이터가 없습니다. <a href="naver-rank.html">키워드분석</a>에서 키워드 일괄 수집을 먼저 실행해 주세요.</div>`;
    return;
  }

  const sections = buildCategorySections(products);
  const sectionByName = new Map(sections.map(section => [section.name, section]));
  const trackerCategories = getTrackerCategories();
  if (!trackerCategories.includes(activeCategory)) {
    activeCategory = trackerCategories[0];
  }
  const activeSection = sectionByName.get(activeCategory) || { name: activeCategory, products: [], keywordCount: 0 };
  const isAllExpanded = expandedCategories.has(activeSection.name);

  const tabsHtml = `<div class="category-tabs">
    ${trackerCategories.map(category => {
      const section = sectionByName.get(category);
      const productCount = section?.products.length || 0;
      return `<button type="button" class="category-tab${category === activeCategory ? " active" : ""}" data-category="${esc(category)}">
        ${esc(category)}<span class="category-tab-count">${productCount}</span>
      </button>`;
    }).join("")}
  </div>`;

  const panelHtml = `
    <section class="category-section">
      <div class="category-title-row">
        <h2 class="category-title">${esc(activeSection.name)}</h2>
        <span class="category-meta">상품 ${activeSection.products.length}개 · 키워드 ${activeSection.keywordCount}개</span>
        <span class="category-title-spacer"></span>
        ${activeSection.products.length
          ? `<button type="button" class="expand-all-btn${isAllExpanded ? " is-open" : ""}" data-action="toggle-all-keywords">
              ${isAllExpanded ? "전체 접기" : "전체 펼치기"}
            </button>`
          : ""}
      </div>
      ${activeSection.products.length
        ? `<div class="product-table">
          <div class="product-table-head">
            <span></span>
            <span>이미지</span>
            <span>상품명</span>
              <span>메인 키워드</span>
              <span>현재 순위</span>
              <span>변동</span>
              <span>보조</span>
              <span>관리</span>
            </div>
            ${activeSection.products.map(product => renderProductCard(product, activeSection.name)).join("")}
          </div>`
        : `<div class="empty">이 카테고리에 잡힌 상품이 없습니다.</div>`}
    </section>
  `;

  target.innerHTML = tabsHtml + panelHtml;
}

document.getElementById("productGroups").addEventListener("click", (e) => {
  const toggleAll = e.target.closest('[data-action="toggle-all-keywords"]');
  if (toggleAll) {
    if (expandedCategories.has(activeCategory)) {
      expandedCategories.delete(activeCategory);
    } else {
      expandedCategories.add(activeCategory);
    }
    renderProducts(cachedProducts);
    return;
  }

  const tab = e.target.closest(".category-tab");
  if (!tab) return;
  activeCategory = tab.dataset.category;
  renderProducts(cachedProducts);
});

function findCachedProduct(code) {
  return cachedProducts.find(product => String(product.code) === String(code));
}

function applyProductMeta(code, patch) {
  cachedProducts.forEach(product => {
    if (String(product.code) === String(code)) Object.assign(product, patch);
  });
  renderProducts(cachedProducts);
}

async function saveProductMeta(product, patch) {
  const masterCode = product.masterCode || product.code;
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/product_rankings?code=eq.${encodeURIComponent(masterCode)}`,
    {
      method: "PATCH",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": "Bearer " + SUPABASE_ANON_KEY,
        "Prefer": "return=minimal",
      },
      body: JSON.stringify(patch),
    }
  );
  if (!res.ok) throw new Error("상품 메타 저장 실패 (" + res.status + ")");
}

function renderMemoList(product) {
  const list = document.getElementById("memoList");
  const memos = parseMemos(product?.memos);
  if (!memos.length) {
    list.innerHTML = `<div class="empty" style="margin-top:0;">아직 남긴 메모가 없습니다.</div>`;
    return;
  }
  list.innerHTML = [...memos].reverse().map((memo, reverseIndex) => {
    const originalIndex = memos.length - 1 - reverseIndex;
    return `<div class="memo-item">
      <div>
        <div class="memo-item-date">${esc(memo.date || "")}</div>
        <div class="memo-item-text">${esc(memo.text || "")}</div>
      </div>
      <button type="button" class="memo-delete" onclick="deleteMemo(${originalIndex})">삭제</button>
    </div>`;
  }).join("");
}

function openMemoModal(event, code) {
  event.stopPropagation();
  const product = findCachedProduct(code);
  if (!product) return;
  memoTargetCode = code;
  document.getElementById("memoModalTitle").textContent = "상품 메모";
  document.getElementById("memoModalSub").textContent = product.name;
  document.getElementById("memoInput").value = "";
  renderMemoList(product);
  document.getElementById("memoModal").classList.add("open");
  document.getElementById("memoModal").setAttribute("aria-hidden", "false");
}

function closeMemoModal() {
  memoTargetCode = "";
  document.getElementById("memoModal").classList.remove("open");
  document.getElementById("memoModal").setAttribute("aria-hidden", "true");
}

async function addMemo() {
  const product = findCachedProduct(memoTargetCode);
  const input = document.getElementById("memoInput");
  const text = input.value.trim();
  if (!product || !text) return;
  const memos = [...parseMemos(product.memos), { date: nowMemoDate(), text }];
  product.memos = memos;
  input.value = "";
  renderMemoList(product);
  applyProductMeta(product.code, { memos });
  try {
    await saveProductMeta(product, { memo: JSON.stringify(memos) });
  } catch (e) {
    alert(e.message || "메모 저장에 실패했습니다.");
  }
}

async function deleteMemo(index) {
  const product = findCachedProduct(memoTargetCode);
  if (!product) return;
  const memos = parseMemos(product.memos);
  memos.splice(index, 1);
  product.memos = memos;
  renderMemoList(product);
  applyProductMeta(product.code, { memos });
  try {
    await saveProductMeta(product, { memo: JSON.stringify(memos) });
  } catch (e) {
    alert(e.message || "메모 삭제에 실패했습니다.");
  }
}

async function toggleProductCheck(event, code) {
  event.stopPropagation();
  const product = findCachedProduct(code);
  if (!product) return;
  const next = !product.isChecked;
  applyProductMeta(code, { isChecked: next });
  try {
    await saveProductMeta(product, { is_checked: next });
  } catch (e) {
    applyProductMeta(code, { isChecked: !next });
    alert(e.message || "강조 상태 저장에 실패했습니다.");
  }
}

document.getElementById("memoModal").addEventListener("click", (e) => {
  if (e.target.id === "memoModal") closeMemoModal();
});

async function loadAndRender() {
  const summary = document.getElementById("summary");
  summary.textContent = "불러오는 중...";
  try {
    const [rows, masters] = await Promise.all([fetchHistory(selectedStore), fetchProductMasters()]);
    if (!rows.length) {
      summary.innerHTML = `"${esc(selectedStore)}" 데이터가 없습니다. <a href="naver-rank.html">키워드분석</a>에서 "키워드 일괄 수집"을 먼저 실행해 주세요.`;
      document.getElementById("productGroups").innerHTML = "";
      return;
    }
    const masterMaps = buildMasterMaps(masters);
    const products = buildProducts(rows, masterMaps);
    cachedProducts = products;
    const collectedKeywords = new Set(rows.filter(r => rankDate(r) === rankDate(rows[0])).map(r => r.keyword));
    const categoryCount = buildCategorySections(products).length;
    summary.innerHTML = `상품 ${products.length}개 · 카테고리 ${categoryCount}개 · 키워드 ${collectedKeywords.size}개 수집됨 · 최근 수집: ${timeAgo(rows[0].checked_at)}`;
    renderProducts(products);
  } catch (e) {
    summary.textContent = "불러오기 실패: " + (e.message || "오류");
  }
}

renderStoreChips();
loadAndRender();
</script>
