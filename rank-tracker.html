  </div>`;
}

/* ── 카테고리 요약 대시보드 ──
   같은 키워드가 여러 상품에 걸려 있으면 그중 "가장 좋은 순위" 1건을 그 키워드의 오늘 상태로 본다.
   (스토어 입장에서 그 키워드로 몇 위에 노출되고 있는지가 관심사이므로) */
function buildDashStats(section) {
  const byKeyword = new Map();
  section.products.forEach(product => {
    getVisibleKeywords(product, section.name).forEach(k => {
      const cur = byKeyword.get(k.keyword);
      if (!cur || rankSortValue(k.rank) < rankSortValue(cur.rank)) byKeyword.set(k.keyword, k);
    });
  });
  const list = [...byKeyword.values()];
  const ranked = list.filter(k => k.rank != null);
  const stats = {
    total: list.length,
    top10: ranked.filter(k => k.rank <= 10).length,
    page1: ranked.filter(k => k.rank <= 40).length,
    page23: ranked.filter(k => k.rank > 40 && k.rank <= 120).length,
    page4plus: ranked.filter(k => k.rank > 120).length,
    up: list.filter(k => k.delta != null && k.delta > 0).length,
    down: list.filter(k => k.delta != null && k.delta < 0).length,
    volumeTotal: list.reduce((sum, k) => sum + (k.search_volume_total != null ? Number(k.search_volume_total) : 0), 0),
    hasVolume: list.some(k => k.search_volume_total != null),
    upMovers: list.filter(k => moveScore(k) > 0).sort((a, b) => moveScore(b) - moveScore(a)).slice(0, 3),
    downMovers: list.filter(k => moveScore(k) < 0).sort((a, b) => moveScore(a) - moveScore(b)).slice(0, 3),
  };
  return stats;
}

/* 순위 변동의 "체감 크기" — 상위 순위일수록 같은 칸수 이동도 크게 평가하는 로그 비율 점수.
   score = ln((이전 순위+5) ÷ (현재 순위+5)). +5 스무딩이 없으면 1~3위권의 일상적인
   1칸 출렁임(3→2위 등)이 50→20위 같은 진짜 상승보다 크게 잡히는 왜곡이 생긴다.
   스무딩 적용 시: 3→2위 0.13 < 500→300위 0.50 < 50→20위 0.79 < 10→1위 0.92. 하락은 음수. */
function moveScore(k) {
  if (k.rank == null || k.delta == null || k.delta === 0) return 0;
  const prevRank = k.rank + k.delta;
  if (prevRank <= 0) return 0;
  return Math.log((prevRank + 5) / (k.rank + 5));
}

/* 주목할 상품: 상품별로 가장 크게 움직인 키워드(가중 점수 기준)를 대표로 뽑아
   급상승/급하락 상품 TOP 3을 고른다. "급"이라 부를 만한 변동만 잡는 두 가지 컷:
   ① 최소 3칸 이동 — 최상위권 1~2칸 출렁임(1↔2위, 3→2위) 제거
   ② 점수 0.4 이상 — 대략 순위가 1.5배 이상 좋아지거나 나빠져야 통과.
      42→38위(0.09), 20→28위(0.28) 같은 완만한 이동은 탈락하고
      4→1위(0.41), 50→20위(0.79), 100→50위(0.65)만 남는다.
   기준 미달이면 억지로 채우지 않고 해당 줄을 통째로 비워둔다. */
const NOTABLE_MIN_STEPS = 3;
const NOTABLE_MIN_SCORE = 0.4;
function buildNotableProducts(section) {
  const moves = section.products.map(product => {
    let best = null;
    let worst = null;
    getVisibleKeywords(product, section.name).forEach(k => {
      if (k.delta == null || Math.abs(k.delta) < NOTABLE_MIN_STEPS) return;
      const score = moveScore(k);
      if (Math.abs(score) < NOTABLE_MIN_SCORE) return;
      if (score > 0 && (!best || score > best.score)) best = { k, score };
      if (score < 0 && (!worst || score < worst.score)) worst = { k, score };
    });
    return { product, best, worst };
  });
  return {
    rising: moves.filter(m => m.best).sort((a, b) => b.best.score - a.best.score).slice(0, 3),
    falling: moves.filter(m => m.worst).sort((a, b) => a.worst.score - b.worst.score).slice(0, 3),
  };
}

function dashProductChip(product, k) {
  const up = k.delta > 0;
  const prevRank = k.rank + k.delta;
  const thumb = product.image ? `<img class="chip-thumb" src="${esc(product.image)}" loading="lazy" alt="">` : "";
  const url = productUrl(product);
  const inner = `${thumb}<span class="chip-name" title="${esc(product.name)}">${esc(product.name)}</span>
    <span class="chip-keyword">${esc(k.keyword)}</span>
    <span class="dash-mover-delta ${up ? "up" : "down"}">${up ? "▲" : "▼"}</span>
    <span class="dash-mover-rank">${prevRank}위 → ${k.rank}위</span>`;
  return url
    ? `<a class="dash-mover-chip" href="${esc(url)}" target="_blank" rel="noopener">${inner}</a>`
    : `<span class="dash-mover-chip">${inner}</span>`;
}

function dashMoverChip(k) {
  const cls = k.delta > 0 ? "up" : "down";
  const arrow = k.delta > 0 ? "▲" : "▼";
  return `<a class="dash-mover-chip" href="${esc(keywordUrl(k.keyword))}">
    ${esc(k.keyword)}
    <span class="dash-mover-delta ${cls}">${arrow}${Math.abs(k.delta)}</span>
    <span class="dash-mover-rank">${k.rank}위</span>
  </a>`;
}

function renderCategoryDashboard(section) {
  const s = buildDashStats(section);
  if (!s.total) return "";
  const rankedTotal = s.page1 + s.page23 + s.page4plus;
  const pct = n => rankedTotal ? Math.round(n / rankedTotal * 100) : 0;
  // 시퀀셜 램프(accent 한 색상, 진할수록 상위 노출) — 분포 바 세그먼트
  const segs = [
    { label: "1페이지", count: s.page1, color: "#e85d2f" },
    { label: "2~3페이지", count: s.page23, color: "#f4a988" },
    { label: "4페이지 이하", count: s.page4plus, color: "#fbdccb" },
  ].filter(seg => seg.count > 0);

  const barHtml = rankedTotal ? `
    <div class="dash-bar-wrap">
      <div class="dash-bar">
        ${segs.map(seg => `<span class="dash-bar-seg" style="flex:${seg.count};background:${seg.color};" title="${seg.label} ${seg.count}개 (${pct(seg.count)}%)"></span>`).join("")}
      </div>
      <div class="dash-legend">
        ${segs.map(seg => `<span class="dash-legend-item"><span class="dash-legend-dot" style="background:${seg.color};"></span>${seg.label} <b>${seg.count}개</b> · ${pct(seg.count)}%</span>`).join("")}
      </div>
    </div>` : "";

  const notable = buildNotableProducts(section);
  const moversHtml = (s.upMovers.length || s.downMovers.length || notable.rising.length || notable.falling.length) ? `
    <div class="dash-movers">
      ${s.upMovers.length ? `<div class="dash-mover-row"><span class="dash-mover-title">상승 TOP</span><div class="dash-mover-chips">${s.upMovers.map(dashMoverChip).join("")}</div></div>` : ""}
      ${s.downMovers.length ? `<div class="dash-mover-row"><span class="dash-mover-title">하락 TOP</span><div class="dash-mover-chips">${s.downMovers.map(dashMoverChip).join("")}</div></div>` : ""}
      ${notable.rising.length ? `<div class="dash-mover-row"><span class="dash-mover-title">급상승 상품</span><div class="dash-mover-chips products">${notable.rising.map(m => dashProductChip(m.product, m.best.k)).join("")}</div></div>` : ""}
      ${notable.falling.length ? `<div class="dash-mover-row"><span class="dash-mover-title">급하락 상품</span><div class="dash-mover-chips products">${notable.falling.map(m => dashProductChip(m.product, m.worst.k)).join("")}</div></div>` : ""}
    </div>` : "";

  return `<div class="rank-dash">
    <div class="rank-dash-tiles">
      <div class="dash-tile"><div class="dash-label">추적 상품</div><div class="dash-value">${section.products.length.toLocaleString()}<small>개</small></div></div>
      <div class="dash-tile"><div class="dash-label">TOP 10</div><div class="dash-value">${s.top10.toLocaleString()}<small>개</small></div></div>
      <div class="dash-tile"><div class="dash-label">1페이지 노출</div><div class="dash-value">${s.page1.toLocaleString()}<small>${pct(s.page1)}%</small></div></div>
      <div class="dash-tile"><div class="dash-label">순위 상승</div><div class="dash-value up">${s.up ? "▲" + s.up.toLocaleString() : "-"}</div></div>
      <div class="dash-tile"><div class="dash-label">순위 하락</div><div class="dash-value down">${s.down ? "▼" + s.down.toLocaleString() : "-"}</div></div>
      <div class="dash-tile"><div class="dash-label">대표 검색량 합</div><div class="dash-value">${s.hasVolume ? s.volumeTotal.toLocaleString() : "-"}</div></div>
    </div>
    ${barHtml}
    ${moversHtml}
  </div>`;
}

function renderProducts(products) {
  const target = document.getElementById("productGroups");
  if (!products.length) {
    target.innerHTML = `<div class="empty">수집된 상품 데이터가 없습니다. <a href="naver-rank.html">키워드분석</a>에서 키워드 일괄 수집을 먼저 실행해 주세요.</div>`;
    return;
  }

  const sections = buildCategorySections(products);
  const sectionByName = new Map(sections.map(section => [section.name, section]));
  const trackerCategories = getTrackerCategories();
  if (!trackerCategories.includes(activeCategory)) {
    activeCategory = trackerCategories[0];
  }
  const activeSection = sectionByName.get(activeCategory) || { name: activeCategory, products: [], keywordCount: 0 };
  const isAllExpanded = expandedCategories.has(activeSection.name);

  const tabsHtml = `<div class="category-tabs">
    ${trackerCategories.map(category => {
      const section = sectionByName.get(category);
      const productCount = section?.products.length || 0;
      return `<button type="button" class="category-tab${category === activeCategory ? " active" : ""}" data-category="${esc(category)}">
        ${esc(category)}<span class="category-tab-count">${productCount}</span>
      </button>`;
    }).join("")}
  </div>`;

  const panelHtml = `
    <section class="category-section">
      ${activeSection.products.length ? renderCategoryDashboard(activeSection) : ""}
      ${activeSection.products.length
        ? `<div class="product-table">
          <div class="category-title-row">
            <h2 class="category-title">${esc(activeSection.name)}</h2>
            <span class="category-meta">상품 ${activeSection.products.length}개 · 키워드 ${activeSection.keywordCount}개</span>
            <span class="category-title-spacer"></span>
            <button type="button" class="expand-all-btn${isAllExpanded ? " is-open" : ""}" data-action="toggle-all-keywords">
              ${isAllExpanded ? "전체 접기" : "전체 펼치기"}
            </button>
          </div>
          <div class="product-table-head">
            <span></span>
            <span>이미지</span>
            <span>상품명</span>
            <span>메인 키워드</span>
            <span>현재 순위</span>
            <span>변동</span>
            <span>보조</span>
            <span>관리</span>
            </div>
            ${activeSection.products.map(product => renderProductCard(product, activeSection.name)).join("")}
          </div>`
        : `<div class="empty">이 카테고리에 잡힌 상품이 없습니다.</div>`}
    </section>
  `;

  target.innerHTML = tabsHtml + panelHtml;
}

document.getElementById("productGroups").addEventListener("click", (e) => {
  const toggleAll = e.target.closest('[data-action="toggle-all-keywords"]');
  if (toggleAll) {
    if (expandedCategories.has(activeCategory)) {
      expandedCategories.delete(activeCategory);
    } else {
      expandedCategories.add(activeCategory);
    }
    renderProducts(cachedProducts);
    return;
  }

  const tab = e.target.closest(".category-tab");
  if (!tab) return;
  activeCategory = tab.dataset.category;
  renderProducts(cachedProducts);
});

function findCachedProduct(code) {
  return cachedProducts.find(product => String(product.code) === String(code));
}

function applyProductMeta(code, patch) {
  cachedProducts.forEach(product => {
    if (String(product.code) === String(code)) Object.assign(product, patch);
  });
  renderProducts(cachedProducts);
}

async function saveProductMeta(product, patch) {
  const masterCode = product.masterCode || product.code;
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/product_rankings?code=eq.${encodeURIComponent(masterCode)}`,
    {
      method: "PATCH",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": "Bearer " + SUPABASE_ANON_KEY,
        "Prefer": "return=minimal",
      },
      body: JSON.stringify(patch),
    }
  );
  if (!res.ok) throw new Error("상품 메타 저장 실패 (" + res.status + ")");
}

function renderMemoList(product) {
  const list = document.getElementById("memoList");
  const memos = parseMemos(product?.memos);
  if (!memos.length) {
    list.innerHTML = `<div class="empty" style="margin-top:0;">아직 남긴 메모가 없습니다.</div>`;
    return;
  }
  list.innerHTML = [...memos].reverse().map((memo, reverseIndex) => {
    const originalIndex = memos.length - 1 - reverseIndex;
    return `<div class="memo-item">
      <div>
        <div class="memo-item-date">${esc(memo.date || "")}</div>
        <div class="memo-item-text">${esc(memo.text || "")}</div>
      </div>
      <button type="button" class="memo-delete" onclick="deleteMemo(${originalIndex})">삭제</button>
    </div>`;
  }).join("");
}

function openMemoModal(event, code) {
  event.stopPropagation();
  const product = findCachedProduct(code);
  if (!product) return;
  memoTargetCode = code;
  document.getElementById("memoModalTitle").textContent = "상품 메모";
  document.getElementById("memoModalSub").textContent = product.name;
  document.getElementById("memoInput").value = "";
  renderMemoList(product);
  document.getElementById("memoModal").classList.add("open");
  document.getElementById("memoModal").setAttribute("aria-hidden", "false");
}

function closeMemoModal() {
  memoTargetCode = "";
  document.getElementById("memoModal").classList.remove("open");
  document.getElementById("memoModal").setAttribute("aria-hidden", "true");
}

async function addMemo() {
  const product = findCachedProduct(memoTargetCode);
  const input = document.getElementById("memoInput");
  const text = input.value.trim();
  if (!product || !text) return;
  const memos = [...parseMemos(product.memos), { date: nowMemoDate(), text }];
  product.memos = memos;
  input.value = "";
  renderMemoList(product);
  applyProductMeta(product.code, { memos });
  try {
    await saveProductMeta(product, { memo: JSON.stringify(memos) });
  } catch (e) {
    alert(e.message || "메모 저장에 실패했습니다.");
  }
}

async function deleteMemo(index) {
  const product = findCachedProduct(memoTargetCode);
  if (!product) return;
  const memos = parseMemos(product.memos);
  memos.splice(index, 1);
  product.memos = memos;
  renderMemoList(product);
  applyProductMeta(product.code, { memos });
  try {
    await saveProductMeta(product, { memo: JSON.stringify(memos) });
  } catch (e) {
    alert(e.message || "메모 삭제에 실패했습니다.");
  }
}

async function toggleProductCheck(event, code) {
  event.stopPropagation();
  const product = findCachedProduct(code);
  if (!product) return;
  const next = !product.isChecked;
  applyProductMeta(code, { isChecked: next });
  try {
    await saveProductMeta(product, { is_checked: next });
  } catch (e) {
    applyProductMeta(code, { isChecked: !next });
    alert(e.message || "강조 상태 저장에 실패했습니다.");
  }
}

document.getElementById("memoModal").addEventListener("click", (e) => {
  if (e.target.id === "memoModal") closeMemoModal();
});

async function loadAndRender() {
  const summary = document.getElementById("summary");
  summary.innerHTML = `<span class="rank-loading"><span class="spinner"></span><span>랭킹 데이터를 불러오는 중...</span></span>`;
  document.getElementById("productGroups").innerHTML = `
    <div class="rank-loading-shell product-table">
      <span class="rank-loading"><span class="spinner"></span><strong>상품 데이터를 불러오는 중...</strong></span>
    </div>`;
  try {
    const [rows, masters] = await Promise.all([fetchHistory(selectedStore), fetchProductMasters()]);
    if (!rows.length) {
      summary.innerHTML = `"${esc(selectedStore)}" 데이터가 없습니다. <a href="naver-rank.html">키워드분석</a>에서 "키워드 일괄 수집"을 먼저 실행해 주세요.`;
      document.getElementById("productGroups").innerHTML = "";
      return;
    }
    const masterMaps = buildMasterMaps(masters);
    const products = buildProducts(rows, masterMaps);
    cachedProducts = products;
    const collectedKeywords = new Set(rows.filter(r => rankDate(r) === rankDate(rows[0])).map(r => r.keyword));
    const categoryCount = buildCategorySections(products).length;
    summary.innerHTML = `상품 ${products.length}개 · 카테고리 ${categoryCount}개 · 키워드 ${collectedKeywords.size}개 수집됨 · 최근 수집: ${timeAgo(rows[0].checked_at)}`;
    renderProducts(products);
    if (!trackedLoaded) {
      loadTrackedData()
        .then(() => renderProducts(cachedProducts))
        .catch(() => {});
    }
  } catch (e) {
    summary.textContent = "불러오기 실패: " + (e.message || "오류");
  }
}

/* ═══════════ 아이템 추적 ═══════════
   내 상품/경쟁사 상품을 링크로 등록해두면 키워드별 순위 + 판매가 변동을 날짜별로 쌓는다.
   수집은 naver-rank 함수의 watchProductIds 파라미터를 사용 — 키워드 1회 스캔에서
   감시 중인 모든 상품의 순위·가격을 한 번에 건져온다. */
const RANK_FN_URL = SUPABASE_URL + "/functions/v1/naver-rank";
let activeView = "rank";
let trackedItems = [];
let trackedHistory = [];
let trackedLoaded = false;
let itemCollecting = false;
let activeTrackedGroup = "competitor";
let itemModalEditCode = ""; // 수정 모드면 대상 상품코드
const expandedTrackedItems = new Set();

const TRACKED_GROUPS = [
  { key: "competitor", label: "경쟁사 상품" },
  { key: "mine", label: "내 상품" },
];

function trackedGroupItems(key) {
  return trackedItems.filter(item => key === "mine" ? item.is_mine : !item.is_mine);
}

function renderItemGroupFilter() {
  const target = document.getElementById("itemGroupFilter");
  if (!target) return;
  const active = TRACKED_GROUPS.find(group => group.key === activeTrackedGroup) || TRACKED_GROUPS[0];
  target.innerHTML = `
    <button type="button" class="store-select" data-action="toggle-item-group-menu" aria-label="추적 아이템 구분 선택">
      <span>${esc(active.label)}</span>
      <span class="store-caret" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </span>
    </button>
    <div class="store-menu">
      ${TRACKED_GROUPS.map(group => `<button type="button" class="store-chip${group.key === activeTrackedGroup ? " active" : ""}" data-item-group="${group.key}">
        ${esc(group.label)} ${trackedGroupItems(group.key).length}개
      </button>`).join("")}
    </div>`;
}

document.getElementById("itemGroupFilter").addEventListener("click", (e) => {
  const toggle = e.target.closest('[data-action="toggle-item-group-menu"]');
  if (toggle) {
    document.getElementById("itemGroupFilter").classList.toggle("open");
    return;
  }
  const chip = e.target.closest("[data-item-group]");
  if (!chip) return;
  activeTrackedGroup = chip.dataset.itemGroup;
  document.getElementById("itemGroupFilter").classList.remove("open");
  renderItemGroupFilter();
  renderTrackedItems();
});

document.querySelectorAll(".view-tab").forEach(tab => tab.addEventListener("click", () => {
  activeView = tab.dataset.view;
  document.querySelectorAll(".view-tab").forEach(t => t.classList.toggle("active", t === tab));
  document.getElementById("rankView").style.display = activeView === "rank" ? "" : "none";
  document.getElementById("itemView").style.display = activeView === "items" ? "" : "none";
  if (activeView === "items" && !trackedLoaded) loadTrackedData();
}));

function sbHeaders(extra) {
  return {
    "Content-Type": "application/json",
    "apikey": SUPABASE_ANON_KEY,
    "Authorization": "Bearer " + SUPABASE_ANON_KEY,
    ...(extra || {}),
  };
}

async function loadTrackedData() {
  const list = document.getElementById("trackedItemList");
  list.innerHTML = `<div class="empty"><span class="rank-loading"><span class="spinner"></span><span>아이템 추적 데이터를 불러오는 중...</span></span></div>`;
  try {
    const [itemsRes, histRes] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/tracked_items?select=*&order=created_at.asc`, { headers: sbHeaders() }),
      fetch(`${SUPABASE_URL}/rest/v1/tracked_item_history?select=*&order=collected_date.desc,checked_at.desc&limit=3000`, { headers: sbHeaders() }),
    ]);
    if (!itemsRes.ok || !histRes.ok) throw new Error("조회 실패 (" + (itemsRes.ok ? histRes.status : itemsRes.status) + ")");
    trackedItems = await itemsRes.json();
    trackedHistory = await histRes.json();
    trackedLoaded = true;
    renderItemGroupFilter();
    renderTrackedItems();
  } catch (e) {
    list.innerHTML = `<div class="empty">아이템 추적 데이터를 불러오지 못했습니다: ${esc(e.message || "오류")}<br>
      Supabase에서 <b>tracked_items.sql</b>을 실행했는지 확인해 주세요.</div>`;
  }
}

function itemKeywords(item) {
  if (Array.isArray(item.keywords)) return item.keywords.map(k => String(k).trim()).filter(Boolean);
  try { return (JSON.parse(item.keywords || "[]") || []).map(k => String(k).trim()).filter(Boolean); }
  catch (_) { return []; }
}

/* 상품 링크 → 네이버 상품코드. 스마트스토어/브랜드스토어의 /products/{id}가 기본.
   가격비교(catalog) 링크는 개별 몰 상품이 아니라 추적이 불안정해 경고만 하고 허용. */
function parseProductLink(raw) {
  const s = String(raw || "").trim();
  if (!s) return { code: "", warn: "" };
  let m = s.match(/\/products\/(\d+)/);
  if (m) return { code: m[1], warn: "" };
  m = s.match(/catalog\/(\d+)/);
  if (m) return { code: m[1], warn: "가격비교 카탈로그 링크입니다 — 개별 판매처 상품 링크를 권장합니다." };
  m = s.match(/nvMid=(\d+)/);
  if (m) return { code: m[1], warn: "" };
  if (/^\d{6,}$/.test(s)) return { code: s, warn: "" };
  return { code: "", warn: "" };
}

function openItemModal(code) {
  itemModalEditCode = code || "";
  const item = code ? trackedItems.find(i => i.product_code === code) : null;
  document.getElementById("itemModalTitle").textContent = item ? "아이템 수정" : "아이템 추가";
  document.getElementById("itemLinkInput").value = item ? (item.product_link || item.product_code) : "";
  document.getElementById("itemLinkInput").disabled = !!item;
  document.getElementById("itemKeywordsInput").value = item ? itemKeywords(item).join(", ") : "";
  document.getElementById("itemIsMineInput").checked = item ? !!item.is_mine : false;
  document.getElementById("itemMemoInput").value = item ? (item.memo || "") : "";
  document.getElementById("itemSaveBtn").textContent = item ? "수정 저장" : "등록하고 바로 수집";
  setItemLinkHint("", "");
  document.getElementById("itemModal").classList.add("open");
  document.getElementById("itemModal").setAttribute("aria-hidden", "false");
}

function closeItemModal() {
  document.getElementById("itemModal").classList.remove("open");
  document.getElementById("itemModal").setAttribute("aria-hidden", "true");
}

document.getElementById("itemModal").addEventListener("click", (e) => {
  if (e.target.id === "itemModal") closeItemModal();
});

function setItemLinkHint(text, cls) {
  const hint = document.getElementById("itemLinkHint");
  hint.textContent = text;
  hint.className = "item-field-hint" + (cls ? " " + cls : "");
}

document.getElementById("itemLinkInput").addEventListener("input", (e) => {
  const { code, warn } = parseProductLink(e.target.value);
  if (!e.target.value.trim()) return setItemLinkHint("", "");
  if (!code) return setItemLinkHint("상품코드를 찾지 못했습니다 — 링크를 확인해 주세요.", "error");
  setItemLinkHint(warn || `상품코드 인식됨: ${code}`, warn ? "error" : "ok");
});

async function saveItemModal() {
  const linkRaw = document.getElementById("itemLinkInput").value.trim();
  const { code } = parseProductLink(linkRaw);
  const keywords = document.getElementById("itemKeywordsInput").value
    .split(",").map(k => k.trim()).filter(Boolean);
  const targetCode = itemModalEditCode || code;
  if (!targetCode) return setItemLinkHint("상품코드를 찾지 못했습니다 — 링크를 확인해 주세요.", "error");
  if (!keywords.length) return setItemLinkHint("추적 키워드를 1개 이상 입력해 주세요.", "error");

  const isNew = !itemModalEditCode;
  const existing = trackedItems.find(i => i.product_code === targetCode);
  if (isNew && existing) return setItemLinkHint("이미 추적 중인 상품입니다.", "error");

  const btn = document.getElementById("itemSaveBtn");
  btn.disabled = true;
  try {
    const payload = {
      product_code: targetCode,
      product_link: linkRaw.startsWith("http") ? linkRaw : (existing?.product_link || ""),
      is_mine: document.getElementById("itemIsMineInput").checked,
      memo: document.getElementById("itemMemoInput").value.trim(),
      keywords,
      updated_at: new Date().toISOString(),
    };
    const res = await fetch(`${SUPABASE_URL}/rest/v1/tracked_items?on_conflict=product_code`, {
      method: "POST",
      headers: sbHeaders({ "Prefer": "resolution=merge-duplicates,return=minimal" }),
      body: JSON.stringify([payload]),
    });
    if (!res.ok) throw new Error("저장 실패 (" + res.status + ")");
    closeItemModal();
    await loadTrackedData();
    if (cachedProducts.length) renderProducts(cachedProducts);
    if (isNew) collectTrackedItems([targetCode]); // 등록 직후 첫 스냅샷 수집 (이때 상품명/이미지도 자동으로 채워짐)
  } catch (e) {
    setItemLinkHint(e.message || "저장에 실패했습니다.", "error");
  } finally {
    btn.disabled = false;
  }
}

async function deleteTrackedItem(event, code) {
  event.stopPropagation();
  const item = trackedItems.find(i => i.product_code === code);
  if (!item) return;
  if (!confirm(`"${item.product_name || code}" 추적을 중단할까요?\n(쌓인 이력 데이터는 지우지 않고 보관합니다)`)) return;
  const res = await fetch(`${SUPABASE_URL}/rest/v1/tracked_items?product_code=eq.${encodeURIComponent(code)}`, {
    method: "DELETE",
    headers: sbHeaders(),
  });
  if (!res.ok) return alert("삭제 실패 (" + res.status + ")");
  await loadTrackedData();
}

/* 수집: 추적 키워드를 모아 키워드당 1회 스캔, watched 결과를 이력으로 저장.
   onlyCodes를 주면 그 상품이 추적하는 키워드만 수집(등록 직후 첫 스냅샷용). */
async function collectTrackedItems(onlyCodes) {
  if (itemCollecting) return;
  const targets = onlyCodes ? trackedItems.filter(i => onlyCodes.includes(i.product_code)) : trackedItems;
  if (!targets.length) return;
  const keywordMap = new Map(); // keyword → 이 키워드를 추적하는 상품코드들
  targets.forEach(item => itemKeywords(item).forEach(kw => {
    if (!keywordMap.has(kw)) keywordMap.set(kw, new Set());
    keywordMap.get(kw).add(item.product_code);
  }));
  if (!keywordMap.size) return;

  const allCodes = trackedItems.map(i => i.product_code); // 스캔은 공짜이므로 전체 감시 목록을 넘겨 겸사겸사 수집
  const status = document.getElementById("itemCollectStatus");
  const btn = document.getElementById("itemCollectBtn");
  itemCollecting = true;
  btn.disabled = true;
  const collectedDate = new Date(Date.now() + 9 * 3600 * 1000).toISOString().slice(0, 10); // KST
  let done = 0;

  try {
    for (const [keyword, codes] of keywordMap) {
      status.textContent = `수집 중... (${++done}/${keywordMap.size}) ${keyword}`;
      try {
        const res = await fetch(RANK_FN_URL, {
          method: "POST",
          headers: sbHeaders(),
          body: JSON.stringify({ keyword, maxRank: 1000, withInsight: false, watchProductIds: allCodes }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || res.status);
        const watched = data.watched || [];
        const foundByCode = new Map(watched.map(w => [String(w.productId), w]));

        // 이력 저장: 이 키워드를 추적하는 상품은 못 찾았어도 "이탈" 행을 남긴다.
        // 추적 키워드가 아니어도 스캔에 걸린 감시 상품은 보너스로 저장(나중에 키워드 추가 시 이력이 이미 있음).
        const rows = [];
        const seen = new Set();
        codes.forEach(codeInSet => {
          const w = foundByCode.get(String(codeInSet));
          rows.push({
            product_code: codeInSet, keyword,
            rank: w ? w.rank : null,
            price: w ? (Number(w.price) || 0) : 0,
            mall_name: w ? (w.mallName || "") : "",
            collected_date: collectedDate,
            checked_at: new Date().toISOString(),
          });
          seen.add(String(codeInSet));
        });
        watched.forEach(w => {
          if (seen.has(String(w.productId))) return;
          rows.push({
            product_code: String(w.productId), keyword,
            rank: w.rank, price: Number(w.price) || 0, mall_name: w.mallName || "",
            collected_date: collectedDate, checked_at: new Date().toISOString(),
          });
        });
        if (rows.length) {
          await fetch(`${SUPABASE_URL}/rest/v1/tracked_item_history?on_conflict=product_code,keyword,collected_date`, {
            method: "POST",
            headers: sbHeaders({ "Prefer": "resolution=merge-duplicates,return=minimal" }),
            body: JSON.stringify(rows),
          });
        }

        // 검색 결과에서 상품명/이미지/판매처 메타 자동 갱신
        for (const w of watched) {
          const item = trackedItems.find(i => i.product_code === String(w.productId));
          if (!item) continue;
          const patch = {};
          if (w.title && w.title !== item.product_name) patch.product_name = w.title;
          if (w.image && w.image !== item.product_image) patch.product_image = w.image;
          if (w.mallName && w.mallName !== item.mall_name) patch.mall_name = w.mallName;
          if (w.link && !item.product_link) patch.product_link = w.link;
          if (Object.keys(patch).length) {
            patch.updated_at = new Date().toISOString();
            await fetch(`${SUPABASE_URL}/rest/v1/tracked_items?product_code=eq.${encodeURIComponent(item.product_code)}`, {
              method: "PATCH",
              headers: sbHeaders({ "Prefer": "return=minimal" }),
              body: JSON.stringify(patch),
            });
            Object.assign(item, patch);
          }
        }
      } catch (e) {
        console.warn("아이템 추적 수집 실패:", keyword, e);
      }
    }
    status.textContent = `수집 완료 (${keywordMap.size}개 키워드)`;
  } finally {
    itemCollecting = false;
    btn.disabled = false;
    await loadTrackedData();
    if (cachedProducts.length) renderProducts(cachedProducts);
    setTimeout(() => { if (!itemCollecting) status.textContent = ""; }, 4000);
  }
}

/* 아이템별 뷰모델: 키워드별 현재 순위/전일 대비, 현재가/직전 가격 변동 */
function buildTrackedView(item) {
  const rows = trackedHistory.filter(r => r.product_code === item.product_code);
  const byKeyword = new Map();
  rows.forEach(r => {
    if (!byKeyword.has(r.keyword)) byKeyword.set(r.keyword, []);
    byKeyword.get(r.keyword).push(r); // 이미 collected_date desc 정렬
  });
  const keywordStates = itemKeywords(item).map(kw => {
    const list = byKeyword.get(kw) || [];
    const cur = list[0] || null;
    const prev = list.find(r => cur && r.collected_date !== cur.collected_date) || null;
    const delta = cur && prev && cur.rank != null && prev.rank != null ? prev.rank - cur.rank : null;
    const historyByDate = new Map();
    list.forEach(r => {
      if (r.rank != null && !historyByDate.has(r.collected_date)) {
        historyByDate.set(r.collected_date, Number(r.rank));
      }
    });
    const history = [...historyByDate.entries()]
      .map(([date, rank]) => ({ date, rank }))
      .sort((a, b) => a.date.localeCompare(b.date));
    return { keyword: kw, rank: cur ? cur.rank : undefined, delta, collectedDate: cur?.collected_date || "", history };
  });

  // 가격 시계열: 날짜별 대표 가격(0 제외) → 최신가와 직전 "다른" 가격 비교
  const priceByDate = new Map();
  rows.forEach(r => {
    const p = Number(r.price) || 0;
    if (p > 0 && !priceByDate.has(r.collected_date)) priceByDate.set(r.collected_date, p);
  });
  const priceDates = [...priceByDate.keys()].sort().reverse();
  const curPrice = priceDates.length ? priceByDate.get(priceDates[0]) : 0;
  let prevPrice = 0, prevPriceDate = "";
  for (const d of priceDates.slice(1)) {
    if (priceByDate.get(d) !== curPrice) { prevPrice = priceByDate.get(d); prevPriceDate = d; break; }
  }
  // 최근 가격 변경 이력 (오래된 → 최신 순으로 짚어가며 변경점만 기록)
  const changes = [];
  let last = null;
  [...priceDates].reverse().forEach(d => {
    const p = priceByDate.get(d);
    if (last != null && p !== last) changes.push({ date: d, from: last, to: p });
    last = p;
  });
  const priceHistory = [...priceByDate.entries()]
    .map(([date, price]) => ({ date, price }))
    .sort((a, b) => a.date.localeCompare(b.date));
  return { keywordStates, curPrice, prevPrice, prevPriceDate, priceChanges: changes.slice(-5).reverse(), priceHistory };
}

function itemPriceCellHtml(view) {
  if (!view.curPrice) return `<span class="item-price-cell"><span class="item-price-now">-</span></span>`;
  let deltaHtml = "";
  if (view.prevPrice) {
    const diff = view.curPrice - view.prevPrice;
    const cls = diff > 0 ? "up" : "down";
    deltaHtml = `<span class="item-price-delta ${cls}">${diff > 0 ? "▲" : "▼"}${Math.abs(diff).toLocaleString()}</span>`;
  }
  return `<span class="item-price-cell"><span class="item-price-now">${view.curPrice.toLocaleString()}원</span>${deltaHtml}</span>`;
}

function filterTrendRows(rows, range, valueKey) {
  const clean = rows.filter(row => row[valueKey] != null).sort((a, b) => a.date.localeCompare(b.date));
  if (!clean.length) return [];
  if (range === "week") return clean.slice(-7);
  if (range === "month6") {
    const last = new Date(clean[clean.length - 1].date);
    const from = new Date(last);
    from.setMonth(from.getMonth() - 6);
    return clean.filter(row => new Date(row.date) >= from);
  }
  if (range === "year") {
    const last = new Date(clean[clean.length - 1].date);
    const from = new Date(last);
    from.setFullYear(from.getFullYear() - 1);
    return clean.filter(row => new Date(row.date) >= from);
  }
  return clean;
}

function renderMiniTrendSvg(rows, valueKey, formatter, invert = false) {
  if (rows.length < 2) {
    return `<div class="rank-trend-empty">표시할 데이터가 아직 부족합니다</div>`;
  }
  const values = rows.map(row => Number(row[valueKey]));
  let min = Math.min(...values);
  let max = Math.max(...values);
  if (min === max) { min -= 1; max += 1; }
  const w = 760, h = 92, padX = 20, padY = 14;
  const x = i => rows.length === 1 ? padX : padX + (i * (w - padX * 2)) / (rows.length - 1);
  const y = v => {
    const t = (v - min) / (max - min);
    return invert ? padY + t * (h - padY * 2) : h - padY - t * (h - padY * 2);
  };
  const points = rows.map((row, i) => `${x(i)},${y(Number(row[valueKey]))}`).join(" ");
  const area = `${padX},${h - padY} ${points} ${w - padX},${h - padY}`;
  const labels = rows.map((row, i) => {
    if (i !== 0 && i !== rows.length - 1 && rows.length > 5 && i % Math.ceil(rows.length / 5) !== 0) return "";
    return `<text class="trend-axis" x="${x(i)}" y="${h + 10}" text-anchor="middle">${esc(row.date.slice(5).replace("-", "."))}</text>`;
  }).join("");
  const dots = rows.map((row, i) =>
    `<circle class="trend-dot"><title>${esc(row.date)} · ${esc(formatter(Number(row[valueKey])))}</title><animate attributeName="r" from="0" to="4" dur=".12s" fill="freeze" /></circle>`
      .replace("<circle", `<circle cx="${x(i)}" cy="${y(Number(row[valueKey]))}"`)
  ).join("");
  return `<svg class="rank-trend-svg" viewBox="0 0 ${w} ${h + 14}" preserveAspectRatio="none" aria-hidden="true">
    <line class="trend-grid" x1="${padX}" x2="${w - padX}" y1="${padY}" y2="${padY}"></line>
    <line class="trend-grid" x1="${padX}" x2="${w - padX}" y1="${h - padY}" y2="${h - padY}"></line>
    <polygon class="trend-fill" points="${area}"></polygon>
    <polyline class="trend-line" points="${points}"></polyline>
    ${dots}
    ${labels}
  </svg>`;
}

function renderTrendWrap(title, rows, valueKey, formatter, invert = false) {
  const ranges = [
    { key: "week", label: "1주일" },
    { key: "month6", label: "6개월" },
    { key: "year", label: "1년" },
  ];
  return `<div class="rank-trend-wrap">
    <div class="rank-trend-head">
      <span>${esc(title)}</span>
      <span class="rank-trend-range">
        ${ranges.map((range, i) => `<button type="button" class="${i === 0 ? "active" : ""}" data-range="${range.key}">${range.label}</button>`).join("")}
      </span>
    </div>
    ${ranges.map((range, i) => {
      const filtered = filterTrendRows(rows, range.key, valueKey);
      return `<div class="rank-trend-panel${i === 0 ? " active" : ""}" data-range="${range.key}">
        ${renderMiniTrendSvg(filtered, valueKey, formatter, invert)}
      </div>`;
    }).join("")}
  </div>`;
}

function renderRankTrend(state) {
  return renderTrendWrap("순위 그래프", state.history || [], "rank", value => `${value}위`, true);
}

function renderPriceTrend(view) {
  return renderTrendWrap("가격 그래프", view.priceHistory || [], "price", value => `${value.toLocaleString()}원`);
}

function renderTrackedItems() {
  const target = document.getElementById("trackedItemList");
  renderItemGroupFilter();
  if (!trackedItems.length) {
    target.innerHTML = `<div class="empty">추적 중인 아이템이 없습니다. 우측 상단 <b>+ 아이템 추가</b>로 내 상품이나 경쟁사 상품 링크를 등록해 보세요.</div>`;
    return;
  }
  const group = TRACKED_GROUPS.find(g => g.key === activeTrackedGroup) || TRACKED_GROUPS[0];
  const items = trackedGroupItems(group.key);
  const allExpanded = items.length && items.every(i => expandedTrackedItems.has(i.product_code));
  target.innerHTML = `
    <div class="product-table">
      <div class="category-title-row">
        <h2 class="category-title">${esc(group.label)}</h2>
        <span class="category-meta">상품 ${items.length}개</span>
        <span class="category-title-spacer"></span>
        ${items.length ? `<button type="button" class="expand-all-btn${allExpanded ? " is-open" : ""}" onclick="toggleTrackedGroup('${group.key}')">
          ${allExpanded ? "전체 접기" : "전체 펼치기"}
        </button>` : ""}
      </div>
      ${items.length ? `
        <div class="item-table-head">
          <span></span>
          <span>이미지</span>
          <span>상품명</span>
          <span>구분</span>
          <span>최고 순위</span>
          <span>변동</span>
          <span>현재 가격</span>
          <span>관리</span>
        </div>
        ${items.map(renderTrackedItemCard).join("")}
      ` : `<div class="empty">이 구분에 등록된 아이템이 없습니다.</div>`}
    </div>`;
}

/* 그룹(경쟁사/내 상품) 단위 전체 펼치기·접기 — 키워드 랭킹의 전체 펼치기와 같은 스타일 */
function toggleTrackedGroup(key) {
  const items = trackedItems.filter(i => key === "mine" ? i.is_mine : !i.is_mine);
  const allExpanded = items.length && items.every(i => expandedTrackedItems.has(i.product_code));
  items.forEach(i => {
    if (allExpanded) expandedTrackedItems.delete(i.product_code);
    else expandedTrackedItems.add(i.product_code);
  });
  renderTrackedItems();
}

function renderTrackedItemCard(item) {
    const view = buildTrackedView(item);
    const best = view.keywordStates.filter(s => s.rank != null).sort((a, b) => a.rank - b.rank)[0];
    const bestDelta = best?.delta ?? null;
    const isOpen = expandedTrackedItems.has(item.product_code);
    const name = item.product_name || "(첫 수집 전 — 수집하면 상품명이 채워집니다)";
    const thumb = item.product_image
      ? `<img class="product-thumb" src="${esc(item.product_image)}" loading="lazy" alt="">`
      : `<span class="product-thumb empty">IMG</span>`;
    const keywordRows = view.keywordStates.map(s => `
      <div class="keyword-rank-item">
        <div class="keyword-rank-row">
          <span class="keyword-type main">추적</span>
          <a class="keyword-name" href="${esc(keywordUrl(s.keyword))}" onclick="event.stopPropagation()">${esc(s.keyword)}</a>
          <span class="keyword-main">${esc(s.collectedDate || "미수집")}</span>
          ${s.rank === undefined ? `<span class="rank-badge">미수집</span>` : rankBadgeHtml(s.rank)}
          ${deltaHtml(s.delta)}
          <span class="keyword-volume"></span>
        </div>
        ${renderRankTrend(s)}
      </div>`).join("");
    const priceHistoryHtml = renderPriceTrend(view);
    return `<div class="product-group${isOpen ? " open" : ""}">
      <div class="item-main-row">
        <button type="button" class="expand-btn" onclick="toggleTrackedItem('${esc(item.product_code)}')" aria-label="키워드 상세 보기"></button>
        ${item.product_link ? `<a class="product-thumb-link" href="${esc(item.product_link)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${thumb}</a>` : thumb}
        <div class="product-info">
          <span class="product-name" title="${esc(name)}">${esc(name)}</span>
          <div class="product-sub">
            <span class="product-code-inline">${esc(item.product_code)}</span>
            ${item.mall_name ? ` · <span class="product-mall-inline">${esc(item.mall_name)}</span>` : ""}
            ${item.memo ? ` · ${esc(item.memo)}` : ""}
          </div>
        </div>
        <span class="item-owner-badge${item.is_mine ? " mine" : ""}">${item.is_mine ? "내 상품" : "경쟁사"}</span>
        ${best ? rankBadgeHtml(best.rank) : `<span class="rank-badge">미수집</span>`}
        ${deltaHtml(bestDelta)}
        ${itemPriceCellHtml(view)}
        <span class="product-actions">
          <button type="button" class="action-btn item-manage-btn" onclick="event.stopPropagation(); openItemModal('${esc(item.product_code)}')" aria-label="아이템 수정">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"></path><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"></path></svg>
            <span class="action-tip">아이템 수정</span>
          </button>
          <button type="button" class="action-btn item-manage-btn danger" onclick="deleteTrackedItem(event, '${esc(item.product_code)}')" aria-label="아이템 삭제">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M19 6l-1 14H6L5 6"></path><path d="M10 11v5"></path><path d="M14 11v5"></path></svg>
            <span class="action-tip">아이템 삭제</span>
          </button>
        </span>
      </div>
      <div class="item-detail">
        ${keywordRows}
        ${priceHistoryHtml}
      </div>
    </div>`;
}

function toggleTrackedItem(code) {
  if (expandedTrackedItems.has(code)) expandedTrackedItems.delete(code);
  else expandedTrackedItems.add(code);
  renderTrackedItems();
}

document.getElementById("trackedItemList").addEventListener("click", (e) => {
  handleTrendRangeClick(e);
});

document.getElementById("productGroups").addEventListener("click", (e) => {
  handleTrendRangeClick(e);
});

function handleTrendRangeClick(e) {
  const rangeBtn = e.target.closest(".rank-trend-range button");
  if (!rangeBtn) return;
  const wrap = rangeBtn.closest(".rank-trend-wrap");
  if (!wrap) return;
  const range = rangeBtn.dataset.range;
  wrap.querySelectorAll(".rank-trend-range button").forEach(btn => btn.classList.toggle("active", btn === rangeBtn));
  wrap.querySelectorAll(".rank-trend-panel").forEach(panel => panel.classList.toggle("active", panel.dataset.range === range));
}

/* 키워드 랭킹의 내 상품 카드 → 아이템 추적 등록. 모달을 상품 정보로 미리 채워서 연다.
   이미 추적 중이면 수정 모드로 연다. */
async function trackFromProduct(event, code) {
  event.stopPropagation();
  const product = findCachedProduct(code);
  if (!product) return;
  if (!trackedLoaded) { try { await loadTrackedData(); } catch (_) { /* 목록 조회 실패해도 신규 등록은 가능 */ } }
  const existing = trackedItems.find(i => i.product_code === String(code));
  if (existing) {
    openItemModal(existing.product_code);
    return;
  }
  openItemModal();
  document.getElementById("itemLinkInput").value = product.link || String(code);
  document.getElementById("itemLinkInput").dispatchEvent(new Event("input")); // 상품코드 인식 힌트 갱신
  const mains = [...new Set(product.keywords.filter(k => !k.is_sub).map(k => k.keyword))];
  document.getElementById("itemKeywordsInput").value = mains.join(", ");
  document.getElementById("itemIsMineInput").checked = true; // 내 스토어 목록에서 온 상품이므로
}

renderStoreChips();
renderItemGroupFilter();
loadAndRender();
</script>
