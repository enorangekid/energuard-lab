<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>랭킹추적 — 에너가드컴퍼니</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css?v=20260713-fix2">
<style>
  :root {
    --bg: #f8f9fb; --card: #fff; --ink: #1a1f2e; --sub: #5a6378;
    --line: #e8ecf2; --dark: #05070b; --dark-tint: #eef0f3;
    --accent: #e85d2f; --accent-dark: #d04420; --accent-tint: #fdeee7;
    --gray-badge: #eef0f3; --danger: #dc2626;
    --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    --font-main: "Pretendard Variable", Pretendard, -apple-system, sans-serif;
    --radius: 6px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scrollbar-gutter: stable; }
  body {
    font-family: var(--font-main);
    background: var(--bg); color: var(--ink); font-size: 15px; line-height: 1.55;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 64px 0 80px; }
  .wrap > header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 20px; }
  .wrap > header h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; }
  .wrap > header .tag { font-size: 12px; font-weight: 600; color: var(--dark); background: var(--dark-tint); padding: 2px 8px; border-radius: 20px; }

  .card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 20px; }
  .store-label { font-size: 15px; font-weight: 800; margin-bottom: 6px; }
  .store-chips { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 8px; }
  .store-chip {
    padding: 7px 10px; border: 1.5px solid var(--line); border-radius: 4px;
    background: #fff; font-size: 13px; font-weight: 600; color: var(--sub); cursor: pointer;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center; transition: all .12s;
    font-family: inherit;
  }
  .store-chip:hover { border-color: #c8cdd4; }
  .store-chip.active { border-color: var(--dark); background: var(--dark); color: #fff; }

  .summary { margin-top: 16px; font-size: 13px; color: var(--sub); }
  .summary a { color: var(--accent); font-weight: 700; }

  .category-tabs {
    margin-top: 24px;
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 8px;
  }
  .category-tab {
    height: 42px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: #fff;
    color: var(--sub);
    font-family: inherit;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    transition: all .12s;
  }
  .category-tab:hover { border-color: #d7dde7; color: var(--ink); background: #fafbfc; }
  .category-tab.active { background: var(--ink); border-color: var(--ink); color: #fff; }
  .category-tab-count { margin-left: 4px; font-size: 11px; font-weight: 700; opacity: .72; }
  .category-section { margin-top: 24px; }
  .category-title-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 0 -10px;
    padding: 13px 20px;
    border-bottom: 1px solid var(--line);
    background: #fff;
  }
  .category-title { font-size: 16px; font-weight: 900; color: var(--ink); }
  .category-meta { font-size: 12px; color: var(--sub); }
  .category-title-spacer { flex: 1; }
  .expand-all-btn {
    flex: 0 0 auto;
    height: 28px;
    padding: 0 10px;
    border: 1px solid #dfe4ec;
    border-radius: 4px;
    background: #fff;
    color: var(--sub);
    font-family: inherit;
    font-size: 12px;
    font-weight: 800;
    cursor: pointer;
    transition: background .12s, border-color .12s, color .12s;
  }
  .expand-all-btn:hover,
  .expand-all-btn.is-open { border-color: #c8cdd4; color: var(--ink); background: #fafbfc; }

  /* ── 카테고리 요약 대시보드 ── */
  .rank-dash {
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: #fff;
    padding: 16px 18px 14px;
    margin-bottom: 22px;
    box-shadow: 0 14px 34px rgba(5, 7, 11, 0.05);
  }
  .rank-dash-tiles {
    display: grid;
    grid-template-columns: repeat(6, minmax(0, 1fr));
    gap: 8px;
  }
  .dash-tile { padding: 4px 2px; min-width: 0; }
  .dash-tile + .dash-tile { border-left: 1px solid var(--line); padding-left: 14px; }
  .dash-label { font-size: 11px; font-weight: 800; color: #8a93a5; white-space: nowrap; }
  .dash-value { margin-top: 2px; font-size: 21px; font-weight: 800; color: var(--ink); letter-spacing: -0.01em; white-space: nowrap; }
  .dash-value small { margin-left: 4px; font-size: 11.5px; font-weight: 700; color: var(--sub); }
  .dash-value.up { color: #16a34a; }
  .dash-value.down { color: var(--danger); }
  .dash-bar-wrap { margin-top: 14px; }
  .dash-bar { display: flex; gap: 2px; height: 12px; }
  .dash-bar-seg { min-width: 3px; }
  .dash-bar-seg:first-child { border-radius: 6px 0 0 6px; }
  .dash-bar-seg:last-child { border-radius: 0 6px 6px 0; }
  .dash-bar-seg:only-child { border-radius: 6px; }
  .dash-legend { display: flex; flex-wrap: wrap; gap: 6px 16px; margin-top: 8px; font-size: 11.5px; color: var(--sub); font-weight: 700; }
  .dash-legend-item { display: inline-flex; align-items: center; gap: 5px; }
  .dash-legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dash-legend-item b { color: var(--ink); font-weight: 800; }
  .dash-movers { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line); display: flex; flex-direction: column; gap: 8px; }
  /* 제목 열을 고정 폭 그리드로 분리 — 칩이 줄바꿈돼도 항상 첫 칩 아래로 정렬된다 */
  .dash-mover-row { display: grid; grid-template-columns: 68px 1fr; align-items: start; gap: 8px; }
  .dash-mover-title { font-size: 11px; font-weight: 800; color: #8a93a5; padding-top: 6px; white-space: nowrap; }
  .dash-mover-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  /* 상품 칩은 균일한 폭의 카드 그리드 — 행이 넘어가도 열이 맞는다 */
  .dash-mover-chips.products { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); }
  .dash-mover-chip {
    display: inline-flex; align-items: center; gap: 6px; min-width: 0;
    padding: 3px 10px; border: 1px solid var(--line); border-radius: 20px;
    background: #fafbfc; font-size: 12px; font-weight: 700; color: var(--ink);
    text-decoration: none; transition: border-color .12s, background .12s;
  }
  .dash-mover-chip:hover { border-color: #f0b79d; background: #fffaf7; }
  .dash-mover-chips.products .dash-mover-chip { border-radius: var(--radius); padding: 5px 10px; }
  .dash-mover-delta { font-family: var(--font-mono); font-size: 11px; font-weight: 700; }
  .dash-mover-delta.up { color: #16a34a; }
  .dash-mover-delta.down { color: var(--danger); }
  .dash-mover-rank { font-size: 11px; color: var(--sub); font-family: var(--font-mono); white-space: nowrap; }
  .chip-thumb { width: 18px; height: 18px; border-radius: 3px; object-fit: cover; flex-shrink: 0; }
  /* 상품명이 남는 공간을 차지하고, 키워드·순위는 오른쪽 끝에 고정 */
  .chip-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: left; }
  .chip-keyword { font-size: 11px; color: var(--sub); white-space: nowrap; }
  @media (max-width: 900px) {
    .rank-dash-tiles { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .dash-tile:nth-child(4) { border-left: none; padding-left: 2px; }
  }

  .product-table {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 0 10px 10px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: #fff;
    overflow: hidden;
    box-shadow: 0 14px 34px rgba(5, 7, 11, 0.05);
  }
  .product-table-head {
    display: grid;
    grid-template-columns: 38px 86px minmax(280px, 1fr) 120px 88px 64px 76px 112px;
    align-items: center;
    margin: 10px 10px 0;
    padding: 9px 14px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: #fafbfc;
    color: #8a93a5;
    font-size: 11.5px;
    font-weight: 800;
    text-align: center;
  }
  .product-group {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: visible;
    margin: 0 10px;
    transition: border-color .14s, box-shadow .14s;
  }
  .product-group:hover {
    border-color: #d9dee8;
    box-shadow: 0 10px 24px rgba(5, 7, 11, 0.06);
  }
  .product-table .product-group:last-child { margin-bottom: 10px; }
  .product-group.open { border-color: #f0b79d; box-shadow: 0 12px 28px rgba(232, 93, 47, 0.08); }
  .product-group.checked {
    border-color: #f0b79d;
    background: #fffaf7;
    box-shadow: 0 12px 28px rgba(232, 93, 47, 0.1);
  }
  .product-main-row {
    display: grid;
    grid-template-columns: 38px 86px minmax(280px, 1fr) 120px 88px 64px 76px 112px;
    align-items: center;
    gap: 0;
    min-height: 76px;
    padding: 10px 14px;
    /* 행 클릭 펼침을 없앴으므로 텍스트 선택/복사가 자유롭다 — 펼침은 +버튼 전용 */
    border-radius: calc(var(--radius) - 1px);
  }
  /* 펼쳐진 상태에서는 아래로 키워드 패널이 이어지므로 아래 모서리는 각지게 */
  .product-group.open .product-main-row { border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
  .product-main-row:hover { background: #fffaf7; }
  .expand-btn {
    width: 24px;
    height: 24px;
    border: 1px solid var(--line);
    border-radius: 50%;
    background: #fafbfc;
    color: var(--sub);
    font-size: 14px;
    font-weight: 800;
    line-height: 1;
    cursor: pointer;
    flex-shrink: 0;
  }
  .expand-btn:hover,
  .product-group.open .expand-btn { border-color: var(--accent); background: var(--accent-tint); color: var(--accent-dark); }
  .product-group.open .expand-btn::before { content: "-"; }
  .expand-btn::before { content: "+"; }
  .product-thumb {
    width: 56px;
    height: 56px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: var(--gray-badge);
    object-fit: cover;
    justify-self: center;
  }
  .product-thumb-link {
    width: 56px;
    height: 56px;
    display: block;
    justify-self: center;
  }
  .product-thumb-link .product-thumb { display: block; }
  .product-thumb.empty {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: #c3c9d4;
    font-size: 10px;
    font-family: var(--font-mono);
    font-weight: 800;
  }
  .product-info { min-width: 0; padding-right: 16px; }
  .product-name {
    display: block;
    width: fit-content;
    max-width: 100%;
    font-size: 14px;
    font-weight: 800;
    color: var(--ink);
    text-decoration: none;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .product-name:hover { color: var(--accent-dark); text-decoration: underline; text-underline-offset: 3px; }
  .product-sub { margin-top: 3px; font-size: 11.5px; color: var(--sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .product-sub .product-code-inline { font-family: var(--font-mono); font-weight: 800; color: #687386; }
  .product-sub .product-price-inline { font-family: var(--font-mono); font-weight: 800; color: var(--accent-dark); }
  .main-keyword-cell { text-align: center; font-size: 13px; font-weight: 900; color: var(--ink); }
  .main-keyword-cell span {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 72px;
    padding: 4px 8px;
    border-radius: 999px;
    background: #f7f8fa;
  }
  .product-count {
    justify-self: center;
    min-width: 56px;
    text-align: center;
    font-size: 11.5px;
    font-weight: 800;
    color: var(--sub);
    white-space: nowrap;
    padding: 4px 8px;
    border-radius: 999px;
    background: #f7f8fa;
  }
  .product-actions { display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
  .action-btn {
    position: relative;
    width: 30px;
    height: 30px;
    flex-shrink: 0;
    border: 1px solid var(--line);
    border-radius: 50%;
    background: #fff;
    color: #9aa3b3;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all .14s;
  }
  .action-btn:hover { border-color: #d7dde7; color: var(--ink); background: #fafbfc; }
  .action-btn svg { width: 15px; height: 15px; }
  .action-btn.has-memo,
  .action-btn.checked,
  .action-btn.tracked {
    border-color: #f0b79d;
    background: var(--accent-tint);
    color: var(--accent-dark);
    box-shadow: none;
  }
  .action-btn.checked:hover,
  .action-btn.tracked:hover {
    border-color: #d7dde7;
    background: #fafbfc;
    color: var(--ink);
  }
  .action-tip {
    position: absolute;
    left: 50%;
    bottom: 38px;
    z-index: 25;
    transform: translate(-50%, 4px);
    padding: 8px 10px;
    border-radius: 6px;
    background: #161a22;
    color: #fff;
    font-size: 12px;
    font-weight: 800;
    line-height: 1.2;
    white-space: nowrap;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transition: all .12s;
    box-shadow: 0 14px 34px rgba(5, 7, 11, 0.22);
  }
  .action-btn:hover .action-tip { opacity: 1; visibility: visible; transform: translate(-50%, 0); }
  .action-btn.has-memo:hover .action-tip { opacity: 0; visibility: hidden; }
  .memo-tip {
    position: absolute;
    right: 0;
    bottom: 36px;
    z-index: 20;
    width: 280px;
    padding: 12px;
    border-radius: var(--radius);
    background: #161a22;
    color: #fff;
    box-shadow: 0 14px 34px rgba(5, 7, 11, 0.22);
    font-size: 12px;
    line-height: 1.45;
    text-align: left;
    opacity: 0;
    visibility: hidden;
    transform: translateY(4px);
    transition: all .12s;
    pointer-events: none;
  }
  .action-btn.has-memo:hover .memo-tip { opacity: 1; visibility: visible; transform: translateY(0); }
  .memo-tip-item + .memo-tip-item { margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,.12); }
  .memo-tip-date { color: var(--accent); font-size: 11px; font-weight: 800; margin-bottom: 2px; }
  .rank-badge {
    min-width: 56px; text-align: center; padding: 5px 4px; border-radius: var(--radius);
    font-weight: 800; font-size: 14px; font-family: var(--font-mono); white-space: nowrap;
    line-height: 1.1;
    background: var(--gray-badge); color: var(--sub);
  }
  .rank-badge small {
    display: block;
    margin-top: 2px;
    font-family: var(--font-main);
    font-size: 10px;
    font-weight: 700;
  }
  .rank-badge.p1 { background: var(--accent-tint); color: var(--accent-dark); }
  .rank-badge.p23 { background: var(--dark-tint); color: var(--ink); }
  .rank-badge.none { background: #fdecec; color: var(--danger); font-size: 12px; line-height: 1.4; }
  .rank-delta { min-width: 34px; font-size: 11.5px; font-weight: 700; font-family: var(--font-mono); text-align: center; }
  .keyword-volume {
    min-width: 74px; display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; color: var(--sub); font-family: var(--font-mono); white-space: nowrap; flex-shrink: 0;
  }
  .keyword-volume svg { width: 11px; height: 11px; flex-shrink: 0; opacity: .55; }
  .rank-delta.up { color: #16a34a; }
  .rank-delta.down { color: var(--danger); }
  .rank-delta.same { color: #c3c9d4; }
  .product-keywords { display: none; border-top: 1px solid var(--line); padding: 6px 0; background: #fffaf7; border-radius: 0 0 var(--radius) var(--radius); overflow: hidden; }
  .product-group.open .product-keywords { display: block; }

  .keyword-rank-row {
    display: flex; align-items: center; gap: 10px; padding: 7px 18px 7px 236px;
    font-size: 12.5px; border-bottom: 1px solid rgba(232, 93, 47, 0.08);
  }
  .keyword-rank-row:last-child { border-bottom: none; }
  .keyword-name { flex: 1; min-width: 0; color: var(--ink); font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-decoration: none; }
  .keyword-name:hover { color: var(--accent-dark); text-decoration: underline; text-underline-offset: 3px; }
  .keyword-main { font-size: 11.5px; color: var(--sub); min-width: 96px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .keyword-type {
    min-width: 38px;
    text-align: center;
    padding: 2px 6px;
    border-radius: 10px;
    background: var(--dark-tint);
    color: var(--sub);
    font-size: 10.5px;
    font-weight: 800;
  }
  .keyword-type.main { background: var(--accent-tint); color: var(--accent-dark); }
  .empty { margin-top: 16px; padding: 18px; background: #fff; border: 1px solid var(--line); border-radius: var(--radius); color: var(--sub); font-size: 13px; }
  .rank-loading-shell {
    width: 100%;
    min-height: 250px;
    margin-top: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 52px 20px 60px;
    color: var(--sub);
    text-align: center;
  }
  .rank-loading-shell .rank-loading {
    flex-direction: column;
    gap: 12px;
  }
  .rank-loading-shell strong { color: var(--ink); font-size: 14px; font-weight: 900; }
  .rank-loading-shell span { font-size: 12px; }
  .rank-loading-shell .spinner {
    width: 36px;
    height: 36px;
    border-width: 4px;
    border-color: var(--dark-tint);
    border-top-color: var(--accent);
    animation-duration: .8s;
  }

  .memo-modal-backdrop {
    position: fixed;
    inset: 0;
    z-index: 9000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: rgba(5, 7, 11, 0.42);
    overflow-y: auto;
  }
  .memo-modal-backdrop.open { display: flex; }
  .memo-modal {
    width: min(520px, 100%);
    max-height: calc(100vh - 64px);
    border: 1px solid rgba(5, 7, 11, 0.12);
    border-radius: 8px;
    background: #fff;
    box-shadow: 0 24px 70px rgba(5, 7, 11, 0.24);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .memo-modal-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--line);
  }
  .memo-modal-title { font-size: 16px; font-weight: 900; color: var(--ink); }
  .memo-modal-sub { margin-top: 3px; font-size: 12px; color: var(--sub); }
  .memo-close {
    width: 30px;
    height: 30px;
    border: 1px solid var(--line);
    border-radius: 50%;
    background: #fff;
    color: var(--sub);
    font-size: 18px;
    cursor: pointer;
  }
  .memo-modal-body { padding: 16px 20px 20px; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }
  .memo-list { max-height: min(320px, calc(100vh - 280px)); overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .memo-item { display: flex; justify-content: space-between; gap: 12px; padding: 10px 12px; border: 1px solid var(--line); border-radius: var(--radius); background: #fafbfc; }
  .memo-item-date { font-size: 11px; color: var(--accent); font-weight: 800; margin-bottom: 3px; }
  .memo-item-text { font-size: 13px; color: var(--ink); line-height: 1.45; white-space: pre-wrap; }
  .memo-delete { border: 0; background: transparent; color: var(--danger); font-size: 12px; font-weight: 800; cursor: pointer; }
  .memo-input-row { display: flex; gap: 8px; }
  .memo-input-row textarea {
    flex: 1;
    height: 76px;
    resize: none;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 10px 12px;
    font-family: inherit;
    font-size: 13px;
    outline: none;
  }

];

function getDisplayKeywords(categoryName) {

function getDetailKeywords(categoryName) {

function getVisibleKeywords(product, categoryName) {

function productHasKeywordOrName(product, keywords) {

function productHasKeyword(product, keywords) {

function isBlockedFromCategory(product, categoryName) {

}

function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function timeAgo(iso) {
  const diffMin = Math.floor((Date.now() - new Date(iso).getTime()) / 60000);
  if (diffMin < 1) return "방금";
  if (diffMin < 60) return diffMin + "분 전";
  const hr = Math.floor(diffMin / 60);
  if (hr < 24) return hr + "시간 전";
  return Math.floor(hr / 24) + "일 전";
}

async function fetchHistory(store) {
  const base = `${SUPABASE_URL}/rest/v1/keyword_rank_history?store_name=eq.${encodeURIComponent(store)}`;
  const order = `&order=collected_date.desc,checked_at.desc`;
  const headers = { "apikey": SUPABASE_ANON_KEY, "Authorization": "Bearer " + SUPABASE_ANON_KEY };
  const selects = [
    `&select=keyword,main_keyword,is_sub,rank,max_rank,product_code,product_name,product_image,product_link,product_price,search_volume_pc,search_volume_mobile,search_volume_total,collected_date,checked_at`,
    `&select=keyword,main_keyword,is_sub,rank,max_rank,product_code,product_name,product_image,product_link,product_price,collected_date,checked_at`,
    `&select=keyword,main_keyword,is_sub,rank,max_rank,product_code,product_name,product_image,collected_date,checked_at`,
    `&select=keyword,main_keyword,is_sub,rank,max_rank,product_code,product_name,collected_date,checked_at`,
  ];
  for (const select of selects) {
    const first = await fetch(base + select + order + `&offset=0&limit=1000`, { headers });
    if (!first.ok) {
      if (first.status === 400) continue; // 없는 컬럼이면 다음 select로 재시도
      throw new Error("조회 실패 (" + first.status + ")");
    }
    // Supabase는 요청당 최대 1,000행만 주므로 페이지를 돌며 최대 6,000행까지 수집
    const rows = await first.json();
    for (let page = 1; page < 6 && rows.length === page * 1000; page++) {
      const res = await fetch(base + select + order + `&offset=${page * 1000}&limit=1000`, { headers });
      if (!res.ok) break;
      const more = await res.json();
      rows.push(...more);
      if (more.length < 1000) break;
    }
    return rows;
  }
  throw new Error("조회 실패 (컬럼 불일치)");
}

async function fetchProductMasters() {
  const url = `${SUPABASE_URL}/rest/v1/product_rankings?select=code,keyword,category_tab,image_url,name,memo,is_checked`;
  const headers = { "apikey": SUPABASE_ANON_KEY, "Authorization": "Bearer " + SUPABASE_ANON_KEY };
  const rows = [];
  for (let page = 0; page < 10; page++) {
    const res = await fetch(url + `&offset=${page * 1000}&limit=1000`, { headers });
    if (!res.ok) throw new Error("상품 마스터 조회 실패 (" + res.status + ")");
    const more = await res.json();
    rows.push(...more);
    if (more.length < 1000) break;
  }
  return rows;
}

function deltaHtml(delta) {

  if (delta < 0) return `<span class="rank-delta down">▼${Math.abs(delta)}</span>`;
  return `<span class="rank-delta same">-</span>`;
}

function productUrl(product) {

function keywordUrl(keyword) {

function rankDate(row) {
  return row.collected_date || row.checked_at.slice(0, 10);
}

function keywordSortIndex(row) {
  if (row?.keyword && ETC_MAIN_KEYWORDS.includes(row.keyword)) {
    return 800000 + ETC_MAIN_KEYWORDS.indexOf(row.keyword) * 1000;
  }
  if (row?.main_keyword && ETC_MAIN_KEYWORDS.includes(row.main_keyword)) {
    return 800000 + ETC_MAIN_KEYWORDS.indexOf(row.main_keyword) * 1000 + 1;
  }
  const mainIdx = KW_TREE.findIndex(g => g.main === row.main_keyword);
  if (mainIdx < 0) return 9999;
  const group = KW_TREE[mainIdx];
  if (!row.is_sub) return mainIdx * 1000;
  const subIdx = group.subs.indexOf(row.keyword);
  return mainIdx * 1000 + 1 + (subIdx < 0 ? 500 : subIdx);
}

function normalizeCategory(category) {
  return getTrackerCategories().includes(category) ? category : "기타";
}

function inferCategoryFromKeywords(keywords) {
  const tokens = new Set();
  const keywordTokens = new Set();
  const mainKeywordTokens = new Set();
  keywords.forEach(k => {
    if (k.keyword) {
      tokens.add(k.keyword);
      keywordTokens.add(k.keyword);
      if (!k.is_sub) mainKeywordTokens.add(k.keyword);
    }
    if (k.main_keyword) tokens.add(k.main_keyword);
  });
  if (HARD_ETC_MAIN_KEYWORDS.some(keyword => mainKeywordTokens.has(keyword))) return "기타";
  const displayGroups = STORE_CATEGORY_DISPLAY_KEYWORDS[selectedStore];
  if (displayGroups) {
    for (const category of getTrackerCategories()) {
      const displayKeywords = displayGroups[category] || [];
      if (displayKeywords.some(keyword => keywordTokens.has(keyword))) return category;
    }
    return "기타";
  }
  for (const category of getTrackerCategories()) {
    if (category === "기타") continue;
    if (CATEGORY_MAIN_KEYWORD[category] && keywordTokens.has(CATEGORY_MAIN_KEYWORD[category])) {
      return category;
    }
  }
  if (SOFT_ETC_MAIN_KEYWORDS.some(keyword => mainKeywordTokens.has(keyword))) return "기타";
  if (HARD_ETC_KEYWORDS.some(keyword => tokens.has(keyword))) return "기타";
  if (ETC_MAIN_KEYWORDS.some(keyword => tokens.has(keyword))) return "기타";
  if (FORCE_ETC_KEYWORDS.some(keyword => tokens.has(keyword))) return "기타";
  for (const category of getTrackerCategories()) {
    if (category === "기타") continue;
    if ((CATEGORY_KEYWORD_GROUPS[category] || []).some(keyword => tokens.has(keyword))) {
      return category;
    }
  }
  return "기타";
}

function hasMainKeyword(keywords, keywordList) {
  return keywords.some(k => !k.is_sub && keywordList.includes(k.keyword));
}

function resolveProductCategory(product) {
  if (PRODUCT_CATEGORY_OVERRIDES[product.code]) return PRODUCT_CATEGORY_OVERRIDES[product.code];
  if (selectedStore === "에너가드컴퍼니") return inferCategoryFromKeywords(product.keywords);
  if (hasMainKeyword(product.keywords, HARD_ETC_MAIN_KEYWORDS)) return "기타";
  const normalized = normalizeCategory(product.category);
  if (normalized !== "기타") return normalized;
  return inferCategoryFromKeywords(product.keywords);
}

function normalizeText(value) {
  return String(value || "").replace(/\s+/g, " ").trim();
}

function parseMemos(raw) {
  if (!raw) return [];
  if (Array.isArray(raw)) return raw;
  try {
    const parsed = JSON.parse(String(raw));
    return Array.isArray(parsed) ? parsed : [];
  } catch (_) {
    return [];
  }
}

function nowMemoDate() {
  const d = new Date();
  const pad = n => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function buildMasterMaps(masters) {
  const byCodeKeyword = new Map();
  const byCode = new Map();
  const byNameKeyword = new Map();
  const byName = new Map();

  masters.forEach(master => {
    const code = normalizeText(master.code);
    const keyword = normalizeText(master.keyword);
    const name = normalizeText(master.name);
    const normalized = {
      code,
      category: normalizeCategory(master.category_tab),
      image: master.image_url || "",
      name: master.name || "",
      memos: parseMemos(master.memo),
      isChecked: master.is_checked === true,
    };
    if (code && keyword) byCodeKeyword.set(code + "|" + keyword, normalized);
    if (code && !byCode.has(code)) byCode.set(code, normalized);
    if (name && keyword) byNameKeyword.set(name + "|" + keyword, normalized);
    if (name && !byName.has(name)) byName.set(name, normalized);
  });

  return { byCodeKeyword, byCode, byNameKeyword, byName };
}

function findProductMaster(row, masterMaps) {
  if (!masterMaps) return null;
  const code = normalizeText(row.product_code);
  const keyword = normalizeText(row.keyword);
  const name = normalizeText(row.product_name);
  return masterMaps.byCodeKeyword.get(code + "|" + keyword)
    || masterMaps.byCode.get(code)
    || masterMaps.byNameKeyword.get(name + "|" + keyword)
    || masterMaps.byName.get(name)
    || null;
}

function buildProducts(rows, masterMaps) {
  const latestDate = rows[0]?.collected_date || rows[0]?.checked_at?.slice(0, 10) || "";
  const latestRows = rows.filter(r => rankDate(r) === latestDate && r.rank != null && r.product_code);
  const previousByProductKeyword = new Map();
  const historyByProductKeyword = new Map();

  rows.forEach(row => {
    if (row.product_code && row.rank != null) {
      const historyKey = row.product_code + "|" + row.keyword;
      if (!historyByProductKeyword.has(historyKey)) historyByProductKeyword.set(historyKey, new Map());
      const dateMap = historyByProductKeyword.get(historyKey);
      const date = rankDate(row);
      if (date && !dateMap.has(date)) dateMap.set(date, Number(row.rank));
    }
    if (!row.product_code || row.rank == null || rankDate(row) === latestDate) return;
    const key = row.product_code + "|" + row.keyword;
    if (!previousByProductKeyword.has(key)) previousByProductKeyword.set(key, row);
  });

  const byProduct = new Map();
  latestRows.forEach(row => {
    const code = row.product_code;
    const master = findProductMaster(row, masterMaps);
    if (!byProduct.has(code)) {
      byProduct.set(code, {
        code,
        name: master?.name || row.product_name || "(상품명 없음)",
        image: master?.image || row.product_image || "",
        link: row.product_link || "",
        price: Number(row.product_price) || 0,
        category: master?.category || "기타",
        masterCode: master?.code || code,
        memos: master?.memos || [],
        isChecked: master?.isChecked || false,
        checkedAt: row.checked_at,
        keywords: [],
      });
    }
    const product = byProduct.get(code);
    if (product.category === "기타" && master?.category) product.category = master.category;
    if (!product.masterCode && master?.code) product.masterCode = master.code;
    if (!product.isChecked && master?.isChecked) product.isChecked = true;
    if ((!product.memos || !product.memos.length) && master?.memos?.length) product.memos = master.memos;
    if (!product.image && (master?.image || row.product_image)) product.image = master?.image || row.product_image;
    if (!product.link && row.product_link) product.link = row.product_link;
    if (!product.price && row.product_price) product.price = Number(row.product_price) || 0;
    if (master?.name && product.name === "(상품명 없음)") product.name = master.name;
    if (row.product_name && product.name === "(상품명 없음)") product.name = row.product_name;
    if (new Date(row.checked_at) > new Date(product.checkedAt)) product.checkedAt = row.checked_at;
    const prev = previousByProductKeyword.get(code + "|" + row.keyword);
    const delta = prev && prev.rank != null && row.rank != null ? prev.rank - row.rank : null;
    const historyMap = historyByProductKeyword.get(code + "|" + row.keyword) || new Map();
    const history = [...historyMap.entries()]
      .map(([date, rank]) => ({ date, rank }))
      .sort((a, b) => a.date.localeCompare(b.date));
    product.keywords.push({ ...row, delta, history });
  });

  return [...byProduct.values()].map(product => {
    product.keywords.sort((a, b) => Number(a.is_sub) - Number(b.is_sub) || rankSortValue(a.rank) - rankSortValue(b.rank) || keywordSortIndex(a) - keywordSortIndex(b));
    product.bestRank = product.keywords[0]?.rank ?? null;
    product.mainBestRank = product.keywords.filter(k => !k.is_sub).sort((a, b) => rankSortValue(a.rank) - rankSortValue(b.rank) || keywordSortIndex(a) - keywordSortIndex(b))[0]?.rank ?? null;
    product.mainKeywordCount = product.keywords.filter(k => !k.is_sub).length;
    return product;
  }).sort((a, b) => (a.mainBestRank ?? 9999) - (b.mainBestRank ?? 9999) || (a.bestRank ?? 9999) - (b.bestRank ?? 9999) || b.keywords.length - a.keywords.length || a.name.localeCompare(b.name, "ko"));
}

function categorySortIndex(categoryName) {
  const idx = getTrackerCategories().findIndex(category => category === categoryName);
  return idx < 0 ? 9999 : idx;
}

function getCategoryLeadKeyword(product, categoryName) {
  const displayKeywords = getDisplayKeywords(categoryName);
  if (displayKeywords) {
    const detailKeywords = getDetailKeywords(categoryName) || displayKeywords;
    return getVisibleKeywords(product, categoryName)
      .sort((a, b) =>
        Number(a.rank == null) - Number(b.rank == null)
        || detailKeywords.indexOf(a.keyword) - detailKeywords.indexOf(b.keyword)
        || (a.rank ?? 9999) - (b.rank ?? 9999)
      )[0] || null;
  }
  if (categoryName === "기타") {
    const etcMain = product.keywords
      .filter(k => !k.is_sub && ETC_MAIN_KEYWORDS.includes(k.keyword))
      .sort((a, b) => ETC_MAIN_KEYWORDS.indexOf(a.keyword) - ETC_MAIN_KEYWORDS.indexOf(b.keyword) || rankSortValue(a.rank) - rankSortValue(b.rank))[0];
    if (etcMain) return etcMain;
    const etcGrouped = product.keywords
      .filter(k => ETC_MAIN_KEYWORDS.includes(k.main_keyword))
      .sort((a, b) => ETC_MAIN_KEYWORDS.indexOf(a.main_keyword) - ETC_MAIN_KEYWORDS.indexOf(b.main_keyword) || Number(a.is_sub) - Number(b.is_sub) || rankSortValue(a.rank) - rankSortValue(b.rank))[0];
    if (etcGrouped) return etcGrouped;
  }
  const preferred = CATEGORY_MAIN_KEYWORD[categoryName];
  if (preferred) {
    const exact = product.keywords.find(k => k.keyword === preferred);
    if (exact) return exact;
  }
  return product.keywords.find(k => !k.is_sub) || product.keywords[0] || null;
}

function categoryProductSort(categoryName) {
  return (a, b) => {
    const aLead = getCategoryLeadKeyword(a, categoryName);
    const bLead = getCategoryLeadKeyword(b, categoryName);
    const displayKeywords = getDisplayKeywords(categoryName);
    if (displayKeywords) {
      return displayKeywords.indexOf(aLead?.keyword) - displayKeywords.indexOf(bLead?.keyword)
        || (aLead?.rank ?? 9999) - (bLead?.rank ?? 9999)
        || a.name.localeCompare(b.name, "ko");
    }
    return keywordSortIndex(aLead || {}) - keywordSortIndex(bLead || {})
      || (aLead?.rank ?? 9999) - (bLead?.rank ?? 9999)
      || (a.mainBestRank ?? 9999) - (b.mainBestRank ?? 9999)
      || (a.bestRank ?? 9999) - (b.bestRank ?? 9999)
      || b.keywords.length - a.keywords.length
      || a.name.localeCompare(b.name, "ko");
  };
}

function buildCategorySections(products) {
  const byCategory = new Map();
  const allowedCategories = getTrackerCategories();
  const displayGroups = STORE_CATEGORY_DISPLAY_KEYWORDS[selectedStore];

  products.forEach(product => {
    if (displayGroups) {
      allowedCategories.forEach(categoryName => {
        if (isBlockedFromCategory(product, categoryName)) return;
        if (!getVisibleKeywords(product, categoryName).length) return;
        if (!byCategory.has(categoryName)) byCategory.set(categoryName, []);
        byCategory.get(categoryName).push(product);
      });
      return;
    }
    const categoryName = resolveProductCategory(product);
    if (!allowedCategories.includes(categoryName)) return;
    if (!byCategory.has(categoryName)) byCategory.set(categoryName, []);
    byCategory.get(categoryName).push(product);
  });

  return [...byCategory.entries()].map(([name, categoryProducts]) => {
    categoryProducts.sort(categoryProductSort(name));
    return {
      name,
      products: categoryProducts,
      keywordCount: categoryProducts.reduce((sum, product) => sum + getVisibleKeywords(product, name).length, 0),
    };
  }).sort((a, b) => categorySortIndex(a.name) - categorySortIndex(b.name) || a.name.localeCompare(b.name, "ko"));
}

function renderProductCard(product, categoryName) {
  const mainKeyword = getCategoryLeadKeyword(product, categoryName);
  const visibleKeywords = getVisibleKeywords(product, categoryName);
  const subCount = Math.max(0, visibleKeywords.length - 1);
  const trackCodes = new Set([product.code, product.masterCode].filter(Boolean).map(code => String(code)));
  const isTracked = trackedItems.some(item => trackCodes.has(String(item.product_code)));
  const itemUrl = productUrl(product);
  const productPrice = formatProductPrice(product.price);
  const priceHtml = productPrice ? ` · <span class="product-price-inline">판매가 ${esc(productPrice)}</span>` : "";
  const productNameHtml = itemUrl

  const memos = parseMemos(product.memos);
  const memoTip = memos.length ? `<div class="memo-tip">${
    [...memos].slice(-3).reverse().map(m => `

  const isCategoryExpanded = expandedCategories.has(categoryName);

  return `<div class="product-group${product.isChecked ? " checked" : ""}${isCategoryExpanded ? " open" : ""}">
    <div class="product-main-row">

      <div class="product-info">
        ${productNameHtml}
        <div class="product-sub"><span class="product-code-inline">${esc(product.code)}</span>${priceHtml}</div>
      </div>
      <span class="main-keyword-cell"><span>${esc(mainKeyword?.keyword || "-")}</span></span>
      ${rankBadgeHtml(mainKeyword?.rank ?? null)}
      ${deltaHtml(mainKeyword?.delta ?? null)}
      <span class="product-count">보조 ${subCount}개</span>
      <span class="product-actions">
        <button type="button" class="action-btn${memos.length ? " has-memo" : ""}" onclick="openMemoModal(event, '${esc(product.code)}')" aria-label="메모">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/></svg>
          <span class="action-tip">메모</span>

        <button type="button" class="action-btn${product.isChecked ? " checked" : ""}" onclick="toggleProductCheck(event, '${esc(product.code)}')" aria-label="중요 체크">

          <span class="action-tip">중요 체크</span>
        </button>
        <button type="button" class="action-btn${isTracked ? " tracked" : ""}" onclick="trackFromProduct(event, '${esc(product.code)}')" aria-label="${isTracked ? "아이템 추적 중" : "아이템 추적에 추가"}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3"/><path d="M12 2v3"/><path d="M12 19v3"/><path d="M2 12h3"/><path d="M19 12h3"/></svg>
          <span class="action-tip">${isTracked ? "추적 중" : "아이템 추적"}</span>
