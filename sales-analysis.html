<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>매출분석 - 에너가드컴퍼니</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css?v=20260714-tipfix">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #f8f9fb; --card: #fff; --ink: #1a1f2e; --sub: #5a6378;
    --line: #e8ecf2; --dark: #05070b; --dark-tint: #eef0f3;
    --accent: #e85d2f; --accent-dark: #d04420; --accent-tint: #fdeee7;
    --good: #0f9f6e; --bad: #dc2626; --gray-badge: #eef0f3;
    --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    --font-main: "Pretendard Variable", Pretendard, -apple-system, sans-serif;
    --radius: 6px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scrollbar-gutter: stable; }
  body { font-family: var(--font-main); background: var(--bg); color: var(--ink); font-size: 15px; line-height: 1.55; }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 64px 0 80px; }
  header.page-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 20px; }
  header.page-head h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; }
  header.page-head .tag { font-size: 12px; font-weight: 600; color: var(--dark); background: var(--dark-tint); padding: 2px 8px; border-radius: 20px; }

  .card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 20px; }
  .toolbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .field { display: flex; align-items: center; gap: 6px; color: var(--sub); font-size: 12px; font-weight: 800; }
  .field input, .field select {
    height: 32px; border: 1px solid var(--line); border-radius: 4px; padding: 0 9px;
    font-family: inherit; background: #fff; color: var(--ink);
  }
  .hidden-date-inputs { display: none; }
  .date-picker-wrap { position: relative; }
  .month-quick-row { display: flex; align-items: center; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
  .month-quick-label { flex-shrink: 0; color: var(--sub); font-size: 11.5px; font-weight: 800; }
  .month-quick-year {
    flex-shrink: 0; height: 34px; padding: 0 10px; border: 1px solid var(--line); border-radius: var(--radius);
    background: #fff; color: var(--ink); font-family: inherit; font-size: 12.5px; font-weight: 800; cursor: pointer;
  }
  /* 12개월이 남은 폭 전체를 균등하게 채운다 — 플랫폼/서브 탭과 같은 카드 스타일 */
  .month-quick-grid { flex: 1; min-width: 0; display: grid; grid-template-columns: repeat(12, minmax(0, 1fr)); gap: 8px; }
  .month-card {
    height: 34px; border: 1px solid var(--line); border-radius: var(--radius);
    background: #fff; color: var(--sub); font-family: inherit; font-size: 12.5px; font-weight: 800; cursor: pointer;
    transition: all .12s;
  }
  .month-card:hover { border-color: #c8cdd4; color: var(--ink); background: #fff; }
  .month-card.active { background: var(--ink); border-color: var(--ink); color: #fff; }
  .month-card.active:hover { background: var(--ink); color: #fff; }
  .month-card:disabled { color: #c3cad6; background: #fafbfc; cursor: default; }
  .month-card:disabled:hover { border-color: var(--line); color: #c3cad6; background: #fafbfc; }
  @media (max-width: 900px) { .month-quick-grid { grid-template-columns: repeat(6, minmax(0, 1fr)); } }
  .date-range-btn {
    min-width: 218px;
    justify-content: space-between;
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .date-popover {
    position: absolute;
    left: 0;
    top: 40px;
    z-index: 20;
    display: none;
    width: 520px;
    max-width: calc(100vw - 28px);
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 8px;
    box-shadow: 0 18px 42px rgba(5, 7, 11, 0.16);
    overflow: hidden;
  }
  .date-popover.open { display: grid; grid-template-columns: 150px minmax(0, 1fr); }
  .preset-list {
    padding: 8px;
    border-right: 1px solid var(--line);
    background: #fafbfc;
  }
  .preset-btn {
    width: 100%;
    height: 34px;
    padding: 0 10px;
    border: 0;
    border-radius: 5px;
    background: transparent;
    color: var(--ink);
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    text-align: left;
    cursor: pointer;
  }
  .preset-btn:hover { background: #eef0f3; }
  .preset-btn.active { background: var(--accent); color: #fff; }
  .date-custom { padding: 10px; }
  .date-custom-row { display: flex; align-items: center; gap: 8px; }
  .date-custom-row input {
    min-width: 148px;
    width: 100%;
    height: 36px;
    border: 1px solid var(--line);
    border-radius: 5px;
    padding: 0 9px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
  }
  .date-custom-row span { color: var(--sub); font-weight: 900; }
  .cal-nav { display: flex; align-items: center; justify-content: center; gap: 6px; margin: 10px 0 4px; }
  .cal-nav b { min-width: 100px; text-align: center; font-size: 13px; font-weight: 900; }
  .cal-nav-btn {
    width: 26px; height: 26px; border: 0; background: transparent;
    color: var(--sub); font-family: inherit; font-size: 14px; font-weight: 900;
    cursor: pointer; border-radius: 4px;
  }
  .cal-nav-btn:hover { background: #eef0f3; color: var(--ink); }
  .cal-weekdays {
    display: grid; grid-template-columns: repeat(7, 1fr);
    text-align: center; font-size: 11px; font-weight: 900; color: var(--sub);
    padding: 4px 2px 6px; border-bottom: 1px solid var(--line);
  }
  .cal-scroll { position: relative; height: 300px; overflow-y: auto; padding: 2px 2px 10px; }
  .cal-month-label { margin: 12px 4px 6px; font-size: 12px; font-weight: 900; color: var(--ink); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); row-gap: 2px; }
  .cal-day {
    height: 30px; border: 0; background: transparent;
    font-family: inherit; font-size: 12px; font-weight: 700; color: var(--ink);
    cursor: pointer; border-radius: 6px;
  }
  .cal-day:hover { background: #eef0f3; }
  .cal-day.in-range { background: var(--accent-tint); border-radius: 0; }
  .cal-day.sel { background: var(--accent); color: #fff; }
  .cal-day.future { color: #c3cad6; cursor: default; }
  .cal-day.future:hover { background: transparent; }
  .date-popover-actions {
    grid-column: 1 / -1;
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    padding: 10px;
    border-top: 1px solid var(--line);
    background: #fff;
  }
  .btn {
    height: 32px; padding: 0 12px; border: 1.5px solid var(--line); border-radius: 4px;
    background: #fff; color: var(--ink); font-family: inherit; font-size: 12px; font-weight: 900;
    cursor: pointer; transition: all .12s;
  }
  .btn:hover { border-color: #c8cdd4; color: var(--ink); background: #fafbfd; }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); color: #fff; }
  .btn.danger { color: var(--bad); }

  /* ── 상단 카테고리 전환(스토어 분석/광고 분석) + 스토어 드롭박스 ──
     랭킹추적과 완전히 동일한 값: 탭 줄(.wrap > header)과 드롭박스 줄(.rank-filterbar)이
     세로로 분리된 두 블록이라 이 페이지도 같은 구조(.analysis-mode-header / .analysis-filterbar)로 맞춘다. */
  .analysis-mode-header { display: flex; align-items: flex-end; gap: 0; margin-bottom: 30px; }
  .analysis-filterbar {
    display: flex; align-items: center; gap: 16px; padding-bottom: 22px;
    border-bottom: 1px solid var(--line); margin-bottom: 24px;
  }
  /* 스토어 드롭박스 + 엑셀 업로드(+) 버튼 묶음 — 키워드분석(.keyword-store-row)과 동일하게
     좁은 간격(8px)으로 한 그룹처럼 붙여준다. */
  .analysis-store-row { display: inline-flex; align-items: center; gap: 8px; }
  .mode-title-tabs { display: inline-flex; align-items: center; gap: 28px; }
  .mode-title-tab {
    position: relative; height: 34px; padding: 0 0 8px; border: 0; background: transparent;
    color: #aeb6c4; font-family: inherit; font-size: 21px; font-weight: 900; cursor: pointer;
  }
  .mode-title-tab:not(.active):hover { color: #7f8795; }
  .mode-title-tab + .mode-title-tab::before {
    content: "";
    position: absolute;
    left: -15px;
    top: 4px;
    width: 1px;
    height: 18px;
    background: #d8dde6;
  }
  .mode-title-text { display: inline-flex; align-items: center; gap: 12px; }
  .mode-label { position: relative; display: inline-flex; align-items: center; }
  .mode-title-tab.active { color: #07111f; }
  .mode-title-tab.active .mode-label::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: -10px; height: 3px;
    background: var(--accent); border-radius: 999px;
  }
  .mode-help {
    width: 18px; height: 18px; border: 1px solid #cfd5df; border-radius: 50%;
    background: #f4f6f9; color: #8a93a5; font-size: 12px; font-weight: 900;
    display: inline-flex; align-items: center; justify-content: center; line-height: 1;
  }
  .store-chips { position: relative; display: block; flex: 0 0 auto; }
  .store-select {
    height: 42px; min-width: 150px; padding: 0 14px 0 18px; border: 1px solid #dfe4ec;
    border-radius: var(--radius); background: #fff; color: var(--sub); font-family: inherit;
    font-size: 14px; font-weight: 800; cursor: pointer; display: inline-flex;
    align-items: center; justify-content: space-between; gap: 18px;
  }
  .store-select:hover, .store-chips.open .store-select { border-color: #c8cdd4; background: #fafbfc; }
  .store-caret { display: inline-flex; align-items: center; justify-content: center; color: #8a93a5; line-height: 1; }
  .store-caret svg { width: 14px; height: 14px; }
  .store-menu {
    position: absolute; z-index: 50; top: calc(100% + 6px); right: 0; min-width: 100%;
    padding: 6px; border: 1px solid var(--line); border-radius: var(--radius);
    background: #fff; box-shadow: 0 16px 34px rgba(5, 7, 11, 0.12); display: none;
  }
  .store-chips.open .store-menu { display: flex; flex-direction: column; gap: 4px; }
  .store-chip {
    height: 34px; padding: 0 12px; border: 0; border-radius: 4px; background: transparent;
    color: var(--sub); font-family: inherit; font-size: 12.5px; font-weight: 800; text-align: left; cursor: pointer;
  }
  .store-chip:hover { background: #f4f6f9; color: var(--ink); }
  .store-chip.active { background: var(--ink); color: #fff; }

  .summary { margin-top: 12px; color: var(--sub); font-size: 13px; }
  .summary b { color: var(--ink); }
  .status { margin-top: 10px; color: var(--sub); font-size: 12px; }
  .status.error { color: var(--bad); }
  .status.ok { color: var(--good); }

  /* ── 요약 대시보드 — 랭킹추적의 .rank-dash와 동일한 스타일(하나의 박스 + 구분선) ── */
  .metric-grid { margin-top: 24px; }
  .rank-dash {
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: #fff;
    padding: 16px 18px 14px;
    box-shadow: 0 14px 34px rgba(5, 7, 11, 0.05);
  }
  .rank-dash-tiles {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 8px;
  }
  .dash-tile { padding: 4px 2px; min-width: 0; }
  .dash-tile + .dash-tile { border-left: 1px solid var(--line); padding-left: 14px; }
  .dash-label { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 800; color: #8a93a5; white-space: nowrap; }
  /* 값은 랭킹추적·키워드분석과 동일하게 본문 폰트(Pretendard) 사용 — 모노스페이스 강제하지 않음 */
  .dash-value {
    margin-top: 2px; font-size: 21px; font-weight: 800; color: var(--ink);
    font-variant-numeric: tabular-nums; letter-spacing: -0.01em; white-space: nowrap;
  }
  /* 근거 노트 — 키워드분석(.ins-info/.ins-tip)과 동일하게 타이틀 옆 물음표 아이콘에 마우스를 올리면 툴팁으로 표시 */
  .dash-info {
    position: relative;
    width: 14px; height: 14px; flex-shrink: 0;
    display: inline-flex; align-items: center; justify-content: center;
    border: 1px solid #cfd5df; border-radius: 50%;
    background: #f4f6f9; color: #8a93a5;
    font-size: 9.5px; font-weight: 900; cursor: default; line-height: 1;
  }
  /* 대시보드 타일 안에서는 .dash-label의 flex gap이 간격을 만들지만, 카드 제목(h2)처럼
     flex가 아닌 자리에 단독으로 들어갈 땐 글자와 바로 붙으므로 직접 여백을 준다 */
  h2 .dash-info { margin-left: 7px; }
  .dash-tip {
    position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(3px);
    z-index: 60; width: max-content; max-width: 230px;
    padding: 8px 11px; border-radius: 6px;
    background: #161a22; color: #fff;
    font-size: 11.5px; font-weight: 600; line-height: 1.5; text-align: left; white-space: normal;
    opacity: 0; visibility: hidden; transition: all .12s; pointer-events: none;
  }
  .dash-info:hover .dash-tip { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
  /* 카드 맨 위(overflow:hidden으로 잘리는 위치)의 아이콘은 위로 띄우면 카드 경계에 잘리므로 아래로 펼친다 */
  .dash-tip.down { bottom: auto; top: 22px; transform: translateX(-50%) translateY(-3px); }
  .dash-info:hover .dash-tip.down { transform: translateX(-50%) translateY(0); }

  /* 유입경로 비율 — 랭킹추적의 페이지 분포 바(.dash-bar-wrap)와 동일한 구조·스타일.
     채널은 순서(정체성) 데이터라 단일 색조 램프 대신 카테고리 팔레트를 쓴다(색상 6개 고정 순서 + 기타). */
  .dash-bar-wrap { margin-top: 14px; }
  .dash-bar { display: flex; gap: 2px; height: 12px; }
  .dash-bar-seg { min-width: 3px; }
  .dash-bar-seg:first-child { border-radius: 6px 0 0 6px; }
  .dash-bar-seg:last-child { border-radius: 0 6px 6px 0; }
  .dash-bar-seg:only-child { border-radius: 6px; }
  .dash-legend { display: flex; flex-wrap: wrap; gap: 6px 16px; margin-top: 8px; font-size: 11.5px; color: var(--sub); font-weight: 700; }
  .dash-legend-item { display: inline-flex; align-items: center; gap: 5px; }
  .dash-legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dash-legend-item b { color: var(--ink); font-weight: 800; }

  /* 상품별 판매량 랭킹 막대 — 같은 종류(상품)의 크기 비교이므로 카테고리 색이 아니라
     accent 단일 색조(랭킹추적·이 페이지 전반의 accent와 동일)로 그린다. */
  .rank-bar-list { display: flex; flex-direction: column; gap: 9px; padding: 16px; border-bottom: 1px solid var(--line); }
  .rank-bar-row { display: grid; grid-template-columns: 160px 1fr 76px; align-items: center; gap: 10px; }
  .rank-bar-name { font-size: 12px; font-weight: 700; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rank-bar-track { position: relative; height: 10px; background: var(--dark-tint); border-radius: 999px; overflow: hidden; }
  .rank-bar-fill { position: absolute; top: 0; left: 0; height: 100%; background: var(--accent); border-radius: 999px; }
  .rank-bar-value { font-size: 12px; font-weight: 800; color: var(--ink); text-align: right; font-family: var(--font-mono); white-space: nowrap; }

  /* 카테고리별 비율 도넛 — 순서 없는 정체성 데이터라 유입경로 바와 같은 카테고리 팔레트를 쓰고,
     범례도 같은 .dash-legend 컴포넌트를 재사용한다(≥2 시리즈는 항상 범례를 둔다는 원칙). */
  .donut-wrap { display: flex; align-items: center; gap: 20px; padding: 16px; border-bottom: 1px solid var(--line); flex-wrap: wrap; }
  .donut-wrap .dash-legend { flex-direction: column; gap: 6px; margin-top: 0; flex: 1 1 200px; }

  /* 매출 급증·급감 TOP — 랭킹추적의 .dash-movers(상승 TOP/하락 TOP)와 동일한 구조·스타일 */
  .dash-movers { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line); display: flex; flex-direction: column; gap: 8px; }
  .dash-mover-row { display: grid; grid-template-columns: 132px 1fr; align-items: start; gap: 8px; }
  .dash-mover-title { font-size: 11px; font-weight: 800; color: #8a93a5; padding-top: 6px; white-space: nowrap; }
  .dash-mover-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .dash-mover-chip {
    display: inline-flex; align-items: center; gap: 6px; min-width: 0;
    padding: 5px 10px; border: 1px solid var(--line); border-radius: var(--radius);
    background: #fafbfc; font-size: 12px; font-weight: 700; color: var(--ink);
  }
  .dash-mover-name { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .dash-mover-delta { font-family: var(--font-mono); font-size: 11px; font-weight: 800; white-space: nowrap; }
  .dash-mover-delta.up { color: var(--good); }
  .dash-mover-delta.down { color: var(--bad); }
  .dash-mover-value { font-size: 11px; color: var(--sub); font-family: var(--font-mono); white-space: nowrap; }
  .metric-cmp { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .metric-cmp .cmp {
    display: inline-flex; align-items: center; gap: 2px; font-size: 10.5px; font-weight: 800;
    padding: 1px 6px; border-radius: 8px; background: var(--dark-tint); color: var(--sub); white-space: nowrap;
  }
  .metric-cmp .cmp.up, .cmp-row .cmp.up { color: var(--good); background: #e7f6ec; }
  .metric-cmp .cmp.down, .cmp-row .cmp.down { color: var(--bad); background: #fdecec; }

  /* 상세 비교 행(전기간/전년) — 토글 스위치로 켜고 끔, 기본은 숨김 */
  .cmp-toggle-bar { display: flex; justify-content: flex-end; align-items: center; padding: 10px 14px 0; }
  .switch-row { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
  .switch-row-label { font-size: 12px; font-weight: 700; color: var(--sub); }
  .switch-row.on .switch-row-label { color: var(--ink); }
  .switch-track {
    position: relative; width: 34px; height: 20px; border-radius: 999px; flex-shrink: 0;
    background: #d8dde6; transition: background .15s;
  }
  .switch-track::after {
    content: ""; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px;
    border-radius: 50%; background: #fff; box-shadow: 0 1px 2px rgba(5, 7, 11, .25); transition: transform .15s;
  }
  .switch-row.on .switch-track { background: var(--accent); }
  .switch-row.on .switch-track::after { transform: translateX(14px); }
  tr.cmp-row td {
    background: var(--dark-tint); font-size: 13px; font-weight: 700; color: var(--ink);
    padding: 10px 12px; border-top: none;
  }
  tr.cmp-row .cmp {
    display: inline-flex; align-items: center; gap: 2px; font-size: 10.5px; font-weight: 800;
    padding: 1px 6px; border-radius: 8px; background: #fff; color: var(--sub); white-space: nowrap;
  }

  /* 섹션 바로가기 탭 — 키워드분석(.sec-nav)과 동일한 스타일. 요약 대시보드 아래에서

function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function money(n) {
  return Math.round(Number(n) || 0).toLocaleString("ko-KR") + "원";
}

function num(n) {
  return Math.round(Number(n) || 0).toLocaleString("ko-KR");
}

function norm(s) {
  return String(s || "").replace(/<[^>]*>/g, "").replace(/\s+/g, " ").trim();
}

function compact(s) {
  return norm(s).replace(/\s/g, "").toLowerCase();
}

function toNumber(value) {
  if (typeof value === "number") return value;
  const text = String(value ?? "").replace(/[^\d.-]/g, "");
  const n = Number(text);
  return Number.isFinite(n) ? n : 0;
}

function toDate(value) {
  if (!value) return "";
  if (value instanceof Date) return value.toISOString().slice(0, 10);
  if (typeof value === "number") {
    const d = XLSX.SSF.parse_date_code(value);
    if (d) return `${d.y}-${String(d.m).padStart(2, "0")}-${String(d.d).padStart(2, "0")}`;
  }
  const text = String(value).trim();
  const m = text.match(/(\d{4})[.\-/년\s]+(\d{1,2})[.\-/월\s]+(\d{1,2})/);
  if (m) return `${m[1]}-${m[2].padStart(2, "0")}-${m[3].padStart(2, "0")}`;
  return "";
}

function kstDate(offsetDays = 0) {
  const now = new Date(Date.now() + 9 * 3600 * 1000);
  const base = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()));
  base.setUTCDate(base.getUTCDate() + offsetDays);
  return base;
}

function formatDate(date) {
  return date.toISOString().slice(0, 10);
}

function addDays(date, days) {
  const next = new Date(date.getTime());
  next.setUTCDate(next.getUTCDate() + days);
  return next;
}

function monthStart(date) {
  return new Date(Date.UTC(date.getUTCFullYear(), date.getUTCMonth(), 1));
}

function monthEnd(date) {
  return new Date(Date.UTC(date.getUTCFullYear(), date.getUTCMonth() + 1, 0));
}

function presetRange(key) {
  const today = kstDate(0);
  const yesterday = kstDate(-1);
  const day = today.getUTCDay();
  const mondayOffset = day === 0 ? -6 : 1 - day;
  if (key === "today") return { from: formatDate(today), to: formatDate(today) };
  if (key === "yesterday") return { from: formatDate(yesterday), to: formatDate(yesterday) };
  if (key === "thisWeek") return { from: formatDate(addDays(today, mondayOffset)), to: formatDate(today) };
  if (key === "lastWeek") {
    const start = addDays(today, mondayOffset - 7);
    return { from: formatDate(start), to: formatDate(addDays(start, 6)) };
  }
  if (key === "last7IncludeToday") return { from: formatDate(kstDate(-6)), to: formatDate(today) };
  if (key === "last7ExcludeToday") return { from: formatDate(kstDate(-7)), to: formatDate(yesterday) };
  if (key === "thisMonth") return { from: formatDate(monthStart(today)), to: formatDate(today) };
  if (key === "lastMonth") {
    const last = new Date(Date.UTC(today.getUTCFullYear(), today.getUTCMonth() - 1, 1));
    return { from: formatDate(monthStart(last)), to: formatDate(monthEnd(last)) };
  }
  if (key === "last30IncludeToday") return { from: formatDate(kstDate(-29)), to: formatDate(today) };
  if (key === "last30ExcludeToday") return { from: formatDate(kstDate(-30)), to: formatDate(yesterday) };
  return { from: formatDate(kstDate(-7)), to: formatDate(yesterday) };
}

// 월별 데이터 채움 여부 캐시: "platform|subtab|year" → Set("YYYY-MM") | null(조회 실패)
let monthFillCache = {};
let monthFillLoadingKey = "";

function monthFillCacheKey(year) {
  return `${activePlatform}|${activeSubtab[activePlatform]}|${year}`;
}

// 해당 연도 전체를 한 번의 조회로 훑어, 데이터가 한 건이라도 있는 월만 모은다.
// 플랫폼/탭마다 실제 데이터가 담긴 원본 테이블이 달라 조회 액션도 다르게 매핑한다.
async function ensureMonthFillLoaded(year) {
  const key = monthFillCacheKey(year);
  if (monthFillCache[key] || monthFillLoadingKey === key) return;
  monthFillLoadingKey = key;
  const platform = activePlatform;
  const subtab = activeSubtab[activePlatform];
  const today = kstDate(0);
  const dateFrom = `${year}-01-01`;
  const dateTo = year === today.getUTCFullYear() ? formatDate(today) : `${year}-12-31`;
  const months = new Set();
  try {
    if (platform === "naver" && subtab === "sales") {
      const data = await callAdFn({ action: "naverStatSummary", dateFrom, dateTo });
      (data.daily || []).forEach(row => row.date && months.add(String(row.date).slice(0, 7)));
    } else if (platform === "naver" && subtab === "ads") {
      const data = await callAdFn({ action: "daily", store: DEFAULT_STORE, dateFrom, dateTo });
      (data.rows || []).forEach(row => row.date && months.add(String(row.date).slice(0, 7)));
    } else if (platform === "coupang" && subtab === "sales") {
      const data = await callAdFn({ action: "coupangSalesSummary", dateFrom, dateTo });
      (data.items || []).forEach(row => row.date && months.add(String(row.date).slice(0, 7)));
    } else if (platform === "coupang" && subtab === "ads") {
      const data = await callAdFn({ action: "coupangSummary", dateFrom, dateTo });
      (data.items || []).forEach(row => row.date && months.add(String(row.date).slice(0, 7)));
    }
    monthFillCache[key] = months;
  } catch (_) {
    monthFillCache[key] = null; // 조회 실패 시 판단 불가 — 비활성화하지 않고 넘어감
  } finally {
    if (monthFillLoadingKey === key) monthFillLoadingKey = "";
    renderMonthQuick();
  }
}

function renderMonthQuick() {
  const grid = document.getElementById("monthQuick");
  if (!grid) return;
  const from = document.getElementById("dateFrom").value;
  const to = document.getElementById("dateTo").value;
  const today = kstDate(0);
  const fillSet = monthFillCache[monthFillCacheKey(monthQuickYear)];
  ensureMonthFillLoaded(monthQuickYear);
  grid.innerHTML = Array.from({ length: 12 }, (_, i) => i + 1).map(month => {
    const start = new Date(Date.UTC(monthQuickYear, month - 1, 1));
    const isFuture = start.getTime() > today.getTime();
    const isCurrentMonth = monthQuickYear === today.getUTCFullYear() && month === today.getUTCMonth() + 1;
    const end = isCurrentMonth ? today : monthEnd(start);
    const rangeFrom = formatDate(start);
    const rangeTo = formatDate(end);
    const monthKey = `${monthQuickYear}-${String(month).padStart(2, "0")}`;
    const isEmpty = !isFuture && fillSet && !fillSet.has(monthKey);
    const disabled = isFuture || isEmpty;
    const active = !disabled && from === rangeFrom && to === rangeTo;
    return disabled
      ? `<button type="button" class="month-card" disabled>${month}월</button>`
      : `<button type="button" class="month-card${active ? " active" : ""}" data-from="${rangeFrom}" data-to="${rangeTo}">${month}월</button>`;
  }).join("");
}

const CAL_MONTHS_BACK = 24; // 표시 범위: 24개월 전 ~ 다음 달
let calPhase = "start"; // 다음 클릭이 시작일인지 종료일인지

function calMonthKeys() {
  const today = kstDate(0);
  const keys = [];
  for (let i = -CAL_MONTHS_BACK; i <= 1; i++) {
    const d = new Date(Date.UTC(today.getUTCFullYear(), today.getUTCMonth() + i, 1));
    keys.push(`${d.getUTCFullYear()}-${String(d.getUTCMonth() + 1).padStart(2, "0")}`);
  }
  return keys;
}

function renderCalendar(scrollToMonth) {
  const scroll = document.getElementById("calScroll");
  if (!scroll) return;
  const from = document.getElementById("draftDateFrom").value;
  const to = document.getElementById("draftDateTo").value;
  const todayStr = formatDate(kstDate(0));
  const prevScrollTop = scroll.scrollTop;
  scroll.innerHTML = calMonthKeys().map(monthKey => {
    const [y, m] = monthKey.split("-").map(Number);
    const firstDay = new Date(Date.UTC(y, m - 1, 1)).getUTCDay();
    const days = new Date(Date.UTC(y, m, 0)).getUTCDate();
    let cells = "";
    for (let i = 0; i < firstDay; i++) cells += "<span></span>";
    for (let d = 1; d <= days; d++) {
      const dateStr = `${monthKey}-${String(d).padStart(2, "0")}`;
      const future = dateStr > todayStr;
      const sel = dateStr === from || dateStr === to;
      const inRange = from && to && dateStr > from && dateStr < to;
      cells += `<button type="button" class="cal-day${sel ? " sel" : ""}${inRange ? " in-range" : ""}${future ? " future" : ""}" data-cal-date="${dateStr}"${future ? " disabled" : ""}>${d}</button>`;
    }
    return `<div class="cal-month" data-month="${monthKey}"><div class="cal-month-label">${y}년 ${String(m).padStart(2, "0")}월</div><div class="cal-grid">${cells}</div></div>`;
  }).join("");
  if (scrollToMonth) {
    const target = scroll.querySelector(`[data-month="${scrollToMonth}"]`);
    if (target) scroll.scrollTop = target.offsetTop;
  } else {
    scroll.scrollTop = prevScrollTop;
  }
  updateCalLabel();
}

function updateCalLabel() {
  const scroll = document.getElementById("calScroll");
  const label = document.getElementById("calLabel");
  if (!scroll || !label) return;
  const blocks = [...scroll.querySelectorAll(".cal-month")];
  const current = blocks.find(b => b.offsetTop + b.offsetHeight - 40 > scroll.scrollTop) || blocks[blocks.length - 1];
  if (current) {
    const [y, m] = current.dataset.month.split("-");
    label.textContent = `${y}년 ${m}월`;
    label.dataset.month = current.dataset.month;
  }
}

function calScrollToMonth(monthKey) {
  const scroll = document.getElementById("calScroll");
  const target = scroll?.querySelector(`[data-month="${monthKey}"]`);
  if (!target) return;
  scroll.scrollTop = target.offsetTop;
  updateCalLabel();
}

function pick(row, names) {
  const keys = Object.keys(row);
  for (const name of names) {
    const found = keys.find(k => compact(k).includes(compact(name)));
    if (found) return row[found];
  }
  return "";
}

function parseSalesRows(rawRows, platform) {
  return rawRows.map((row, index) => {
    const productName = norm(pick(row, ["상품명", "제품명", "등록상품명", "노출상품명", "item name", "product name"]));
    const optionName = norm(pick(row, ["옵션", "옵션정보", "선택사항", "option"]));
    const productCode = norm(pick(row, ["상품번호", "상품ID", "판매자상품코드", "SKU", "바코드", "product id"]));
    const qty = toNumber(pick(row, ["수량", "주문수량", "판매수량", "구매수", "quantity"]));
    const amount = toNumber(pick(row, ["결제금액", "주문금액", "상품주문금액", "판매금액", "정산금액", "매출", "amount", "sales"]));
    const orderDate = toDate(pick(row, ["주문일", "결제일", "구매일", "발주일", "date"]));
    if (!productName && !productCode && !amount) return null;
    return {
      id: `${platform}-${Date.now()}-${index}`,
      platform,
      productName: productName || "(상품명 없음)",
      optionName,
      productCode,
      qty: qty || 1,
      amount,
      orderDate,
      uploadedAt: new Date().toISOString(),
    };
  }).filter(Boolean);
}

async function importFile(file, platform) {
  const buffer = await file.arrayBuffer();
  const wb = XLSX.read(buffer, { type: "array", cellDates: true });
  const rows = [];
  wb.SheetNames.forEach(name => {
    rows.push(...XLSX.utils.sheet_to_json(wb.Sheets[name], { defval: "" }));
  });
  const parsed = parseSalesRows(rows, platform);
  salesRows = salesRows.concat(parsed);
  saveState();
  render();
}

function filteredSalesRows(platform = activePlatform) {
  const from = document.getElementById("dateFrom").value;
  const to = document.getElementById("dateTo").value;
  return salesRows.filter(row => {
    if (row.platform !== platform) return false;
    if (!row.orderDate) return true;
    if (from && row.orderDate < from) return false;
    if (to && row.orderDate > to) return false;
    return true;
  });
}

function productGroups(platform = activePlatform) {
  const map = new Map();
  filteredSalesRows(platform).forEach(row => {
    const key = row.productCode || compact(row.productName);
    if (!map.has(key)) {
      map.set(key, { productName: row.productName, productCode: row.productCode, sales: 0, qty: 0, orders: 0 });
    }
    const item = map.get(key);
    item.orders += 1;
    item.qty += Number(row.qty) || 0;
    item.sales += Number(row.amount) || 0;
  });
  return [...map.values()].sort((a, b) => b.sales - a.sales);
}

// 쿠팡 상품광고 보고서의 날짜는 "20260601" 형식
function coupangAdDate(value) {
  const raw = String(value ?? "").trim();
  if (/^\d{8}$/.test(raw)) return `${raw.slice(0, 4)}-${raw.slice(4, 6)}-${raw.slice(6, 8)}`;
  return toDate(value);
}

// 쿠팡 광고관리 > 보고서(일별·광고그룹) 엑셀 파싱. 전환 지표는 14일 기여 기준을 사용한다.
function parseCoupangAdRows(rawRows) {
  return rawRows.map(row => {
    const date = coupangAdDate(pick(row, ["날짜", "date"]));
    const adGroup = norm(pick(row, ["광고그룹"]));
    const cost = toNumber(pick(row, ["광고비"]));
    if (!date || (!adGroup && !cost)) return null;
    return {
      date,
      campaign: norm(pick(row, ["캠페인명"])),
      adGroup,
      placement: norm(pick(row, ["광고 노출 지면", "노출 지면", "지면"])),
      adType: norm(pick(row, ["광고유형"])),
      impressions: toNumber(pick(row, ["노출수"])),
      clicks: toNumber(pick(row, ["클릭수"])),
      cost,
      orders: toNumber(pick(row, ["총 주문수(14일)"])),
      sales: toNumber(pick(row, ["총 전환매출액(14일)"])),
      orders1: toNumber(pick(row, ["총 주문수(1일)"])),
      sales1: toNumber(pick(row, ["총 전환매출액(1일)"])),
      uploadedAt: new Date().toISOString(),
    };
  }).filter(Boolean);
}

async function importCoupangAdFile(file) {
  const status = document.getElementById("adStatus");
  try {
    const buffer = await file.arrayBuffer();
    const wb = XLSX.read(buffer, { type: "array", cellDates: true });
    const rows = [];
    wb.SheetNames.forEach(name => rows.push(...XLSX.utils.sheet_to_json(wb.Sheets[name], { defval: "" })));
    const parsed = parseCoupangAdRows(rows);
    if (!parsed.length) {
      status.className = "status error";
      status.textContent = "쿠팡 광고 보고서 형식을 인식하지 못했습니다. 광고관리의 '일별 × 광고그룹' 보고서 엑셀인지 확인해 주세요.";
      return;
    }
    status.className = "status";
    status.textContent = "쿠팡 광고 데이터를 저장하는 중...";
    const result = await callAdFn({ action: "coupangUpload", rows: parsed });
    status.className = "status ok";
    status.textContent = `쿠팡 광고 ${num(result.dayCount)}일치 저장 완료 (${result.dateFrom} ~ ${result.dateTo})`;
    coupangAdLoadKey = "";
    loadCoupangAds();
  } catch (e) {
    status.className = "status error";
    status.textContent = "쿠팡 광고 업로드 실패: " + String(e.message || e);
  }
}

async function loadCoupangAds() {
  const status = document.getElementById("adStatus");
  const dateFrom = document.getElementById("dateFrom").value;
  const dateTo = document.getElementById("dateTo").value;
  if (coupangAdLoading) return;
  coupangAdLoading = true; showLoading("저장된 쿠팡 광고 데이터를 불러오는 중...");
  coupangAdLoadKey = currentAdLoadKey();
  renderAdsPanel();
  try {
    const data = await callAdFn({ action: "coupangSummary", dateFrom, dateTo });
    coupangAdRows = data.items || [];
    coupangAdLoading = false; hideLoading();
    status.className = "status ok";
    status.textContent = coupangAdRows.length

    status.textContent = "쿠팡 광고 불러오기 실패: " + String(e.message || e);

}

async function readWorkbookRows(file) {
  const buffer = await file.arrayBuffer();
  const wb = XLSX.read(buffer, { type: "array", cellDates: true });
  const rows = [];
  wb.SheetNames.forEach(name => rows.push(...XLSX.utils.sheet_to_json(wb.Sheets[name], { defval: "" })));
  return rows;
}

// 셀러 인사이트 "일별 요약" 파일: 날짜/방문자/조회/장바구니/주문/구매전환율/판매량/매출(원)
function parseCoupangSalesRows(rawRows) {
  return rawRows.map(row => {
    const date = toDate(pick(row, ["날짜"]));
    if (!date) return null; // 합계 행(날짜 없음) 제외
    return {
      date,
      visitors: toNumber(pick(row, ["방문자"])),
      views: toNumber(pick(row, ["조회"])),
      carts: toNumber(pick(row, ["장바구니"])),
      orders: toNumber(pick(row, ["주문"])),
      qty: toNumber(pick(row, ["판매량"])),
      sales: toNumber(pick(row, ["매출"])),
    };
  }).filter(Boolean);
}

// 셀러 인사이트 "상품별" 파일: 옵션 단위, 날짜 컬럼 없음 (기간 스냅샷)
function parseCoupangItemRows(rawRows) {
  return rawRows.map(row => {
    const optionId = String(pick(row, ["옵션 ID", "옵션ID"]) ?? "").trim();
    if (!optionId) return null;
    return {
      optionId,
      optionName: norm(pick(row, ["옵션명"])),
      productName: norm(pick(row, ["상품명"])),
      productId: String(pick(row, ["등록상품ID"]) ?? ""),
      category: norm(pick(row, ["카테고리"])),
      sales: toNumber(pick(row, ["매출(원)"])),
      orders: toNumber(pick(row, ["주문"])),
      qty: toNumber(pick(row, ["판매량"])),
      visitors: toNumber(pick(row, ["방문자"])),
      views: toNumber(pick(row, ["조회"])),
      carts: toNumber(pick(row, ["장바구니"])),
      itemWinner: toNumber(pick(row, ["아이템위너"])),
      cancelAmount: toNumber(pick(row, ["총 취소 금액"])),
      cancelQty: toNumber(pick(row, ["총 취소된 상품수"])),

  }).filter(Boolean);
}

async function loadCoupangItemPeriods() {

    coupangItemPeriod = `${coupangItemPeriods[0].from}|${coupangItemPeriods[0].to}`;
  }
}

async function loadCoupangItemRows() {
  if (!coupangItemPeriod) { coupangItemRows = []; return; }
  const [periodFrom, periodTo] = coupangItemPeriod.split("|");
  const data = await callAdFn({ action: "coupangItemSummary", periodFrom, periodTo });
  coupangItemRows = data.items || [];
}

// ─── 네이버 판매분석 (비즈어드바이저 엑셀) ───

// 상품성과 파일: 일별 × 채널상품 ("전체" 행 = 스토어 일별 합계)
function parseNaverProductRows(rawRows) {
  return rawRows.map(row => {
    const date = toDate(pick(row, ["날짜"]));
    const productName = norm(pick(row, ["채널상품명"]));
    if (!date || !productName) return null;
    return {
      date,
      productId: String(pick(row, ["채널상품번호"]) ?? "").trim() || productName,
      productName,
      payCount: toNumber(pick(row, ["상품결제건수"])),
      refundCount: toNumber(pick(row, ["환불건수"])),
      salesTotal: toNumber(pick(row, ["판매금액(총)"])),
      salesNet: toNumber(pick(row, ["판매금액(순)"])),
      refundAmount: toNumber(pick(row, ["환불금액"])),
      qty: toNumber(pick(row, ["결제상품수량"])),
      refundQty: toNumber(pick(row, ["환불상품수량"])),
      visits: toNumber(pick(row, ["방문수"])),
      conversion: toNumber(pick(row, ["구매전환율"])),
    };
  }).filter(Boolean);
}

// 유입경로 파일: 일별 × 경로 3단계
function parseNaverVisitRows(rawRows) {
  return rawRows.map(row => {
    const date = toDate(pick(row, ["날짜"]));
    if (!date) return null;
    return {
      date,
      path1: norm(pick(row, ["경로(1단계)"])) || "-",
      path2: norm(pick(row, ["경로(2단계)"])) || "-",
      path3: norm(pick(row, ["경로(3단계)"])) || "-",
      visits: toNumber(pick(row, ["방문수"])),
      payCount: toNumber(pick(row, ["상품결제건수"])),
      conversion: toNumber(pick(row, ["구매전환율"])),
      salesTotal: toNumber(pick(row, ["판매금액(총)"])),
    };
  }).filter(Boolean);
}

// 고객 파일: 행마다 "2026-06-01~2026-06-30" 형식의 기간이 들어있는 월별 스냅샷
function parseNaverCustomerRows(rawRows) {
  return rawRows.map(row => {
    const period = String(pick(row, ["날짜"]) || "");
    const m = period.match(/(\d{4}-\d{2}-\d{2})\s*~\s*(\d{4}-\d{2}-\d{2})/);
    const segment = norm(pick(row, ["고객분류"]));
    if (!m || !segment) return null;
    return {
      periodFrom: m[1],
      periodTo: m[2],
      segment,
      visitors: toNumber(pick(row, ["방문고객수"])),
      payers: toNumber(pick(row, ["결제고객수"])),
      conversion: toNumber(pick(row, ["구매전환율(고객)", "구매전환율"])),
      salesTotal: toNumber(pick(row, ["판매금액(총)"])),
      avgPayment: toNumber(pick(row, ["객단가"])),
    };
  }).filter(Boolean);
}

function detectNaverStatType(rows) {
  if (!rows.length) return "";
  const keys = Object.keys(rows[0]).map(key => compact(key));
  if (keys.some(key => key.includes("채널상품명"))) return "product";
  if (keys.some(key => key.includes("경로(1단계)"))) return "visit";
  if (keys.some(key => key.includes("고객분류"))) return "customer";
  if (keys.some(key => key.includes("대카테고리"))) return "category";
  return "";
}

async function importNaverStatFiles(files) {
  const status = document.getElementById("adStatus");
  const messages = [];
  try {
    for (const file of files) {
      status.className = "status";
      status.textContent = `${file.name} 저장 중...` + (messages.length ? ` (완료: ${messages.join(" · ")})` : "");
      const rows = await readWorkbookRows(file);
      const type = detectNaverStatType(rows);
      if (type === "product") {
        const result = await callAdFn({ action: "naverProductUpload", rows: parseNaverProductRows(rows) });
        messages.push(`상품성과 ${num(result.dayCount)}일치 (${result.dateFrom}~${result.dateTo})`);
      } else if (type === "visit") {
        const result = await callAdFn({ action: "naverVisitUpload", rows: parseNaverVisitRows(rows) });
        messages.push(`유입경로 ${num(result.dayCount)}일치`);
      } else if (type === "customer") {
        const result = await callAdFn({ action: "naverCustomerUpload", rows: parseNaverCustomerRows(rows) });
        messages.push(`고객 ${num(result.periodCount)}개 기간`);
      } else if (type === "category") {
        messages.push(`${file.name}: 카테고리 파일은 사용하지 않음(상품성과 파일로 대체)`);
      } else {
        messages.push(`${file.name}: 형식 인식 실패`);
      }
    }
    status.className = "status ok";
    status.textContent = "저장 완료: " + messages.join(" · ");
    naverStatLoadKey = "";
    loadNaverStat();
  } catch (e) {
    status.className = "status error";
    status.textContent = "판매분석 업로드 실패: " + String(e.message || e)
      + (messages.length ? ` (완료: ${messages.join(" · ")})` : "");
  }
}

function coupangAdGroups() {
  const from = document.getElementById("dateFrom").value;
  const to = document.getElementById("dateTo").value;
  const rows = coupangAdRows.filter(row =>
    (!from || row.date >= from) && (!to || row.date <= to) &&
    (!coupangPlacement || row.placement === coupangPlacement));
  const map = new Map();
  rows.forEach(row => {
    const key = row.adGroup || row.campaign || "(광고그룹 없음)";
    if (!map.has(key)) {
      map.set(key, {
        type: row.adType || "-", name: key, status: row.campaign || "-",
        impressions: 0, clicks: 0, ctr: 0, cpc: 0, cost: 0,
        conversions: 0, conversionRate: 0, conversionSales: 0,
        purchaseConversions: 0, purchaseSales: 0, purchaseRoas: 0,
      });
    }
    const item = map.get(key);
    item.impressions += row.impressions;
    item.clicks += row.clicks;
    item.cost += row.cost;
    item.conversions += row.orders;
    item.purchaseConversions += row.orders;
    item.conversionSales += row.sales;
    item.purchaseSales += row.sales;
  });
  const finalize = item => {
    item.ctr = item.impressions ? (item.clicks / item.impressions) * 100 : 0;
    item.cpc = item.clicks ? item.cost / item.clicks : 0;
    item.conversionRate = item.clicks ? (item.conversions / item.clicks) * 100 : 0;
    item.purchaseRoas = item.cost ? (item.purchaseSales / item.cost) * 100 : 0;
    return item;
  };
  const items = [...map.values()].map(finalize);
  const total = finalize(items.reduce((acc, item) => {
    acc.impressions += item.impressions;
    acc.clicks += item.clicks;
    acc.cost += item.cost;
    acc.conversions += item.conversions;
    acc.purchaseConversions += item.purchaseConversions;
    acc.conversionSales += item.conversionSales;
    acc.purchaseSales += item.purchaseSales;
    return acc;
  }, {
    name: "전체 광고", type: "-", status: "-", isTotal: true,
    impressions: 0, clicks: 0, ctr: 0, cpc: 0, cost: 0,
    conversions: 0, conversionRate: 0, conversionSales: 0,
    purchaseConversions: 0, purchaseSales: 0, purchaseRoas: 0,
  }));
  return { items, total: items.length ? total : null, dayCount: new Set(rows.map(row => row.date)).size };
}

function filteredAds() {
  // 현재 조회 키(스토어+기간)와 정확히 일치하는 캐시만 사용.
  // 범위 겹침으로 필터하면 과거에 조회한 다른 기간의 행들이 중복 합산된다.
  const key = currentAdLoadKey();
  return adRows.filter(row => (!row.platform || row.platform === "naver") && row.loadKey === key);
}

function adTotals() {
  const rows = filteredAds();
  const totalRow = rows.find(row => row.isTotal);
  if (totalRow) {
    return {
      cost: Number(totalRow.cost) || 0,
      impressions: Number(totalRow.impressions) || 0,
      clicks: Number(totalRow.clicks) || 0,
      ctr: Number(totalRow.ctr) || 0,
      cpc: Number(totalRow.cpc) || 0,
      conversions: Number(totalRow.conversions) || 0,
      conversionRate: Number(totalRow.conversionRate) || 0,
      conversionSales: Number(totalRow.conversionSales) || 0,
      ror: Number(totalRow.ror) || 0,
      purchaseConversions: Number(totalRow.purchaseConversions) || 0,
      purchaseSales: Number(totalRow.purchaseSales) || 0,
      purchaseRoas: Number(totalRow.purchaseRoas) || 0,
    };
  }
  const acc = rows.reduce((acc, row) => {
    acc.cost += Number(row.cost) || 0;
    acc.impressions += Number(row.impressions) || 0;
    acc.clicks += Number(row.clicks) || 0;
    acc.conversions += Number(row.conversions) || 0;
    acc.conversionSales += Number(row.conversionSales) || 0;
    acc.purchaseConversions += Number(row.purchaseConversions) || 0;
    acc.purchaseSales += Number(row.purchaseSales) || 0;
    return acc;
  }, { cost: 0, impressions: 0, clicks: 0, ctr: 0, cpc: 0, conversions: 0, conversionRate: 0, conversionSales: 0, ror: 0, purchaseConversions: 0, purchaseSales: 0, purchaseRoas: 0 });
  acc.conversionRate = acc.clicks ? (acc.conversions / acc.clicks) * 100 : 0;
  acc.ror = acc.cost ? (acc.conversionSales / acc.cost) * 100 : 0;
  acc.purchaseRoas = acc.cost ? (acc.purchaseSales / acc.cost) * 100 : 0;
  return acc;
}

// 유입경로(path1 › path2) 채널별 방문수 비율 — 랭킹추적의 페이지 분포 바(1페이지/2~3페이지/4페이지 이하)와
// 같은 "세그먼트 바 + 범례" 형태. path1만으로 묶으면 "네이버 검색"에 통합검색·가격비교·플러스스토어검색이
// 다 섞이고 "네이버 서비스"에 플러스스토어·네이버페이가 섞여 뭉개지므로, path1+path2 조합으로 세분화한다.
// path2를 지정하지 않은 규칙(네이버광고)은 그 path1의 모든 하위 유형(검색광고·디스플레이광고 등)을 합친다.
const CHANNEL_RULES = [
  { name: "네이버 통합검색", path1: "네이버 검색", path2: "통합검색" },
  { name: "네이버 가격비교", path1: "네이버 검색", path2: "가격비교 검색" },
  { name: "플러스스토어 검색", path1: "네이버 검색", path2: "네이버플러스스토어 검색" },
  { name: "플러스스토어", path1: "네이버 서비스", path2: "네이버플러스스토어" },
  { name: "네이버광고", path1: "네이버 광고" },
  { name: "직유입", path1: "직유입" },
  { name: "네이버페이", path1: "네이버 서비스", path2: "네이버 페이" },
];
// 네이버 검색 계열(통합검색·가격비교)은 초록 계열 두 톤, 플러스스토어 계열(검색·서비스)은 보라 계열 두 톤으로
// 묶어서 "네이버 쪽"과 "플러스스토어 쪽"이 한눈에 구분되게 하고, 나머지는 서로 겹치지 않는 색으로 배열했다.
// dataviz 스킬 validate_palette.js로 7색 전체 CVD 분리·명도·채도 통과 확인함(기타의 회색은 카테고리색이 아니라 검증 대상 제외).
const CHANNEL_BAR_COLORS = ["#16803c", "#5fb87f", "#8f7fe0", "#4a3aa7", "#eda100", "#2a78d6", "#e34948"];
const CHANNEL_ETC_COLOR = "#c3c2b7";
// 네이버 판매분석 원본 데이터의 공백 표기가 "네이버 광고"/"네이버광고"처럼 들쭉날쭉해서
// 정확히 일치하는 문자열로만 비교하면 다 "기타"로 새어 나간다 — 공백을 지우고 비교한다.
const normChannelName = s => (s || "").replace(/\s+/g, "");
function classifyChannel(row) {
  const p1 = normChannelName(row.path1);
  const p2 = normChannelName(row.path2);
  const rule = CHANNEL_RULES.find(r => normChannelName(r.path1) === p1 && (!r.path2 || normChannelName(r.path2) === p2));
  return rule ? rule.name : "기타";
}
function naverVisitChannelBarHtml() {
  const order = CHANNEL_RULES.map(r => r.name).concat(["기타"]);
  const colors = CHANNEL_BAR_COLORS.concat([CHANNEL_ETC_COLOR]);
  const totals = new Map(order.map(name => [name, 0]));
  naverStat.visitPaths.forEach(row => {
    const visits = Number(row.visits) || 0;
    const name = classifyChannel(row);
    totals.set(name, totals.get(name) + visits);
  });
  const list = order.map((name, i) => ({ name, visits: totals.get(name), color: colors[i] }));
  const total = list.reduce((sum, c) => sum + c.visits, 0);
  if (!total) return "";
  const pct = n => Math.round(n / total * 100);
  // 색은 채널마다 고정(위 순서)이지만, 화면에는 방문수가 많은 채널이 왼쪽부터 오도록 정렬해서 보여준다.
  const segs = list.filter(c => c.visits > 0).sort((a, b) => b.visits - a.visits);
  return `
    <div class="dash-bar-wrap">
      <div class="dash-bar">
        ${segs.map(c => `<span class="dash-bar-seg" style="flex:${c.visits};background:${c.color};" title="${esc(c.name)} ${num(c.visits)}회 (${pct(c.visits)}%)"></span>`).join("")}
      </div>
      <div class="dash-legend">
        ${segs.map(c => `<span class="dash-legend-item"><span class="dash-legend-dot" style="background:${c.color};"></span>${esc(c.name)} <b>${num(c.visits)}회</b> · ${pct(c.visits)}%</span>`).join("")}
      </div>
    </div>`;
}

// ── 매출 급증·급감 TOP — 랭킹추적의 "상승 TOP/하락 TOP"(moveScore/buildNotableProducts)과 같은 개념을
// 네이버 상품별 매출 데이터에 적용한다. 비교 대상 중 하나라도 최소 기준(minFloor) 이상이고
// 변화율이 SALES_MOVER_MIN_PCT 이상이어야 "급"으로 인정 — 기준 미달이면 억지로 채우지 않고 그 줄을 비워둔다.
const SALES_MOVER_MIN_PCT = 30;
const SALES_MOVER_MIN_SALES = 10000; // 상품 매출 비교 시 노이즈 컷(원)

function buildMovers(curList, prevList, idFn, valueKey, minFloor) {
  const curMap = new Map(curList.map(r => [idFn(r), r]));
  const prevMap = new Map(prevList.map(r => [idFn(r), r]));
  const ids = new Set([...curMap.keys(), ...prevMap.keys()]);
  const moves = [];
  ids.forEach(id => {
    const cur = curMap.get(id);
    const prev = prevMap.get(id);
    const curVal = cur ? Number(cur[valueKey]) || 0 : 0;
    const prevVal = prev ? Number(prev[valueKey]) || 0 : 0;
    if (curVal < minFloor && prevVal < minFloor) return;
    if (!prevVal && curVal) { moves.push({ item: cur, curVal, prevVal, pct: null, isNew: true }); return; }
    if (prevVal && !curVal) { moves.push({ item: prev, curVal, prevVal, pct: -100, isGone: true }); return; }
    if (!prevVal) return;
    const pct = (curVal - prevVal) / prevVal * 100;
    if (Math.abs(pct) < SALES_MOVER_MIN_PCT) return;
    moves.push({ item: cur, curVal, prevVal, pct });
  });
  const rising = moves.filter(m => m.isNew || (m.pct != null && m.pct > 0))
    .sort((a, b) => (b.isNew ? Infinity : b.pct) - (a.isNew ? Infinity : a.pct)).slice(0, 3);
  const falling = moves.filter(m => m.isGone || (m.pct != null && m.pct < 0))
    .sort((a, b) => (a.isGone ? -Infinity : a.pct) - (b.isGone ? -Infinity : b.pct)).slice(0, 3);
  return { rising, falling };
}

function moverChip(m, nameFn, valueFmt) {
  const isRising = m.isNew || (m.pct != null && m.pct > 0);
  const cls = isRising ? "up" : "down";
  const deltaText = m.isNew ? "신규" : m.isGone ? "중단" : `${m.pct > 0 ? "▲" : "▼"}${Math.abs(m.pct).toFixed(0)}%`;
  const name = nameFn(m.item);
  return `<span class="dash-mover-chip">
    <span class="dash-mover-name" title="${esc(name)}">${esc(name)}</span>
    <span class="dash-mover-delta ${cls}">${deltaText}</span>
    <span class="dash-mover-value">${valueFmt(m.prevVal)} → ${valueFmt(m.curVal)}</span>
  </span>`;
}

function moverRowHtml(title, items, nameFn, valueFmt) {
  if (!items.length) return "";
  return `<div class="dash-mover-row"><span class="dash-mover-title">${esc(title)}</span><div class="dash-mover-chips">${items.map(m => moverChip(m, nameFn, valueFmt)).join("")}</div></div>`;
}

const productMoverName = item => item.productName || item.productId || "-";

// 전기간·전년 비교 데이터가 모두 준비된 뒤 상품 매출 급증/급감만 비교한다(유입경로는 아래 유입비율 그래프가 대신함).
function naverSalesMoversHtml() {
  if (!naverSalesCompare || naverSalesCompare.key !== currentAdLoadKey()) return "";
  const rows = [];
  [{ key: "prev", label: "전기간" }, { key: "year", label: "전년" }].forEach(p => {
    const period = naverSalesCompare[p.key];
    if (!period || !period.hasData) return;
    const productMoves = buildMovers(naverStat.products, period.products || [], r => r.productId, "salesTotal", SALES_MOVER_MIN_SALES);
    rows.push(moverRowHtml(`매출 급증 (${p.label})`, productMoves.rising, productMoverName, money));
    rows.push(moverRowHtml(`매출 급감 (${p.label})`, productMoves.falling, productMoverName, money));
  });
  const html = rows.filter(Boolean).join("");
  return html ? `<div class="dash-movers">${html}</div>` : "";
}

/* ── 섹션 바로가기 탭 (키워드분석 .sec-nav와 완전히 동일한 "탭 전환" 방식) ──
   스크롤 이동이 아니라, 선택한 카드 하나만 즉시 보여주고 나머지는 숨긴다.
   맨 왼쪽 "종합분석"은 naver-rank.html과 동일하게 전체를 한 번에 보여주는 기본 탭. */
let mainNavActiveIdx = "all"; // "all" = 종합분석, 그 외는 카드 인덱스(숫자) — 재렌더링에도 선택 유지

// 카드 제목의 순수 텍스트만 추출 — h2 안에 물음표 툴팁(.dash-info > .dash-tip)이 들어있으면
// textContent가 툴팁 문구까지 통째로 이어붙여지므로, 툴팁 노드를 떼어내고 읽는다.
function cardTitleText(card) {
  const h2 = card.querySelector("h2");
  if (!h2) return "";
  const clone = h2.cloneNode(true);
  clone.querySelectorAll(".dash-info").forEach(el => el.remove());
  return clone.textContent.trim();
}

function renderMainNav() {
  const nav = document.getElementById("mainNav");
  if (!nav) return;
  const cards = [...document.querySelectorAll("#mainPanel .content-card")];
  if (cards.length < 2) {
    nav.classList.remove("on");
    nav.innerHTML = "";
    cards.forEach(card => { card.style.display = ""; });
    return;
  }
  nav.classList.add("on");
  nav.innerHTML = `<button type="button" class="sec-nav-btn" data-idx="all">종합분석</button>` +
    cards.map((card, i) => {
      const label = cardTitleText(card) || `섹션 ${i + 1}`;
      return `<button type="button" class="sec-nav-btn" data-idx="${i}">${esc(label)}</button>`;
    }).join("");
  applyMainNavTab(mainNavActiveIdx);
}

function applyMainNavTab(idx) {
  const cards = [...document.querySelectorAll("#mainPanel .content-card")];
  if (idx !== "all" && cards[idx]) {
    // 접혀 있는 카드를 선택하면 먼저 펼친다 — 펼치기는 패널 재렌더링을 일으키므로
    // 여기서 재렌더링을 한 번 거치고, 다음 패스에서 펼쳐진 상태로 표시만 전환한다.
    const toggleHead = cards[idx].querySelector("[data-toggle-card]");
    if (toggleHead && !cards[idx].querySelector(".section-body")) {
      coupangCardOpen[toggleHead.dataset.toggleCard] = true;
      saveCoupangCardOpen();
      mainNavActiveIdx = idx;
      renderSalesPanel(); // → 내부에서 renderMainNav() → applyMainNavTab()이 다시 호출됨
      return;
    }
  }
  mainNavActiveIdx = idx;
  cards.forEach((card, i) => { card.style.display = (idx === "all" || idx === i) ? "" : "none"; });
  document.querySelectorAll("#mainNav .sec-nav-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.idx === String(idx));
  });
}

document.getElementById("mainNav").addEventListener("click", e => {
  const btn = e.target.closest(".sec-nav-btn");
  if (!btn) return;
  applyMainNavTab(btn.dataset.idx === "all" ? "all" : Number(btn.dataset.idx));
});

/* ── 일별 매출 추이 차트 (키워드분석의 검색량 추이 차트와 동일한 SVG 직접 그리기 방식) ──
   naverDailyTableHtml/coupangDailyTableHtml이 <div id="[bodyId]"></div> 플레이스홀더를 반환하면,
   그 HTML이 실제로 DOM에 꽂힌 뒤(각 render*SalesPanel 끝에서) 이 함수로 SVG를 채워 넣는다. */
function nsNiceCeil(v) {
  if (v <= 0) return 1;
  const pow = Math.pow(10, Math.floor(Math.log10(v)));
  for (const m of [1, 2, 2.5, 5, 10]) { if (v <= m * pow) return m * pow; }
  return 10 * pow;
}

const salesTrendChartState = {}; // bodyId → { data, x, y, W } (네이버·쿠팡 두 차트가 동시에 상태를 가질 수 있음)

function renderSalesTrendChart(bodyId, rowsAsc) {
  const body = document.getElementById(bodyId);
  if (!body) return;
  const raw = (rowsAsc || []).filter(r => r.date).map(r => ({ date: r.date, total: Number(r.total) || 0 }));
  if (raw.length < 2) { body.innerHTML = ""; return; }

  // 빠진 날짜를 0으로 채워 연속된 일자 시퀀스로 만든다 — missing 플래그로 빗살 표시 구간을 기억
  const byDate = new Map(raw.map(d => [d.date, d]));
  const data = [];
  let cur = new Date(raw[0].date + "T00:00:00Z");
  const end = new Date(raw[raw.length - 1].date + "T00:00:00Z");
  while (cur.getTime() <= end.getTime()) {
    const key = cur.toISOString().slice(0, 10);
    const src = byDate.get(key);
    data.push(src ? { date: key, total: src.total, missing: false } : { date: key, total: 0, missing: true });
    cur = new Date(cur.getTime() + 86400000);
  }

  // padL: 검색량(4~5자리)보다 매출 금액(최대 7~8자리, 예: 4,407,700)이 훨씬 길어서
  // 축 라벨이 잘리지 않을 만큼만 잡고(너무 넉넉하면 그래프가 오른쪽으로 쏠려 보임),
  // padR도 함께 넓혀 좌우 여백 차이를 줄인다.
  const W = 900, H = 270, padL = 70, padR = 34, padT = 30, padB = 32;
  const iw = W - padL - padR, ih = H - padT - padB;
  const vals = data.map(d => d.total);
  const yMax = nsNiceCeil(Math.max(...vals));
  const x = i => padL + i * iw / (data.length - 1);
  const y = v => padT + ih - v / yMax * ih;

  let grid = "", labels = "";
  for (let s = 0; s <= 4; s++) {
    const v = yMax * s / 4, yy = y(v);
    grid += `<line x1="${padL}" y1="${yy}" x2="${W - padR}" y2="${yy}" stroke="#e8ecf2" stroke-width="1"/>`;
    labels += `<text x="${padL - 8}" y="${yy + 4}" text-anchor="end" font-size="11" fill="#8a93a5">${Math.round(v).toLocaleString()}</text>`;
  }
  const step = Math.max(1, Math.ceil(data.length / 8));
  data.forEach((d, i) => {
    if (i % step !== 0 && i !== data.length - 1) return;
    const [, mm, dd] = d.date.split("-");
    labels += `<text x="${x(i)}" y="${H - 8}" text-anchor="middle" font-size="11" fill="#8a93a5">${Number(mm)}.${Number(dd)}</text>`;
  });

  const pts = vals.map((v, i) => `${x(i)},${y(v)}`).join(" ");
  const areaPts = `${pts} ${x(data.length - 1)},${padT + ih} ${x(0)},${padT + ih}`;

  // 데이터 없는 구간(연속된 missing 날짜들) 위에 45° 빗살 밴드
  const halfStep = data.length > 1 ? iw / (data.length - 1) / 2 : 0;
  let hatches = "";
  const hatchId = bodyId + "Hatch";
  for (let i = 0; i < data.length; i++) {
    if (!data[i].missing) continue;
    let j = i;
    while (j + 1 < data.length && data[j + 1].missing) j++;
    const x1 = Math.max(padL, x(i) - halfStep);
    const x2 = Math.min(W - padR, x(j) + halfStep);
    hatches += `<rect x="${x1}" y="${padT}" width="${x2 - x1}" height="${ih}" fill="url(#${hatchId})" opacity="0.5"/>`;
    i = j;
  }

  // 최대/최소 주석 — 최소는 데이터 없는 날(0) 제외, 텍스트는 차트 안쪽으로 고정
  const realVals = data.map((d, i) => d.missing ? null : { v: d.total, i }).filter(Boolean);
  let marks = "";
  if (realVals.length) {
    const maxI = realVals.reduce((best, c) => c.v > best.v ? c : best).i;
    const minI = realVals.reduce((best, c) => c.v < best.v ? c : best).i;
    const clampX = v => Math.min(Math.max(v, padL + 44), W - padR - 44);
    const fmtDate = d => { const [, mm, dd] = d.split("-"); return `${Number(mm)}.${Number(dd)}`; };
    marks = `
      <circle cx="${x(maxI)}" cy="${y(vals[maxI])}" r="4" fill="var(--accent)" stroke="#fff" stroke-width="2"/>
      <text x="${clampX(x(maxI))}" y="${Math.max(y(vals[maxI]) - 10, 14)}" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1a1f2e">최대 ${fmtDate(data[maxI].date)} · ${vals[maxI].toLocaleString()}원</text>`;
    if (minI !== maxI) {
      marks += `
      <circle cx="${x(minI)}" cy="${y(vals[minI])}" r="4" fill="var(--accent)" stroke="#fff" stroke-width="2"/>
      <text x="${clampX(x(minI))}" y="${Math.min(y(vals[minI]) + 20, H - padB - 6)}" text-anchor="middle" font-size="11.5" font-weight="700" fill="#5a6378">최소 ${fmtDate(data[minI].date)} · ${vals[minI].toLocaleString()}원</text>`;
    }
  }

  const svgId = bodyId + "Svg";
  body.innerHTML = `<div class="vol-chart-wrap">
    <svg id="${svgId}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
      <defs>
        <pattern id="${hatchId}" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
          <line x1="0" y1="0" x2="0" y2="6" stroke="#c3c9d4" stroke-width="1.4"/>
        </pattern>
      </defs>
      ${grid}${hatches}${labels}
      <polygon points="${areaPts}" fill="var(--accent)" opacity="0.08"/>
      <polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      ${marks}
      <line id="${bodyId}Cross" x1="0" y1="${padT}" x2="0" y2="${padT + ih}" stroke="#c3c9d4" stroke-width="1" style="display:none;"/>
      <circle id="${bodyId}Dot" r="4.5" fill="var(--accent)" stroke="#fff" stroke-width="2" style="display:none;"/>
    </svg>
    <div class="vol-tip" id="${bodyId}Tip" style="display:none;"></div>
  </div>`;

  salesTrendChartState[bodyId] = { data, x, y, W };
  const svg = document.getElementById(svgId);
  svg.addEventListener("mousemove", (e) => salesTrendChartHover(bodyId, e));
  svg.addEventListener("mouseleave", () => {
    document.getElementById(bodyId + "Cross").style.display = "none";
    document.getElementById(bodyId + "Dot").style.display = "none";
    document.getElementById(bodyId + "Tip").style.display = "none";
  });
}

function salesTrendChartHover(bodyId, e) {
  const state = salesTrendChartState[bodyId];
  if (!state) return;
  const { data, x, y, W } = state;
  const svg = document.getElementById(bodyId + "Svg");
  const rect = svg.getBoundingClientRect();
  const svgX = (e.clientX - rect.left) / rect.width * W;
  let best = 0, bestDist = Infinity;
  data.forEach((_, i) => {
    const d = Math.abs(x(i) - svgX);
    if (d < bestDist) { bestDist = d; best = i; }
  });
  const px = x(best), py = y(data[best].total);
  const cross = document.getElementById(bodyId + "Cross");
  const dot = document.getElementById(bodyId + "Dot");
  const tip = document.getElementById(bodyId + "Tip");
  cross.setAttribute("x1", px); cross.setAttribute("x2", px);
  cross.style.display = "";
  dot.setAttribute("cx", px); dot.setAttribute("cy", py);
  dot.style.display = "";
  tip.textContent = data[best].missing
    ? `${data[best].date} · 데이터 없음`
    : `${data[best].date} · ${data[best].total.toLocaleString()}원`;
  tip.style.display = "block";
  const leftPx = px / W * rect.width;
  tip.style.left = Math.min(Math.max(leftPx, 60), rect.width - 60) + "px";
}

// 상품별 판매량 랭킹 막대 — rows를 qtyFn 기준 내림차순으로 top N개만 그린다(전부 그리면 표와 중복).
function topQtyBarHtml(rows, nameFn, qtyFn, limit = 10) {
  const list = rows.filter(r => qtyFn(r) > 0).slice().sort((a, b) => qtyFn(b) - qtyFn(a)).slice(0, limit);
  if (!list.length) return "";
  const max = qtyFn(list[0]);
  return `
    <div class="rank-bar-list">
      ${list.map(r => `
        <div class="rank-bar-row">
          <div class="rank-bar-name" title="${esc(nameFn(r))}">${esc(nameFn(r))}</div>
          <div class="rank-bar-track"><div class="rank-bar-fill" style="width:${max ? qtyFn(r) / max * 100 : 0}%"></div></div>
          <div class="rank-bar-value">${num(qtyFn(r))}개</div>
        </div>`).join("")}
    </div>`;
}

// 카테고리별 비율 도넛(SVG) — 세그먼트 사이 2px 여백을 두고, 12시 방향에서 시작하도록 전체를 -90도 회전.
function donutChartSvg(segs, size = 120, thickness = 18) {
  const r = (size - thickness) / 2;
  const c = 2 * Math.PI * r;
  const gap = 2;
  let offset = 0;
  const circles = segs.map(s => {
    const fullLen = s.pct / 100 * c;
    const drawLen = Math.max(fullLen - gap, 0.001);
    const html = `<circle cx="${size / 2}" cy="${size / 2}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${thickness}" stroke-dasharray="${drawLen} ${c - drawLen}" stroke-dashoffset="${-offset}"></circle>`;
    offset += fullLen;
    return html;
  }).join("");
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" style="transform:rotate(-90deg);flex-shrink:0;">${circles}</svg>`;
}

// 쿠팡 상품별(옵션) 카테고리 매출 비율 — 상위 6개 + "기타"로 묶어 카테고리 팔레트(유입경로 바와 같은 6색)를 쓴다.
const COUPANG_CATEGORY_COLORS = ["#2a78d6", "#1baf7a", "#eda100", "#008300", "#4a3aa7", "#e34948"];
const COUPANG_CATEGORY_ETC_COLOR = "#c3c2b7";
function coupangCategoryDonutHtml() {
  const byCategory = new Map();
  coupangItemRows.forEach(row => {
    const name = row.category || "기타";
    byCategory.set(name, (byCategory.get(name) || 0) + (Number(row.sales) || 0));
  });
  let list = [...byCategory.entries()].map(([name, sales]) => ({ name, sales })).sort((a, b) => b.sales - a.sales);
  if (list.length > 7) {
    const etc = list.slice(6).reduce((sum, c) => sum + c.sales, 0);
    list = list.slice(0, 6).concat([{ name: "기타", sales: etc }]);
  }
  const total = list.reduce((sum, c) => sum + c.sales, 0);
  if (!total) return "";
  const segs = list.filter(c => c.sales > 0).map((c, i) => ({
    ...c,
    pct: c.sales / total * 100,
    color: c.name === "기타" ? COUPANG_CATEGORY_ETC_COLOR : COUPANG_CATEGORY_COLORS[i % COUPANG_CATEGORY_COLORS.length],
  }));
  return `
    <div class="donut-wrap">
      ${donutChartSvg(segs)}
      <div class="dash-legend">
        ${segs.map(c => `<span class="dash-legend-item"><span class="dash-legend-dot" style="background:${c.color};"></span>${esc(c.name)} <b>${money(c.sales)}</b> · ${Math.round(c.pct)}%</span>`).join("")}
      </div>
    </div>`;
}

function adSortValue(row, key) {
  switch (key) {
    case "ctr": return Number(row.ctr) || (row.impressions ? row.clicks / row.impressions * 100 : 0);
    case "cpc": return Number(row.cpc) || (row.clicks ? row.cost / row.clicks : 0);
    case "conversions": return Number(row.purchaseConversions) || 0;
    case "conversionRate": return row.clicks ? (Number(row.purchaseConversions) || 0) / row.clicks * 100 : 0;
    case "conversionSales": return Number(row.purchaseSales) || 0;
    case "roas": return Number(row.purchaseRoas) || (row.cost ? (Number(row.purchaseSales) || 0) / row.cost * 100 : 0);
    case "name": return String(row.name || row.keyword || "");
    case "type": return adTypeLabel(row.type);
    case "status": return campaignStatusLabel(row.status);
    default: return Number(row[key]) || 0;
  }
}

function compareAdRows(a, b) {
  const va = adSortValue(a, adSort.key);
  const vb = adSortValue(b, adSort.key);
  const cmp = typeof va === "string" ? va.localeCompare(String(vb), "ko") : va - vb;
  return adSort.dir === "asc" ? cmp : -cmp;
}

function adTh(key, label, width, isNum) {
  const active = adSort.key === key;
  const arrow = active ? (adSort.dir === "asc" ? "▲" : "▼") : "⇅";
  return `<th class="sortable${isNum ? " num" : ""}${active ? " sorted" : ""}" data-sort="${key}">${label} <span class="arrow">${arrow}</span></th>`;
}

function formatPercentValue(value) {

// 조회기간과 같은 길이의 "이전 기간"과 "1년 전 같은 기간"을 계산.
// 예: 최근 30일 조회 → 이전 30일, 1년 전 같은 30일.
function comparePeriodRanges(dateFrom, dateTo) {
  const from = new Date(`${dateFrom}T00:00:00Z`);
  const to = new Date(`${dateTo}T00:00:00Z`);
  if (Number.isNaN(from.getTime()) || Number.isNaN(to.getTime())) return null;
  const dayMs = 86400000;
  const lengthDays = Math.round((to - from) / dayMs) + 1;
  const fmt = d => d.toISOString().slice(0, 10);

  const prevTo = new Date(from.getTime() - dayMs);
  const prevFrom = new Date(prevTo.getTime() - (lengthDays - 1) * dayMs);

  const yearFrom = new Date(from.getTime());
  yearFrom.setUTCFullYear(yearFrom.getUTCFullYear() - 1);
  const yearTo = new Date(to.getTime());
  yearTo.setUTCFullYear(yearTo.getUTCFullYear() - 1);

  return {
    prev: { from: fmt(prevFrom), to: fmt(prevTo) },
    year: { from: fmt(yearFrom), to: fmt(yearTo) },
  };
}

// 상대 변화율(%) — 광고비·클릭수처럼 값 자체를 비교할 때
function pctChangeChip(label, cur, prev) {
  if (prev == null) return `<span class="cmp">${esc(label)} 데이터 없음</span>`;
  if (prev === 0) {
    if (cur === 0) return `<span class="cmp">${esc(label)} 동일</span>`;
    return `<span class="cmp up">${esc(label)} 신규</span>`;
  }
  const pct = ((cur - prev) / prev) * 100;
  const cls = pct > 0.05 ? "up" : pct < -0.05 ? "down" : "";
  const arrow = pct > 0.05 ? "▲" : pct < -0.05 ? "▼" : "-";
  return `<span class="cmp ${cls}">${esc(label)} ${arrow}${Math.abs(pct).toFixed(1)}%</span>`;
}

// %p(퍼센트 포인트) 변화 — 전환율·광고수익률처럼 이미 %인 값을 비교할 때
function ppChangeChip(label, cur, prev, hasPrevData) {
  if (!hasPrevData) return `<span class="cmp">${esc(label)} 데이터 없음</span>`;
  const diff = cur - prev;
  const cls = diff > 0.05 ? "up" : diff < -0.05 ? "down" : "";
  const arrow = diff > 0.05 ? "▲" : diff < -0.05 ? "▼" : "-";
  return `<span class="cmp ${cls}">${esc(label)} ${arrow}${Math.abs(diff).toFixed(1)}%p</span>`;
}

async function fetchAdCompareTotals(store, dateFrom, dateTo) {
  try {
    const data = await callAdFn({ action: "summary", store, dateFrom, dateTo });
    const t = data.total || {};
    const impressions = Number(t.impressions) || 0;
    const clicks = Number(t.clicks) || 0;
    const cost = Number(t.cost) || 0;
    const purchaseConversions = Number(t.purchaseConversions) || 0;
    return {
      hasData: (data.items || []).length > 0 || cost > 0,
      cost, clicks, impressions,
      ctr: impressions ? clicks / impressions * 100 : 0,
      cpc: clicks ? cost / clicks : 0,
      purchaseConversions,
      purchaseSales: Number(t.purchaseSales) || 0,
      convRate: clicks ? purchaseConversions / clicks * 100 : 0,
      roas: Number(t.purchaseRoas) || (cost ? (Number(t.purchaseSales) || 0) / cost * 100 : 0),
      cpa: purchaseConversions ? cost / purchaseConversions : 0,
    };
  } catch (_) {
    return { hasData: false, cost: 0, clicks: 0, impressions: 0, ctr: 0, cpc: 0, purchaseConversions: 0, purchaseSales: 0, convRate: 0, roas: 0, cpa: 0 };
  }
}

/* ── 상세 테이블 비교 행 (버튼 토글, 기본 숨김) ──
   tfoot 합계 아래에 "전기간 대비"/"전년 대비" 두 줄을 붙인다.
   specs = 테이블 숫자 컬럼 순서대로 [{key, cur, type}] — key가 없으면 "-" 표시. */
let detailCompareOpen = false;

function toggleDetailCompare() {
  detailCompareOpen = !detailCompareOpen;
  render();
}

function cmpToggleBarHtml() {
  return `<div class="cmp-toggle-bar">
    <label class="switch-row${detailCompareOpen ? " on" : ""}" onclick="toggleDetailCompare()">
      <span class="switch-row-label">비교기간 함께보기</span>
      <span class="switch-track" role="switch" aria-checked="${detailCompareOpen}"></span>
    </label>
  </div>`;
}

function detailCmpRows(compare, specs, labelColspan = 1) {
  if (!detailCompareOpen) return "";
  const ready = compare && compare.key === currentAdLoadKey();
  const chip = (period, spec) => {
    if (!spec.key) return "-";
    if (!ready || !period) return `<span class="cmp">…</span>`;
    if (!period.hasData || period[spec.key] == null) return `<span class="cmp">-</span>`;
    return spec.type === "rate"
      ? ppChangeChip("", spec.cur, period[spec.key], true)
      : pctChangeChip("", spec.cur, period[spec.key]);
  };
  const row = (period, label) =>
    `<tr class="cmp-row"><td colspan="${labelColspan}">${label}</td>${specs.map(s => `<td class="num">${chip(period, s)}</td>`).join("")}</tr>`;
  return row(compare ? compare.prev : null, "전기간 대비") + row(compare ? compare.year : null, "전년 대비");
}

// 지표 카드 하단에 붙일 비교 칩 2개(전기간 / 전년) 생성.
// type: "abs"(금액·건수 등 절대값 → 증감률 %) | "rate"(이미 %인 값 → %p 차이)
function metricCompareHtml(compare, key, cur, type = "abs") {
  if (!compare || compare.key !== currentAdLoadKey()) {
    return `<div class="metric-cmp"><span class="cmp">비교 데이터 불러오는 중...</span></div>`;
  }
  const line = (period, label) => {
    if (!period) return `<span class="cmp">${esc(label)} 확인 중...</span>`;
    if (!period.hasData) return `<span class="cmp">${esc(label)} 데이터 없음</span>`;
    return type === "rate" ? ppChangeChip(label, cur, period[key], true) : pctChangeChip(label, cur, period[key]);
  };
  return `<div class="metric-cmp">${line(compare.prev, "전기간")}${line(compare.year, "전년")}</div>`;
}

function ensureNaverAdsLoaded() {
  if (activePlatform !== "naver" || activeSubtab.naver !== "ads" || adLoading || adCollecting) return;
  // adLoadKey = 마지막으로 조회를 "완료"한 키. 결과가 0건이어도 완료로 취급해야
  // 빈 기간에서 무한 재조회 루프에 빠지지 않는다.
  if (adLoadKey === currentAdLoadKey()) return;
  loadNaverAds();
}

async function callAdFn(payload) {
  const res = await fetch(AD_FN_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_ANON_KEY,
      "Authorization": "Bearer " + SUPABASE_ANON_KEY,
    },
    body: JSON.stringify(payload),
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok || data.error) throw new Error(data.error || "광고 함수 호출 실패");
  return data;
}

// 저장된 데이터만 읽는다 (네이버 API 호출 없음, 1~2초). 수집은 collectNaverAds()에서 별도로.
async function loadNaverAds() {
  const status = document.getElementById("adStatus");
  const dateFrom = document.getElementById("dateFrom").value;
  const dateTo = document.getElementById("dateTo").value;
  const store = DEFAULT_STORE;
  const loadKey = currentAdLoadKey();
  if (adLoading) return;
  adLoading = true; showLoading("저장된 광고 데이터를 불러오는 중...");
  adLoadKey = loadKey;
  status.className = "status";
  status.textContent = "저장된 광고 데이터를 불러오는 중...";
  renderAdsPanel();
  try {
    const data = await callAdFn({ action: "summary", store, dateFrom, dateTo });
    adRows = adRows.filter(row => !(row.platform === "naver" && row.loadKey === loadKey));
    adRows = adRows.concat([
      ...(data.total && (data.items || []).length ? [{ ...data.total, isTotal: true }] : []),
      ...(data.items || []),
    ].map(row => ({ ...row, platform: "naver", dateFrom, dateTo, loadKey, fetchedAt: new Date().toISOString() })));
    adMissingDates = data.missingDates || [];
    adStaleDates = data.staleDates || [];
    saveState();
    status.className = "status ok";
    const needDates = adMissingDates.length + adStaleDates.length;
    status.textContent = `네이버 광고 ${data.count || 0}개 캠페인 · 저장 데이터 기준`
      + (needDates ? ` · 수집 필요 ${needDates}일` : " · 최신 상태");
    adLoading = false; hideLoading();
    render();
    loadAdCompare(); // 비교기간(이전/1년 전)은 백그라운드로 읽어와 준비되는 대로 반영
  } catch (e) {
    adLoading = false; hideLoading();
    status.className = "status error";
    const message = String(e.message || e);
    status.textContent = message.includes("Failed to fetch")
      ? "광고 가져오기 실패: Supabase 함수 또는 네트워크 상태를 확인해 주세요."
      : "광고 가져오기 실패: " + message;
    renderAdsPanel();
  }
}

// 수집 버튼: 미수집/갱신 대상 날짜를 5일씩 나눠 remaining이 0이 될 때까지 반복 수집한다.
async function collectNaverAds() {
  if (adCollecting || adLoading) return;
  const status = document.getElementById("adStatus");
  const dateFrom = document.getElementById("dateFrom").value;
  const dateTo = document.getElementById("dateTo").value;
  const store = DEFAULT_STORE;
  adCollecting = true; showLoading("광고 데이터 수집 중...");
  adCollectProgress = { done: 0, remaining: adMissingDates.length + adStaleDates.length };
  status.className = "status";
  status.textContent = "광고 데이터 수집을 시작했습니다...";
  renderAdsPanel();
  try {
    let purchaseError = "";
    for (let i = 0; i < 40; i++) {
      const data = await callAdFn({ action: "collect", store, dateFrom, dateTo, maxDays: 5 });
      adCollectProgress.done += (data.collected || []).length;
      adCollectProgress.remaining = Number(data.remaining) || 0;
      if (data.purchaseError) purchaseError = data.purchaseError;
      setLoadingMessage(`광고 데이터 수집 중... (${num(adCollectProgress.done)}일 완료${adCollectProgress.remaining ? ` · ${num(adCollectProgress.remaining)}일 남음` : ""})`);
      renderAdsPanel();
      if (data.done || !(data.collected || []).length) break;
    }
    adCollecting = false; hideLoading();
    status.className = "status ok";
    status.textContent = `수집 완료 (${num(adCollectProgress.done)}일)`
      + (purchaseError ? ` · 일부 실패: ${purchaseError}` : "");
    adLoadKey = "";
    loadNaverAds();
  } catch (e) {
    adCollecting = false; hideLoading();
    status.className = "status error";
    status.textContent = "광고 수집 실패: " + String(e.message || e)
      + (adCollectProgress.done ? ` (${num(adCollectProgress.done)}일은 저장됨 — 다시 수집하면 이어서 진행됩니다)` : "");
    renderAdsPanel();
  }
}

// 텍스트 입력 정규화: "20260701", "2026.7.1" 등을 YYYY-MM-DD로 변환, 잘못된 값은 적용 중인 날짜로 되돌림
function normalizeDraftDateInput(el, fallbackId) {
  const digits = String(el.value || "").replace(/\D/g, "");
  let value = "";
  if (digits.length === 8) {
    value = `${digits.slice(0, 4)}-${digits.slice(4, 6)}-${digits.slice(6, 8)}`;
    const check = new Date(`${value}T00:00:00Z`);
    if (Number.isNaN(check.getTime()) || check.toISOString().slice(0, 10) !== value) value = "";
  } else if (digits.length === 6) {
    value = `20${digits.slice(0, 2)}-${digits.slice(2, 4)}-${digits.slice(4, 6)}`;
    const check = new Date(`${value}T00:00:00Z`);
    if (Number.isNaN(check.getTime()) || check.toISOString().slice(0, 10) !== value) value = "";
  }
  el.value = value || document.getElementById(fallbackId).value;
}

  activePreset = "";

  if (nav) {
    const label = document.getElementById("calLabel");
    const base = label.dataset.month || formatDate(kstDate(0)).slice(0, 7);
    const [y, m] = base.split("-").map(Number);
    const next = new Date(Date.UTC(y, m - 1 + Number(nav.dataset.calNav), 1));
    calScrollToMonth(`${next.getUTCFullYear()}-${String(next.getUTCMonth() + 1).padStart(2, "0")}`);
    return;
  }
  const day = e.target.closest("[data-cal-date]");
  if (!day || day.disabled) return;
  const picked = day.dataset.calDate;
  const fromEl = document.getElementById("draftDateFrom");
  const toEl = document.getElementById("draftDateTo");
  if (calPhase === "start" || !fromEl.value) {
    fromEl.value = picked;
    toEl.value = picked;
    calPhase = "end";
  } else if (picked < fromEl.value) {
    fromEl.value = picked;
    toEl.value = picked;
  } else {
    toEl.value = picked;
    calPhase = "start";
  }
  activePreset = "";
  renderPresetButtons();
  renderCalendar();
});
document.getElementById("cancelDateBtn").addEventListener("click", closeDatePopover);
document.getElementById("applyDateBtn").addEventListener("click", applyDateRange);
document.addEventListener("click", e => {
  // 달력 재렌더링으로 DOM에서 분리된 요소는 바깥 클릭으로 취급하지 않음
  if (!e.target.isConnected) return;
  if (!e.target.closest(".date-picker-wrap")) closeDatePopover();
});
document.getElementById("mainPanel").addEventListener("click", e => {
  const toggleHead = e.target.closest("[data-toggle-card]");
  if (toggleHead && !e.target.closest(".content-tools")) {
    const key = toggleHead.dataset.toggleCard;
    coupangCardOpen[key] = !cardOpenState(key);
    saveCoupangCardOpen();
    renderSalesPanel();
    return;
  }
  if (e.target.closest(".ad-collect-btn")) {
    collectNaverAds();
    return;
  }
  const placementBtn = e.target.closest(".coupang-placement-btn");
  if (placementBtn) {
    coupangPlacement = placementBtn.dataset.placement || "";
    render();
    return;
  }
  const th = e.target.closest("th[data-sort]");
  if (!th) return;
  const key = th.dataset.sort;
  if (adSort.key === key) adSort.dir = adSort.dir === "asc" ? "desc" : "asc";
  else adSort = { key, dir: "desc" };
  renderAdsPanel();
});

setDefaultDates();
render();
</script>
</body>
</html>
