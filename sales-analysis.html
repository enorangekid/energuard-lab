<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>매출분석 - 에너가드컴퍼니</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css?v=20260721-align2">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #f8f9fb; --card: #fff; --ink: #1a1f2e; --sub: #5a6378;
    --line: #e8ecf2; --dark: #05070b; --dark-tint: #eef0f3;
    --accent: #e85d2f; --accent-dark: #d04420; --accent-tint: #fdeee7;
    --good: #0f9f6e; --bad: #dc2626; --gray-badge: #eef0f3;
    --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    --font-main: "Pretendard Variable", Pretendard, -apple-system, sans-serif;
    --radius: 6px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scrollbar-gutter: stable; }
  body { font-family: var(--font-main); background: var(--bg); color: var(--ink); font-size: 15px; line-height: 1.55; }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 64px 0 80px; }
  header.page-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 20px; }
  header.page-head h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; }
  header.page-head .tag { font-size: 12px; font-weight: 600; color: var(--dark); background: var(--dark-tint); padding: 2px 8px; border-radius: 20px; }

  .card {
    background: var(--card); border: 1.5px solid var(--line); border-radius: var(--radius); padding: 20px;
    box-shadow: 0 14px 34px rgba(5, 7, 11, 0.05);
  }
  .field { display: flex; align-items: center; gap: 6px; color: var(--sub); font-size: 12px; font-weight: 800; }
  .field input, .field select {
    height: 32px; border: 1px solid var(--line); border-radius: 4px; padding: 0 9px;
    font-family: inherit; background: #fff; color: var(--ink);
  }
  .hidden-date-inputs { display: none; }
  .month-quick-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .month-quick-year {
    flex-shrink: 0; height: 36px; padding: 0 10px; border: 1.5px solid var(--line); border-radius: var(--radius);
    background: #fff; color: var(--ink); font-family: inherit; font-size: 13px; font-weight: 800; cursor: pointer;
    box-shadow: 0 2px 6px rgba(5, 7, 11, .04); transition: all .15s;
  }
  .month-quick-year:hover { border-color: #f0b79d; background: #fffaf7; }
  /* 12개월이 남은 폭 전체를 균등하게 채운다 — 플랫폼/서브 탭과 같은 카드 스타일 */
  .month-quick-grid { flex: 1; min-width: 0; display: grid; grid-template-columns: repeat(12, minmax(0, 1fr)); gap: 8px; }
  .month-card {
    height: 36px; border: 1.5px solid var(--line); border-radius: var(--radius);
    background: #fff; color: var(--sub); font-family: inherit; font-size: 13px; font-weight: 800; cursor: pointer;
    box-shadow: 0 2px 6px rgba(5, 7, 11, .04); transition: all .15s;
  }
  .month-card:hover { border-color: #f0b79d; color: var(--ink); background: #fffaf7; }
  .month-card.active { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 6px 16px rgba(232, 93, 47, .26); }
  .month-card.active:hover { background: var(--accent); color: #fff; }
  .month-card:disabled { color: #c3cad6; background: #fafbfc; cursor: default; }
  .month-card:disabled:hover { border-color: var(--line); color: #c3cad6; background: #fafbfc; }
  @media (max-width: 900px) { .month-quick-grid { grid-template-columns: repeat(6, minmax(0, 1fr)); } }
  .btn {
    height: 32px; padding: 0 12px; border: 1.5px solid var(--line); border-radius: 4px;
    background: #fff; color: var(--ink); font-family: inherit; font-size: 12px; font-weight: 900;
    cursor: pointer; transition: all .12s;
  }
  .btn:hover { border-color: #c8cdd4; color: var(--ink); background: #fafbfd; }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); color: #fff; }
  .btn.danger { color: var(--bad); }

  /* ── 상단 카테고리 전환(스토어 분석/광고 분석) + 스토어 드롭박스 ──
     랭킹추적과 완전히 동일한 값: 탭 줄(.wrap > header)과 드롭박스 줄(.rank-filterbar)이
     세로로 분리된 두 블록이라 이 페이지도 같은 구조(.analysis-mode-header / .analysis-filterbar)로 맞춘다. */
  .analysis-mode-header { display: flex; align-items: flex-end; gap: 0; margin-bottom: 30px; }
  .analysis-filterbar {
    display: flex; align-items: center; gap: 16px; padding-bottom: 22px;
    border-bottom: 1px solid var(--line); margin-bottom: 24px;
  }
  /* 스토어 드롭박스 + 엑셀 업로드(+) 버튼 묶음 — 키워드분석(.keyword-store-row)과 동일하게
     좁은 간격(8px)으로 한 그룹처럼 붙여준다. */
  .analysis-store-row { display: inline-flex; align-items: center; gap: 8px; }
  .mode-title-tabs { display: inline-flex; align-items: center; gap: 28px; }
  .mode-title-tab {
    position: relative; height: 34px; padding: 0 0 8px; border: 0; background: transparent;
    color: #aeb6c4; font-family: inherit; font-size: 21px; font-weight: 900; cursor: pointer;
  }
  .mode-title-tab:not(.active):hover { color: #7f8795; }
  .mode-title-tab + .mode-title-tab::before {
    content: "";
    position: absolute;
    left: -15px;
    top: 4px;
    width: 1px;
    height: 18px;
    background: #d8dde6;
  }
  .mode-title-text { display: inline-flex; align-items: center; gap: 12px; }
  .mode-label { position: relative; display: inline-flex; align-items: center; }
  .mode-title-tab.active { color: #07111f; }
  .mode-title-tab.active .mode-label::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: -10px; height: 3px;
    background: var(--accent); border-radius: 999px;
  }
  .mode-help {
    width: 18px; height: 18px; border: 1px solid #cfd5df; border-radius: 50%;
    background: #f4f6f9; color: #8a93a5; font-size: 12px; font-weight: 900;
    display: inline-flex; align-items: center; justify-content: center; line-height: 1;
  }
  .store-chips { position: relative; display: block; flex: 0 0 auto; }
  .store-select {
    height: 42px; min-width: 150px; padding: 0 14px 0 18px; border: 1px solid #dfe4ec;
    border-radius: var(--radius); background: #fff; color: var(--sub); font-family: inherit;
    font-size: 14px; font-weight: 800; cursor: pointer; display: inline-flex;
    align-items: center; justify-content: space-between; gap: 18px;
  }
  .store-select:hover, .store-chips.open .store-select { border-color: #c8cdd4; background: #fafbfc; }
  .store-caret { display: inline-flex; align-items: center; justify-content: center; color: #8a93a5; line-height: 1; }
  .store-caret svg { width: 14px; height: 14px; }
  .store-menu {
    position: absolute; z-index: 50; top: calc(100% + 6px); right: 0; min-width: 100%;
    padding: 6px; border: 1px solid var(--line); border-radius: var(--radius);
    background: #fff; box-shadow: 0 16px 34px rgba(5, 7, 11, 0.12); display: none;
  }
  .store-chips.open .store-menu { display: flex; flex-direction: column; gap: 4px; }
  .store-chip {
    height: 34px; padding: 0 12px; border: 0; border-radius: 4px; background: transparent;
    color: var(--sub); font-family: inherit; font-size: 12.5px; font-weight: 800; text-align: left; cursor: pointer;
  }
  .store-chip:hover { background: #f4f6f9; color: var(--ink); }
  .store-chip.active { background: var(--ink); color: #fff; }

  .status { margin-top: 10px; color: var(--sub); font-size: 12px; }
  .status.error { color: var(--bad); }
  .status.ok { color: var(--good); }

  /* ── 요약 대시보드 — 랭킹추적의 .rank-dash와 동일한 스타일(하나의 박스 + 구분선) ── */
  .metric-grid { margin-top: 18px; }
  .rank-dash {
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: #fff;
    padding: 16px 18px 14px;
    box-shadow: 0 14px 34px rgba(5, 7, 11, 0.05);
  }
  .rank-dash-tiles {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 8px;
  }
  .dash-tile { padding: 4px 2px; min-width: 0; }
  .dash-tile + .dash-tile { border-left: 1px solid var(--line); padding-left: 14px; }
  .dash-label { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 800; color: #8a93a5; white-space: nowrap; }
  /* 값은 랭킹추적·키워드분석과 동일하게 본문 폰트(Pretendard) 사용 — 모노스페이스 강제하지 않음 */
  .dash-value {
    margin-top: 2px; font-size: 21px; font-weight: 800; color: var(--ink);
    font-variant-numeric: tabular-nums; letter-spacing: -0.01em; white-space: nowrap;
  }
  /* 근거 노트 — 키워드분석(.ins-info/.ins-tip)과 동일하게 타이틀 옆 물음표 아이콘에 마우스를 올리면 툴팁으로 표시 */
  .dash-info {
    position: relative;
    width: 14px; height: 14px; flex-shrink: 0;
    display: inline-flex; align-items: center; justify-content: center;
    border: 1px solid #cfd5df; border-radius: 50%;
    background: #f4f6f9; color: #8a93a5;
    font-size: 9.5px; font-weight: 900; cursor: default; line-height: 1;
  }
  /* 대시보드 타일 안에서는 .dash-label의 flex gap이 간격을 만들지만, 카드 제목(h2)처럼
     flex가 아닌 자리에 단독으로 들어갈 땐 글자와 바로 붙으므로 직접 여백을 준다 */
  h2 .dash-info { margin-left: 7px; }
  .dash-tip {
    position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(3px);
    z-index: 60; width: max-content; max-width: 230px;
    padding: 8px 11px; border-radius: 6px;
    background: #161a22; color: #fff;
    font-size: 11.5px; font-weight: 600; line-height: 1.5; text-align: left; white-space: normal;
    opacity: 0; visibility: hidden; transition: all .12s; pointer-events: none;
  }
  .dash-info:hover .dash-tip { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
  /* 카드 맨 위(overflow:hidden으로 잘리는 위치)의 아이콘은 위로 띄우면 카드 경계에 잘리므로 아래로 펼친다 */
  .dash-tip.down { bottom: auto; top: 22px; transform: translateX(-50%) translateY(-3px); }
  .dash-info:hover .dash-tip.down { transform: translateX(-50%) translateY(0); }

  /* 유입경로 비율 — 랭킹추적의 페이지 분포 바(.dash-bar-wrap)와 동일한 구조·스타일.
     채널은 순서(정체성) 데이터라 단일 색조 램프 대신 카테고리 팔레트를 쓴다(색상 6개 고정 순서 + 기타). */
  .dash-bar-wrap { margin-top: 14px; }
  .dash-bar { display: flex; gap: 2px; height: 12px; }
  .dash-bar-seg { min-width: 3px; }
  .dash-bar-seg:first-child { border-radius: 6px 0 0 6px; }
  .dash-bar-seg:last-child { border-radius: 0 6px 6px 0; }
  .dash-bar-seg:only-child { border-radius: 6px; }
  .dash-legend { display: flex; flex-wrap: wrap; gap: 6px 16px; margin-top: 8px; font-size: 11.5px; color: var(--sub); font-weight: 700; }
  .dash-legend-item { display: inline-flex; align-items: center; gap: 5px; }
  .dash-legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dash-legend-item b { color: var(--ink); font-weight: 800; }

  /* 상품별 판매량 랭킹 막대 — 같은 종류(상품)의 크기 비교이므로 카테고리 색이 아니라
     accent 단일 색조(랭킹추적·이 페이지 전반의 accent와 동일)로 그린다. */
  .rank-bar-list { display: flex; flex-direction: column; gap: 9px; padding: 16px; border-bottom: 1px solid var(--line); }
  .rank-bar-row { display: grid; grid-template-columns: 160px 1fr 76px; align-items: center; gap: 10px; }
  .rank-bar-name { font-size: 12px; font-weight: 700; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-decoration: none; }
  a.rank-bar-name:hover { color: var(--accent); text-decoration: underline; }
  .rank-bar-track { position: relative; height: 10px; background: var(--dark-tint); border-radius: 999px; overflow: hidden; }
  .rank-bar-fill { position: absolute; top: 0; left: 0; height: 100%; background: var(--accent); border-radius: 999px; }
  .rank-bar-value { font-size: 12px; font-weight: 800; color: var(--ink); text-align: right; font-family: var(--font-mono); white-space: nowrap; }

  /* 카테고리별 비율 도넛 — 순서 없는 정체성 데이터라 유입경로 바와 같은 카테고리 팔레트를 쓰고,
     범례도 같은 .dash-legend 컴포넌트를 재사용한다(≥2 시리즈는 항상 범례를 둔다는 원칙). */
  .donut-wrap { display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 24px; padding: 20px 16px; border-bottom: 1px solid var(--line); }
  .product-charts-row .donut-wrap .dash-legend { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px 14px; margin-top: 0; width: 100%; }
  /* 카테고리명이 길 때 칸이 좁으면 글자가 단어 중간에서 줄바꿈되던 문제 — 이름은 한 줄로 말줄임
     처리하고 금액·비중은 그 아래 줄에 따로 둬서, 칸 너비와 무관하게 항상 안 밀리게 한다. */
  .dash-legend-text { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .dash-legend-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .dash-legend-value { white-space: nowrap; }

  /* 판매량 막대 + 카테고리 도넛을 한 줄에 나란히 — 서로 다른 데이터라 각자 독립된 박스로 감싼다. */
  .product-charts-row { display: flex; align-items: stretch; gap: 16px; }
  .product-charts-row .rank-bar-list { flex: 7 1 0; min-width: 0; padding: 16px; border: 1px solid var(--line); border-radius: var(--radius); }
  .product-charts-row .donut-wrap { flex: 3 1 0; min-width: 0; padding: 16px; border: 1px solid var(--line); border-radius: var(--radius); }

  /* 매출/유입 상승·하락 TOP — 랭킹추적의 .dash-movers(상승 TOP/하락 TOP)와 동일한 구조·스타일 */
  .dash-movers { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line); display: flex; flex-direction: column; gap: 8px; }
  /* 전기간/전년 중 하나만 골라 보는 토글 — 세그먼트 버튼 한 쌍 */
  .mover-period-toggle { display: inline-flex; gap: 2px; padding: 2px; background: var(--dark-tint); border-radius: 999px; width: fit-content; }
  .mover-period-btn {
    height: 24px; padding: 0 12px; border: 0; border-radius: 999px; background: transparent;
    color: var(--sub); font-family: inherit; font-size: 11.5px; font-weight: 800; cursor: pointer; transition: all .12s;
  }
  .mover-period-btn.on { background: #fff; color: var(--ink); box-shadow: 0 1px 3px rgba(5, 7, 11, .12); }
  /* 쿠팡 상승·하락 TOP은 토글 없이 비교기간을 한 줄로 미리 밝혀두고, 행 제목은 짧게 유지한다
     (제목 칸에 날짜범위까지 넣으면 132px 칸을 넘쳐서 잘려 보임) */
  .dash-mover-period-note { font-size: 11px; color: var(--sub); font-weight: 700; }
  .dash-mover-row { display: grid; grid-template-columns: 132px 1fr; align-items: start; gap: 8px; }
  .dash-mover-title { font-size: 11px; font-weight: 800; color: #8a93a5; padding-top: 6px; white-space: nowrap; }
  .dash-mover-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .dash-mover-chip {
    display: inline-flex; align-items: center; gap: 6px; min-width: 0;
    padding: 5px 10px; border: 1px solid var(--line); border-radius: var(--radius);
    background: #fafbfc; font-size: 12px; font-weight: 700; color: var(--ink); text-decoration: none;
  }
  a.dash-mover-chip:hover { border-color: #f0b79d; background: #fffaf7; }
  .dash-mover-name { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .dash-mover-delta { font-family: var(--font-mono); font-size: 11px; font-weight: 800; white-space: nowrap; }
  .dash-mover-delta.up { color: var(--good); }
  .dash-mover-delta.down { color: var(--bad); }
  .dash-mover-value { font-size: 11px; color: var(--sub); font-family: var(--font-mono); white-space: nowrap; }

  /* 유입경로 — 키워드분석 "검색 노출 분석"(.sel-row)과 동일한 순위 리스트 + 막대 스타일.
     "영향력" 개념 대신 방문수를 막대·굵은 값으로 쓰고, 나머지 지표는 오른쪽에 나눠 붙인다.
     각 행을 별도 grid 컨테이너로 두면 칸 폭(특히 1fr/auto)이 "그 행의 내용"만 보고 행마다 따로
     계산돼서 좌우 끝선이 행마다 미묘하게 어긋난다 — 리스트 전체를 하나의 grid로 두고 셀들을
     바로 자식으로 흘려 넣어야, 같은 열의 폭이 전체 행을 통틀어 한 번에 계산되어 항상 맞는다. */
  .visit-list {
    display: grid; grid-template-columns: 56px 260px minmax(60px, 1fr) 90px auto;
    align-items: center; column-gap: 12px; padding: 0 18px; font-size: 13px;
  }
  /* 유입분석은 요약분석과 같은 .summary-mini-card 구조로 바뀌면서 .summary-section-body가
     이미 좌우 20px 여백을 주고 있어서, .visit-list 자체 padding(0 18px)까지 더해지면 이중으로
     들여써 보인다 — 검색분석(아직 옛 .section-body 구조)은 그대로 두고 여기만 상쇄한다. */
  .summary-section-body .visit-list { padding: 0; }
  .visit-cell { padding: 9px 0; border-bottom: 1px solid #f4f5f7; }
  .visit-list .visit-cell:nth-last-child(-n+5) { border-bottom: none; }
  .visit-rank {
    text-align: center; font-family: var(--font-mono); font-weight: 800; font-size: 14px;
    line-height: 1.1; color: var(--sub); font-variant-numeric: tabular-nums; white-space: nowrap;
  }
  .visit-rank span { display: inline-block; min-width: 56px; background: var(--dark-tint); border-radius: var(--radius); padding: 5px 4px; }
  /* 넘치는 이름은 말줄임표로 잘라내고 title 툴팁으로만 전체를 보여준다. */
  .visit-name { font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  /* 검색분석의 검색어는 키워드분석으로 바로 이동하는 링크라 나머지(유입경로 등) .visit-name과
     구분해 이 클래스에만 호버 스타일을 준다 */
  a.visit-name-link { color: inherit; text-decoration: none; }
  a.visit-name-link:hover { color: var(--accent); text-decoration: underline; }
  /* .visit-cell의 padding(9px 0)과 트랙 자체의 height(8px)를 같은 요소에 같이 주면 border-box라
     패딩이 높이를 다 잡아먹어 안쪽 막대(.visit-bar)가 찌그러져 안 보인다 — 셀(패딩·구분선 담당)과
     트랙(8px 높이·배경·막대 담당)을 별도 요소로 분리한다. */
  .visit-bar-wrap { display: flex; align-items: center; }
  .visit-bar-track { width: 100%; height: 8px; background: var(--dark-tint); border-radius: 4px; overflow: hidden; }
  .visit-bar { display: block; height: 100%; background: var(--accent); border-radius: 4px; }
  .visit-share { font-family: var(--font-mono); font-size: 12px; color: var(--ink); text-align: right; white-space: nowrap; }
  .visit-share b { color: var(--accent-dark); }

  /* 고객분석 — 신규/재구매 두 세그먼트를 나란히 비교하는 카드. 방문/결제/매출처럼 더할 수 있는
     값은 .visit-bar-track/.visit-bar를 재사용해 비중 막대까지 보여주고(색만 세그먼트별로 다르게),
     구매전환율·객단가처럼 평균/비율값은 막대 없이 숫자만 나열한다(.cust-seg-row-plain). */
  .cust-seg-card { flex: 1 1 220px; min-width: 200px; border: 1px solid var(--line); border-radius: var(--radius); padding: 16px 18px; }
  .cust-seg-title { font-size: 12px; font-weight: 800; color: var(--sub); margin-bottom: 14px; }
  .cust-seg-row { margin-bottom: 14px; }
  .cust-seg-row:last-child { margin-bottom: 0; }
  .cust-seg-row-head { display: flex; justify-content: space-between; align-items: baseline; font-size: 12.5px; font-weight: 700; color: var(--ink); margin-bottom: 6px; }
  .cust-seg-row-value { font-family: var(--font-mono); font-weight: 800; font-size: 12.5px; }
  .cust-seg-row-plain { display: flex; justify-content: space-between; align-items: center; font-size: 12.5px; font-weight: 700; color: var(--ink); padding: 5px 0; }
  .visit-bar.new { background: #2a78d6; }
  .visit-bar.repeat { background: #16803c; }
  .visit-detail { font-size: 11.5px; color: var(--sub); text-align: left; font-variant-numeric: tabular-nums; white-space: nowrap; }

  /* 요약분석 — 유입경로 비율/전기간·전년 비교/핵심 지표 TOP3를 각각 독립된 카드로 세로로 쌓는다.
     바깥 .summary-card는 탭 생성용 .content-card 구조를 유지하기 위한 투명 래퍼일 뿐이라
     자체 테두리·그림자·패딩은 없애고, 실제 카드 모양(테두리·그림자)은 .summary-mini-card가 갖는다.
     (.content-card 기본 테두리/배경보다 이 규칙이 소스 순서상 앞에 있어서, 클래스 하나짜리
     선택자로는 나중에 나오는 .content-card 규칙에 덮여쓰였다 — .content-card.summary-card로
     specificity를 올려서 순서와 무관하게 항상 이기게 한다) */
  .content-card.summary-card { background: transparent; border: 0; box-shadow: none; overflow: visible; }
  .summary-cards-stack { display: flex; flex-direction: column; gap: 18px; }
  .summary-mini-card {
    background: #fff; border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: 0 14px 34px rgba(5, 7, 11, 0.05); overflow: hidden;
  }
  .summary-divider { height: 1px; background: var(--line); }
  .summary-section-title-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 20px 20px 16px; }
  .summary-section-title-wrap { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .summary-section-title { font-size: 15px; font-weight: 800; color: var(--ink); }
  /* 제목보다 한 단계 작은 회색 보조 설명 — 줄 하나 늘었다고 카드가 눈에 띄게 더 커지지 않도록
     제목 줄 패딩(24px→20px)을 살짝 줄여서 상쇄했다 */
  .summary-section-subtitle { font-size: 12px; font-weight: 600; color: var(--sub); }
  .summary-section-body { padding: 20px 20px 28px; }
  /* 유입 그래프 — 타일 밑에 작게 붙어있던 것보다 막대를 굵게, 범례 글자를 크게 키워서 독립 섹션답게 */
  .summary-section-body .dash-bar-wrap { margin-top: 0; }
  .summary-section-body .dash-bar { height: 28px; border-radius: 8px; overflow: hidden; }
  /* 기본 .dash-legend는 flex-wrap이라 줄마다 항목 글자수가 달라지면 다음 줄 항목이 윗줄과
     세로로 안 맞는다(예: "네이버페이"가 "플러스스토어"보다 짧아서 왼쪽으로 틀어져 보임) —
     grid로 바꿔 글자수와 무관하게 열이 항상 맞춰지게 한다. */
  .summary-section-body .dash-legend {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    column-gap: 28px; row-gap: 12px; margin-top: 18px; font-size: 13.5px;
  }
  .summary-section-body .dash-legend-dot { width: 10px; height: 10px; }

  /* 요약분석 — 매출/유입/검색 TOP3를 나란히 보여주는 미니 카드 묶음.
     네이버 스마트스토어 자체 "요약 리포트"의 랭킹 카드 구조를 참고했다. */
  .summary-top3-row-wrap { display: flex; gap: 14px; flex-wrap: wrap; }
  .summary-top3-card { flex: 1 1 220px; min-width: 200px; border: 1px solid var(--line); border-radius: var(--radius); padding: 16px 18px; }
  .summary-top3-title { font-size: 12px; font-weight: 800; color: var(--sub); margin-bottom: 12px; }
  .summary-top3-row { display: flex; align-items: center; gap: 8px; padding: 9px 0; border-bottom: 1px solid #f4f5f7; }
  .summary-top3-row:last-child { border-bottom: none; }
  .summary-top3-rank {
    flex: 0 0 auto; width: 20px; height: 20px; border-radius: 50%; background: var(--dark-tint);
    display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 11px; font-weight: 800; color: var(--sub);
  }
  .summary-top3-name {
    flex: 1 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    font-size: 13px; font-weight: 700; color: inherit; text-decoration: none;
  }
  a.summary-top3-name:hover { color: var(--accent); text-decoration: underline; }
  .summary-top3-value {
    flex: 0 0 auto; display: flex; flex-direction: column; align-items: flex-end; gap: 2px;
    font-family: var(--font-mono); font-size: 12px; font-weight: 800; color: var(--ink); white-space: nowrap;
  }
  .summary-top3-share { font-size: 10.5px; font-weight: 700; color: var(--sub); }
  /* 3위까지만 보이던 걸 눌러서 더 펼치는 버튼 — 네이버 요약 리포트의 "순위 더보기 +"와 같은 자리 */
  .summary-top3-more {
    display: flex; align-items: center; justify-content: center; gap: 4px; width: 100%;
    margin-top: 10px; padding: 10px 0 0; border: 0; border-top: 1px solid #f4f5f7; background: transparent;
    color: var(--sub); font-family: inherit; font-size: 12px; font-weight: 800; cursor: pointer;
  }
  .summary-top3-more:hover { color: var(--accent); }

  /* 전기간·전년 비교 미니 카드 — TOP3 카드와 같은 틀(.summary-top3-card)을 쓰되, 한 줄 값 대신
     "1위 이름 ▲53%" + 그 아래 "19,000원 → 86,000원" 두 줄 구성이라 전용 규칙을 추가한다. */
  .summary-mover-grid .summary-top3-card { flex: 1 1 260px; }
  .summary-mover-grid .summary-top3-title { margin-bottom: 4px; }
  .summary-mover-subtitle { font-size: 11.5px; color: var(--sub); font-weight: 600; margin: 0 0 12px; }
  .summary-mover-row { padding: 9px 0; border-bottom: 1px solid #f4f5f7; }
  .summary-mover-row:last-child { border-bottom: none; }
  .summary-mover-row-main { display: flex; align-items: center; gap: 8px; }
  .summary-mover-row-detail { margin-top: 4px; padding-left: 28px; font-size: 11.5px; color: var(--sub); font-family: var(--font-mono); }
  .summary-mover-delta { flex: 0 0 auto; margin-left: auto; font-family: var(--font-mono); font-size: 12px; font-weight: 800; white-space: nowrap; }
  .summary-mover-delta.up { color: var(--good); }
  .summary-mover-delta.down { color: var(--bad); }

  /* 전체 데이터 도구 보기 — 위 줄은 네이버 진단 리포트, 아래 줄은 우리 도구로 가는 링크 카드.
     둘 다 같은 카드 모양이라 위·아래 줄 사이에 살짝 간격만 둔다. */
  .summary-tool-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px; }
  .summary-tool-grid-second { margin-top: 10px; }
  .summary-tool-card {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 14px 16px; border: 1px solid var(--line); border-radius: var(--radius);
    background: #fff; text-decoration: none; color: inherit; transition: all .15s;
  }
  .summary-tool-card:hover { border-color: #f0b79d; background: #fffaf7; }
  .summary-tool-text { min-width: 0; }
  .summary-tool-title { font-size: 14px; font-weight: 800; color: var(--ink); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .summary-tool-subtitle { font-size: 11.5px; color: var(--sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  /* 유틸리티 페이지(.utility-arrow)와 동일한 원형 배지 아이콘 — 색상도 그대로(진한 네이비), 통일 목적이라 오렌지로 바꾸지 않는다 */
  .summary-tool-icon {
    flex: 0 0 auto; width: 26px; height: 26px; border-radius: 50%;
    background: var(--dark); color: #fff;
    display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 14px;
  }

  .metric-cmp { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .metric-cmp .cmp {
    display: inline-flex; align-items: center; gap: 2px; font-size: 10.5px; font-weight: 800;
    padding: 1px 6px; border-radius: 8px; background: var(--dark-tint); color: var(--sub); white-space: nowrap;
  }
  .metric-cmp .cmp.up { color: var(--good); background: #e7f6ec; }
  .metric-cmp .cmp.down { color: var(--bad); background: #fdecec; }

  /* 섹션 바로가기 탭 — 요약 대시보드 위에서 이번 화면에 뜬 콘텐츠 카드(매출분석/유입분석/
     검색분석/고객분석 등)로 바로 이동. 랭킹추적의 카테고리 배너(.category-tab, 아이소핑크·
     스티로폼 탭)와 크기·글자 크기까지 완전히 동일하게 맞춘다.
     탭 개수가 화면마다 다르므로(네이버 5개·쿠팡은 더 적음) grid auto-fit 대신 flex(각 버튼
     flex:1)로 —개수와 무관하게 항상 좌우 끝까지 꽉 채운다. */
  .sec-nav {
    display: none;
    margin: 64px 0 20px;
    background: var(--bg);
  }
  .sec-nav.on { display: flex; gap: 8px; }
  .sec-nav-btn {
    flex: 1 1 0; min-width: 0; height: 42px;
    border: 1.5px solid var(--line); border-radius: var(--radius);
    background: #fff; color: var(--sub);
    font-family: inherit; font-size: 13px; font-weight: 800; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    white-space: nowrap;
    box-shadow: 0 2px 6px rgba(5, 7, 11, .04);
    transition: all .15s;
  }
  /* 호버는 사이트 전반에서 쓰는 따뜻한 오렌지 틴트(예: .dash-mover-chip:hover)와 같은 톤 */
  .sec-nav-btn:hover { border-color: #f0b79d; color: var(--ink); background: #fffaf7; }
  /* 활성 탭은 검정 대신 브랜드 액센트(오렌지)로 채우고, 그 색으로 은은한 글로우 그림자를 줘서
     밋밋한 흑백 박스보다 붕 뜬 느낌(입체감)을 준다 */
  .sec-nav-btn.active {
    background: var(--accent); border-color: var(--accent); color: #fff;
    box-shadow: 0 10px 24px rgba(232, 93, 47, .28);
  }

  /* 일별 추이 차트 — 키워드분석의 검색량 추이 차트(.vol-chart-wrap/.vol-tip)와 동일한 스타일 */
  .vol-chart-wrap { position: relative; padding: 14px 16px 18px; border-bottom: 1px solid var(--line); }
  .vol-chart-wrap svg { display: block; width: 100%; height: auto; }
  /* 6개월/1년 확장 조회 중에는 기존(1달) 차트를 흐리게 유지해서 "멈춘 게 아니라 불러오는 중"임을 보여준다 */
  #naverSalesTrendBody.is-loading, #coupangSalesTrendBody.is-loading { opacity: .45; transition: opacity .15s; pointer-events: none; }
  /* 일별 매출 추이는 표를 "데이터 테이블" 카드로 옮겨서 그래프 아래에 더 이상 내용이 없다 —
     .vol-chart-wrap의 border-bottom(원래 검색량 추이처럼 아래에 표가 붙는 화면을 위한 구분선)이
     카드 테두리 바로 위에 불필요하게 겹쳐 보여서 여기서만 없앤다. */
  #naverSalesTrendBody .vol-chart-wrap, #coupangSalesTrendBody .vol-chart-wrap { border-bottom: none; padding-bottom: 0; }
  .vol-tip {
    position: absolute; top: 6px; transform: translateX(-50%);
    padding: 5px 10px; border-radius: 6px;
    background: #161a22; color: #fff;
    font-size: 12px; font-weight: 700; font-family: var(--font-mono, monospace);
    white-space: nowrap; pointer-events: none; z-index: 10;
  }

  /* 고정 상단바(73px) + 탭 높이만큼 앵커 이동 시 여백 확보 */
  .content-card {
    scroll-margin-top: 132px; margin-top: 18px; background: #fff; border: 1px solid var(--line); border-radius: var(--radius);
    overflow: hidden; box-shadow: 0 14px 34px rgba(5, 7, 11, 0.05);
  }
  .content-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 14px; border-bottom: 1px solid var(--line); }
  .content-head h2 { font-size: 15px; font-weight: 800; }
  .content-head span { color: var(--sub); font-size: 12px; }
  /* 위 규칙(span 전체)이 카드 제목(h2) 안에 중첩된 물음표 툴팁(.dash-info/.dash-tip)의
     색상까지 덮어써 버려서, 어두운 배경의 툴팁 글자가 흐린 회색으로 보이던 문제를 되돌린다. */
  .content-head .dash-info { color: #8a93a5; font-size: 9.5px; }
  .content-head .dash-tip { color: #fff; font-size: 11.5px; }
  .content-head-main { display: flex; align-items: baseline; gap: 10px; min-width: 0; flex: 1 1 auto; }
  .content-head-main h2 { flex-shrink: 0; }
  .content-meta { color: var(--sub); font-size: 12px; font-weight: 600; white-space: nowrap; }
  .content-tools { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-left: auto; }
  .file-input { max-width: 260px; font-family: inherit; font-size: 12px; color: var(--sub); }
  /* 랭킹추적(rank-tracker.html)의 "전체 펼치기" 버튼과 동일한 스타일 — 카드 헤더 안에서 캐럿(펼치기) 옆에
     붙는 작은 버튼. 거긴 <button>, 여기선 <label>로 파일 입력을 감싸 클릭 시 바로 파일선택창이 뜨게 한다. */
  .expand-all-btn {
    flex: 0 0 auto; height: 28px; padding: 0 10px;
    border: 1px solid #dfe4ec; border-radius: 4px; background: #fff; color: var(--sub);
    font-family: inherit; font-size: 12px; font-weight: 800; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background .12s, border-color .12s, color .12s;
  }
  .expand-all-btn:hover { border-color: #c8cdd4; color: var(--ink); background: #fafbfc; }
  /* 파일 업로드 트리거 — 키워드분석의 스토어 추가(+) 버튼과 동일한 스타일 */
  .store-add-icon {
    width: 42px; height: 42px; border: 1px solid #07111f; border-radius: var(--radius);
    background: #07111f; color: #fff; display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all .12s; flex-shrink: 0;
  }
  .store-add-icon:hover { border-color: #111827; color: #fff; background: #111827; }
  .store-add-icon svg { width: 16px; height: 16px; }
  /* 광고 데이터 수집 아이콘 — 랭킹추적 아이템 추적의 오렌지색 수집 버튼과 동일한 색상 */
  .store-add-icon.collect { border-color: var(--accent); background: var(--accent); }
  .store-add-icon.collect:hover { border-color: var(--accent-dark); background: var(--accent-dark); }
  .store-add-icon.collect.busy { opacity: .6; pointer-events: none; }

  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  .table-scroll { overflow-x: visible; }
  .table-scroll table { min-width: 0; }
  .ad-table { font-variant-numeric: tabular-nums; }
  .ad-table tbody tr:hover td { background: #fff9f5; }
  .ad-table .ad-name-cell { min-width: 0; }
  .ad-name {
    display: block;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-weight: 900;
    color: var(--ink);
    letter-spacing: 0;
    text-decoration: none;
  }
  a.ad-name:hover { color: var(--accent); text-decoration: underline; }
  .ad-type-badge {
    display: inline-flex;
    align-items: center;
    max-width: 100%;
    height: 22px;
    padding: 0 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 900;
    white-space: nowrap;
    background: #fff0e9;
    color: var(--accent-dark);
  }
  .ad-table td.num { color: #263244; font-weight: 750; }
  .ad-table td.num.strong { color: var(--accent-dark); font-weight: 900; }
  /* 표 안 숫자 아래 전월/전년 비교 칩 — 지표 대시보드의 .metric-cmp .cmp와 같은 배지 스타일 */
  .ad-table td .cell-cmp { margin-top: 3px; }
  .ad-table td .cell-cmp .cmp {

function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function norm(s) {

}

function compact(s) {
  return norm(s).replace(/\s/g, "").toLowerCase();
}

function toNumber(value) {
  if (typeof value === "number") return value;

  const n = Number(text);
  return Number.isFinite(n) ? n : 0;
}

function toDate(value) {

  if (typeof value === "number") {
    const d = XLSX.SSF.parse_date_code(value);

  }
  const text = String(value).trim();
  const m = text.match(/(\d{4})[.\-/년\s]+(\d{1,2})[.\-/월\s]+(\d{1,2})/);
  if (m) return `${m[1]}-${m[2].padStart(2, "0")}-${m[3].padStart(2, "0")}`;
  return "";
}

function kstDate(offsetDays = 0) {
  const now = new Date(Date.now() + 9 * 3600 * 1000);
  const base = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()));
  base.setUTCDate(base.getUTCDate() + offsetDays);
  return base;
}

function formatDate(date) {
  return date.toISOString().slice(0, 10);
}

function monthEnd(date) {
  return new Date(Date.UTC(date.getUTCFullYear(), date.getUTCMonth() + 1, 0));
}

function setDateRange(from, to) {
  document.getElementById("dateFrom").value = from;
  document.getElementById("dateTo").value = to;
  renderMonthQuick();
}

// 월별 바로가기: 연도 드롭박스 + 1~12월 카드. 선택한 연도의 해당 월 전체(1일~말일)로 즉시 전환.
let monthQuickYear = kstDate(0).getUTCFullYear();

function monthQuickYearOptions() {
  const curYear = kstDate(0).getUTCFullYear();
  const years = [];
  for (let y = curYear; y >= curYear - 3; y--) years.push(y);
  return years;
}

function renderMonthQuickYearSelect() {
  const sel = document.getElementById("monthQuickYear");
  if (!sel) return;
  sel.innerHTML = monthQuickYearOptions().map(y =>
    `<option value="${y}"${y === monthQuickYear ? " selected" : ""}>${y}년</option>`
  ).join("");
}

// 월별 데이터 채움 여부 캐시: "platform|subtab|year" → Set("YYYY-MM") | null(조회 실패)
let monthFillCache = {};
let monthFillLoadingKey = "";

function monthFillCacheKey(year) {
  return `${activePlatform}|${activeSubtab[activePlatform]}|${year}`;
}

// 해당 연도 전체를 한 번의 조회로 훑어, 데이터가 한 건이라도 있는 월만 모은다.
// 플랫폼/탭마다 실제 데이터가 담긴 원본 테이블이 달라 조회 액션도 다르게 매핑한다.
async function ensureMonthFillLoaded(year) {
  const key = monthFillCacheKey(year);
  if (monthFillCache[key] || monthFillLoadingKey === key) return;
  monthFillLoadingKey = key;
  const platform = activePlatform;
  const subtab = activeSubtab[activePlatform];
  const today = kstDate(0);
  const dateFrom = `${year}-01-01`;
  const dateTo = year === today.getUTCFullYear() ? formatDate(today) : `${year}-12-31`;
  const months = new Set();
  try {
    if (platform === "naver" && subtab === "sales") {
      // naverStatSummary는 상품별·유입경로별·고객 스냅샷까지 같이 조회/집계해서 무거우므로,
      // "어느 달에 데이터가 있는지"만 가볍게 확인하는 전용 액션을 대신 쓴다.
      const data = await callAdFn({ action: "naverStatMonths", dateFrom, dateTo });
      (data.months || []).forEach(m => months.add(m));
    } else if (platform === "naver" && subtab === "ads") {
      const data = await callAdFn({ action: "daily", store: DEFAULT_STORE, dateFrom, dateTo });
      (data.rows || []).forEach(row => row.date && months.add(String(row.date).slice(0, 7)));
    } else if (platform === "coupang" && subtab === "sales") {
      const data = await callAdFn({ action: "coupangSalesMonths", dateFrom, dateTo });
      (data.months || []).forEach(m => months.add(m));
    } else if (platform === "coupang" && subtab === "ads") {
      const data = await callAdFn({ action: "coupangSummary", dateFrom, dateTo });
      (data.items || []).forEach(row => row.date && months.add(String(row.date).slice(0, 7)));
    }
    monthFillCache[key] = months;
  } catch (_) {
    monthFillCache[key] = null; // 조회 실패 시 판단 불가 — 비활성화하지 않고 넘어감
  } finally {
    if (monthFillLoadingKey === key) monthFillLoadingKey = "";
    renderMonthQuick();
  }
}

function renderMonthQuick() {
  const grid = document.getElementById("monthQuick");
  if (!grid) return;
  const from = document.getElementById("dateFrom").value;
  const to = document.getElementById("dateTo").value;
  const today = kstDate(0);
  const cacheKey = monthFillCacheKey(monthQuickYear);
  const fillSet = monthFillCache[cacheKey]; // Set(채워진 월) | null(조회 실패) | undefined(아직 조회 전/조회 중)
  const stillLoading = !(cacheKey in monthFillCache);
  ensureMonthFillLoaded(monthQuickYear);
  grid.innerHTML = Array.from({ length: 12 }, (_, i) => i + 1).map(month => {
    const start = new Date(Date.UTC(monthQuickYear, month - 1, 1));
    const isFuture = start.getTime() > today.getTime();
    const isCurrentMonth = monthQuickYear === today.getUTCFullYear() && month === today.getUTCMonth() + 1;
    const end = isCurrentMonth ? today : monthEnd(start);
    const rangeFrom = formatDate(start);
    const rangeTo = formatDate(end);
    const monthKey = `${monthQuickYear}-${String(month).padStart(2, "0")}`;
    // 연도를 막 바꿔서 아직 그 연도의 "채워진 월" 목록을 조회 중일 때는, 조회가 끝나기 전까지
    // 잘못 활성화되어 보이지 않도록(= 데이터 있는 것처럼 클릭 가능해 보이지 않도록) 우선 비활성 처리한다.
    // 조회가 끝나면 ensureMonthFillLoaded가 다시 renderMonthQuick()을 불러서 실제 값으로 바뀐다.
    const isEmpty = !isFuture && (stillLoading || (fillSet && !fillSet.has(monthKey)));
    const disabled = isFuture || isEmpty;
    const active = !disabled && from === rangeFrom && to === rangeTo;
    return disabled
      ? `<button type="button" class="month-card" disabled>${month}월</button>`
      : `<button type="button" class="month-card${active ? " active" : ""}" data-from="${rangeFrom}" data-to="${rangeTo}">${month}월</button>`;
  }).join("");
}

document.getElementById("monthQuickYear").addEventListener("change", e => {
  monthQuickYear = Number(e.target.value);
  renderMonthQuick();
});
document.getElementById("monthQuick").addEventListener("click", e => {
  const card = e.target.closest(".month-card");
  if (!card || card.disabled) return;
  setDateRange(card.dataset.from, card.dataset.to);
  render();
});
renderMonthQuickYearSelect();

function pick(row, names) {
  const keys = Object.keys(row);
  for (const name of names) {
    const found = keys.find(k => compact(k).includes(compact(name)));
    if (found) return row[found];
  }
  return "";
}

function parseSalesRows(rawRows, platform) {
  return rawRows.map((row, index) => {
    const productName = norm(pick(row, ["상품명", "제품명", "등록상품명", "노출상품명", "item name", "product name"]));
    const optionName = norm(pick(row, ["옵션", "옵션정보", "선택사항", "option"]));
    const productCode = norm(pick(row, ["상품번호", "상품ID", "판매자상품코드", "SKU", "바코드", "product id"]));
    const qty = toNumber(pick(row, ["수량", "주문수량", "판매수량", "구매수", "quantity"]));
    const amount = toNumber(pick(row, ["결제금액", "주문금액", "상품주문금액", "판매금액", "정산금액", "매출", "amount", "sales"]));
    const orderDate = toDate(pick(row, ["주문일", "결제일", "구매일", "발주일", "date"]));
    if (!productName && !productCode && !amount) return null;
    return {
      id: `${platform}-${Date.now()}-${index}`,
      platform,
      productName: productName || "(상품명 없음)",
      optionName,
      productCode,
      qty: qty || 1,
      amount,
      orderDate,
      uploadedAt: new Date().toISOString(),
    };
  }).filter(Boolean);
}

async function importFile(file, platform) {
  const buffer = await file.arrayBuffer();
  const wb = XLSX.read(buffer, { type: "array", cellDates: true });
  const rows = [];
  wb.SheetNames.forEach(name => {
    rows.push(...XLSX.utils.sheet_to_json(wb.Sheets[name], { defval: "" }));
  });
  const parsed = parseSalesRows(rows, platform);
  salesRows = salesRows.concat(parsed);
  saveState();
  render();
}

function filteredSalesRows(platform = activePlatform) {
  const from = document.getElementById("dateFrom").value;
  const to = document.getElementById("dateTo").value;
  return salesRows.filter(row => {
    if (row.platform !== platform) return false;
    if (!row.orderDate) return true;
    if (from && row.orderDate < from) return false;
    if (to && row.orderDate > to) return false;
    return true;
  });
}

function productGroups(platform = activePlatform) {
  const map = new Map();
  filteredSalesRows(platform).forEach(row => {
    const key = row.productCode || compact(row.productName);
    if (!map.has(key)) {
      map.set(key, { productName: row.productName, productCode: row.productCode, sales: 0, qty: 0, orders: 0 });
    }
    const item = map.get(key);
    item.orders += 1;
    item.qty += Number(row.qty) || 0;
    item.sales += Number(row.amount) || 0;
  });
  return [...map.values()].sort((a, b) => b.sales - a.sales);
}

// 쿠팡 상품광고 보고서의 날짜는 "20260601" 형식
function coupangAdDate(value) {
  const raw = String(value ?? "").trim();
  if (/^\d{8}$/.test(raw)) return `${raw.slice(0, 4)}-${raw.slice(4, 6)}-${raw.slice(6, 8)}`;
  return toDate(value);
}

async function loadCoupangAds() {

    status.textContent = "상품목록 업로드 실패: " + String(e.message || e);
  }
}

async function loadCoupangProductMap() {

  }

function ensureCoupangSalesLoaded() {

async function loadCoupangSales() {
  const status = document.getElementById("adStatus");
  if (coupangSalesLoading) return;
  coupangSalesLoading = true; showLoading("저장된 쿠팡 매출 데이터를 불러오는 중...");

    const exact = coupangItemPeriods.find(p => p.from === dateFrom && p.to === dateTo);

    loadCoupangItemCompare(); // 상품별 상승·하락 TOP(최신 스냅샷 고정)도 백그라운드로 준비
  } catch (e) {

async function loadCoupangItemPeriods() {
  const data = await callAdFn({ action: "coupangItemPeriods" });
  coupangItemPeriods = data.periods || [];
  if (!coupangItemPeriod && coupangItemPeriods.length) {
    coupangItemPeriod = `${coupangItemPeriods[0].from}|${coupangItemPeriods[0].to}`;
  }
}

async function loadCoupangItemRows() {
  if (!coupangItemPeriod) { coupangItemRows = []; return; }
  const [periodFrom, periodTo] = coupangItemPeriod.split("|");
  const data = await callAdFn({ action: "coupangItemSummary", periodFrom, periodTo });
  coupangItemRows = data.items || [];
}

async function fetchCoupangItemPeriodRows(period) {
  if (!period) return { hasData: false, items: [] };
  try {
    const data = await callAdFn({ action: "coupangItemSummary", periodFrom: period.from, periodTo: period.to });
    const items = data.items || [];
    return { hasData: items.length > 0, items };
  } catch (_) {
    return { hasData: false, items: [] };
  }
}

// 상품별 실적은 날짜범위가 아니라 업로드 스냅샷(기간) 단위라 달력과 못 맞춘다 — 그래서 이 보조지표는
// coupangItemPeriod(드롭다운 선택) 대신 "가장 최신 업로드 스냅샷"을 고정 기준으로 삼는다.
// 전기간 = 그 직전에 업로드된 스냅샷. 전년 = 최신 스냅샷 종료일의 1년 전과 가장 가까운(45일 이내)
// 스냅샷 — 그보다 멀면 "아직 그만큼 데이터가 안 쌓인 것"으로 보고 비워둔다(데이터가 쌓이면 자동으로 채워짐).
async function loadCoupangItemCompare() {
  if (!coupangItemPeriods.length) {
    coupangItemCompare = { key: "", latestPeriod: null, latestItems: [], prev: null, year: null };
    return;
  }
  const latestPeriod = coupangItemPeriods[0];
  const key = `${latestPeriod.from}|${latestPeriod.to}`;
  coupangItemCompare = { key, latestPeriod, latestItems: [], prev: null, year: null };

  const prevPeriod = coupangItemPeriods[1] || null;

  const yearTarget = new Date(latestPeriod.to);
  yearTarget.setFullYear(yearTarget.getFullYear() - 1);
  let yearPeriod = null;
  let yearDiffDays = Infinity;
  coupangItemPeriods.slice(1).forEach(p => {
    const diff = Math.abs(new Date(p.to) - yearTarget) / 86400000;
    if (diff < yearDiffDays) { yearDiffDays = diff; yearPeriod = p; }
  });
  if (yearDiffDays > 45) yearPeriod = null;

  const [latest, prev, year] = await Promise.all([
    fetchCoupangItemPeriodRows(latestPeriod),
    fetchCoupangItemPeriodRows(prevPeriod),
    fetchCoupangItemPeriodRows(yearPeriod),
  ]);
  if (coupangItemCompare.key !== key) return; // 응답 오는 사이 새 업로드로 최신 스냅샷이 바뀌었으면 폐기
  coupangItemCompare = {
    key, latestPeriod, latestItems: latest.items,
    prev: { period: prevPeriod, ...prev },
    year: { period: yearPeriod, ...year },
  };
  renderMetrics();
  if (activePlatform === "coupang" && activeSubtab.coupang === "sales") renderSalesPanel(); // 요약분석 무버·TOP3, 상품별 실적 대시보드
}

// ─── 네이버 판매분석 (비즈어드바이저 엑셀) ───

// 상품성과 파일: 일별 × 채널상품 ("전체" 행 = 스토어 일별 합계)
function parseNaverProductRows(rawRows) {
  return rawRows.map(row => {
    const date = toDate(pick(row, ["날짜"]));
    const productName = norm(pick(row, ["채널상품명"]));
    if (!date || !productName) return null;
    return {
      date,
      productId: String(pick(row, ["채널상품번호"]) ?? "").trim() || productName,
      productName,
      payCount: toNumber(pick(row, ["상품결제건수"])),
      refundCount: toNumber(pick(row, ["환불건수"])),
      salesTotal: toNumber(pick(row, ["판매금액(총)"])),
      salesNet: toNumber(pick(row, ["판매금액(순)"])),
      refundAmount: toNumber(pick(row, ["환불금액"])),
      qty: toNumber(pick(row, ["결제상품수량"])),
      refundQty: toNumber(pick(row, ["환불상품수량"])),
      visits: toNumber(pick(row, ["방문수"])),
      conversion: toNumber(pick(row, ["구매전환율"])),
    };
  }).filter(Boolean);
}

// 유입경로 파일: 일별 × 경로 3단계
function parseNaverVisitRows(rawRows) {
  return rawRows.map(row => {
    const date = toDate(pick(row, ["날짜"]));
    if (!date) return null;
    return {
      date,
      path1: norm(pick(row, ["경로(1단계)"])) || "-",
      path2: norm(pick(row, ["경로(2단계)"])) || "-",
      path3: norm(pick(row, ["경로(3단계)"])) || "-",
      visits: toNumber(pick(row, ["방문수"])),
      payCount: toNumber(pick(row, ["상품결제건수"])),
      conversion: toNumber(pick(row, ["구매전환율"])),
      salesTotal: toNumber(pick(row, ["판매금액(총)"])),
    };
  }).filter(Boolean);
}

// 검색분석 파일: 일별 × 검색어 ("전체" 행 = 그날 검색 유입 합계)
function parseNaverSearchRows(rawRows) {
  return rawRows.map(row => {
    const date = toDate(pick(row, ["날짜"]));
    if (!date) return null;
    return {
      date,
      term: norm(pick(row, ["검색어"])) || "전체",
      visits: toNumber(pick(row, ["방문수"])),
      payCount: toNumber(pick(row, ["상품결제건수"])),
      conversion: toNumber(pick(row, ["구매전환율"])),
      salesTotal: toNumber(pick(row, ["판매금액(총)"])),
      avgOrder: toNumber(pick(row, ["상품결제단가"])),
    };
  }).filter(Boolean);
}

// 고객분석 파일: 행마다 기간(예: "2026-06-01~2026-06-30")이 통째로 들어있는 월별 스냅샷.
// 분석기준을 "신규/재구매"로 받으면 구분 컬럼이 신규/재구매 값을, "성/연령별"로 받으면
// "남성 20대" 같은 값을 갖는다 — 컬럼 이름이 아니라 실제 값으로 dimension을 가른다
// (detectCustomerDimension), 두 파일의 구분 컬럼 헤더명이 서로 다를 수 있어서다.
function parseNaverCustomerRows(rawRows) {
  return rawRows.map(row => {
    const periodRaw = norm(pick(row, ["날짜"]));
    const [periodFromRaw, periodToRaw] = periodRaw.split("~");
    const periodFrom = toDate(periodFromRaw);
    const periodTo = toDate(periodToRaw);
    const segment = norm(pick(row, ["고객분류", "성별", "분석기준", "고객구분"]));
    if (!periodFrom || !periodTo || !segment) return null;
    return {
      periodFrom,
      periodTo,
      segment,
      visitors: toNumber(pick(row, ["방문고객수"])),
      payers: toNumber(pick(row, ["결제고객수"])),
      conversion: toNumber(pick(row, ["구매전환율(고객)", "구매전환율"])),
      salesTotal: toNumber(pick(row, ["판매금액(총)"])),
      avgPayment: toNumber(pick(row, ["객단가"])),
    };
  }).filter(Boolean);
}

function detectCustomerDimension(rows) {
  return rows.some(r => r.segment === "신규" || r.segment === "재구매") ? "ltv" : "gender_age";
}

// 고객현황 파일("통계_고객현황_YYYYMM_YYYYMM.csv") — 관심고객수/알림고객수 월별 스냅샷.
// "기준일"이 "2026.06"처럼 일(day) 없이 연.월만 있어서, toDate()로는 못 읽고 직접 그 달의
// 1일~말일로 변환한다.
function parseNaverCustomerInterestRows(rawRows) {
  return rawRows.map(row => {
    const raw = norm(pick(row, ["기준일"]));
    const m = raw.match(/(\d{4})\D+(\d{1,2})/);
    if (!m) return null;
    const year = Number(m[1]), month = Number(m[2]);
    const periodFrom = `${year}-${String(month).padStart(2, "0")}-01`;
    const lastDay = new Date(Date.UTC(year, month, 0)).getUTCDate();
    const periodTo = `${year}-${String(month).padStart(2, "0")}-${String(lastDay).padStart(2, "0")}`;
    return {
      periodFrom,
      periodTo,
      interestNew: toNumber(pick(row, ["관심고객수(증감)"])),
      interestTotal: toNumber(pick(row, ["관심고객수(누적)"])),
      notifyNew: toNumber(pick(row, ["알림고객수(증감)"])),
      notifyTotal: toNumber(pick(row, ["알림고객수(누적)"])),
    };
  }).filter(Boolean);
}

function detectNaverStatType(rows) {
  if (!rows.length) return "";
  const keys = Object.keys(rows[0]).map(key => compact(key));
  if (keys.some(key => key.includes("채널상품명"))) return "product";
  if (keys.some(key => key.includes("경로(1단계)"))) return "visit";
  if (keys.some(key => key.includes("검색어"))) return "search";
  if (keys.some(key => key.includes("관심고객수"))) return "customerInterest";
  if (keys.some(key => key.includes("방문고객수")) && keys.some(key => key.includes("결제고객수"))) return "customer";
  return "";
}

// 판매분석/방문분석 카드마다 자기 버튼으로 파일 하나씩 올린다(쿠팡과 동일한 방식) —
// 엉뚱한 종류의 파일을 올리면 detectNaverStatType으로 걸러서 바로 에러 표시.
async function importNaverSingleFile(file, expectedType, expectedLabel, uploadFn) {
  const status = document.getElementById("adStatus");
  try {
    status.className = "status";
    status.textContent = `${file.name} 저장 중...`;
    const rows = await readWorkbookRows(file);
    if (detectNaverStatType(rows) !== expectedType) {
      status.className = "status error";
      status.textContent = `${expectedLabel} 엑셀 형식을 인식하지 못했습니다. 스마트스토어에서 받은 파일이 맞는지 확인해 주세요.`;
      return;
    }
    const message = await uploadFn(rows);
    status.className = "status ok";
    status.textContent = "저장 완료: " + message;
    naverStatLoadKey = "";
    loadNaverStat();
  } catch (e) {
    status.className = "status error";
    status.textContent = `${expectedLabel} 업로드 실패: ` + String(e.message || e);
  }
}

// 고객분석은 파일 종류가 하나("customer")뿐이라 detectNaverStatType만으로는 신규/재구매
// 파일과 성/연령별 파일을 구분 못 한다 — 실제 구분 값을 보고(detectCustomerDimension)
// 버튼이 기대하는 축(expectedDimension)과 다르면 엉뚱한 버튼에 올린 것으로 보고 막는다.
async function importNaverCustomerFile(file, expectedDimension, expectedLabel) {
  const status = document.getElementById("adStatus");
  try {
    status.className = "status";
    status.textContent = `${file.name} 저장 중...`;
    const rows = await readWorkbookRows(file);
    if (detectNaverStatType(rows) !== "customer") {
      status.className = "status error";
      status.textContent = `고객분석 엑셀 형식을 인식하지 못했습니다. 스마트스토어에서 받은 파일이 맞는지 확인해 주세요.`;
      return;
    }
    const parsed = parseNaverCustomerRows(rows);
    const dimension = detectCustomerDimension(parsed);
    if (dimension !== expectedDimension) {
      status.className = "status error";
      status.textContent = `이 파일은 ${dimension === "ltv" ? "신규/재구매" : "성/연령별"} 데이터로 보입니다. "${expectedLabel} 엑셀 업로드" 버튼에 올려주세요.`;
      return;
    }
    const result = await callAdFn({ action: "naverCustomerUpload", dimension, rows: parsed });
    status.className = "status ok";
    status.textContent = `저장 완료: 고객분석(${expectedLabel}) ${num(result.periodCount)}개월치`;
    naverStatLoadKey = "";
    loadNaverStat();
  } catch (e) {
    status.className = "status error";
    status.textContent = `${expectedLabel} 업로드 실패: ` + String(e.message || e);
  }
}

function ensureNaverStatLoaded() {

  if (naverStatLoadKey === currentAdLoadKey()) return;
  loadNaverStat();
}

async function loadNaverStat() {
  const status = document.getElementById("adStatus");
  if (naverStatLoading) return;
  naverStatLoading = true; showLoading("저장된 판매분석 데이터를 불러오는 중...");
  naverStatLoadKey = currentAdLoadKey();
  renderSalesPanel();
  try {

    const dateTo = document.getElementById("dateTo").value;

    naverStat = {
      daily: data.daily || [],

      searchTerms: data.searchTerms || [],
      customerPeriods: data.customerPeriods || [],
      customerPeriod: data.customerPeriod || "",
      customer: data.customer || [],
      customerGenderAge: data.customerGenderAge || [],
      customerInterest: data.customerInterest || null,
    };
    selectedCustomerPeriod = naverStat.customerPeriod; // 서버가 최종 확정한 기간으로 드롭다운도 맞춘다
    naverStatLoading = false; hideLoading();
    naverStatLoadKey = currentAdLoadKey();
    render();
    loadNaverSalesCompare(); // 비교기간은 백그라운드로 읽어와 준비되는 대로 반영
  } catch (e) {
    naverStatLoading = false; hideLoading();
    naverStatLoadKey = "";
    status.className = "status error";
    status.textContent = "판매분석 불러오기 실패: " + String(e.message || e);

}

function naverDailyTotals() {
  return naverStat.daily.reduce((acc, row) => {
    acc.visits += row.visits;
    acc.payCount += row.payCount;
    acc.qty += row.qty;
    acc.salesTotal += row.salesTotal;
    acc.salesNet += row.salesNet;
    acc.refundAmount += row.refundAmount;
    return acc;
  }, { visits: 0, payCount: 0, qty: 0, salesTotal: 0, salesNet: 0, refundAmount: 0 });
}

function coupangSalesTotals() {
  return coupangSalesRows.reduce((acc, row) => {
    acc.visitors += row.visitors;
    acc.views += row.views;
    acc.carts += row.carts;
    acc.orders += row.orders;
    acc.qty += row.qty;
    acc.sales += row.sales;
    return acc;
  }, { visitors: 0, views: 0, carts: 0, orders: 0, qty: 0, sales: 0 });
}

// 쿠팡 원본 행(일자×광고그룹)의 노출/클릭/비용 등을 다 더한 뒤 비율 지표를 다시 계산한다.
// 광고그룹별 합계(groupCoupangAdRows)와 전체 합계(coupangAdGroups의 total) 양쪽에서 같이 쓴다.
function finalizeCoupangAdMetrics(item) {
  item.ctr = item.impressions ? (item.clicks / item.impressions) * 100 : 0;
  item.cpc = item.clicks ? item.cost / item.clicks : 0;
  item.conversionRate = item.clicks ? (item.conversions / item.clicks) * 100 : 0;
  item.purchaseRoas = item.cost ? (item.purchaseSales / item.cost) * 100 : 0;
  return item;
}

// 쿠팡 원본 행(일자×광고그룹)을 광고그룹(=표에 보이는 광고 이름) 기준으로 합산한다.
// 조회기간 표(coupangAdGroups)와 비교기간(fetchCoupangAdCompareTotals)이 반드시 같은 방식으로
// 묶어야, 표 안 전월/전년 비교 칩이 같은 광고그룹끼리 이름으로 정확히 짝지어진다.
function groupCoupangAdRows(rows) {
  const map = new Map();
  rows.forEach(row => {
    const key = row.adGroup || row.campaign || "(광고그룹 없음)";
    if (!map.has(key)) {
      map.set(key, {
        type: row.adType || "-", name: key, status: row.campaign || "-",
        impressions: 0, clicks: 0, ctr: 0, cpc: 0, cost: 0,
        conversions: 0, conversionRate: 0, conversionSales: 0,
        purchaseConversions: 0, purchaseSales: 0, purchaseRoas: 0,
      });
    }
    const item = map.get(key);
    item.impressions += row.impressions;
    item.clicks += row.clicks;
    item.cost += row.cost;
    item.conversions += row.orders;
    item.purchaseConversions += row.orders;
    item.conversionSales += row.sales;
    item.purchaseSales += row.sales;
  });
  return [...map.values()].map(finalizeCoupangAdMetrics);
}

function coupangAdGroups() {
  const from = document.getElementById("dateFrom").value;
  const to = document.getElementById("dateTo").value;
  const rows = coupangAdRows.filter(row =>
    (!from || row.date >= from) && (!to || row.date <= to) &&
    (!coupangPlacement || row.placement === coupangPlacement));
  const items = groupCoupangAdRows(rows);
  const total = finalizeCoupangAdMetrics(items.reduce((acc, item) => {
    acc.impressions += item.impressions;
    acc.clicks += item.clicks;
    acc.cost += item.cost;
    acc.conversions += item.conversions;
    acc.purchaseConversions += item.purchaseConversions;
    acc.conversionSales += item.conversionSales;
    acc.purchaseSales += item.purchaseSales;
    return acc;
  }, {
    name: "전체 광고", type: "-", status: "-", isTotal: true,
    impressions: 0, clicks: 0, ctr: 0, cpc: 0, cost: 0,
    conversions: 0, conversionRate: 0, conversionSales: 0,
    purchaseConversions: 0, purchaseSales: 0, purchaseRoas: 0,
  }));
  return { items, total: items.length ? total : null, dayCount: new Set(rows.map(row => row.date)).size };
}

function filteredAds() {
  // 현재 조회 키(스토어+기간)와 정확히 일치하는 캐시만 사용.
  // 범위 겹침으로 필터하면 과거에 조회한 다른 기간의 행들이 중복 합산된다.
  const key = currentAdLoadKey();
  return adRows.filter(row => (!row.platform || row.platform === "naver") && row.loadKey === key);
}

function adTotals() {
  const rows = filteredAds();
  const totalRow = rows.find(row => row.isTotal);
  if (totalRow) {
    return {
      cost: Number(totalRow.cost) || 0,
      impressions: Number(totalRow.impressions) || 0,
      clicks: Number(totalRow.clicks) || 0,
      ctr: Number(totalRow.ctr) || 0,
      cpc: Number(totalRow.cpc) || 0,
      conversions: Number(totalRow.conversions) || 0,
      conversionRate: Number(totalRow.conversionRate) || 0,
      conversionSales: Number(totalRow.conversionSales) || 0,
      ror: Number(totalRow.ror) || 0,
      purchaseConversions: Number(totalRow.purchaseConversions) || 0,
      purchaseSales: Number(totalRow.purchaseSales) || 0,
      purchaseRoas: Number(totalRow.purchaseRoas) || 0,
    };
  }
  const acc = rows.reduce((acc, row) => {
    acc.cost += Number(row.cost) || 0;
    acc.impressions += Number(row.impressions) || 0;
    acc.clicks += Number(row.clicks) || 0;
    acc.conversions += Number(row.conversions) || 0;
    acc.conversionSales += Number(row.conversionSales) || 0;
    acc.purchaseConversions += Number(row.purchaseConversions) || 0;
    acc.purchaseSales += Number(row.purchaseSales) || 0;
    return acc;
  }, { cost: 0, impressions: 0, clicks: 0, ctr: 0, cpc: 0, conversions: 0, conversionRate: 0, conversionSales: 0, ror: 0, purchaseConversions: 0, purchaseSales: 0, purchaseRoas: 0 });
  acc.conversionRate = acc.clicks ? (acc.conversions / acc.clicks) * 100 : 0;
  acc.ror = acc.cost ? (acc.conversionSales / acc.cost) * 100 : 0;
  acc.purchaseRoas = acc.cost ? (acc.purchaseSales / acc.cost) * 100 : 0;
  return acc;
}
