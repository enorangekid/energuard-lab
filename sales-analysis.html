// 유입경로(path1 › path2) 채널별 방문수 비율 — 랭킹추적의 페이지 분포 바(1페이지/2~3페이지/4페이지 이하)와
// 같은 "세그먼트 바 + 범례" 형태. path1만으로 묶으면 "네이버 검색"에 통합검색·가격비교·플러스스토어검색이
// 다 섞이고 "네이버 서비스"에 플러스스토어·네이버페이가 섞여 뭉개지므로, path1+path2 조합으로 세분화한다.
// path2를 지정하지 않은 규칙(네이버광고)은 그 path1의 모든 하위 유형(검색광고·디스플레이광고 등)을 합친다.
const CHANNEL_RULES = [
  { name: "네이버 통합검색", path1: "네이버 검색", path2: "통합검색" },
  { name: "네이버 가격비교", path1: "네이버 검색", path2: "가격비교 검색" },
  { name: "플러스스토어 검색", path1: "네이버 검색", path2: "네이버플러스스토어 검색" },
  { name: "플러스스토어", path1: "네이버 서비스", path2: "네이버플러스스토어" },
  { name: "네이버광고", path1: "네이버 광고" },
  { name: "직유입", path1: "직유입" },
  { name: "네이버페이", path1: "네이버 서비스", path2: "네이버 페이" },
];
// 네이버 검색 계열(통합검색·가격비교)은 초록 계열 두 톤, 플러스스토어 계열(검색·서비스)은 보라 계열 두 톤으로
// 묶어서 "네이버 쪽"과 "플러스스토어 쪽"이 한눈에 구분되게 하고, 나머지는 서로 겹치지 않는 색으로 배열했다.
// dataviz 스킬 validate_palette.js로 7색 전체 CVD 분리·명도·채도 통과 확인함(기타의 회색은 카테고리색이 아니라 검증 대상 제외).
const CHANNEL_BAR_COLORS = ["#16803c", "#5fb87f", "#8f7fe0", "#4a3aa7", "#eda100", "#2a78d6", "#e34948"];
const CHANNEL_ETC_COLOR = "#c3c2b7";
// 네이버 판매분석 원본 데이터의 공백 표기가 "네이버 광고"/"네이버광고"처럼 들쭉날쭉해서
// 정확히 일치하는 문자열로만 비교하면 다 "기타"로 새어 나간다 — 공백을 지우고 비교한다.
const normChannelName = s => (s || "").replace(/\s+/g, "");
function classifyChannel(row) {
  const p1 = normChannelName(row.path1);
  const p2 = normChannelName(row.path2);
  const rule = CHANNEL_RULES.find(r => normChannelName(r.path1) === p1 && (!r.path2 || normChannelName(r.path2) === p2));
  return rule ? rule.name : "기타";
}
function naverVisitChannelBarHtml() {
  const order = CHANNEL_RULES.map(r => r.name).concat(["기타"]);
  const colors = CHANNEL_BAR_COLORS.concat([CHANNEL_ETC_COLOR]);
  const totals = new Map(order.map(name => [name, 0]));
  naverStat.visitPaths.forEach(row => {
    const visits = Number(row.visits) || 0;
    const name = classifyChannel(row);
    totals.set(name, totals.get(name) + visits);
  });
  const list = order.map((name, i) => ({ name, visits: totals.get(name), color: colors[i] }));
  const total = list.reduce((sum, c) => sum + c.visits, 0);
  if (!total) return "";
  const pct = n => Math.round(n / total * 100);
  // 색은 채널마다 고정(위 순서)이지만, 화면에는 방문수가 많은 채널이 왼쪽부터 오도록 정렬해서 보여준다.
  const segs = list.filter(c => c.visits > 0).sort((a, b) => b.visits - a.visits);
  return `
    <div class="dash-bar-wrap">
      <div class="dash-bar">
        ${segs.map(c => `<span class="dash-bar-seg" style="flex:${c.visits};background:${c.color};" title="${esc(c.name)} ${num(c.visits)}회 (${pct(c.visits)}%)"></span>`).join("")}
      </div>
      <div class="dash-legend">
        ${segs.map(c => `<span class="dash-legend-item"><span class="dash-legend-dot" style="background:${c.color};"></span>${esc(c.name)} <b>${num(c.visits)}회</b> · ${pct(c.visits)}%</span>`).join("")}
      </div>
    </div>`;
}

// ── 매출 상승·하락 TOP — 랭킹추적의 "상승 TOP/하락 TOP"(moveScore/buildNotableProducts)과 같은 개념을
// 네이버 상품별 매출 데이터에 적용한다. "급증/급감"은 어느 정도 꾸준히 팔리던 상품이 크게 움직인 경우를
// 보려는 것이므로, 두 기간 다 minFloor 이상 팔린(또는 유입된) 항목만 대상으로 한다 — 안 팔리던 게 갑자기
// 팔리거나(신규) 아예 끊긴(중단) 경우는 성격이 다른 신호라서 여기서는 제외한다.
// 변화율이 SALES_MOVER_MIN_PCT 이상이어야 "급"으로 인정 — 기준 미달이면 억지로 채우지 않고 그 줄을 비워둔다.
const SALES_MOVER_MIN_PCT = 30;
const SALES_MOVER_MIN_SALES = 10000; // 상품 매출 비교 시 노이즈 컷(원)

// limit 기본값 3(칩으로 나열하는 쿠팡 등 기존 화면 그대로 유지) — 네이버 요약분석의 "순위 더보기"처럼
// 더 많이 뽑아둔 다음 화면에서 골라 보여줘야 하는 곳은 더 큰 limit을 넘겨서 쓴다.
function buildMovers(curList, prevList, idFn, valueKey, minFloor, limit = 3) {
  const curMap = new Map(curList.map(r => [idFn(r), r]));
  const prevMap = new Map(prevList.map(r => [idFn(r), r]));
  const ids = new Set([...curMap.keys(), ...prevMap.keys()]);
  const moves = [];
  ids.forEach(id => {
    const cur = curMap.get(id);
    const prev = prevMap.get(id);
    const curVal = cur ? Number(cur[valueKey]) || 0 : 0;
    const prevVal = prev ? Number(prev[valueKey]) || 0 : 0;
    if (curVal < minFloor || prevVal < minFloor) return;
    const pct = (curVal - prevVal) / prevVal * 100;
    if (Math.abs(pct) < SALES_MOVER_MIN_PCT) return;
    moves.push({ item: cur, curVal, prevVal, pct });
  });
  const rising = moves.filter(m => m.pct > 0).sort((a, b) => b.pct - a.pct).slice(0, limit);
  const falling = moves.filter(m => m.pct < 0).sort((a, b) => a.pct - b.pct).slice(0, limit);
  return { rising, falling };
}

// 네이버 상품성과의 productId는 "채널상품번호"(숫자)라서 스마트스토어 상품 링크를 그대로 만들 수 있다.
// 채널상품번호가 없어 상품명으로 대체된 경우(숫자가 아님)는 링크를 만들지 않는다.
const NAVER_STORE_SLUG = "hkdy";
function naverProductUrl(productId) {
  return /^\d+$/.test(String(productId || "")) ? `https://smartstore.naver.com/${NAVER_STORE_SLUG}/products/${productId}` : "";
}

// 쿠팡은 상품 페이지 링크(vp/products/{노출상품ID})를 만들려면 자주 바뀌는 "노출상품ID"가 필요한데
// 셀러 인사이트 엑셀엔 그게 없다(등록상품ID·옵션ID만 있음, 둘 다 URL 경로엔 못 씀).
// 그 ID를 별도로 동기화하면 로테이션될 때마다 링크가 깨져서(네이버 가격비교 코드와 같은 문제) 계속
// 손봐야 한다 — 여기선 "이 상품이 뭔지 확인"이 목적이므로 검색결과로 충분해 상품명 검색으로 대체한다.
function coupangSearchUrl(name) {
  const q = String(name || "").trim();
  return q ? `https://www.coupang.com/np/search?q=${encodeURIComponent(q)}` : "";
}

// 테스트용: 경로의 노출상품ID 자리에 더미값(0)을 넣고 vendorItemId(옵션ID)만 정확히 넣어본다.
// 실제로 상품 페이지까지 뜨는지 사용자가 직접 확인해보기 위한 실험적 버전 — 옵션ID 없으면 검색으로 대체.
function coupangProductUrl(row) {
  const vid = String(row?.optionId || "").trim();
  if (!/^\d+$/.test(vid)) return coupangSearchUrl(row?.productName || row?.optionName);
  // 상품목록(Wing) 업로드로 옵션ID↔노출상품ID 매핑이 있으면 정확한 경로로, 없으면 더미 경로(0)로 —
  // 더미 경로도 vendorItemId로 정확한 상품을 찾아가되 "오류가 발생했습니다" 팝업 한 번 뜨는 정도라
  // 매핑이 없거나(아직 업로드 전) 오래돼도(노출상품ID 로테이션) 안전하게 저하된다.
  const mapped = coupangProductMap.get(vid);
  const pid = mapped?.productId && /^\d+$/.test(mapped.productId) ? mapped.productId : "0";
  return `https://www.coupang.com/vp/products/${pid}?vendorItemId=${vid}`;
}

// 랭킹추적 요약 대시보드의 dashMoverChip/dashProductChip과 동일하게, 링크가 있으면 칩 전체를 <a>로 감싼다
// (텍스트만 링크가 아니라 칩 하나가 통째로 클릭 영역이고, 호버 시 칩 테두리·배경이 바뀌는 것도 그쪽과 동일).
function moverChip(m, nameFn, valueFmt, urlFn) {
  const cls = m.pct > 0 ? "up" : "down";
  const deltaText = `${m.pct > 0 ? "▲" : "▼"}${Math.abs(m.pct).toFixed(0)}%`;
  const name = nameFn(m.item);
  const url = urlFn ? urlFn(m.item) : "";
  const inner = `<span class="dash-mover-name" title="${esc(name)}">${esc(name)}</span>
    <span class="dash-mover-delta ${cls}">${deltaText}</span>
    <span class="dash-mover-value">${valueFmt(m.prevVal)} → ${valueFmt(m.curVal)}</span>`;
  return url
    ? `<a class="dash-mover-chip" href="${esc(url)}" target="_blank" rel="noopener">${inner}</a>`
    : `<span class="dash-mover-chip">${inner}</span>`;
}

function moverRowHtml(title, items, nameFn, valueFmt, urlFn) {
  if (!items.length) return "";
  return `<div class="dash-mover-row"><span class="dash-mover-title">${esc(title)}</span><div class="dash-mover-chips">${items.map(m => moverChip(m, nameFn, valueFmt, urlFn)).join("")}</div></div>`;
}

const productMoverName = item => item.productName || item.productId || "-";
const pathMoverName = item => item.path2 && item.path2 !== "-" ? `${item.path1} › ${item.path2}` : item.path1;
const SALES_MOVER_MIN_VISITS = 10; // 유입경로 비교 시 노이즈 컷(회)

// 전기간·전년을 한번에 다 보여주면 너무 많아서, 토글로 하나만 골라 보여준다.
let salesMoverPeriod = "prev"; // "prev" | "year"
function setSalesMoverPeriod(key) {
  if (salesMoverPeriod === key) return;
  salesMoverPeriod = key;
  // 네이버·쿠팡 판매분석 둘 다 전기간/전년 비교는 이제 요약분석 카드(renderSalesPanel) 쪽에서 그려진다.
  if ((activePlatform === "naver" && activeSubtab.naver === "sales") || (activePlatform === "coupang" && activeSubtab.coupang === "sales")) renderSalesPanel();
  else renderMetrics();
}
function salesMoverPeriodToggleHtml() {
  const opt = (key, label) => `<button type="button" class="mover-period-btn${salesMoverPeriod === key ? " on" : ""}" onclick="setSalesMoverPeriod('${key}')">${label}</button>`;
  return `<div class="mover-period-toggle">${opt("prev", "전월")}${opt("year", "전년")}</div>`;
}

// 매출분석 "데이터 테이블" 카드 — 일별/상품별 표 중 하나만 골라서 보여준다(전기간·전년 토글과
// 같은 방식). 일별 매출 카드에서 표를 떼어내면서 이 카드가 표 전용 창구가 됐다.
let salesDataTableMode = "daily"; // "daily" | "product"
function setSalesDataTableMode(mode) {
  if (salesDataTableMode === mode) return;
  salesDataTableMode = mode;
  renderSalesPanel();
}
function salesDataTableModeToggleHtml() {
  const opt = (key, label) => `<button type="button" class="mover-period-btn${salesDataTableMode === key ? " on" : ""}" onclick="setSalesDataTableMode('${key}')">${label}</button>`;
  return `<div class="mover-period-toggle">${opt("daily", "일별 데이터")}${opt("product", "상품별 데이터")}</div>`;
}
function naverSalesDataTableSectionHtml() {
  if (salesDataTableMode === "product") {
    return naverStat.products.length ? naverProductDataTableHtml() : `<div class="empty">이 기간에 저장된 상품별 데이터가 없습니다.</div>`;
  }
  return naverStat.daily.length ? naverDailyDataTableHtml() : `<div class="empty">이 기간에 저장된 데이터가 없습니다.</div>`;
}

// 요약분석 미니카드의 "순위 더보기" 펼침 상태 — 카드마다 고유 key로 구분해서 Set에 넣었다 뺐다만
// 하면 되므로 전역 하나로 충분하다. 눌렀다고 전부 다 보여주진 않고 SUMMARY_EXPANDED_LIMIT까지만.
const summaryExpandedCards = new Set();
const SUMMARY_EXPANDED_LIMIT = 10;
function toggleSummaryExpand(key) {
  if (summaryExpandedCards.has(key)) summaryExpandedCards.delete(key);
  else summaryExpandedCards.add(key);
  renderSalesPanel();
}
function summaryMoreBtnHtml(key, totalCount, threshold = 3) {
  if (totalCount <= threshold) return "";
  const expanded = summaryExpandedCards.has(key);
  return `<button type="button" class="summary-top3-more" onclick="toggleSummaryExpand('${key}')">${expanded ? "간략히 보기" : "순위 더보기"} <span>${expanded ? "−" : "+"}</span></button>`;
}

// 전기간/전년 비교를 "핵심 지표 TOP3"와 같은 미니 카드(제목+보조설명+랭킹 리스트)로 보여준다.
// 예전엔 칩을 한 줄로 늘어놓기만 했는데, 카드 형태로 바꾸면 넓어진 공간도 잘 쓰고 다른
// 요약분석 카드들과 톤이 맞는다. 순위 행 밑에 작은 글씨로 "이전값 → 이후값"도 같이 보여준다.
function moverMiniCardHtml(key, title, subtitle, moves, nameFn, valueFmt, urlFn) {
  const expanded = summaryExpandedCards.has(key);
  const list = moves.slice(0, expanded ? SUMMARY_EXPANDED_LIMIT : 3);
  const rows = list.length
    ? list.map((m, i) => {
      const name = nameFn(m.item);
      const url = urlFn ? urlFn(m.item) : "";
      const cls = m.pct > 0 ? "up" : "down";
      const deltaText = `${m.pct > 0 ? "▲" : "▼"}${Math.abs(m.pct).toFixed(0)}%`;
      const nameHtml = url
        ? `<a class="summary-top3-name" href="${esc(url)}" target="_blank" rel="noopener" title="${esc(name)}">${esc(name)}</a>`
        : `<span class="summary-top3-name" title="${esc(name)}">${esc(name)}</span>`;
      return `<div class="summary-mover-row">
        <div class="summary-mover-row-main">
          <span class="summary-top3-rank">${i + 1}</span>
          ${nameHtml}
          <span class="summary-mover-delta ${cls}">${deltaText}</span>
        </div>
        <div class="summary-mover-row-detail">${valueFmt(m.prevVal)} → ${valueFmt(m.curVal)}</div>
      </div>`;
    }).join("")
    : `<div class="empty">비교 기준을 넘는 변동이 없습니다.</div>`;
  return `<div class="summary-top3-card">
    <div class="summary-top3-title">${esc(title)}</div>
    <div class="summary-mover-subtitle">${esc(subtitle)}</div>
    ${rows}
    ${summaryMoreBtnHtml(key, moves.length)}
  </div>`;
}

function naverSummaryMoversCardsHtml() {
  if (!naverSalesCompare || naverSalesCompare.key !== currentAdLoadKey()) {
    return `<div class="empty">비교 데이터를 불러오는 중...</div>`;
  }
  const period = naverSalesCompare[salesMoverPeriod];
  if (!period || !period.hasData) return `<div class="empty">비교할 데이터가 없습니다.</div>`;
  const productMoves = buildMovers(naverStat.products, period.products || [], r => r.productId, "salesTotal", SALES_MOVER_MIN_SALES, SUMMARY_EXPANDED_LIMIT);
  const pathMoves = buildMovers(naverStat.visitPaths, period.visitPaths || [], r => `${r.path1}|${r.path2}`, "visits", SALES_MOVER_MIN_VISITS, SUMMARY_EXPANDED_LIMIT);
  const cards = [
    moverMiniCardHtml("mover-sales-up", "매출 상승", "이번 기간 매출이 크게 늘어난 상품이에요", productMoves.rising, productMoverName, money, item => naverProductUrl(item.productId)),
    moverMiniCardHtml("mover-sales-down", "매출 하락", "이번 기간 매출이 크게 줄어든 상품이에요", productMoves.falling, productMoverName, money, item => naverProductUrl(item.productId)),
    moverMiniCardHtml("mover-visit-up", "유입 상승", "이번 기간 방문이 크게 늘어난 경로예요", pathMoves.rising, pathMoverName, v => num(v) + "회"),
    moverMiniCardHtml("mover-visit-down", "유입 하락", "이번 기간 방문이 크게 줄어든 경로예요", pathMoves.falling, pathMoverName, v => num(v) + "회"),
  ].join("");
  return `<div class="summary-top3-row-wrap summary-mover-grid">${cards}</div>`;
}

const coupangMoverName = item => item.optionName || item.productName || "-";

const fmtPeriodRange = p => p ? `${p.from} ~ ${p.to}` : "";

// 쿠팡 옵션별 매출·조회수 상승/하락 TOP. 상품별 실적이 날짜범위가 아니라 업로드 스냅샷 단위라
// 달력/드롭다운과 무관하게 항상 "최신 스냅샷"을 기준(coupangItemCompare.latestItems)으로 고정하고,
// 네이버와 동일한 전기간/전년 토글(salesMoverPeriod)로 비교 대상만 바꾼다. 전년은 아직 1년치
// 스냅샷이 안 쌓였으면 데이터가 없을 수 있는데, 나중에 쌓이면 자동으로 채워진다.
function coupangSalesMoversHtml() {
  const latestKey = coupangItemPeriods[0] ? `${coupangItemPeriods[0].from}|${coupangItemPeriods[0].to}` : "";
  if (!coupangItemCompare.latestPeriod || coupangItemCompare.key !== latestKey) return "";
  const toggle = salesMoverPeriodToggleHtml();
  const period = coupangItemCompare[salesMoverPeriod]; // "prev" | "year"
  const periodLabel = salesMoverPeriod === "prev" ? "전월" : "전년";
  if (!period || !period.hasData) return `<div class="dash-movers">${toggle}</div>`;

  const urlFn = item => coupangProductUrl(item);
  const salesMoves = buildMovers(coupangItemCompare.latestItems, period.items, r => r.optionId, "sales", SALES_MOVER_MIN_SALES);
  const viewMoves = buildMovers(coupangItemCompare.latestItems, period.items, r => r.optionId, "views", SALES_MOVER_MIN_VISITS);
  const rows = [
    moverRowHtml(`매출 상승 (${periodLabel})`, salesMoves.rising, coupangMoverName, money, urlFn),
    moverRowHtml(`매출 하락 (${periodLabel})`, salesMoves.falling, coupangMoverName, money, urlFn),
    moverRowHtml(`조회 상승 (${periodLabel})`, viewMoves.rising, coupangMoverName, v => num(v) + "회", urlFn),
    moverRowHtml(`조회 하락 (${periodLabel})`, viewMoves.falling, coupangMoverName, v => num(v) + "회", urlFn),
  ].filter(Boolean).join("");
  const note = `<div class="dash-mover-period-note">최신 스냅샷 ${esc(fmtPeriodRange(coupangItemCompare.latestPeriod))} vs ${esc(periodLabel)} ${esc(fmtPeriodRange(period.period))}</div>`;
  return `<div class="dash-movers">${toggle}${note}${rows}</div>`;
}

/* ── 섹션 바로가기 탭 (키워드분석 .sec-nav와 완전히 동일한 "탭 전환" 방식) ──
   스크롤 이동이 아니라, 선택한 카드 하나만 즉시 보여주고 나머지는 숨긴다.
   맨 왼쪽 "종합분석"은 naver-rank.html과 동일하게 전체를 한 번에 보여주는 기본 탭. */
let mainNavActiveIdx = "all"; // "all" = 종합분석, 그 외는 카드 인덱스(숫자) — 재렌더링에도 선택 유지

// 카드 제목의 순수 텍스트만 추출 — h2 안에 물음표 툴팁(.dash-info > .dash-tip)이 들어있으면
// textContent가 툴팁 문구까지 통째로 이어붙여지므로, 툴팁 노드를 떼어내고 읽는다.
function cardTitleText(card) {
  const h2 = card.querySelector("h2");
  if (!h2) return "";
  const clone = h2.cloneNode(true);
  clone.querySelectorAll(".dash-info").forEach(el => el.remove());
  return clone.textContent.trim();
}

// includeAllTab=false로 부르면 맨 앞의 "종합분석"(전체 펼치기) 탭을 만들지 않는다 — 이미 그 역할을
// 하는 전용 카드(예: "요약분석")가 카드 목록 맨 앞에 있는 화면(네이버 판매분석)에서 쓴다.
function renderMainNav(includeAllTab = true) {
  const nav = document.getElementById("mainNav");
  if (!nav) return;
  const cards = [...document.querySelectorAll("#mainPanel .content-card")];
  if (cards.length < 2) {
    nav.classList.remove("on");
    nav.innerHTML = "";
    cards.forEach(card => { card.style.display = ""; });
    return;
  }
  if (!includeAllTab && mainNavActiveIdx === "all") mainNavActiveIdx = 0;
  nav.classList.add("on");
  nav.innerHTML = (includeAllTab ? `<button type="button" class="sec-nav-btn" data-idx="all">종합분석</button>` : "") +
    cards.map((card, i) => {
      const label = cardTitleText(card) || `섹션 ${i + 1}`;
      return `<button type="button" class="sec-nav-btn" data-idx="${i}">${esc(label)}</button>`;
    }).join("");
  applyMainNavTab(mainNavActiveIdx);
}

function applyMainNavTab(idx) {
  const cards = [...document.querySelectorAll("#mainPanel .content-card")];
  if (idx !== "all" && cards[idx]) {
    // 접혀 있는 카드를 선택하면 먼저 펼친다 — 펼치기는 패널 재렌더링을 일으키므로
    // 여기서 재렌더링을 한 번 거치고, 다음 패스에서 펼쳐진 상태로 표시만 전환한다.
    const toggleHead = cards[idx].querySelector("[data-toggle-card]");
    if (toggleHead && !cards[idx].querySelector(".section-body")) {
      coupangCardOpen[toggleHead.dataset.toggleCard] = true;
      saveCoupangCardOpen();
      mainNavActiveIdx = idx;
      renderSalesPanel(); // → 내부에서 renderMainNav() → applyMainNavTab()이 다시 호출됨
      return;
    }
  }
  mainNavActiveIdx = idx;
  cards.forEach((card, i) => { card.style.display = (idx === "all" || idx === i) ? "" : "none"; });
  document.querySelectorAll("#mainNav .sec-nav-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.idx === String(idx));
  });
  // 요약 대시보드("요약 리포트" 미니 카드)는 "요약분석" 탭의 시작 부분이라, 네이버·쿠팡 판매분석
  // 화면 모두 요약분석(맨 앞 카드, idx 0)일 때만 보이고 다른 탭에서는 숨긴다.
  if ((activePlatform === "naver" && activeSubtab.naver === "sales") || (activePlatform === "coupang" && activeSubtab.coupang === "sales")) {
    const metricGrid = document.getElementById("metricGrid");
    if (metricGrid) metricGrid.style.display = idx === 0 ? "" : "none";
  }
}

document.getElementById("mainNav").addEventListener("click", e => {
  const btn = e.target.closest(".sec-nav-btn");
  if (!btn) return;
  applyMainNavTab(btn.dataset.idx === "all" ? "all" : Number(btn.dataset.idx));
});

/* ── 일별 매출 추이 차트 (키워드분석의 검색량 추이 차트와 동일한 SVG 직접 그리기 방식) ──
   naverDailyTableHtml/coupangDailyChartHtml이 <div id="[bodyId]"></div> 플레이스홀더를 반환하면,
   그 HTML이 실제로 DOM에 꽂힌 뒤(각 render*SalesPanel 끝에서) 이 함수로 SVG를 채워 넣는다. */
function nsNiceCeil(v) {
  if (v <= 0) return 1;
  const pow = Math.pow(10, Math.floor(Math.log10(v)));
  for (const m of [1, 2, 2.5, 5, 10]) { if (v <= m * pow) return m * pow; }
  return 10 * pow;
}

// "6개월"/"1년" 선택 시, 현재 선택 기간의 끝(dateTo)부터 역산한 시작일 — dateTo가 6월 30일이고
// months=6이면 1월 1일부터(6개월치 달력월 전체)로 맞춘다.
function salesTrendExtRangeFrom(months, dateTo) {
  const to = new Date(`${dateTo}T00:00:00Z`);
  const start = new Date(Date.UTC(to.getUTCFullYear(), to.getUTCMonth() - months + 1, 1));
  return formatDate(start);
}

// naverStat.daily는 상단에서 고른 기간(예: 6월 한 달) 것만 있어서, 매출 추이 차트에서 더 긴
// 흐름을 보려면 이 차트 전용으로 따로 조회해야 한다. 표·대시보드·다른 카드는 손대지 않고
// 이 함수가 채우는 salesTrendExtDaily만 차트 렌더링에 쓴다.
async function ensureSalesTrendExtLoaded() {
  const months = SALES_TREND_RANGE_MONTHS[salesTrendRangeLength];
  if (!months) return;
  const dateTo = document.getElementById("dateTo").value;
  const key = `${salesTrendRangeLength}|${dateTo}`;
  if (salesTrendExtKey === key || salesTrendExtLoading) return;
  salesTrendExtLoading = true;
  document.getElementById("naverSalesTrendBody")?.classList.add("is-loading");
  try {
    const dateFrom = salesTrendExtRangeFrom(months, dateTo);
    // naverStatSummary(상품별·유입경로별·검색어·고객까지 다 집계)는 6~12개월 범위에서 너무
    // 느려서, 일별 합계만 가볍게 주는 전용 액션을 쓴다.
    const data = await callAdFn({ action: "naverDailyOnly", dateFrom, dateTo });
    salesTrendExtDaily = data.daily || [];
    salesTrendExtKey = key;
  } catch (_) {
    salesTrendExtDaily = [];
    salesTrendExtKey = "";
  } finally {
    salesTrendExtLoading = false;
    document.getElementById("naverSalesTrendBody")?.classList.remove("is-loading");
    // 탭을 통째로 다시 그리면 느려지니, 차트만 갱신한다(요청 도중 다른 탭으로 옮겼으면 skip).
    if (activePlatform === "naver" && activeSubtab.naver === "sales" && document.getElementById("naverSalesTrendBody")) {
      const trendChart = salesTrendChartRows();
      renderSalesTrendChart("naverSalesTrendBody", trendChart.rows, trendChart.unit);
    }
  }
}

// 매출 추이 차트에 넣을 rows/unit을 고른다 — "1달"이거나 확장 데이터가 아직 안 왔으면 우선
// 현재 선택 기간(naverStat.daily) 그대로 보여주고, 확장 데이터가 준비되면 그걸로 바뀐다.
function salesTrendChartRows() {
  const trendMetric = SALES_TREND_METRICS[salesTrendMetric];
  const dateTo = document.getElementById("dateTo").value;
  const key = `${salesTrendRangeLength}|${dateTo}`;
  const source = salesTrendRangeLength !== "1m" && salesTrendExtKey === key ? salesTrendExtDaily : naverStat.daily;
  return { rows: source.map(r => ({ date: r.date, total: trendMetric.get(r) })), unit: trendMetric.unit };
}

const salesTrendChartState = {}; // bodyId → { data, x, y, W } (네이버·쿠팡 두 차트가 동시에 상태를 가질 수 있음)

function renderSalesTrendChart(bodyId, rowsAsc, unit = "원") {
  const body = document.getElementById(bodyId);
  if (!body) return;
  const raw = (rowsAsc || []).filter(r => r.date).map(r => ({ date: r.date, total: Number(r.total) || 0 }));
  if (raw.length < 2) { body.innerHTML = ""; return; }

  // 빠진 날짜를 0으로 채워 연속된 일자 시퀀스로 만든다 — missing 플래그로 빗살 표시 구간을 기억
  const byDate = new Map(raw.map(d => [d.date, d]));
  const data = [];
  let cur = new Date(raw[0].date + "T00:00:00Z");
  const end = new Date(raw[raw.length - 1].date + "T00:00:00Z");
  while (cur.getTime() <= end.getTime()) {
    const key = cur.toISOString().slice(0, 10);
    const src = byDate.get(key);
    data.push(src ? { date: key, total: src.total, missing: false } : { date: key, total: 0, missing: true });
    cur = new Date(cur.getTime() + 86400000);
  }

  // padL: 검색량(4~5자리)보다 매출 금액(최대 7~8자리, 예: 4,407,700)이 훨씬 길어서
  // 축 라벨이 잘리지 않을 만큼만 잡고(너무 넉넉하면 그래프가 오른쪽으로 쏠려 보임),
  // padR도 함께 넓혀 좌우 여백 차이를 줄인다.
  const W = 900, H = 270, padL = 70, padR = 34, padT = 30, padB = 32;
  const iw = W - padL - padR, ih = H - padT - padB;
  const vals = data.map(d => d.total);
  const yMax = nsNiceCeil(Math.max(...vals));
  const x = i => padL + i * iw / (data.length - 1);
  const y = v => padT + ih - v / yMax * ih;

  let grid = "", labels = "";
  for (let s = 0; s <= 4; s++) {
    const v = yMax * s / 4, yy = y(v);
    grid += `<line x1="${padL}" y1="${yy}" x2="${W - padR}" y2="${yy}" stroke="#e8ecf2" stroke-width="1"/>`;
    labels += `<text x="${padL - 8}" y="${yy + 4}" text-anchor="end" font-size="11" fill="#8a93a5">${Math.round(v).toLocaleString()}</text>`;
  }
  const step = Math.max(1, Math.ceil(data.length / 8));
  data.forEach((d, i) => {
    if (i % step !== 0 && i !== data.length - 1) return;
    const [, mm, dd] = d.date.split("-");
    labels += `<text x="${x(i)}" y="${H - 8}" text-anchor="middle" font-size="11" fill="#8a93a5">${Number(mm)}.${Number(dd)}</text>`;
  });

  const pts = vals.map((v, i) => `${x(i)},${y(v)}`).join(" ");
  const areaPts = `${pts} ${x(data.length - 1)},${padT + ih} ${x(0)},${padT + ih}`;

  // 데이터 없는 구간(연속된 missing 날짜들) 위에 45° 빗살 밴드
  const halfStep = data.length > 1 ? iw / (data.length - 1) / 2 : 0;
  let hatches = "";
  const hatchId = bodyId + "Hatch";
  for (let i = 0; i < data.length; i++) {
    if (!data[i].missing) continue;
    let j = i;
    while (j + 1 < data.length && data[j + 1].missing) j++;
    const x1 = Math.max(padL, x(i) - halfStep);
    const x2 = Math.min(W - padR, x(j) + halfStep);
    hatches += `<rect x="${x1}" y="${padT}" width="${x2 - x1}" height="${ih}" fill="url(#${hatchId})" opacity="0.5"/>`;
    i = j;
  }

  // 최대/최소 주석 — 최소는 데이터 없는 날(0) 제외, 텍스트는 차트 안쪽으로 고정
  const realVals = data.map((d, i) => d.missing ? null : { v: d.total, i }).filter(Boolean);
  let marks = "";
  if (realVals.length) {
    const maxI = realVals.reduce((best, c) => c.v > best.v ? c : best).i;
    const minI = realVals.reduce((best, c) => c.v < best.v ? c : best).i;
    const clampX = v => Math.min(Math.max(v, padL + 44), W - padR - 44);
    const fmtDate = d => { const [, mm, dd] = d.split("-"); return `${Number(mm)}.${Number(dd)}`; };
    marks = `
      <circle cx="${x(maxI)}" cy="${y(vals[maxI])}" r="4" fill="var(--accent)" stroke="#fff" stroke-width="2"/>
      <text x="${clampX(x(maxI))}" y="${Math.max(y(vals[maxI]) - 10, 14)}" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1a1f2e">최대 ${fmtDate(data[maxI].date)} · ${vals[maxI].toLocaleString()}${unit}</text>`;
    if (minI !== maxI) {
      marks += `
      <circle cx="${x(minI)}" cy="${y(vals[minI])}" r="4" fill="var(--accent)" stroke="#fff" stroke-width="2"/>
      <text x="${clampX(x(minI))}" y="${Math.min(y(vals[minI]) + 20, H - padB - 6)}" text-anchor="middle" font-size="11.5" font-weight="700" fill="#5a6378">최소 ${fmtDate(data[minI].date)} · ${vals[minI].toLocaleString()}${unit}</text>`;
    }
  }

  const svgId = bodyId + "Svg";
  body.innerHTML = `<div class="vol-chart-wrap">
    <svg id="${svgId}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
      <defs>
        <pattern id="${hatchId}" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
          <line x1="0" y1="0" x2="0" y2="6" stroke="#c3c9d4" stroke-width="1.4"/>
        </pattern>
      </defs>
      ${grid}${hatches}${labels}
      <polygon points="${areaPts}" fill="var(--accent)" opacity="0.08"/>
      <polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      ${marks}
      <line id="${bodyId}Cross" x1="0" y1="${padT}" x2="0" y2="${padT + ih}" stroke="#c3c9d4" stroke-width="1" style="display:none;"/>
      <circle id="${bodyId}Dot" r="4.5" fill="var(--accent)" stroke="#fff" stroke-width="2" style="display:none;"/>
    </svg>
    <div class="vol-tip" id="${bodyId}Tip" style="display:none;"></div>
  </div>`;

  salesTrendChartState[bodyId] = { data, x, y, W, unit };
  const svg = document.getElementById(svgId);
  svg.addEventListener("mousemove", (e) => salesTrendChartHover(bodyId, e));
  svg.addEventListener("mouseleave", () => {
    document.getElementById(bodyId + "Cross").style.display = "none";
    document.getElementById(bodyId + "Dot").style.display = "none";
    document.getElementById(bodyId + "Tip").style.display = "none";
  });
}

function salesTrendChartHover(bodyId, e) {
  const state = salesTrendChartState[bodyId];
  if (!state) return;
  const { data, x, y, W, unit } = state;
  const svg = document.getElementById(bodyId + "Svg");
  const rect = svg.getBoundingClientRect();
  const svgX = (e.clientX - rect.left) / rect.width * W;
  let best = 0, bestDist = Infinity;
  data.forEach((_, i) => {
    const d = Math.abs(x(i) - svgX);
    if (d < bestDist) { bestDist = d; best = i; }
  });
  const px = x(best), py = y(data[best].total);
  const cross = document.getElementById(bodyId + "Cross");
  const dot = document.getElementById(bodyId + "Dot");
  const tip = document.getElementById(bodyId + "Tip");
  cross.setAttribute("x1", px); cross.setAttribute("x2", px);
  cross.style.display = "";
  dot.setAttribute("cx", px); dot.setAttribute("cy", py);
  dot.style.display = "";
  tip.textContent = data[best].missing
    ? `${data[best].date} · 데이터 없음`
    : `${data[best].date} · ${data[best].total.toLocaleString()}${unit}`;
  tip.style.display = "block";
  const leftPx = px / W * rect.width;
  tip.style.left = Math.min(Math.max(leftPx, 60), rect.width - 60) + "px";
}

// 쿠팡 매출 추이 — 네이버 매출분석 추이 차트와 동일한 1개월/6개월/1년 기간 선택 기능. 쿠팡은
// coupangSalesSummary 자체가 이미 coupang_daily_sales 원본 테이블만 가볍게 조회하는 액션이라
// (naverStatSummary처럼 상품별·유입경로별까지 다 집계하지 않음) 네이버의 naverDailyOnly 같은
// 별도 경량 액션 없이 같은 액션을 넓은 기간으로 다시 부르기만 하면 된다.
const COUPANG_TREND_RANGE_LABELS = { "1m": "1개월", "6m": "6개월", "1y": "1년" };
const COUPANG_TREND_RANGE_MONTHS = { "6m": 6, "1y": 12 };
let coupangTrendRangeLength = "1m";
let coupangTrendExtDaily = [];
let coupangTrendExtKey = "";
let coupangTrendExtLoading = false;

function coupangTrendExtRangeFrom(months, dateTo) {
  const to = new Date(`${dateTo}T00:00:00Z`);
  const start = new Date(Date.UTC(to.getUTCFullYear(), to.getUTCMonth() - months + 1, 1));
  return formatDate(start);
}

// "1개월"이거나 확장 데이터가 아직 안 왔으면 우선 현재 선택 기간(coupangSalesRows) 그대로

// 쿠팡 일별 매출 표 정렬 — 날짜는 문자열(ISO라 사전순=시간순), 나머지는 숫자.
let coupangDailySort = { key: "", dir: "desc" };
function coupangDailySortValue(row, key) {
  switch (key) {
    case "date": return row.date;
    case "convRate": return row.views ? row.orders / row.views * 100 : 0;
    case "avgOrder": return row.orders ? row.sales / row.orders : 0;
    default: return Number(row[key]) || 0;
  }
}
function compareCoupangDailyRows(a, b) {
  if (!coupangDailySort.key) return 0;
  const va = coupangDailySortValue(a, coupangDailySort.key);
  const vb = coupangDailySortValue(b, coupangDailySort.key);
  const cmp = typeof va === "string" ? va.localeCompare(String(vb)) : va - vb;
  return coupangDailySort.dir === "asc" ? cmp : -cmp;
}

// 상품별 매출 랭킹 막대 — rows를 valueFn(매출) 기준 내림차순으로 top N개만 그린다(전부 그리면 표와 중복).
function topValueBarHtml(rows, nameFn, valueFn, valueFmt, limit = 10, urlFn) {
  const list = rows.filter(r => valueFn(r) > 0).slice().sort((a, b) => valueFn(b) - valueFn(a)).slice(0, limit);
  if (!list.length) return "";
  const max = valueFn(list[0]);
  return `
    <div class="rank-bar-list">
      ${list.map(r => {
        const name = nameFn(r);
        const url = urlFn ? urlFn(r) : "";
        const nameHtml = url
          ? `<a class="rank-bar-name" href="${esc(url)}" target="_blank" rel="noopener" title="${esc(name)}">${esc(name)}</a>`
          : `<div class="rank-bar-name" title="${esc(name)}">${esc(name)}</div>`;
        return `
        <div class="rank-bar-row">
          ${nameHtml}
          <div class="rank-bar-track"><div class="rank-bar-fill" style="width:${max ? valueFn(r) / max * 100 : 0}%"></div></div>
          <div class="rank-bar-value">${valueFmt(valueFn(r))}</div>
        </div>`;
      }).join("")}
    </div>`;
}

// 카테고리별 비율 도넛(SVG) — 세그먼트 사이 2px 여백을 두고, 12시 방향에서 시작하도록 전체를 -90도 회전.
// 각 조각에 <title>을 넣어 마우스 오버 시 이름·금액·비율이 브라우저 기본 툴팁으로 뜨게 한다.
// pathLength="100"으로 실제 둘레 길이와 무관하게 dash 계산을 0~100 퍼센트 단위로 고정한다.
function donutChartSvg(segs, size = 152, thickness = 20) {
  const cx = size / 2, cy = size / 2;
  const r = (size - thickness) / 2 - 1;
  const gap = 1.2;
  let offset = 0;
  const circles = segs.map(s => {
    const drawLen = Math.max(s.pct - gap, 0.001);
    const tip = `${esc(s.name)} ${money(s.value)} · ${Math.round(s.pct)}%`;
    const html = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${thickness}" stroke-linecap="round" pathLength="100" stroke-dasharray="${drawLen} ${100 - drawLen}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${cx} ${cy})"><title>${tip}</title></circle>`;
    offset += s.pct;
    return html;
  }).join("");
  return `<svg viewBox="0 0 ${size} ${size}" style="width:${size}px;height:${size}px;display:block;">${circles}</svg>`;
}

// 사이트에 등록된 카테고리가 아니라, 상품명에서 키워드를 매칭해 우리가 직접 정한 제품 라인으로 분류한다.
// 새 라인을 추가하거나 키워드를 넓히려면 이 배열만 고치면 된다 — 어느 키워드에도 안 걸리면 "기타".
// 네이버·쿠팡 둘 다 상품명 텍스트만 있으면 되므로 같은 분류를 두 플랫폼에 그대로 쓴다.
const CUSTOM_PRODUCT_CATEGORIES = [
  { name: "아이소핑크", keywords: ["아이소핑크"] },
  { name: "스티로폼", keywords: ["스티로폼", "EPS"] },
  { name: "열반사단열재", keywords: ["열반사"] },
  { name: "단열벽지", keywords: ["단열벽지"] },
  { name: "창문형 단열재", keywords: ["창문"] },
];
// 아이소핑크는 이름 그대로 핑크 계열로. 단열벽지는 원래 초록이라 스티로폼(아쿠아)과 헷갈려서 파란색으로 교체.
const CATEGORY_DONUT_COLORS = ["#e87ba4", "#1baf7a", "#eda100", "#2a78d6", "#4a3aa7"];
const CATEGORY_DONUT_ETC_COLOR = "#c3c2b7";
// 상품명에 "아이소핑크"·"열반사단열재"처럼 두 카테고리 키워드가 동시에 들어간 경우가 있어서,
// 배열 순서가 아니라 상품명 안에서 실제로 더 앞에 나오는 키워드를 기준으로 분류한다.
function classifyProductCategory(name) {
  const n = name || "";
  let best = null;
  CUSTOM_PRODUCT_CATEGORIES.forEach(c => {
    c.keywords.forEach(k => {
      const idx = n.indexOf(k);
      if (idx !== -1 && (!best || idx < best.index)) best = { name: c.name, index: idx };
    });
  });
  return best ? best.name : "기타";
}
function productCategoryDonutHtml(rows, nameFn, valueFn) {
  const order = CUSTOM_PRODUCT_CATEGORIES.map(c => c.name).concat(["기타"]);
  const colors = CATEGORY_DONUT_COLORS.concat([CATEGORY_DONUT_ETC_COLOR]);
  const totals = new Map(order.map(name => [name, 0]));
  rows.forEach(row => {
    const name = classifyProductCategory(nameFn(row));
    totals.set(name, totals.get(name) + (Number(valueFn(row)) || 0));
  });
  const list = order.map((name, i) => ({ name, value: totals.get(name), color: colors[i] }));
  const total = list.reduce((sum, c) => sum + c.value, 0);
  if (!total) return "";
  // 색은 카테고리마다 고정하되, 화면에는 매출이 큰 카테고리가 먼저 오도록 정렬해서 보여준다.
  const segs = list.filter(c => c.value > 0).map(c => ({ ...c, pct: c.value / total * 100 })).sort((a, b) => b.value - a.value);
  return `
    <div class="donut-wrap">
      ${donutChartSvg(segs)}
      <div class="dash-legend">
        ${segs.map(c => `<span class="dash-legend-item">
          <span class="dash-legend-dot" style="background:${c.color};"></span>
          <span class="dash-legend-text">
            <span class="dash-legend-name" title="${esc(c.name)}">${esc(c.name)}</span>
            <span class="dash-legend-value"><b>${money(c.value)}</b> · ${Math.round(c.pct)}%</span>
          </span>
        </span>`).join("")}
      </div>
    </div>`;
}

// 판매량 막대와 카테고리 도넛을 한 줄에 나란히 배치 — 둘 다 없으면 빈 줄 자체를 만들지 않는다.

// 쿠팡 상품별 실적 표 정렬 — 옵션명만 문자열, 나머지는 숫자.
let coupangItemSort = { key: "", dir: "desc" };
function coupangItemSortValue(row, key) {
  switch (key) {
    case "optionName": return row.optionName || row.productName || "";
    case "convRate": return row.views ? row.orders / row.views * 100 : 0;
    default: return Number(row[key]) || 0;
  }
}
function compareCoupangItemRows(a, b) {
  if (!coupangItemSort.key) return 0;
  const va = coupangItemSortValue(a, coupangItemSort.key);
  const vb = coupangItemSortValue(b, coupangItemSort.key);
  const cmp = typeof va === "string" ? va.localeCompare(String(vb), "ko") : va - vb;
  return coupangItemSort.dir === "asc" ? cmp : -cmp;
}

// 쿠팡 "일별 매출" 탭 대시보드 — 위쪽 요약 리포트(#metricGrid, 매출/주문/방문자/구매전환율/객단가
// 총계)와 겹치지 않도록, 하루 단위 분포 관점 지표로 구성한다(naverSalesDetailCardHtml과 같은 방식).
function coupangSalesDashCompareHtml(curVal, prevKeyFn, type = "abs") {
  const compare = coupangSalesCompare;
  if (!compare || compare.key !== currentAdLoadKey()) {
    return `<div class="metric-cmp"><span class="cmp">비교 데이터 불러오는 중...</span></div>`;
  }
  const line = (period, label) => {
    if (!period) return `<span class="cmp">${esc(label)} 확인 중...</span>`;
    if (!period.hasData) return `<span class="cmp">${esc(label)} 데이터 없음</span>`;
    const prevVal = prevKeyFn(period);
    return type === "rate" ? ppChangeChip(label, curVal, prevVal, true) : pctChangeChip(label, curVal, prevVal);
  };
  return `<div class="metric-cmp">${line(compare.prev, "전월")}${line(compare.year, "전년")}</div>`;
}

function coupangItemDashTiles() {
  const items = coupangItemCompare.latestItems || [];
  const soldCount = items.filter(r => r.sales > 0).length;
  const totalSales = items.reduce((s, r) => s + (Number(r.sales) || 0), 0);
  const top = [...items].sort((a, b) => b.sales - a.sales)[0] || null;
  const topShare = top && totalSales ? top.sales / totalSales * 100 : 0;
  const winnerAvg = items.length ? items.reduce((s, r) => s + (Number(r.itemWinner) || 0), 0) / items.length : 0;
  const totalCancel = items.reduce((s, r) => s + (Number(r.cancelAmount) || 0), 0);
  const cancelRate = totalSales ? totalCancel / totalSales * 100 : 0;
  const truncName = name => name.length > 16 ? name.slice(0, 16) + "…" : name;
  const shareOf = arr => {
    const arrTotal = arr.reduce((s, r) => s + (Number(r.sales) || 0), 0);
    const arrTop = [...arr].sort((a, b) => b.sales - a.sales)[0];
    return arrTop && arrTotal ? arrTop.sales / arrTotal * 100 : 0;
  };
  const winnerOf = arr => arr.length ? arr.reduce((s, r) => s + (Number(r.itemWinner) || 0), 0) / arr.length : 0;
  const cancelRateOf = arr => {
    const arrTotal = arr.reduce((s, r) => s + (Number(r.sales) || 0), 0);
    const arrCancel = arr.reduce((s, r) => s + (Number(r.cancelAmount) || 0), 0);
    return arrTotal ? arrCancel / arrTotal * 100 : 0;
  };
  return [
    { label: "판매금액(총)", value: money(totalSales), note: `${num(items.length)}개 옵션 합계`,
      cmp: coupangItemDashCompareHtml(totalSales, p => (p.items || []).reduce((s, r) => s + (Number(r.sales) || 0), 0)) },
    { label: "판매 옵션 수", value: num(soldCount) + "개", note: `전체 ${num(items.length)}개 중`,
      cmp: coupangItemDashCompareHtml(soldCount, p => (p.items || []).filter(r => r.sales > 0).length) },
    { label: "TOP 옵션 비중", value: formatPercentValue(topShare), note: top ? `1위 ${truncName(top.optionName || top.productName || "-")}` : "데이터 없음",
      cmp: coupangItemDashCompareHtml(topShare, p => shareOf(p.items || []), "rate") },
    { label: "아이템위너 비율", value: formatPercentValue(winnerAvg), note: "옵션 평균",
      cmp: coupangItemDashCompareHtml(winnerAvg, p => winnerOf(p.items || []), "rate") },
    { label: "취소율", value: formatPercentValue(cancelRate), note: `취소금액 ${money(totalCancel)}`,
      cmp: coupangItemDashCompareHtml(cancelRate, p => cancelRateOf(p.items || []), "rate") },
  ];
}

function renderCoupangSalesPanel() {
  document.getElementById("mainPanel").innerHTML =
    coupangSummaryCardHtml()
    + coupangSalesDetailCardHtml()
    + coupangItemDetailCardHtml();

  document.getElementById("coupangItemFile").addEventListener("change", e => {
    const file = e.target.files?.[0];
    if (file) importCoupangItemFile(file);
  });
  document.getElementById("coupangProductMapFile").addEventListener("change", e => {
    const file = e.target.files?.[0];
    if (file) importCoupangProductMapFile(file);
  });
  const periodSelect = document.getElementById("coupangItemPeriodSelect");
  if (periodSelect) {
    periodSelect.addEventListener("change", async () => {
      coupangItemPeriod = periodSelect.value;
      coupangItemLoading = true; showLoading("상품별 실적을 불러오는 중...");
      renderCoupangSalesPanel();
      try {
        await loadCoupangItemRows();
      } catch (e) {
        const status = document.getElementById("adStatus");
        status.className = "status error";
        status.textContent = "상품별 실적 불러오기 실패: " + String(e.message || e);
      }
      coupangItemLoading = false; hideLoading();
      renderCoupangSalesPanel();
      // 상승·하락 TOP은 이 드롭다운 선택과 무관하게 항상 최신 스냅샷 기준 고정이라 여기선 다시 안 불러옴
    });
  }
  document.getElementById("coupangSalesFile").addEventListener("change", e => {
    const file = e.target.files?.[0];
    if (file) importCoupangSalesFile(file);
    e.target.value = ""; // 같은 파일을 다시 선택해도 change가 발생하도록 초기화
  });
  // 기간을 바꿀 때 일별 매출 탭 전체(대시보드·표까지)를 다시 그리면 체감 속도가 크게 떨어져서,
  // 차트만 직접 갱신한다(renderSalesPanel() 재호출 없음) — 네이버 매출 추이와 같은 방식.
  document.getElementById("coupangTrendRangeSelect")?.addEventListener("change", e => {
    coupangTrendRangeLength = e.target.value;
    if (coupangTrendRangeLength !== "1m") ensureCoupangTrendExtLoaded();
    const trendChart = coupangTrendChartRows();
    renderSalesTrendChart("coupangSalesTrendBody", trendChart.rows, trendChart.unit);
  });
  ensureCoupangSalesLoaded();
  if (coupangTrendRangeLength !== "1m") ensureCoupangTrendExtLoaded();
  const trendChart = coupangTrendChartRows();
  renderSalesTrendChart("coupangSalesTrendBody", trendChart.rows, trendChart.unit);
  renderMainNav(false); // "요약분석"이 이미 요약 역할을 하므로 별도 "종합분석"(전체 펼치기) 탭은 만들지 않음
}

// 매출분석 > 일별 매출 표 정렬 — 날짜 열은 문자열 비교(ISO 형식이라 사전순=시간순), 나머지
// 열은 숫자 비교. 구매전환율/객단가는 저장된 값이 아니라 매번 계산해서 쓰는 파생값이라 별도로
// 분기한다.
function salesDailySortValue(row, key) {
  switch (key) {
    case "date": return row.date;
    case "convRate": return row.visits ? row.payCount / row.visits * 100 : 0;
    case "avgOrder": return row.payCount ? row.salesTotal / row.payCount : 0;
    default: return Number(row[key]) || 0;
  }
}
function compareSalesDailyRows(a, b) {
  if (!salesDailySort.key) return 0; // 아직 칼럼을 안 눌렀으면 원본 순서 유지
  const va = salesDailySortValue(a, salesDailySort.key);
  const vb = salesDailySortValue(b, salesDailySort.key);
  const cmp = typeof va === "string" ? va.localeCompare(String(vb)) : va - vb;
  return salesDailySort.dir === "asc" ? cmp : -cmp;
}

// 매출분석 > 상품별 데이터 표 정렬 — 상품명만 문자열 비교, 나머지는 숫자 비교.
let productDataSort = { key: "", dir: "desc" };
function productDataSortValue(row, key) {
  if (key === "productName") return row.productName;
  return Number(row[key]) || 0;
}
function compareProductDataRows(a, b) {
  if (!productDataSort.key) return 0; // 아직 칼럼을 안 눌렀으면 원본 순서(판매금액(총) 내림차순) 유지
  const va = productDataSortValue(a, productDataSort.key);
  const vb = productDataSortValue(b, productDataSort.key);
  const cmp = typeof va === "string" ? va.localeCompare(String(vb), "ko") : va - vb;
  return productDataSort.dir === "asc" ? cmp : -cmp;
}

// 일별/상품별 데이터 테이블의 정렬 가능한 헤더 — 두 표가 같은 모양을 쓰도록 공용 함수 하나로
// 뺐다. 클릭 전엔 화살표 없음, 클릭한 칼럼에만 ▲(오름차순)/▼(내림차순)가 붙고, 처음 클릭하면
// 내림차순부터 시작한다. tableId로 어느 표(일별/상품별)의 정렬 상태인지 클릭 핸들러가 구분한다.
function dataTableTh(tableId, sortState, key, label, width, isNum) {
  const active = sortState.key === key;
  const arrow = active ? (sortState.dir === "asc" ? "▲" : "▼") : "";
  const style = width ? ` style="width:${width}px"` : "";
  return `<th class="sortable${isNum ? " num" : ""}${active ? " sorted" : ""}"${style} data-table="${tableId}" data-sort-key="${key}">${esc(label)}${arrow ? ` <span class="arrow">${arrow}</span>` : ""}</th>`;
}

// "일별 매출" 카드는 이제 추이 차트만 담당한다 — 날짜별 원본 표는 "데이터 테이블" 카드로 옮겨서

// "지표별 랭킹 확인하기"와 같은 구성이며, 네이버 자체 판매분석 페이지의 검색어 랭킹 섹션을
// 참고했다(그대로 복제는 아님). 구매전환율은 더해도 의미 있는 "전체"가 안 나오는 비율값이라

function naverSearchRankingCardHtml() {
  const nameFn = r => r.term;

  const byPayCount = [...naverStat.searchTerms].sort((a, b) => b.payCount - a.payCount);
  const byConv = [...naverStat.searchTerms].sort((a, b) => b.conversion - a.conversion);
  const bySales = [...naverStat.searchTerms].sort((a, b) => b.salesTotal - a.salesTotal);
  const cards = [
    top3ListHtml("search-rank-visits", "방문수", naverStat.searchTerms, nameFn, r => r.visits, v => num(v) + "회", urlFn),

// 고객분석 대시보드 — "전체합산" 세그먼트를 이번 스냅샷 기간의 총계 지표로 보여준다.
// 아래 두 카드(신규/재구매·성/연령별)가 이미 세그먼트별 상세를 다루므로, 여기서는 원본 표
// 대신 이 기간 전체를 요약하는 지표만 보여준다. 관심고객수는 별도 파일(고객현황)을 올려야
// 나오는 지표라, 업로드 안 했으면 자동으로 빠지고 4개만 남는다.
function naverCustomerDashHtml() {
  const total = naverStat.customer.find(r => r.segment === "전체합산");
  if (!total) return `<div class="empty">저장된 고객 데이터가 없습니다.</div>`;
  const tiles = [
    { label: "결제고객수", value: num(total.payers) + "명", note: `방문 ${num(total.visitors)}명 중` },
    { label: "구매전환율(고객)", value: formatPercentValue(total.conversion), note: "결제고객수 ÷ 방문고객수" },
    { label: "판매금액(총)", value: money(total.salesTotal), note: "전체합산 기준" },
    { label: "객단가", value: money(total.avgPayment), note: "판매금액(총) ÷ 결제고객수" },
  ];
  const interest = naverStat.customerInterest;
  if (interest) {
    tiles.push(
      { label: "관심고객수(누적)", value: num(interest.interestTotal) + "명", note: `이번 달 ${interest.interestNew >= 0 ? "+" : ""}${num(interest.interestNew)}명` },
    );
  }
  return `
    <div class="rank-dash-tiles" style="grid-template-columns:repeat(${tiles.length}, minmax(0, 1fr));">
      ${tiles.map(x => `
        <div class="dash-tile">
          <div class="dash-label">${esc(x.label)}<span class="dash-info">?<span class="dash-tip">${esc(x.note)}</span></span></div>
          <div class="dash-value">${x.value}</div>
        </div>`).join("")}
    </div>`;
}

// 고객을 신규/재구매 두 세그먼트로 나눠 4개 지표 기준으로 비중을 비교한다 — 네이버 자체
// 판매분석 페이지의 "주요 지표별 고객 비중"(신규/재구매 랭킹)을 참고했다(그대로 복제는 아님).
// 방문고객수·결제고객수·판매금액(총)처럼 더할 수 있는 값은 .visit-bar로 비중 막대까지 보여주고,
// 구매전환율·객단가처럼 평균/비율값은 막대 없이 숫자만 나열한다(showBar=false).
function naverCustomerSegmentCardHtml() {
  const newSeg = naverStat.customer.find(r => r.segment === "신규");
  const repeatSeg = naverStat.customer.find(r => r.segment === "재구매");
  if (!newSeg || !repeatSeg) return `<div class="empty">신규/재구매 구분 데이터가 없습니다.</div>`;

  const metric = (title, getVal, fmt, showBar = true) => {
    const nv = Number(getVal(newSeg)) || 0;
    const rv = Number(getVal(repeatSeg)) || 0;
    const total = nv + rv;
    const nShare = total ? nv / total * 100 : 0;
    const rShare = total ? rv / total * 100 : 0;
    const row = (label, val, share, barClass) => showBar
      ? `<div class="cust-seg-row">
          <div class="cust-seg-row-head"><span>${label}</span><span class="cust-seg-row-value">${fmt(val)} / ${share.toFixed(1)}%</span></div>
          <div class="visit-bar-track"><span class="visit-bar ${barClass}" style="width:${Math.max(3, share)}%"></span></div>
        </div>`
      : `<div class="cust-seg-row-plain"><span>${label}</span><span class="cust-seg-row-value">${fmt(val)}</span></div>`;
    return `<div class="cust-seg-card">
      <div class="cust-seg-title">${esc(title)}</div>
      ${row("신규 고객", nv, nShare, "new")}
      ${row("재구매 고객", rv, rShare, "repeat")}
    </div>`;
  };

  const cards = [
    metric("결제고객수 비중", r => r.payers, v => num(v) + "명"),
    metric("구매전환율(고객)", r => r.conversion, v => formatPercentValue(v), false),
    metric("판매금액(총) 비중", r => r.salesTotal, v => money(v)),
    metric("객단가", r => r.avgPayment, v => money(v), false),
  ].join("");
  return `<div class="summary-top3-row-wrap">${cards}</div>`;
}

// 고객을 성별+연령대(예: "남성 20대")로 나눠 4개 지표 기준으로 순위 매겨 보여준다 — 네이버
// 자체 판매분석 페이지의 "주요 지표별 고객 비중"(성/연령별 랭킹)을 참고했다(그대로 복제는

  const cards = [
    top3ListHtml("cust-ga-payers", "결제고객수", byPayers, nameFn, r => r.payers, v => num(v) + "명"),

// 요약분석 탭 — 매출·유입·검색 각 영역의 TOP3만 나란히 뽑아 보여주는 압축 요약.
// 네이버 스마트스토어 자체 "요약 리포트"의 "지표별 랭킹 확인하기" 섹션 구조를 참고했다.
// 순위 옆에 값만 있으면 "1위가 압도적인지 고르게 퍼져있는지" 감이 안 와서, 전체(items 전부) 대비
// 비중(%)도 같이 보여준다 — 네이버 요약 리포트의 "판매금액비중"과 같은 역할.
// showShare=false는 구매전환율·객단가처럼 "비율/평균"이라 서로 더해서 전체 대비 비중을 내는 게
// 의미 없는 지표에 쓴다(합산해도 진짜 "전체"가 아니라서). 매출·방문수처럼 더할 수 있는 값은 계속
// 기본값(true)으로 비중을 보여준다.
function top3ListHtml(key, title, items, nameFn, valueFn, valueFmt, urlFn, showShare = true) {
  const expanded = summaryExpandedCards.has(key);
  const total = showShare ? items.reduce((sum, item) => sum + (Number(valueFn(item)) || 0), 0) : 0;
  const list = items.slice(0, expanded ? SUMMARY_EXPANDED_LIMIT : 3);
  const rows = list.length
    ? list.map((item, i) => {
      const name = nameFn(item);
      const url = urlFn ? urlFn(item) : "";
      const value = Number(valueFn(item)) || 0;
      const share = total ? (value / total * 100) : 0;
      const nameHtml = url
        ? `<a class="summary-top3-name" href="${esc(url)}" target="_blank" rel="noopener" title="${esc(name)}">${esc(name)}</a>`
        : `<span class="summary-top3-name" title="${esc(name)}">${esc(name)}</span>`;
      return `<div class="summary-top3-row">
        <span class="summary-top3-rank">${i + 1}</span>
        ${nameHtml}
        <span class="summary-top3-value">
          ${valueFmt(value)}
          ${showShare ? `<span class="summary-top3-share">비중 ${share.toFixed(1)}%</span>` : ""}
        </span>
      </div>`;
    }).join("")
    : `<div class="empty">데이터 없음</div>`;
  return `<div class="summary-top3-card"><div class="summary-top3-title">${esc(title)}</div>${rows}${summaryMoreBtnHtml(key, items.length)}</div>`;
}

// 매출분석 대시보드 전용 비교칩 — naverSalesCompare(전기간/전년)에는 salesNet/refundAmount/
// products 같은 "원본 합계"만 있고 일평균·환불율·TOP비중 같은 파생 지표는 없어서, prevKeyFn으로
// 비교기간 데이터에서 같은 방식으로 직접 계산해 비교한다. dayCount는 comparePeriodRanges가
// 항상 조회기간과 같은 일수로 이전/전년 기간을 만들어주므로 현재 dayCount를 그대로 나눠 쓴다.
function naverSalesDashCompareHtml(curVal, prevKeyFn, type = "abs") {
  const compare = naverSalesCompare;
  if (!compare || compare.key !== currentAdLoadKey()) {
    return `<div class="metric-cmp"><span class="cmp">비교 데이터 불러오는 중...</span></div>`;
  }
  const line = (period, label) => {
    if (!period) return `<span class="cmp">${esc(label)} 확인 중...</span>`;
    if (!period.hasData) return `<span class="cmp">${esc(label)} 데이터 없음</span>`;
    const prevVal = prevKeyFn(period);
    return type === "rate" ? ppChangeChip(label, curVal, prevVal, true) : pctChangeChip(label, curVal, prevVal);
  };
  return `<div class="metric-cmp">${line(compare.prev, "전월")}${line(compare.year, "전년")}</div>`;
}

// 매출분석 탭 전용 카드 — 대시보드/일별 매출/상품별 매출을 요약분석과 같은 방식으로
// 각각 독립된 미니 카드(제목 → 구분선 → 내용)로 쌓는다. 대시보드는 요약분석 탭의
// "요약 리포트"(metricGrid, 요약분석에서만 보임)와는 별개의 카드로, 매출분석 탭에
// 머무른 채로도 이번 기간 핵심 지표를 바로 볼 수 있게 한다.
function naverSalesDetailCardHtml() {
  const titleRow = (title, subtitle, rightHtml = "") =>
    `<div class="summary-section-title-row">
      <div class="summary-section-title-wrap">
        <span class="summary-section-title">${esc(title)}</span>
        <span class="summary-section-subtitle">${esc(subtitle)}</span>
      </div>
      ${rightHtml}
    </div>`;
  const body = html => `<div class="summary-section-body">${html}</div>`;
  const divider = `<div class="summary-divider"></div>`;
  const miniCard = (title, subtitle, content, rightHtml = "") =>
    `<div class="summary-mini-card">${titleRow(title, subtitle, rightHtml)}${divider}${body(content)}</div>`;

  // 요약분석의 "요약 리포트"(매출·결제건수·방문수·구매전환율·객단가)와 지표가 겹치지 않도록,
  // 여기서는 일별·상품별 매출 표 두 개를 가로지르는 "분포" 관점 지표로 구성한다.
  const t = naverDailyTotals();
  const dayCount = naverStat.daily.length;
  const avgDailyNet = dayCount ? t.salesNet / dayCount : 0;
  const peakDay = naverStat.daily.reduce((best, r) => (!best || r.salesNet > best.salesNet) ? r : best, null);
  const soldProductCount = naverStat.products.filter(p => p.salesTotal > 0).length;
  const topProduct = naverStat.products[0] || null;
  const topShare = topProduct && t.salesTotal ? topProduct.salesTotal / t.salesTotal * 100 : 0;
  const refundRate = t.salesTotal ? t.refundAmount / t.salesTotal * 100 : 0;
  const truncName = name => name.length > 16 ? name.slice(0, 16) + "…" : name;
  const dashTiles = [
    { label: "일 평균 매출(순)", value: money(avgDailyNet), note: `${num(dayCount)}일 평균`,
      cmp: naverSalesDashCompareHtml(avgDailyNet, p => dayCount ? p.salesNet / dayCount : 0) },
    { label: "매출 최고일", value: peakDay ? peakDay.date : "-", note: peakDay ? `순매출 ${money(peakDay.salesNet)}` : "데이터 없음", cmp: "" },
    { label: "판매 상품 수", value: num(soldProductCount) + "개", note: `전체 ${num(naverStat.products.length)}개 중`,
      cmp: naverSalesDashCompareHtml(soldProductCount, p => (p.products || []).filter(x => x.salesTotal > 0).length) },
    { label: "TOP 상품 비중", value: formatPercentValue(topShare), note: topProduct ? `1위 ${truncName(topProduct.productName)}` : "데이터 없음",
      cmp: naverSalesDashCompareHtml(topShare, p => {
        const arr = p.products || [];
        return arr.length && p.salesTotal ? arr[0].salesTotal / p.salesTotal * 100 : 0;
      }, "rate") },
    { label: "환불율", value: formatPercentValue(refundRate), note: `환불 ${money(t.refundAmount)}`,
      cmp: naverSalesDashCompareHtml(refundRate, p => p.salesTotal ? p.refundAmount / p.salesTotal * 100 : 0, "rate") },
  ];
  const dashHtml = `
    <div class="rank-dash-tiles">
      ${dashTiles.map(x => `
        <div class="dash-tile">
          <div class="dash-label">${esc(x.label)}<span class="dash-info">?<span class="dash-tip">${esc(x.note)}</span></span></div>
          <div class="dash-value">${x.value}</div>
          ${x.cmp || ""}
        </div>`).join("")}
    </div>`;

  const uploadBtn = `
    <label class="expand-all-btn" title="스마트스토어 접속후 데이터분석 > 판매분석 > 분석기준 상품 선택 > 다운로드 후 업로드">
      판매분석 엑셀 업로드
      <input class="file-input" id="naverProductFile" type="file" accept=".xlsx,.xls,.csv" style="display:none;">
    </label>`;

  const cards = [
    miniCard("대시보드", "이번 매출분석 기간의 핵심 지표를 한눈에 확인하세요.", dashHtml),
    miniCard("일별 매출", "날짜별 방문수·결제건수·구매전환율과 판매금액·환불·순매출 추이를 확인하세요.",
      naverStat.daily.length ? naverDailyTableHtml() : `<div class="empty">이 기간에 저장된 데이터가 없습니다. 판매분석 엑셀을 업로드하거나 기간을 변경해 보세요.</div>`,
      uploadBtn),
    miniCard("상품별 매출", "어떤 상품이 매출을 가장 많이 만들었는지 순위와 카테고리 비중으로 확인하세요.",
      naverStat.products.length ? naverProductTableHtml() : `<div class="empty">이 기간에 저장된 상품별 데이터가 없습니다.</div>`),
    miniCard("데이터 테이블", "선택한 분석기준의 상세데이터를 제공합니다.",
      naverSalesDataTableSectionHtml(), salesDataTableModeToggleHtml()),
  ].join("");

  return `<div class="content-card summary-card">
    <h2 style="display:none">매출분석</h2>
    <div class="summary-cards-stack">${cards}</div>
  </div>`;
}

// 채널 하나(또는 여러 개) 이름에 해당하는 방문수가 전체 방문수에서 차지하는 비중(%) —
// 현재 기간(naverStat.visitPaths)과 비교기간(naverSalesCompare.prev/.year의 visitPaths)에
// 똑같이 써야 해서 배열을 인자로 받는 공용 함수로 뺐다.
function channelShareOfPaths(paths, names) {
  const arr = paths || [];
  const total = arr.reduce((s, r) => s + (Number(r.visits) || 0), 0);
  if (!total) return 0;
  const set = Array.isArray(names) ? names : [names];
  const v = arr.filter(r => set.includes(classifyChannel(r))).reduce((s, r) => s + (Number(r.visits) || 0), 0);
  return v / total * 100;
}

// channelShareOfPaths와 같은 필터링이지만 비중(%)이 아니라 방문수 그대로 필요할 때 쓴다.
function channelVisitsOfPaths(paths, names) {
  const arr = paths || [];
  const set = Array.isArray(names) ? names : [names];
  return arr.filter(r => set.includes(classifyChannel(r))).reduce((s, r) => s + (Number(r.visits) || 0), 0);
}

// 유입분석 탭 전용 카드 — 매출분석과 같은 방식(대시보드 → 원본 표)으로 구성한다. 대시보드는
// 요약분석의 "유입경로 비율"(채널별 막대+범례 전체 분포)과 겹치지 않도록, 전체 분포 대신
// 직접유입/검색/광고처럼 궁금해할 만한 채널 비중 몇 개를 낱개 숫자 지표로 뽑아서 보여준다.
function naverVisitDetailCardHtml() {
  const titleRow = (title, subtitle, rightHtml = "") =>
    `<div class="summary-section-title-row">
      <div class="summary-section-title-wrap">
        <span class="summary-section-title">${esc(title)}</span>
        <span class="summary-section-subtitle">${esc(subtitle)}</span>
      </div>
      ${rightHtml}
    </div>`;
  const body = html => `<div class="summary-section-body">${html}</div>`;
  const divider = `<div class="summary-divider"></div>`;
  const miniCard = (title, subtitle, content, rightHtml = "") =>
    `<div class="summary-mini-card">${titleRow(title, subtitle, rightHtml)}${divider}${body(content)}</div>`;

  const paths = naverStat.visitPaths;
  const totalVisits = paths.reduce((s, r) => s + (Number(r.visits) || 0), 0);
  const searchVisits = channelVisitsOfPaths(paths, ["네이버 통합검색", "네이버 가격비교"]);
  const searchShare = channelShareOfPaths(paths, ["네이버 통합검색", "네이버 가격비교"]);
  const plusStoreShare = channelShareOfPaths(paths, ["플러스스토어 검색", "플러스스토어"]);
  const adShare = channelShareOfPaths(paths, "네이버광고");
  const directShare = channelShareOfPaths(paths, "직유입");

  const dashTiles = [
    { label: "전체 방문수", value: num(totalVisits) + "회", note: `유입경로 ${num(paths.length)}개 합계`,
      cmp: naverSalesDashCompareHtml(totalVisits, p => (p.visitPaths || []).reduce((s, r) => s + (Number(r.visits) || 0), 0)) },
    { label: "네이버 검색 유입 비중", value: formatPercentValue(searchShare), note: `방문 ${num(searchVisits)}회 · 통합검색 + 가격비교`,
      cmp: naverSalesDashCompareHtml(searchShare, p => channelShareOfPaths(p.visitPaths, ["네이버 통합검색", "네이버 가격비교"]), "rate") },
    { label: "네이버플러스스토어 비중", value: formatPercentValue(plusStoreShare), note: "네이버플러스스토어 + 플러스스토어 검색",
      cmp: naverSalesDashCompareHtml(plusStoreShare, p => channelShareOfPaths(p.visitPaths, ["플러스스토어 검색", "플러스스토어"]), "rate") },
    { label: "네이버 광고 비중", value: formatPercentValue(adShare), note: "네이버 광고를 통한 유입",
      cmp: naverSalesDashCompareHtml(adShare, p => channelShareOfPaths(p.visitPaths, "네이버광고"), "rate") },
    { label: "직접 유입 비중", value: formatPercentValue(directShare), note: "검색·광고 없이 바로 들어온 방문",
      cmp: naverSalesDashCompareHtml(directShare, p => channelShareOfPaths(p.visitPaths, "직유입"), "rate") },
  ];
  const dashHtml = `
    <div class="rank-dash-tiles" style="grid-template-columns:repeat(${dashTiles.length}, minmax(0, 1fr));">
      ${dashTiles.map(x => `
        <div class="dash-tile">
          <div class="dash-label">${esc(x.label)}<span class="dash-info">?<span class="dash-tip">${esc(x.note)}</span></span></div>
          <div class="dash-value">${x.value}</div>
          ${x.cmp || ""}
        </div>`).join("")}
    </div>`;

  const uploadBtn = `
    <label class="expand-all-btn" title="스마트스토어 접속후 데이터분석 > 방문분석 > 분석기준 경로 선택 > 다운로드 후 업로드">
      방문분석 엑셀 업로드
      <input class="file-input" id="naverVisitFile" type="file" accept=".xlsx,.xls,.csv" style="display:none;">
    </label>`;

  const cards = [
    miniCard("대시보드", "이번 유입분석 기간의 핵심 지표를 한눈에 확인하세요.", dashHtml),
    miniCard("지표별 랭킹 확인하기", "방문수·결제건수·구매전환율·판매금액 기준으로 어떤 유입경로가 가장 성과가 좋은지 확인하세요.", naverVisitRankingCardHtml()),
    miniCard("유입경로", "경로별 방문수와 결제 성과를 순위로 확인하세요.",
      naverStat.visitPaths.length ? naverVisitListHtml() : `<div class="empty">이 기간에 저장된 유입경로 데이터가 없습니다. 방문분석 엑셀을 업로드해 주세요.</div>`,
      uploadBtn),
  ].join("");

  return `<div class="content-card summary-card">
    <h2 style="display:none">유입분석</h2>
    <div class="summary-cards-stack">${cards}</div>
  </div>`;
}

// 검색분석 탭 전용 카드 — 유입분석과 같은 구성(대시보드 → 지표별 랭킹 → 원본 표)으로 만든다.
// 대시보드는 요약분석의 "핵심 지표 TOP3 · 검색어"와 겹치지 않도록, 검색어 개별 순위 대신
// 주요 제품군(아이소핑크/스티로폼/열반사단열재/단열벽지) 키워드가 섞인 검색이 전체 검색 방문 중
// 몇 %를 차지하는지 보여준다.
function naverSearchDetailCardHtml() {
  const titleRow = (title, subtitle, rightHtml = "") =>
    `<div class="summary-section-title-row">
      <div class="summary-section-title-wrap">
        <span class="summary-section-title">${esc(title)}</span>
        <span class="summary-section-subtitle">${esc(subtitle)}</span>
      </div>
      ${rightHtml}
    </div>`;
  const body = html => `<div class="summary-section-body">${html}</div>`;
  const divider = `<div class="summary-divider"></div>`;
  const miniCard = (title, subtitle, content, rightHtml = "") =>
    `<div class="summary-mini-card">${titleRow(title, subtitle, rightHtml)}${divider}${body(content)}</div>`;

  const terms = naverStat.searchTerms;
  const totalVisits = terms.reduce((s, r) => s + (Number(r.visits) || 0), 0);
  // 검색어에 특정 제품 키워드가 포함된 방문이 전체의 몇 %인지 — 어떤 제품군이 검색을 통해
  // 얼마나 유입되는지 한눈에 보기 위함이다.
  const termShare = (list, keyword) => {
    const arr = list || [];
    const total = arr.reduce((s, r) => s + (Number(r.visits) || 0), 0);
    if (!total) return 0;
    const v = arr.filter(r => (r.term || "").includes(keyword)).reduce((s, r) => s + (Number(r.visits) || 0), 0);
    return v / total * 100;
  };

  const dashTiles = [
    { label: "검색어 수", value: num(terms.length) + "개", note: `총 방문 ${num(totalVisits)}회`,
      cmp: naverSalesDashCompareHtml(terms.length, p => (p.searchTerms || []).length) },
    { label: "아이소핑크 비중", value: formatPercentValue(termShare(terms, "아이소핑크")), note: "검색어에 '아이소핑크' 포함",
      cmp: naverSalesDashCompareHtml(termShare(terms, "아이소핑크"), p => termShare(p.searchTerms, "아이소핑크"), "rate") },
    { label: "스티로폼 비중", value: formatPercentValue(termShare(terms, "스티로폼")), note: "검색어에 '스티로폼' 포함",
      cmp: naverSalesDashCompareHtml(termShare(terms, "스티로폼"), p => termShare(p.searchTerms, "스티로폼"), "rate") },
    { label: "열반사단열재 비중", value: formatPercentValue(termShare(terms, "열반사")), note: "검색어에 '열반사' 포함",
      cmp: naverSalesDashCompareHtml(termShare(terms, "열반사"), p => termShare(p.searchTerms, "열반사"), "rate") },
    { label: "단열벽지 비중", value: formatPercentValue(termShare(terms, "단열벽지")), note: "검색어에 '단열벽지' 포함",
      cmp: naverSalesDashCompareHtml(termShare(terms, "단열벽지"), p => termShare(p.searchTerms, "단열벽지"), "rate") },
  ];
  const dashHtml = `
    <div class="rank-dash-tiles">
      ${dashTiles.map(x => `
        <div class="dash-tile">
          <div class="dash-label">${esc(x.label)}<span class="dash-info">?<span class="dash-tip">${esc(x.note)}</span></span></div>
          <div class="dash-value">${x.value}</div>
          ${x.cmp || ""}
        </div>`).join("")}

function adSortValue(row, key) {
  switch (key) {
    case "ctr": return Number(row.ctr) || (row.impressions ? row.clicks / row.impressions * 100 : 0);
    case "cpc": return Number(row.cpc) || (row.clicks ? row.cost / row.clicks : 0);
    case "conversions": return Number(row.purchaseConversions) || 0;
    case "conversionRate": return row.clicks ? (Number(row.purchaseConversions) || 0) / row.clicks * 100 : 0;
    case "conversionSales": return Number(row.purchaseSales) || 0;
    case "roas": return Number(row.purchaseRoas) || (row.cost ? (Number(row.purchaseSales) || 0) / row.cost * 100 : 0);
    case "name": return String(row.name || row.keyword || "");
    case "type": return adTypeLabel(row.type);
    default: return Number(row[key]) || 0;
  }
}

function compareAdRows(a, b) {
  const va = adSortValue(a, adSort.key);
  const vb = adSortValue(b, adSort.key);
  const cmp = typeof va === "string" ? va.localeCompare(String(vb), "ko") : va - vb;
  return adSort.dir === "asc" ? cmp : -cmp;
}

function adTh(key, label, width, isNum) {
  const active = adSort.key === key;
  const arrow = active ? (adSort.dir === "asc" ? "▲" : "▼") : "";
  const style = width ? ` style="width:${width}px"` : "";
  return `<th class="sortable${isNum ? " num" : ""}${active ? " sorted" : ""}"${style} data-sort="${key}">${esc(label)}${arrow ? ` <span class="arrow">${arrow}</span>` : ""}</th>`;
}

// 조회기간(row)과 비교기간(compareRow, 전월 또는 전년의 같은 이름 캠페인/광고그룹)을 광고 이름
// 기준으로 짝지어, 표의 숫자 옆에 증감을 바로 붙여 보여준다. compareRow가 없으면 칩 없이 값만.
const AD_METRIC_SPECS = [
  { key: "impressions", fmt: v => num(v) },
  { key: "clicks", fmt: v => num(v) },
  { key: "ctr", fmt: v => formatPercentValue(v), rate: true },
  { key: "cpc", fmt: v => money(v) },
  { key: "conversions", fmt: v => num(v) },
  { key: "conversionRate", fmt: v => formatPercentValue(v), rate: true },
  { key: "cost", fmt: v => money(v), strong: true },
  { key: "conversionSales", fmt: v => money(v) },
  { key: "roas", fmt: v => formatPercentValue(v), rate: true, strong: true },
];

function adMetricCells(row, compareRow) {
  return AD_METRIC_SPECS.map(spec => {
    const cur = adSortValue(row, spec.key);
    const chip = compareRow
      ? (spec.rate
        ? ppChangeChip("", cur, adSortValue(compareRow, spec.key), true)
        : pctChangeChip("", cur, adSortValue(compareRow, spec.key)))
      : "";
    return `<td class="num${spec.strong ? " strong" : ""}">${spec.fmt(cur)}${chip ? `<div class="cell-cmp">${chip}</div>` : ""}</td>`;
  }).join("");
}

// compare = { key, prev, year } (fetchAdCompareTotals/fetchCoupangAdCompareTotals 결과).
// adCmpPeriod("prev"|"year")로 고른 기간의 items에서 같은 이름의 행을 찾아 반환한다.
function adCompareRowFor(compare, row) {
  if (!compare || compare.key !== currentAdLoadKey()) return null;
  const period = compare[adCmpPeriod];
  if (!period || !period.hasData) return null;
  const name = String(row.name || row.keyword || "");
  return (period.items || []).find(r => String(r.name || r.keyword || "") === name) || null;
}

function formatPercentValue(value) {
  const n = Number(value) || 0;
  if (!n) return "-";
  return n.toLocaleString("ko-KR", { maximumFractionDigits: 2 }) + "%";
}

function adTypeLabel(type) {
  const value = String(type || "-");

    WEB_SITE: "파워링크",

    POWER_CONTENTS: "파워컨텐츠",
    BRAND_SEARCH: "브랜드검색",
  };
  return labels[value] || value;
}

function currentAdLoadKey() {
  return [
    DEFAULT_STORE,
    document.getElementById("dateFrom").value,
    document.getElementById("dateTo").value,
  ].join("|");
}

// 조회기간과 같은 길이의 "이전 기간"과 "1년 전 같은 기간"을 계산.
// 예: 최근 30일 조회 → 이전 30일, 1년 전 같은 30일.
function comparePeriodRanges(dateFrom, dateTo) {
  const from = new Date(`${dateFrom}T00:00:00Z`);
  const to = new Date(`${dateTo}T00:00:00Z`);
  if (Number.isNaN(from.getTime()) || Number.isNaN(to.getTime())) return null;
  const dayMs = 86400000;
  const lengthDays = Math.round((to - from) / dayMs) + 1;
  const fmt = d => d.toISOString().slice(0, 10);

  const prevTo = new Date(from.getTime() - dayMs);
  const prevFrom = new Date(prevTo.getTime() - (lengthDays - 1) * dayMs);

  const yearFrom = new Date(from.getTime());
  yearFrom.setUTCFullYear(yearFrom.getUTCFullYear() - 1);
  const yearTo = new Date(to.getTime());
  yearTo.setUTCFullYear(yearTo.getUTCFullYear() - 1);

  return {
    prev: { from: fmt(prevFrom), to: fmt(prevTo) },
    year: { from: fmt(yearFrom), to: fmt(yearTo) },
  };
}

// 상대 변화율(%) — 광고비·클릭수처럼 값 자체를 비교할 때
function pctChangeChip(label, cur, prev) {
  if (prev == null) return `<span class="cmp">${esc(label)} 데이터 없음</span>`;
  if (prev === 0) {
    if (cur === 0) return `<span class="cmp">${esc(label)} -</span>`;
    return `<span class="cmp up">${esc(label)} 신규</span>`;
  }
  const pct = ((cur - prev) / prev) * 100;
  const cls = pct > 0.05 ? "up" : pct < -0.05 ? "down" : "";
  const arrow = pct > 0.05 ? "▲" : pct < -0.05 ? "▼" : "-";
  return `<span class="cmp ${cls}">${esc(label)} ${arrow}${Math.abs(pct).toFixed(1)}%</span>`;
}

// %p(퍼센트 포인트) 변화 — 전환율·광고수익률처럼 이미 %인 값을 비교할 때
function ppChangeChip(label, cur, prev, hasPrevData) {
  if (!hasPrevData) return `<span class="cmp">${esc(label)} 데이터 없음</span>`;
  const diff = cur - prev;
  const cls = diff > 0.05 ? "up" : diff < -0.05 ? "down" : "";
  const arrow = diff > 0.05 ? "▲" : diff < -0.05 ? "▼" : "-";
  return `<span class="cmp ${cls}">${esc(label)} ${arrow}${Math.abs(diff).toFixed(1)}%p</span>`;
}

async function fetchAdCompareTotals(store, dateFrom, dateTo) {
  try {
    const data = await callAdFn({ action: "summary", store, dateFrom, dateTo });
    const t = data.total || {};
    const impressions = Number(t.impressions) || 0;
    const clicks = Number(t.clicks) || 0;
    const cost = Number(t.cost) || 0;
    const purchaseConversions = Number(t.purchaseConversions) || 0;
    return {
      hasData: (data.items || []).length > 0 || cost > 0,
      cost, clicks, impressions,
      ctr: impressions ? clicks / impressions * 100 : 0,
      cpc: clicks ? cost / clicks : 0,
      purchaseConversions,
      purchaseSales: Number(t.purchaseSales) || 0,
      convRate: clicks ? purchaseConversions / clicks * 100 : 0,
      roas: Number(t.purchaseRoas) || (cost ? (Number(t.purchaseSales) || 0) / cost * 100 : 0),
      cpa: purchaseConversions ? cost / purchaseConversions : 0,
      // 표 안에서 캠페인별로 전월·전년 대비를 보여주려면 이 비교기간의 캠페인별 원본 행도 필요하다.
      items: (data.items || []).filter(row => !row.isTotal),
    };
  } catch (_) {
    return { hasData: false, cost: 0, clicks: 0, impressions: 0, ctr: 0, cpc: 0, purchaseConversions: 0, purchaseSales: 0, convRate: 0, roas: 0, cpa: 0, items: [] };
  }
}

async function fetchCoupangAdCompareTotals(dateFrom, dateTo) {
  try {
    const data = await callAdFn({ action: "coupangSummary", dateFrom, dateTo });
    const rows = data.items || [];
    if (!rows.length) return { hasData: false, cost: 0, clicks: 0, impressions: 0, ctr: 0, cpc: 0, purchaseConversions: 0, purchaseSales: 0, convRate: 0, roas: 0, cpa: 0, items: [] };
    const t = rows.reduce((acc, row) => {
      acc.cost += row.cost; acc.clicks += row.clicks; acc.orders += row.orders; acc.sales += row.sales;
      acc.impressions += row.impressions;
      return acc;
    }, { cost: 0, clicks: 0, orders: 0, sales: 0, impressions: 0 });
    return {
      hasData: true,
      cost: t.cost, clicks: t.clicks, impressions: t.impressions,
      ctr: t.impressions ? t.clicks / t.impressions * 100 : 0,
      cpc: t.clicks ? t.cost / t.clicks : 0,
      purchaseConversions: t.orders,
      purchaseSales: t.sales,
      convRate: t.clicks ? (t.orders / t.clicks) * 100 : 0,
      roas: t.cost ? (t.sales / t.cost) * 100 : 0,
      cpa: t.orders ? t.cost / t.orders : 0,
      // 표에서 광고그룹 이름으로 짝짓기 위해, 현재 기간 표(coupangAdGroups)와 똑같이 광고그룹
      // 단위로 합산해서 넘긴다. rows는 일자×광고그룹 원본이라 이름 필드(name)가 없어 그대로
      // 넘기면 adCompareRowFor의 이름 매칭이 항상 실패한다.
      items: groupCoupangAdRows(rows),
    };
  } catch (_) {
    return { hasData: false, cost: 0, clicks: 0, impressions: 0, ctr: 0, cpc: 0, purchaseConversions: 0, purchaseSales: 0, convRate: 0, roas: 0, cpa: 0, items: [] };
  }
}

async function fetchNaverSalesCompareTotals(dateFrom, dateTo) {
  try {
    const data = await callAdFn({ action: "naverStatSummary", dateFrom, dateTo });
    const daily = data.daily || [];
    // products/visitPaths/searchTerms는 급증·급감 TOP(대시보드 무버)이나 대시보드 파생 지표를
    // 비교기간 기준으로 다시 계산할 때 그대로 재사용한다.
    const products = data.products || [];
    const visitPaths = data.visitPaths || [];
    const searchTerms = data.searchTerms || [];
    if (!daily.length) return { hasData: false, salesNet: 0, salesTotal: 0, refundAmount: 0, payCount: 0, visits: 0, convRate: 0, avgOrder: 0, products, visitPaths, searchTerms };
    const t = daily.reduce((acc, row) => {
      acc.visits += row.visits;
      acc.payCount += row.payCount;
      acc.salesNet += row.salesNet;
      acc.salesTotal += row.salesTotal;
      acc.refundAmount += row.refundAmount;
      return acc;
    }, { visits: 0, payCount: 0, salesNet: 0, salesTotal: 0, refundAmount: 0 });
    return {
      hasData: true,
      salesNet: t.salesNet,
      salesTotal: t.salesTotal,
      refundAmount: t.refundAmount,
      payCount: t.payCount,
      visits: t.visits,
      convRate: t.visits ? (t.payCount / t.visits) * 100 : 0,
      avgOrder: t.payCount ? t.salesTotal / t.payCount : 0,
      products, visitPaths, searchTerms,
    };
  } catch (_) {
    return { hasData: false, salesNet: 0, salesTotal: 0, refundAmount: 0, payCount: 0, visits: 0, convRate: 0, avgOrder: 0, products: [], visitPaths: [], searchTerms: [] };
  }
}

let adCmpPeriod = "prev"; // "prev" | "year"
function setAdCmpPeriod(key) {
  if (adCmpPeriod === key) return;
  adCmpPeriod = key;
  renderAdsPanel();
}
function adCmpPeriodToggleHtml() {
  const opt = (key, label) => `<button type="button" class="mover-period-btn${adCmpPeriod === key ? " on" : ""}" onclick="setAdCmpPeriod('${key}')">${label}</button>`;
  return `<div class="mover-period-toggle">${opt("prev", "전월")}${opt("year", "전년")}</div>`;

// 지표 카드 하단에 붙일 비교 칩 2개(전기간 / 전년) 생성.
// type: "abs"(금액·건수 등 절대값 → 증감률 %) | "rate"(이미 %인 값 → %p 차이)
function metricCompareHtml(compare, key, cur, type = "abs") {
  if (!compare || compare.key !== currentAdLoadKey()) {
    return `<div class="metric-cmp"><span class="cmp">비교 데이터 불러오는 중...</span></div>`;
  }
  const line = (period, label) => {
    if (!period) return `<span class="cmp">${esc(label)} 확인 중...</span>`;
    if (!period.hasData) return `<span class="cmp">${esc(label)} 데이터 없음</span>`;
    return type === "rate" ? ppChangeChip(label, cur, period[key], true) : pctChangeChip(label, cur, period[key]);
  };
  return `<div class="metric-cmp">${line(compare.prev, "전월")}${line(compare.year, "전년")}</div>`;
}

function ensureNaverAdsLoaded() {
  if (activePlatform !== "naver" || activeSubtab.naver !== "ads" || adLoading || adCollecting) return;
  // adLoadKey = 마지막으로 조회를 "완료"한 키. 결과가 0건이어도 완료로 취급해야
  // 빈 기간에서 무한 재조회 루프에 빠지지 않는다.
  if (adLoadKey === currentAdLoadKey()) return;
  loadNaverAds();
}

async function callAdFn(payload) {
  const res = await fetch(AD_FN_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_ANON_KEY,
      "Authorization": "Bearer " + SUPABASE_ANON_KEY,
    },
    body: JSON.stringify(payload),
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok || data.error) throw new Error(data.error || "광고 함수 호출 실패");
  return data;
}

// 저장된 데이터만 읽는다 (네이버 API 호출 없음, 1~2초). 수집은 collectNaverAds()에서 별도로.
async function loadNaverAds() {
  const status = document.getElementById("adStatus");
  const dateFrom = document.getElementById("dateFrom").value;
  const dateTo = document.getElementById("dateTo").value;
  const store = DEFAULT_STORE;
  const loadKey = currentAdLoadKey();
  if (adLoading) return;
  adLoading = true; showLoading("저장된 광고 데이터를 불러오는 중...");
  adLoadKey = loadKey;
  status.className = "status";
  status.textContent = "저장된 광고 데이터를 불러오는 중...";
  renderAdsPanel();
  try {
    const data = await callAdFn({ action: "summary", store, dateFrom, dateTo });
    adRows = adRows.filter(row => !(row.platform === "naver" && row.loadKey === loadKey));
    adRows = adRows.concat([
      ...(data.total && (data.items || []).length ? [{ ...data.total, isTotal: true }] : []),
      ...(data.items || []),
    ].map(row => ({ ...row, platform: "naver", dateFrom, dateTo, loadKey, fetchedAt: new Date().toISOString() })));
    adMissingDates = data.missingDates || [];
    adStaleDates = data.staleDates || [];
    saveState();
    status.className = "status ok";
    const needDates = adMissingDates.length + adStaleDates.length;
    status.textContent = `네이버 광고 ${data.count || 0}개 캠페인 · 저장 데이터 기준`
      + (needDates ? ` · 수집 필요 ${needDates}일` : " · 최신 상태");
    adLoading = false; hideLoading();
    render();
    loadAdCompare(); // 비교기간(이전/1년 전)은 백그라운드로 읽어와 준비되는 대로 반영
  } catch (e) {
    adLoading = false; hideLoading();
    status.className = "status error";
    const message = String(e.message || e);
    status.textContent = message.includes("Failed to fetch")
      ? "광고 가져오기 실패: Supabase 함수 또는 네트워크 상태를 확인해 주세요."
      : "광고 가져오기 실패: " + message;
    renderAdsPanel();
  }
}

// 수집 버튼: 미수집/갱신 대상 날짜를 5일씩 나눠 remaining이 0이 될 때까지 반복 수집한다.
async function collectNaverAds() {
  if (adCollecting || adLoading) return;
  const status = document.getElementById("adStatus");
  const dateFrom = document.getElementById("dateFrom").value;
  const dateTo = document.getElementById("dateTo").value;
  const store = DEFAULT_STORE;
  adCollecting = true; showLoading("광고 데이터 수집 중...");
  adCollectProgress = { done: 0, remaining: adMissingDates.length + adStaleDates.length };
  status.className = "status";
  status.textContent = "광고 데이터 수집을 시작했습니다...";
  renderAdsPanel();
  try {
    let purchaseError = "";
    for (let i = 0; i < 40; i++) {
      const data = await callAdFn({ action: "collect", store, dateFrom, dateTo, maxDays: 5 });
      adCollectProgress.done += (data.collected || []).length;
      adCollectProgress.remaining = Number(data.remaining) || 0;
      if (data.purchaseError) purchaseError = data.purchaseError;
      setLoadingMessage(`광고 데이터 수집 중... (${num(adCollectProgress.done)}일 완료${adCollectProgress.remaining ? ` · ${num(adCollectProgress.remaining)}일 남음` : ""})`);
      renderAdsPanel();
      if (data.done || !(data.collected || []).length) break;
    }
    adCollecting = false; hideLoading();
    status.className = "status ok";
    status.textContent = `수집 완료 (${num(adCollectProgress.done)}일)`
      + (purchaseError ? ` · 일부 실패: ${purchaseError}` : "");
    adLoadKey = "";
    loadNaverAds();
  } catch (e) {
    adCollecting = false; hideLoading();
    status.className = "status error";
    status.textContent = "광고 수집 실패: " + String(e.message || e)
      + (adCollectProgress.done ? ` (${num(adCollectProgress.done)}일은 저장됨 — 다시 수집하면 이어서 진행됩니다)` : "");
    renderAdsPanel();
  }
}

// 기본값 = 이번 달(1일 ~ 오늘). "월별 바로가기"에서 이번 달 카드가 그대로 활성 표시된다.
function setDefaultDates() {
  const today = kstDate(0);
  const start = new Date(Date.UTC(today.getUTCFullYear(), today.getUTCMonth(), 1));
  setDateRange(formatDate(start), formatDate(today));
}

// 카테고리(스토어 분석/광고 분석) — 플랫폼과 무관한 전역 축이므로 두 플랫폼 모두 같은 값으로 맞춘다
document.getElementById("categoryTabs").addEventListener("click", e => {
  const tab = e.target.closest(".mode-title-tab");
  if (!tab) return;
  const next = tab.dataset.subtab;
  activeSubtab.naver = next;
  activeSubtab.coupang = next;
  document.getElementById("adStatus").textContent = "";
  mainNavActiveIdx = "all"; // 카드 구성 자체가 바뀌므로 종합분석으로 리셋
  render();
});

// 스토어(네이버/쿠팡) 드롭박스
document.getElementById("platformChips").addEventListener("click", e => {
  const toggle = e.target.closest('[data-action="toggle-platform-menu"]');
  if (toggle) {
    document.getElementById("platformChips").classList.toggle("open");
    return;
  }
  const chip = e.target.closest(".store-chip");
  if (!chip) return;
  activePlatform = chip.dataset.platform;
  document.getElementById("platformChips").classList.remove("open");
  document.getElementById("adStatus").textContent = "";
  mainNavActiveIdx = "all"; // 카드 구성 자체가 바뀌므로 종합분석으로 리셋
  render();
});

document.addEventListener("click", e => {
  const box = document.getElementById("platformChips");
  if (box && !box.contains(e.target)) box.classList.remove("open");
});

document.getElementById("mainPanel").addEventListener("click", e => {
  const toggleHead = e.target.closest("[data-toggle-card]");
  if (toggleHead && !e.target.closest(".content-tools")) {
    const key = toggleHead.dataset.toggleCard;
    coupangCardOpen[key] = !cardOpenState(key);
    saveCoupangCardOpen();
    renderSalesPanel();
    return;
  }
  if (e.target.closest(".ad-collect-btn")) {
    collectNaverAds();
    return;
  }
  const placementBtn = e.target.closest(".coupang-placement-btn");
  if (placementBtn) {
    coupangPlacement = placementBtn.dataset.placement || "";
    render();
    return;
  }
  // 일별/상품별 데이터 테이블 헤더 클릭 — 처음 클릭하면 항상 내림차순부터 시작하고, 같은 칼럼을
  // 다시 클릭하면 오름차순/내림차순을 토글한다(dataTableTh 참고).
  const dataTh = e.target.closest("th[data-sort-key]");
  if (dataTh) {
    const key = dataTh.dataset.sortKey;
    const sortStateByTable = {
      daily: salesDailySort, product: productDataSort,
      coupangDaily: coupangDailySort, coupangItem: coupangItemSort,
    };
    const sortState = sortStateByTable[dataTh.dataset.table] || salesDailySort;
    if (sortState.key === key) sortState.dir = sortState.dir === "asc" ? "desc" : "asc";
    else { sortState.key = key; sortState.dir = "desc"; }
    renderSalesPanel();
    return;
  }
  const th = e.target.closest("th[data-sort]");
  if (!th) return;
  const key = th.dataset.sort;
  if (adSort.key === key) adSort.dir = adSort.dir === "asc" ? "desc" : "asc";
  else adSort = { key, dir: "desc" };
  renderAdsPanel();
});

setDefaultDates();
render();
