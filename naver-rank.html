<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>키워드 분석 — 에너가드컴퍼니</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css?v=20260714-logo2">
<style>
  :root {
    --bg: #f8f9fb; --card: #fff; --ink: #1a1f2e; --sub: #5a6378;
    --line: #e8ecf2; --dark: #05070b; --dark-tint: #eef0f3;
    --accent: #e85d2f; --accent-dark: #d04420; --accent-tint: #fdeee7;
    --gray-badge: #eef0f3; --danger: #dc2626;
    --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    --font-main: "Pretendard Variable", Pretendard, -apple-system, sans-serif;
    --radius: 6px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font-main);
    background: var(--bg); color: var(--ink); font-size: 15px; line-height: 1.55;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 64px 0 80px; }
  .wrap > header { display: flex; align-items: flex-end; gap: 0; margin-bottom: 30px; }
  .mode-title-tabs { display: inline-flex; align-items: center; gap: 28px; }
  .mode-title-tab {
    position: relative; height: 34px; padding: 0 0 8px; border: 0; background: transparent;
    color: #07111f; font-family: inherit; font-size: 21px; font-weight: 900; cursor: default;
  }
  .mode-title-text { display: inline-flex; align-items: center; gap: 12px; }
  .mode-label { position: relative; display: inline-flex; align-items: center; }
  .mode-title-tab.active .mode-label::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: -10px; height: 3px;
    background: var(--accent); border-radius: 999px;
  }
  .mode-help {
    width: 18px; height: 18px; border: 1px solid #cfd5df; border-radius: 50%;
    background: #f4f6f9; color: #8a93a5; font-size: 12px; font-weight: 900;
    display: inline-flex; align-items: center; justify-content: center; line-height: 1;
  }

  .card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 20px; }
  .card + .card { margin-top: 16px; }

  .keyword-result-banner {
    display: none;
    margin-top: 24px;
  }
  .keyword-result-chip {
    width: 100%;
    min-height: 64px;
    padding: 11px 18px;
    border: 1px solid var(--ink);
    border-radius: var(--radius);
    background: var(--ink);
    color: #fff;
    font-family: inherit;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    text-align: center;
  }
  .keyword-result-name {
    font-size: 15px;
    font-weight: 900;
    line-height: 1.2;
  }
  .keyword-result-meta {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11.5px;
    font-weight: 700;
    opacity: .72;
    line-height: 1.2;
  }
  .keyword-result-sep { opacity: .72; }

  .keyword-filterbar {
    display: flex; align-items: center; gap: 12px; padding-bottom: 22px;
    border-bottom: 1px solid var(--line);
  }
  .keyword-store-row { display: inline-flex; align-items: center; gap: 8px; }
  .store-chips { position: relative; display: block; flex: 0 0 auto; }
  .store-select {
    height: 42px; min-width: 190px; padding: 0 14px 0 18px; border: 1px solid #dfe4ec;
    border-radius: var(--radius); background: #fff; color: var(--sub); font-family: inherit;
    font-size: 14px; font-weight: 800; cursor: pointer; display: inline-flex;
    align-items: center; justify-content: space-between; gap: 18px;
  }
  .store-select:hover, .store-chips.open .store-select { border-color: #c8cdd4; background: #fafbfc; }
  .store-caret { display: inline-flex; align-items: center; justify-content: center; color: #8a93a5; line-height: 1; }
  .store-caret svg { width: 14px; height: 14px; }
  .store-menu {
    position: absolute; z-index: 50; top: calc(100% + 6px); left: 0; min-width: 100%;
    padding: 6px; border: 1px solid var(--line); border-radius: var(--radius);
    background: #fff; box-shadow: 0 16px 34px rgba(5, 7, 11, 0.12); display: none;
  }
  .store-chips.open .store-menu { display: flex; flex-direction: column; gap: 4px; }
  .store-option {
    height: 34px; padding: 0 12px; border: 0; border-radius: 4px; background: transparent;
    color: var(--sub); font-family: inherit; font-size: 12.5px; font-weight: 800; text-align: left; cursor: pointer;
    display: flex; align-items: center; gap: 8px;
  }
  .store-option:hover { background: #f4f6f9; color: var(--ink); }
  .store-option.active { background: var(--ink); color: #fff; }
  .store-option-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .store-option-remove { opacity: .6; font-weight: 900; }
  .store-option-remove:hover { opacity: 1; }
  .store-add-icon {
    width: 42px; height: 42px; border: 1px solid #07111f; border-radius: var(--radius);
    background: #07111f; color: #fff; display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all .12s;
  }
  .store-add-icon:hover { border-color: #111827; color: #fff; background: #111827; }
  .store-add-icon svg { width: 16px; height: 16px; }
  .keyword-search-panel { margin-top: 24px; }

  /* 검색 폼 */
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 15px; font-weight: 800; margin-bottom: 6px; }
  /* 트렌드 카테고리 배너와 동일한 폭이 되도록, 실제 스토어 수와 무관하게 항상 9칸 그리드로 고정.
     채워지지 않은 칸은 요소 자체가 없으니 그냥 빈 공간으로 남는다(=비활성 배너는 보이지 않음). */
  .chips { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 8px; }
  .chip {
    padding: 7px 10px; border: 1.5px solid var(--line); border-radius: 4px;
    background: #fff; font-size: 13px; font-weight: 600; cursor: pointer;
    color: var(--sub); text-align: center; white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; transition: all .12s; font-family: inherit; position: relative;
  }
  .chip:hover { border-color: #c8cdd4; }
  .chip.active { border-color: var(--dark); color: #fff; background: var(--dark); }
  .chip-add { color: var(--accent); border-style: dashed; }
  .chip-add:hover { border-color: var(--accent); background: var(--accent-tint); }
  .chip-remove {
    display: inline-block; margin-left: 6px; font-weight: 800; color: inherit;
    opacity: .6;
  }
  .chip-remove:hover { opacity: 1; }
  .form-row {
    display: flex; align-items: center; gap: 10px;
    background: #fff; border: 1.5px solid var(--line); border-radius: 8px;
    padding: 8px 8px 8px 20px; box-shadow: 0 4px 16px rgba(5, 7, 11, 0.06);
  }
  .form-row:focus-within { border-color: var(--dark); }
  .form-row svg { flex-shrink: 0; color: var(--sub); }
  input#keyword {
    flex: 1; border: none; outline: none; padding: 10px 0;
    font-size: 16px; font-family: inherit; color: var(--ink); min-width: 0;
  }
  input#keyword::placeholder { color: #b8bdc7; font-weight: 700; }
  select#range {
    border: none; border-left: 1px solid var(--line); background: transparent;
    padding: 10px 12px; font-size: 14px; font-family: inherit; color: var(--sub); cursor: pointer;
  }
  button#searchBtn {
    padding: 12px 28px; border: none; border-radius: 6px;
    background: var(--accent); color: #fff; font-size: 15px; font-weight: 700;
    font-family: inherit; cursor: pointer; white-space: nowrap; transition: background .15s;
  }
  button#searchBtn:hover { background: var(--accent-dark); }
  button#searchBtn:disabled { background: #f0b8a1; cursor: wait; }

  /* 키워드 일괄 수집 (기본 접힘) */
  #batchCard { padding: 0; margin-top: 24px; }
  .batch-head { display: flex; align-items: center; gap: 10px; padding: 13px 18px; cursor: pointer; user-select: none; }
  .batch-head:hover { background: #fafbfd; }
  .batch-title { font-size: 15px; font-weight: 800; }
  .batch-store-label { font-size: 12px; font-weight: 400; color: var(--sub); }
  .batch-caret { margin-left: auto; display: flex; align-items: center; color: var(--sub); transition: transform .15s; flex-shrink: 0; }
  .batch-caret svg { width: 11px; height: 11px; }
  #batchCard.open .batch-caret { transform: rotate(180deg); }
  .batch-body { display: none; border-top: 1px solid var(--line); padding: 16px 18px; }
  #batchCard.open .batch-body { display: block; }

  /* 내 스토어(.chip)와 동일한 배지 형태 · 가상 7칸 그리드로 폭/높이 통일 */
  .batch-utils { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 6px; margin-bottom: 10px; }
  .batch-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 6px; }
  .batch-grid + .batch-grid { margin-top: 6px; }
  .batch-divider {
    display: flex; align-items: center; gap: 10px; margin: 13px 0 9px;
    color: var(--sub); font-size: 12px; font-weight: 800;
  }
  .batch-divider::before,
  .batch-divider::after {
    content: ""; height: 1px; background: var(--line); flex: 1;
  }
  .batch-banner {
    padding: 7px 10px; border: 1.5px solid var(--line); border-radius: 4px;
    background: #fff; font-size: 13px; font-weight: 600; color: var(--sub); cursor: pointer;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center;
    transition: all .12s; font-family: inherit; position: relative;
  }
  .batch-banner:hover { border-color: #c8cdd4; }
  .batch-banner.main { font-weight: 700; color: var(--ink); }
  .batch-banner.sub { font-weight: 500; color: var(--sub); }
  .batch-banner.active { border-color: var(--dark); color: #fff; background: var(--dark); }
  .batch-banner.util { color: var(--accent); border-style: dashed; }
  .batch-banner.util:hover { border-color: var(--accent); background: var(--accent-tint); }
  .batch-utils .batch-banner.util {
    height: 42px; padding: 0 12px; border-radius: 6px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 800;
  }
  .batch-banner-remove {
    display: inline-block; margin-left: 6px; font-weight: 800; color: inherit; opacity: .6;
  }
  .batch-banner-remove:hover { opacity: 1; }

  .batch-run-wrap { display: none; margin-top: 14px; text-align: center; }
  #batchRunBtn {
    height: 42px; padding: 0 28px; border: none; border-radius: 6px;
    background: var(--accent); color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
    font-family: inherit; transition: background .15s;
  }
  #batchRunBtn:hover { background: var(--accent-dark); }
  #batchRunBtn:disabled { background: #f0b8a1; cursor: wait; }
  .batch-status { margin-top: 10px; font-size: 13px; color: var(--sub); }
  .batch-status b { color: var(--ink); font-family: var(--font-mono); }
  .batch-list { margin-top: 8px; max-height: 220px; overflow-y: auto; }
  .batch-item {
    display: flex; align-items: center; gap: 10px; padding: 6px 2px;
    font-size: 12.5px; border-bottom: 1px solid #f4f5f7;
  }
  .batch-item:last-child { border-bottom: none; }
  .batch-item .kw { flex: 1; color: var(--ink); font-weight: 600; }
  .batch-item .kw.sub { padding-left: 14px; font-weight: 500; color: var(--sub); }
  .batch-item .rk { font-family: var(--font-mono); font-weight: 800; color: var(--sub); }
  .batch-item .rk.good { color: var(--accent-dark); }
  .batch-item .rk.none { color: var(--danger); font-weight: 600; }

  /* 인사이트 카드 */
  #insight {
    display: none;
    margin-top: 24px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px 18px 14px;
    box-shadow: 0 14px 34px rgba(5, 7, 11, 0.05);
  }
  .ins-meta { margin-bottom: 8px; font-size: 12px; font-weight: 600; color: var(--sub); }
  .ins-meta b { color: var(--ink); font-weight: 800; background: var(--dark-tint); padding: 2px 8px; border-radius: 10px; margin-left: 4px; }
  .ins-grid {
    display: grid; grid-template-columns: repeat(6, minmax(0, 1fr));
    gap: 8px;
  }
  .ins-card {
    min-width: 0;
    background: transparent;
    border: 0;
    border-radius: 0;
    padding: 4px 2px;
  }
  .ins-card + .ins-card { border-left: 1px solid var(--line); padding-left: 14px; }
  .ins-label { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 800; color: #8a93a5; margin-bottom: 2px; white-space: nowrap; }
  .ins-value { margin-top: 2px; font-size: 21px; font-weight: 800; color: var(--ink); font-variant-numeric: tabular-nums; letter-spacing: -0.01em; white-space: nowrap; }
  .ins-value small { margin-left: 4px; font-size: 11.5px; font-weight: 700; color: var(--sub); }
  /* 근거 노트 — 타이틀 옆 물음표 아이콘에 마우스를 올리면 툴팁으로 표시 */
  .ins-info {
    position: relative;
    width: 14px; height: 14px; flex-shrink: 0;
    display: inline-flex; align-items: center; justify-content: center;
    border: 1px solid #cfd5df; border-radius: 50%;
    background: #f4f6f9; color: #8a93a5;
    font-size: 9.5px; font-weight: 900; cursor: default; line-height: 1;
  }
  .ins-tip {
    position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(3px);
    z-index: 30; width: max-content; max-width: 230px;
    padding: 8px 11px; border-radius: 6px;
    background: #161a22; color: #fff;
    font-size: 11.5px; font-weight: 600; line-height: 1.5; text-align: left; white-space: normal;
    opacity: 0; visibility: hidden; transition: all .12s; pointer-events: none;
  }
  .ins-info:hover .ins-tip { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
  @media (max-width: 900px) {
    .ins-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .ins-card:nth-child(4) { border-left: 0; padding-left: 2px; }
  }
  /* 검색량 추세 카드 — 증감 색은 다른 페이지 증감 표기와 동일 */
  .trend-up { color: #16a34a; }
  .trend-down { color: var(--danger); }
  .trend-flat { color: var(--sub); }
  /* 전월/전년 비교 칩 — 매출분석 대시보드(.metric-cmp .cmp)와 동일한 스타일 (한 줄 고정) */
  .metric-cmp { display: flex; gap: 6px; margin-top: 8px; flex-wrap: nowrap; }
  .metric-cmp .cmp {
    display: inline-flex; align-items: center; gap: 2px; font-size: 10.5px; font-weight: 800;
    padding: 1px 6px; border-radius: 8px; background: var(--dark-tint); color: var(--sub); white-space: nowrap;
  }
  .metric-cmp .cmp.up { color: #16a34a; background: #e7f6ec; }
  .metric-cmp .cmp.down { color: var(--danger); background: #fdecec; }
  .ins-warn { margin-top: 8px; font-size: 12px; color: var(--accent); }

  /* 섹션 카드 공통 */
  .sec { display: none; margin-top: 24px; background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; }
  .sec-head { display: flex; align-items: center; gap: 10px; padding: 13px 18px; cursor: pointer; user-select: none; }
  .sec-title { font-size: 15px; font-weight: 800; }
  .sec-caret { margin-left: auto; display: flex; align-items: center; color: var(--sub); transition: transform .15s; flex-shrink: 0; }
  .sec-caret svg { width: 11px; height: 11px; }
  .sec.open .sec-caret { transform: rotate(180deg); }
  .sec-body { display: none; border-top: 1px solid var(--line); }
  .sec.open .sec-body { display: block; }

  /* 내 스토어 순위 행 */
  .row { display: flex; align-items: center; gap: 14px; padding: 12px 18px; border-bottom: 1px solid var(--line); }
  .row:last-child { border-bottom: none; }
  .rank-badge {
    min-width: 64px; text-align: center; padding: 6px 4px; border-radius: 4px;
    font-weight: 800; font-size: 15px; font-family: var(--font-mono); font-variant-numeric: tabular-nums;
    background: var(--gray-badge); color: var(--sub);
  }
  .rank-badge small { display: block; font-family: var(--font-main); font-size: 10.5px; font-weight: 600; margin-top: 1px; }
  .rank-badge.p1 { background: var(--accent-tint); color: var(--accent-dark); }
  .rank-badge.p23 { background: var(--dark-tint); color: var(--ink); }
  .row img { width: 44px; height: 44px; border-radius: 4px; object-fit: cover; border: 1px solid var(--line); }
  .row .info { min-width: 0; flex: 1; }
  .row .title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row .title a { color: inherit; text-decoration: none; }
  .row .title a:hover { text-decoration: underline; }
  .row .subtxt { font-size: 12.5px; color: var(--sub); font-variant-numeric: tabular-nums; }
  .empty-row { padding: 16px 18px; font-size: 13.5px; color: var(--danger); }

  /* TOP10 */
  .top-row { display: flex; align-items: center; gap: 12px; padding: 10px 18px; border-bottom: 1px solid #f4f5f7; font-size: 13px; }
  .top-row:last-child { border-bottom: none; }
  .top-row.mine { background: var(--accent-tint); }
  .top-rank { min-width: 34px; text-align: center; font-weight: 800; font-family: var(--font-mono); color: var(--sub); background: var(--gray-badge); border-radius: 4px; padding: 4px 0; font-size: 12.5px; }
  .top-row.mine .top-rank { background: #f8d3bd; color: var(--accent-dark); }
  .top-row img { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; border: 1px solid var(--line); }
  .top-mall { min-width: 105px; font-weight: 700; color: var(--ink); font-size: 12.5px; }
  .top-mall .star { color: var(--accent); font-size: 11px; }
  .top-title { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--sub); }
  .top-title a { color: inherit; text-decoration: none; }
  .top-title a:hover { text-decoration: underline; }
  .top-price { color: var(--accent); font-weight: 700; white-space: nowrap; font-size: 12.5px; font-family: var(--font-mono); }

  /* 아이템 추적 등록 버튼 (내 스토어 순위 · TOP10 공용) */
  .track-btn {
    position: relative;
    width: 30px; height: 30px; flex-shrink: 0;
    border: 1px solid var(--line); border-radius: 50%;
    background: #fff; color: #9aa3b3;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all .14s;
  }
  .track-btn:hover { border-color: #d7dde7; color: var(--ink); background: #fafbfc; }
  .track-btn.added { border-color: #f0b79d; background: var(--accent-tint); color: var(--accent-dark); box-shadow: none; }
  .track-btn.added:hover { border-color: #d7dde7; background: #fafbfc; color: var(--ink); }
  .track-btn svg { width: 15px; height: 15px; }
  .track-tip {
    position: absolute; left: 50%; bottom: calc(100% + 8px); transform: translateX(-50%) translateY(3px);
    z-index: 40; padding: 5px 8px; border-radius: 5px; background: #161a22; color: #fff;
    font-size: 11px; font-weight: 700; line-height: 1; white-space: nowrap;
    opacity: 0; visibility: hidden; transition: all .12s; pointer-events: none;
  }
  .track-tip::after {
    content: ""; position: absolute; left: 50%; top: 100%; transform: translateX(-50%);
    border: 4px solid transparent; border-top-color: #161a22;
  }
  .track-btn:hover .track-tip { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }

  /* 섹션 바로가기 탭 — 스크롤해도 상단에 고정 (sticky 상단바 73px 바로 아래에 붙는다) */
  .sec-nav {
    position: sticky; top: 73px; z-index: 40;
    display: flex; align-items: center; justify-content: center; gap: 28px;
    margin: 64px 0 20px; padding: 0 12px;
    background: var(--bg);
  }
  .sec-nav-btn {
    padding: 10px 0 12px; border: 0; border-radius: 0;
    background: transparent; color: #b8bdc7;
    font-family: inherit; font-size: 19px; font-weight: 700; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    transition: color .15s, border-color .15s;
  }
  .sec-nav-btn:hover { color: var(--ink); }
  .sec-nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  /* 고정 상단바(73px) + 탭 높이만큼 앵커 이동 시 여백 확보 */
  #insight, .sec { scroll-margin-top: 132px; }

  /* 검색량 추이 차트 */
  .vol-chart-wrap { position: relative; padding: 14px 16px 8px; }
  .vol-chart-wrap svg { display: block; width: 100%; height: auto; }
  .vol-tip {
    position: absolute; top: 6px; transform: translateX(-50%);
    padding: 5px 10px; border-radius: 6px;
    background: #161a22; color: #fff;
    font-size: 12px; font-weight: 700; font-family: var(--font-mono);
    white-space: nowrap; pointer-events: none; z-index: 10;
  }

  /* 분석 로딩 (매출분석과 동일한 스피너 스타일) */
  .search-loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 40px 20px 46px;
    color: var(--sub);
    text-align: center;
  }
  .search-loading strong { color: var(--ink); font-size: 14px; font-weight: 900; }
  .search-loading span { font-size: 12px; }
  .spinner {
    width: 36px;
    height: 36px;
    border: 4px solid var(--dark-tint);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 연관 키워드 */
  .rel-table { width: 100%; border-collapse: separate; border-spacing: 0 8px; padding: 0 10px 10px; }
  .rel-table .rel-extra { display: none; }
  .rel-table.rel-expanded .rel-extra { display: table-row; }
  .rel-more-btn {
    display: block; width: 100%; padding: 11px 0;
    border: 0; border-top: 1px solid var(--line);
    background: #fafbfc; color: var(--sub);
    font-family: inherit; font-size: 12.5px; font-weight: 800; cursor: pointer;
    transition: all .12s;
  }
  .rel-more-btn:hover { color: var(--accent-dark); background: #fffaf7; }
  .rel-table th, .rel-table td {
    padding: 9px 18px;
    text-align: center;
    vertical-align: middle;
    font-size: 13px;
    border-bottom: 1px solid #f4f5f7;
  }
  .rel-table th {
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    background: #fafbfc;
    font-size: 11.5px;
    color: #8a93a5;
    font-weight: 800;
    letter-spacing: 0;
  }
  .rel-table th:first-child {
    border-left: 1px solid var(--line);
    border-radius: var(--radius) 0 0 var(--radius);
  }
  .rel-table th:last-child {
    border-right: 1px solid var(--line);
    border-radius: 0 var(--radius) var(--radius) 0;
  }
  .rel-table tbody tr { background: #fff; }
  .rel-table tr:last-child td { border-bottom: none; }
  .rel-table td.num { font-variant-numeric: tabular-nums; font-family: var(--font-mono); color: var(--ink); }
  .rel-kw { font-weight: 700; color: var(--accent); cursor: pointer; }
  .rel-kw:hover { text-decoration: underline; }
  .comp-badge { font-size: 10.5px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
  .comp-낮음 { background: var(--accent-tint); color: var(--accent-dark); }
  .comp-중간 { background: var(--dark-tint); color: var(--ink); }
  .comp-높음 { background: #fdecec; color: var(--danger); }

  /* 판매자 점유율 */
  .sel-row { display: flex; align-items: center; gap: 12px; padding: 9px 18px; border-bottom: 1px solid #f4f5f7; font-size: 13px; }
  .sel-row:last-child { border-bottom: none; }
  .sel-row.mine { background: var(--accent-tint); }
  .sel-rank { min-width: 26px; text-align: center; font-family: var(--font-mono); font-weight: 700; font-size: 12px; color: var(--sub); background: var(--gray-badge); border-radius: 4px; padding: 3px 0; }
  .sel-row.mine .sel-rank { background: var(--accent); color: #fff; }
  .sel-mall { min-width: 130px; font-weight: 700; }
  .sel-mall .star { color: var(--accent); font-size: 11px; }
  .sel-mall a { color: inherit; text-decoration: none; }
  .sel-mall a:hover { color: var(--accent); text-decoration: underline; }
  .sel-bar-wrap { flex: 1; height: 8px; background: var(--gray-badge); border-radius: 4px; overflow: hidden; }
  .sel-bar { height: 100%; background: var(--dark); border-radius: 4px; }
  .sel-row.mine .sel-bar { background: var(--accent); }
  .sel-share { min-width: 96px; font-family: var(--font-mono); font-size: 12px; color: var(--ink); text-align: right; white-space: nowrap; }
  .sel-share b { color: var(--accent); }
  .sel-detail { min-width: 150px; font-size: 11.5px; color: var(--sub); text-align: right; font-variant-numeric: tabular-nums; }

  /* 경쟁강도 배지 */
  .cr-badge { font-size: 10.5px; font-weight: 700; padding: 2px 8px; border-radius: 10px; font-family: var(--font-mono); }
  .cr-low  { background: #e7f6ec; color: #16a34a; }
  .cr-mid  { background: #fdf3e0; color: #b45309; }
  .cr-high { background: #fdecec; color: var(--danger); }

  /* 경쟁지수 (0~100 게이지) */
  .comp-score { display: inline-flex; align-items: center; gap: 7px; cursor: default; }
  .comp-score .comp-gauge {
    width: 48px; height: 6px; border-radius: 3px;
    background: var(--gray-badge); overflow: hidden; display: inline-block;
  }
  .comp-score .comp-gauge span { display: block; height: 100%; border-radius: 3px; }
  .comp-score b { min-width: 24px; text-align: right; font-family: var(--font-mono); font-size: 12px; font-weight: 800; }
  .comp-score.c0 b { color: #16a34a; } .comp-score.c0 .comp-gauge span { background: #16a34a; }
  .comp-score.c1 b { color: #65a30d; } .comp-score.c1 .comp-gauge span { background: #84cc16; }
  .comp-score.c2 b { color: #b45309; } .comp-score.c2 .comp-gauge span { background: #eab308; }
  .comp-score.c3 b { color: #ea580c; } .comp-score.c3 .comp-gauge span { background: #f97316; }
  .comp-score.c4 b { color: var(--danger); } .comp-score.c4 .comp-gauge span { background: var(--danger); }
  .niche-badge { font-size: 10px; font-weight: 800; color: #16a34a; background: #e7f6ec; padding: 1px 7px; border-radius: 10px; margin-left: 6px; }

  /* 인기 쇼핑 키워드 위젯 (삭제 아님 — 임시로 숨김 처리) */
  #trendWidget { display: none; margin-top: 24px; background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; }
  .tr-head { display: flex; align-items: center; gap: 10px; padding: 13px 18px; cursor: pointer; user-select: none; }
  .tr-head:hover { background: #fafbfd; }
  .tr-title { font-size: 15px; font-weight: 800; }
  .tr-meta { font-size: 12px; color: var(--sub); }
  .tr-caret { margin-left: auto; display: flex; align-items: center; color: var(--sub); transition: transform .15s; flex-shrink: 0; }
  .tr-caret svg { width: 11px; height: 11px; }
  #trendWidget.open .tr-caret { transform: rotate(180deg); }
  .tr-body { display: none; border-top: 1px solid var(--line); }
  #trendWidget.open .tr-body { display: block; }
  .tr-controls { display: flex; flex-direction: column; gap: 10px; padding: 12px 18px; border-bottom: 1px solid var(--line); }
  .tr-cats { display: flex; gap: 8px; }
  .tr-cat {
    flex: 1; padding: 7px 10px; border: 1.5px solid var(--line); border-radius: 4px;
    background: #fff; font-size: 13px; font-weight: 600; color: var(--sub); cursor: pointer;
    white-space: nowrap; text-align: center; transition: all .15s;
  }
  .tr-cat:hover { border-color: #c8cdd4; color: var(--ink); }
  .tr-cat.active { border-color: var(--dark); background: var(--dark); color: #fff; }
  .tr-units { align-self: flex-end; display: flex; gap: 2px; background: var(--gray-badge); border-radius: 4px; padding: 2px; }
  .tr-unit { padding: 4px 12px; border: none; border-radius: 3px; background: transparent; font-size: 12px; font-weight: 700; color: var(--sub); cursor: pointer; }
  .tr-unit.active { background: #fff; color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,.08); }
  .tr-list { column-count: 2; column-gap: 0; padding: 8px 0; }
  .tr-row { display: flex; align-items: center; gap: 10px; padding: 7px 18px; break-inside: avoid; font-size: 13px; }
  .tr-rank { min-width: 26px; text-align: center; font-family: var(--font-mono); font-weight: 700; font-size: 12px; color: var(--sub); background: var(--gray-badge); border-radius: 4px; padding: 2px 0; }
  .tr-kw { font-weight: 700; color: var(--ink); cursor: pointer; }
  .tr-kw:hover { color: var(--accent); text-decoration: underline; }
  .tr-chg { font-size: 11.5px; font-weight: 700; font-family: var(--font-mono); }
  .tr-chg.up { color: #16a34a; }
  .tr-chg.down { color: var(--danger); }
  .tr-chg.same { color: #c3c9d4; }
  .tr-chg.new { color: var(--accent); } /* 아이템발굴(.tr-delta.new)과 동일 — 배경 없는 주황 텍스트 */
  .tr-status { padding: 16px 18px; font-size: 12.5px; color: var(--sub); }
  @media (max-width: 600px) { .tr-list { column-count: 1; } }

  @media (max-width: 560px) { .row img, .top-row img { display: none; } }

</style>

  return window.nrSaveAnalysis({
    keyword,
    store,
    data,
    summary: {
      volume: data.ad?.monthlyTotal ?? null,
      products: data.stats?.totalProducts ?? null,
      compScore: data.ad?.compRatio != null ? compScore(data.ad.compRatio) : null,
      bestRank: ranks.length ? Math.min(...ranks) : null,
    },
  });
}

/* ── 섹션 탭 (스크롤 이동 없이 해당 섹션만 바로 표시) ──
   "종합분석"은 전체 섹션을 쌓아 보여주는 기존 화면, 나머지 탭은 그 섹션 하나만 탭 아래에 보여준다.
   데이터 유무(dataset.avail)와 탭 선택에 따른 표시를 분리해서 관리 —
   검색량 추이처럼 비동기로 늦게 뜨는 섹션도 현재 탭 상태를 존중한다. */
const TAB_SECS = ["secVolTrend", "secRel", "secStore", "secTop", "secSellers"];
let currentSecTab = "insight";

// render() 직후(탭 필터가 걸리기 전 순수한 상태)에 호출해 데이터 유무를 기록
function markSecAvail() {
  TAB_SECS.forEach(id => {
    const el = document.getElementById(id);
    el.dataset.avail = el.style.display !== "none" ? "1" : "";
  });
}

function applySecTab(tabId) {
  currentSecTab = tabId;
  TAB_SECS.forEach(id => {
    const el = document.getElementById(id);
    const avail = el.dataset.avail === "1";
    el.style.display = avail && (tabId === "insight" || tabId === id) ? "block" : "none";
    if (avail && tabId === id) el.classList.add("open");
  });
  document.querySelectorAll(".sec-nav-btn").forEach(b => {
    const target = b.dataset.target;
    const avail = target === "insight" || document.getElementById(target).dataset.avail === "1";
    b.style.display = avail ? "" : "none";
    b.classList.toggle("active", target === tabId);
  });
}

document.getElementById("secNav").addEventListener("click", (e) => {

/* 검색량 추세: 월별 스냅샷(keyword_search_volume_monthly)에서 전월·전년 동월과 비교.
   서버가 keyword를 공백 제거+소문자로 저장하므로 같은 규칙으로 조회한다.
   상태(상승세/유지/하락세)는 전월 대비 ±5% 기준, 칩은 매출분석 대시보드와 같은 형식. */
async function loadVolumeTrend(keyword) {
  const valueEl = document.getElementById("volTrendValue");
  const noteEl = document.getElementById("volTrendNote");
  const chipsEl = document.getElementById("volTrendChips");
  if (!valueEl) return;
  try {
    const key = String(keyword).replace(/\s+/g, "").toLowerCase();
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/keyword_search_volume_monthly?keyword=eq.${encodeURIComponent(key)}&select=snapshot_month,total&order=snapshot_month.desc&limit=60`,
      { headers: { "apikey": SUPABASE_ANON_KEY, "Authorization": "Bearer " + SUPABASE_ANON_KEY } },
    );
    const rows = res.ok ? await res.json() : [];
    renderVolumeChart([...rows].reverse()); // 차트는 과거 → 최신 순
    if (!rows.length) {
      valueEl.textContent = "-";
      noteEl.textContent = "수집된 검색량 스냅샷 없음";
      return;
    }
    const cur = rows[0];
    const [y, m] = cur.snapshot_month.split("-").map(Number);
    const monthKey = (yy, mm) => `${yy}-${String(mm).padStart(2, "0")}`;
    const byMonth = new Map(rows.map(r => [r.snapshot_month, r]));
    const prevMonth = byMonth.get(m === 1 ? monthKey(y - 1, 12) : monthKey(y, m - 1)) || null;
    const prevYear = byMonth.get(monthKey(y - 1, m)) || null;

    // 상태: 전월 대비 ±5% 기준
    if (prevMonth && prevMonth.total > 0) {
      const pct = (cur.total - prevMonth.total) / prevMonth.total * 100;
      if (pct > 5) valueEl.innerHTML = `<span class="trend-up">상승세</span>`;
      else if (pct < -5) valueEl.innerHTML = `<span class="trend-down">하락세</span>`;
      else valueEl.innerHTML = `<span class="trend-flat">유지</span>`;
    } else {
      valueEl.textContent = "-";
    }

    // 전월/전년 비교 칩 — 매출분석의 pctChangeChip과 동일한 표기
    const volChip = (label, prev) => {
      if (!prev || !(prev.total > 0)) return `<span class="cmp">${label} 데이터 없음</span>`;
      const pct = (cur.total - prev.total) / prev.total * 100;
      const cls = pct > 0.05 ? "up" : pct < -0.05 ? "down" : "";
      const arrow = pct > 0.05 ? "▲" : pct < -0.05 ? "▼" : "-";
      return `<span class="cmp ${cls}">${label} ${arrow}${Math.abs(pct).toFixed(1)}%</span>`;
    };
    if (chipsEl) chipsEl.innerHTML = volChip("전월", prevMonth) + volChip("전년", prevYear);

    const fmt = r => r ? `${r.snapshot_month} ${Number(r.total).toLocaleString()}` : "없음";
    noteEl.textContent = `기준 ${fmt(cur)} · 전월 ${fmt(prevMonth)} · 전년 동월 ${fmt(prevYear)}`;
  } catch (_) {
    valueEl.textContent = "-";
    noteEl.textContent = "추세 조회 실패";
  }
}

/* ── 검색량 추이 라인 차트 (월별 스냅샷, SVG 직접 그리기) ── */
function niceCeil(v) {
  if (v <= 0) return 1;
  const pow = Math.pow(10, Math.floor(Math.log10(v)));
  for (const m of [1, 2, 2.5, 5, 10]) {
    if (v <= m * pow) return m * pow;
  }
  return 10 * pow;
}

let volChartData = null;

function renderVolumeChart(rowsAsc) {
  const sec = document.getElementById("secVolTrend");
  const body = document.getElementById("volChartBody");
  if (!sec || !body) return;
  const raw = (rowsAsc || []).map(r => ({ month: r.snapshot_month, total: Number(r.total) || 0 }));
  if (raw.length < 2) { sec.style.display = "none"; sec.dataset.avail = ""; applySecTab(currentSecTab); return; }

  // 빠진 달을 0으로 채워 연속된 월 시퀀스로 만든다 — missing 플래그로 빗살 표시 구간을 기억
  const byMonth = new Map(raw.map(d => [d.month, d]));
  const data = [];
  let [cy, cm] = raw[0].month.split("-").map(Number);
  const [ey, em] = raw[raw.length - 1].month.split("-").map(Number);
  while (cy < ey || (cy === ey && cm <= em)) {
    const key = `${cy}-${String(cm).padStart(2, "0")}`;
    const src = byMonth.get(key);
    data.push(src ? { month: key, total: src.total, missing: false } : { month: key, total: 0, missing: true });
    cm++; if (cm > 12) { cm = 1; cy++; }
  }

  const W = 900, H = 270, padL = 56, padR = 20, padT = 30, padB = 32;
  const iw = W - padL - padR, ih = H - padT - padB;
  const vals = data.map(d => d.total);
  const yMax = niceCeil(Math.max(...vals));
  const x = i => padL + i * iw / (data.length - 1);
  const y = v => padT + ih - v / yMax * ih;

  // y축 눈금 + 가로 그리드 (하나의 색, 가는 실선 — 데이터보다 뒤로 물러나게)
  let grid = "", labels = "";
  for (let s = 0; s <= 4; s++) {
    const v = yMax * s / 4, yy = y(v);
    grid += `<line x1="${padL}" y1="${yy}" x2="${W - padR}" y2="${yy}" stroke="#e8ecf2" stroke-width="1"/>`;
    labels += `<text x="${padL - 8}" y="${yy + 4}" text-anchor="end" font-size="11" fill="#8a93a5">${Math.round(v).toLocaleString()}</text>`;
  }
  // x축 라벨 (약 8개 간격, "25.1" 형식)
  const step = Math.max(1, Math.ceil(data.length / 8));
  data.forEach((d, i) => {
    if (i % step !== 0 && i !== data.length - 1) return;
    const [yy, mm] = d.month.split("-");
    labels += `<text x="${x(i)}" y="${H - 8}" text-anchor="middle" font-size="11" fill="#8a93a5">${yy.slice(2)}.${Number(mm)}</text>`;
  });

  const pts = vals.map((v, i) => `${x(i)},${y(v)}`).join(" ");
  const areaPts = `${pts} ${x(data.length - 1)},${padT + ih} ${x(0)},${padT + ih}`;

  // 데이터 없는 구간(연속된 missing 달들) 위에 45° 빗살 밴드
  const halfStep = data.length > 1 ? iw / (data.length - 1) / 2 : 0;
  let hatches = "";
  for (let i = 0; i < data.length; i++) {
    if (!data[i].missing) continue;
    let j = i;
    while (j + 1 < data.length && data[j + 1].missing) j++;
    const x1 = Math.max(padL, x(i) - halfStep);
    const x2 = Math.min(W - padR, x(j) + halfStep);
    hatches += `<rect x="${x1}" y="${padT}" width="${x2 - x1}" height="${ih}" fill="url(#volHatch)" opacity="0.5"/>`;
    i = j;
  }

  // 최대/최소 주석 (판다랭크 스타일) — 최소는 데이터 없는 달(0) 제외, 텍스트는 차트 안쪽으로 고정
  const realVals = data.map((d, i) => d.missing ? null : { v: d.total, i }).filter(Boolean);
  const maxI = realVals.reduce((best, cur) => cur.v > best.v ? cur : best).i;
  const minI = realVals.reduce((best, cur) => cur.v < best.v ? cur : best).i;
  const clampX = v => Math.min(Math.max(v, padL + 40), W - padR - 40);
  const fmtMonth = m => { const [yy, mm] = m.split("-"); return `${yy.slice(2)}.${Number(mm)}`; };
  let marks = `
    <circle cx="${x(maxI)}" cy="${y(vals[maxI])}" r="4" fill="var(--accent)" stroke="#fff" stroke-width="2"/>
    <text x="${clampX(x(maxI))}" y="${Math.max(y(vals[maxI]) - 10, 14)}" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1a1f2e">최대 ${fmtMonth(data[maxI].month)} · ${vals[maxI].toLocaleString()}</text>`;
  if (minI !== maxI) {
    marks += `
    <circle cx="${x(minI)}" cy="${y(vals[minI])}" r="4" fill="var(--accent)" stroke="#fff" stroke-width="2"/>
    <text x="${clampX(x(minI))}" y="${Math.min(y(vals[minI]) + 20, H - padB - 6)}" text-anchor="middle" font-size="11.5" font-weight="700" fill="#5a6378">최소 ${fmtMonth(data[minI].month)} · ${vals[minI].toLocaleString()}</text>`;
  }

  body.innerHTML = `<div class="vol-chart-wrap">
    <svg id="volChartSvg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
      <defs>
        <pattern id="volHatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
          <line x1="0" y1="0" x2="0" y2="6" stroke="#c3c9d4" stroke-width="1.4"/>
        </pattern>
      </defs>
      ${grid}${hatches}${labels}
      <polygon points="${areaPts}" fill="var(--accent)" opacity="0.08"/>
      <polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      ${marks}
      <line id="volCross" x1="0" y1="${padT}" x2="0" y2="${padT + ih}" stroke="#c3c9d4" stroke-width="1" style="display:none;"/>
      <circle id="volHoverDot" r="4.5" fill="var(--accent)" stroke="#fff" stroke-width="2" style="display:none;"/>
    </svg>
    <div class="vol-tip" id="volTip" style="display:none;"></div>
  </div>`;
  sec.classList.add("open");
  sec.dataset.avail = "1";
  applySecTab(currentSecTab); // 현재 탭 상태에 맞춰 표시 여부 결정 (비동기 렌더라 강제로 켜지 않음)
  volChartData = { data, x, y, padL, padT, ih, W };

  const svg = document.getElementById("volChartSvg");
  svg.addEventListener("mousemove", volChartHover);
  svg.addEventListener("mouseleave", () => {
    document.getElementById("volCross").style.display = "none";
    document.getElementById("volHoverDot").style.display = "none";
    document.getElementById("volTip").style.display = "none";
  });
}

function volChartHover(e) {
  if (!volChartData) return;
  const { data, x, y, W } = volChartData;
  const svg = document.getElementById("volChartSvg");
  const rect = svg.getBoundingClientRect();
  const svgX = (e.clientX - rect.left) / rect.width * W;
  // 가장 가까운 데이터 포인트 찾기
  let best = 0, bestDist = Infinity;
  data.forEach((_, i) => {
    const d = Math.abs(x(i) - svgX);
    if (d < bestDist) { bestDist = d; best = i; }
  });
  const px = x(best), py = y(data[best].total);
  const cross = document.getElementById("volCross");
  const dot = document.getElementById("volHoverDot");
  const tip = document.getElementById("volTip");
  cross.setAttribute("x1", px); cross.setAttribute("x2", px);
  cross.style.display = "";
  dot.setAttribute("cx", px); dot.setAttribute("cy", py);
  dot.style.display = "";
  tip.textContent = data[best].missing
    ? `${data[best].month} · 데이터 없음`
    : `${data[best].month} · ${data[best].total.toLocaleString()}`;
  tip.style.display = "block";
  const leftPx = px / W * rect.width;
  tip.style.left = Math.min(Math.max(leftPx, 60), rect.width - 60) + "px";
}

function card(label, value, note) {
  return `<div class="ins-card">
    <div class="ins-label">${label}${note ? `<span class="ins-info">?<span class="ins-tip">${note}</span></span>` : ""}</div>
    <div class="ins-value">${value}</div>
  </div>`;
}
/* 경쟁강도(상품수÷검색량)를 "몇 : 몇" 비율로 변환
   - 1 이상: 상품이 검색량보다 많음 → "N : 1" (N배 많음, 경쟁 치열)
   - 1 미만: 검색량이 상품보다 많음 → "1 : N" (블루오션 쪽) */
function fmtRatio(r) {
  if (r == null) return "-";
  if (r === 0) return "0 : 1";
  if (r >= 1) return (Math.round(r * 10) / 10) + " : 1";
  return "1 : " + (Math.round((1 / r) * 10) / 10);
}
/* 경쟁지수: 상품수÷검색량 비율을 로그 보간으로 0~100 점수화.
   앵커는 기존 배지 등급 경계와 일치 — 0.8(여유↔보통)=40점, 3(보통↔치열)=70점 */
function compScore(r) {
  if (r == null) return null;
  if (r <= 0) return 0;
  const anchors = [[0.05, 0], [0.8, 40], [3, 70], [50, 100]];
  if (r <= anchors[0][0]) return 0;
  if (r >= anchors[anchors.length - 1][0]) return 100;
  for (let i = 0; i < anchors.length - 1; i++) {
    const [r1, s1] = anchors[i];
    const [r2, s2] = anchors[i + 1];
    if (r <= r2) {
      const t = (Math.log10(r) - Math.log10(r1)) / (Math.log10(r2) - Math.log10(r1));
      return Math.round(s1 + t * (s2 - s1));
    }
  }
  return 100;
}

function compScoreLevel(score) {
  return score < 20 ? "c0" : score < 40 ? "c1" : score < 60 ? "c2" : score < 80 ? "c3" : "c4";
}

function crBadge(r) {
  if (r == null) return "-";
  const score = compScore(r);
  return `<span class="comp-score ${compScoreLevel(score)}" title="상품수 : 검색량 = ${fmtRatio(r)} (100에 가까울수록 경쟁 치열)">
    <span class="comp-gauge"><span style="width:${score}%"></span></span><b>${score}</b>
  </span>`;
}
function compBadge(idx) {
  if (!idx) return "-";
  return `<span class="comp-badge comp-${esc(idx)}">${esc(idx)}</span>`;
}
function fmtWon(n) {
  if (n >= 10000) return Math.round(n / 1000) / 10 + "만";
  return n.toLocaleString();
}
function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

/* ───────── 키워드 일괄 수집 (전체 스토어 아니라 현재 선택된 스토어 1개 기준) ───────── */
const batchSelected = new Set(); // 지금 선택된 키워드들

function getBatchKeywordTree() {
  return STORE_BATCH_KEYWORDS[selectedStore] || KW_TREE;
}

function keywordMeta(keyword) {
  for (const g of getBatchKeywordTree()) {
    if (g.main === keyword) return { mainKeyword: g.main, isSub: false };
    if (g.subs.includes(keyword)) return { mainKeyword: g.main, isSub: true };
  }
  const custom = loadCustomKeywords().find(item => item.keyword === keyword);
  if (custom) return { mainKeyword: custom.mainKeyword, isSub: custom.isSub };
  return { mainKeyword: keyword, isSub: false };
}

/* 사용자가 직접 추가한 키워드 (기본 22개 목록에는 없는 것들). 스토어와 동일하게 localStorage에 저장.
   { keyword, isSub, mainKeyword } 형태 — 예전(문자열만) 저장분도 마이그레이션해서 읽어줌 */
const CUSTOM_KW_KEY = "nrCustomKeywords";
function loadCustomKeywords() {
  try {
    const raw = JSON.parse(localStorage.getItem(CUSTOM_KW_KEY)) || [];
    return raw.map(item => typeof item === "string" ? { keyword: item, isSub: false, mainKeyword: item } : item);
  } catch (_) { return []; }
}
function saveCustomKeywords(list) { localStorage.setItem(CUSTOM_KW_KEY, JSON.stringify(list)); }

function renderBatchBanners() {
  const tree = getBatchKeywordTree();
  const mainHtml = tree.map(g =>
    `<button type="button" class="batch-banner main${batchSelected.has(g.main) ? " active" : ""}" data-keyword="${esc(g.main)}" onclick="toggleBatchKeyword(this)">${esc(g.main)}</button>`
  );
  const subHtml = [];
  tree.forEach(g => {
    g.subs.forEach(sub => {
      subHtml.push(`<button type="button" class="batch-banner sub${batchSelected.has(sub) ? " active" : ""}" data-keyword="${esc(sub)}" onclick="toggleBatchKeyword(this)">${esc(sub)}</button>`);
    });
  });

  loadCustomKeywords().forEach(({ keyword: kw, isSub }) => {
    const cls = isSub ? "sub" : "main";
    const html = `<button type="button" class="batch-banner ${cls}${batchSelected.has(kw) ? " active" : ""}" data-keyword="${esc(kw)}" onclick="toggleBatchKeyword(this)">${esc(kw)}<span class="batch-banner-remove" onclick="removeCustomKeyword(event, this)">&times;</span></button>`;
    (isSub ? subHtml : mainHtml).push(html);
  });

  document.getElementById("batchMainGrid").innerHTML = mainHtml.join("");
  document.getElementById("batchSubGrid").innerHTML = subHtml.join("");
}
renderBatchBanners();

function addCustomKeyword() {
  const name = (prompt("추가할 키워드를 입력하세요") || "").trim();
  if (!name) return;
  const already = getBatchKeywordTree().some(g => g.main === name || g.subs.includes(name)) || loadCustomKeywords().some(item => item.keyword === name);
  if (already) { alert("이미 있는 키워드입니다."); return; }

  const isMain = confirm(`"${name}"을(를) 메인 키워드로 추가할까요?\n\n확인 = 메인 키워드\n취소 = 보조 키워드`);
  let mainKeyword = name;
  if (!isMain) {
    const parent = (prompt("이 키워드가 속할 메인 키워드를 입력하세요 (비워두면 독립 키워드로 추가됩니다)") || "").trim();
    mainKeyword = parent || name;
  }

  const list = loadCustomKeywords();
  list.push({ keyword: name, isSub: !isMain, mainKeyword });
  saveCustomKeywords(list);
  renderBatchBanners();
}

function removeCustomKeyword(e, el) {
  e.stopPropagation();
  const kw = el.closest(".batch-banner").dataset.keyword;
  batchSelected.delete(kw);
  saveCustomKeywords(loadCustomKeywords().filter(item => item.keyword !== kw));
  renderBatchBanners();
  updateBatchRunUi();
}

function updateBatchRunUi() {
  document.getElementById("batchRunWrap").style.display = batchSelected.size ? "block" : "none";
  document.getElementById("batchRunBtn").textContent = `선택한 ${batchSelected.size}개 키워드 수집 시작`;
}

function toggleBatchKeyword(el) {
  const kw = el.dataset.keyword;
  if (batchSelected.has(kw)) { batchSelected.delete(kw); el.classList.remove("active"); }
  else { batchSelected.add(kw); el.classList.add("active"); }
  updateBatchRunUi();
}

/* 그리드 전체가 이미 다 선택돼 있으면 한 번 더 눌렀을 때 전체 취소, 아니면 전체 선택 */
function toggleAllInGrid(gridId) {
  const buttons = [...document.querySelectorAll(`#${gridId} .batch-banner`)];
  const allSelected = buttons.length > 0 && buttons.every(el => batchSelected.has(el.dataset.keyword));
  buttons.forEach(el => {
    if (allSelected) { batchSelected.delete(el.dataset.keyword); el.classList.remove("active"); }
    else { batchSelected.add(el.dataset.keyword); el.classList.add("active"); }
  });
  updateBatchRunUi();
}

function selectAllMainKeywords() { toggleAllInGrid("batchMainGrid"); }
function selectAllSubKeywords() { toggleAllInGrid("batchSubGrid"); }

function updateBatchStoreLabel() {
  const el = document.getElementById("batchStoreLabel");
  if (el) el.textContent = `(${selectedStore})`;
}
updateBatchStoreLabel();

function exactStoreName(s) {
  return String(s || "").trim().replace(/\s+/g, " ");
}

function isExactStoreName(mallName, storeName) {
  return exactStoreName(mallName) === exactStoreName(storeName);
}

function isExactSelectedStore(mallName) {
  return isExactStoreName(mallName, selectedStore);
}

function todayKstDate() {
  const kst = new Date(Date.now() + 9 * 60 * 60 * 1000);
  return kst.toISOString().slice(0, 10);
}

/* 이 스토어의 해당 키워드 검색결과 안에 있는 "모든" 매칭 상품을 상품코드별로 반환 (최고 순위 1건으로 뭉개지 않음).
   withVolume:true로 이 키워드의 월간 검색량도 같이 받는다 — 연관키워드 확장 없는 가벼운 호출이라
   일괄 수집처럼 키워드가 많아도 부담이 적다. 서버에서 keyword_search_volume_monthly에도 자동 저장됨. */
async function fetchRankRows(keyword, watchProductIds) {
  const res = await fetch(FN_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + SUPABASE_ANON_KEY,
      "apikey": SUPABASE_ANON_KEY,
    },
    body: JSON.stringify({
      storeName: selectedStore, keyword, maxRank: 1000, withInsight: false, withVolume: true,
      ...(watchProductIds && watchProductIds.length ? { watchProductIds } : {}),
    }),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || res.status);
  return {
    rows: (data.results || []).filter(r => isExactSelectedStore(r.mallName)), // [{rank, title, productId, ...}, ...] — 상품 0개면 이탈
    volume: data.volume || null, // {pc, mobile, total} | null
    watched: data.watched || [], // 아이템 추적 대상이 이 키워드 결과에 있으면 [{productId, rank, price, ...}]
  };
}

/* ── 아이템 추적 피기백 ──
   랭킹추적에서 등록한 추적 아이템(tracked_items)의 상품코드를 일괄 수집 시 같이 넘기면,
   같은 스캔에서 경쟁사 상품의 순위·가격도 추가 API 비용 없이 얻어진다. 결과는
   tracked_item_history에 저장 — 실패해도 본래 수집에는 영향 없음. */
async function fetchTrackedItemCodes() {
  try {
    const res = await fetch(SUPABASE_URL + "/rest/v1/tracked_items?select=product_code", {
      headers: { "apikey": SUPABASE_ANON_KEY, "Authorization": "Bearer " + SUPABASE_ANON_KEY },
    });
    if (!res.ok) return [];
    return (await res.json()).map(r => String(r.product_code));
  } catch (_) { return []; }
}

/* ── 분석 결과에서 바로 아이템 추적 등록 ──
   내 스토어 순위/TOP10 행의 과녁 버튼: 지금 검색한 키워드를 추적 키워드로 하여
   tracked_items에 등록하고, 이미 알고 있는 오늘의 순위·가격을 첫 이력으로 저장한다.
   이미 추적 중인 상품이면 이 키워드만 추가한다. */
function extractProductCode(link) {
  const s = String(link || "");
  const m = s.match(/\/products\/(\d+)/) || s.match(/[?&](?:id|nvMid)=(\d+)/);
  return m ? m[1] : "";
}

function trackBtnHtml(p) {
  const code = String(p.code || "").trim() || extractProductCode(p.link);
  if (!code) return "";
  const data = esc(JSON.stringify({ ...p, code }));
  return `<button type="button" class="track-btn" data-code="${esc(code)}" data-item="${data}"
    onclick="trackItemFromAnalysis(this)" aria-label="아이템 추적에 추가" title="아이템 추적에 추가">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3"/><path d="M12 2v3"/><path d="M12 19v3"/><path d="M2 12h3"/><path d="M19 12h3"/></svg>
    <span class="track-tip">아이템 추적</span>
  </button>`;
}

// 이미 추적 중인 상품의 버튼을 채워진 상태로 표시
async function markTrackedButtons() {
  const codes = await fetchTrackedItemCodes();
  if (!codes.length) return;
  const set = new Set(codes.map(String));
  document.querySelectorAll(".track-btn[data-code]").forEach(btn => {
    if (set.has(btn.dataset.code)) {
      btn.classList.add("added");
      btn.title = "추적 중 (누르면 이 키워드 추가)";
      const tip = btn.querySelector(".track-tip");
      if (tip) tip.textContent = "추적 중";
    }
  });
}

async function trackItemFromAnalysis(btn) {
  const p = JSON.parse(btn.dataset.item);
  const headers = {
    "Content-Type": "application/json",
    "apikey": SUPABASE_ANON_KEY,
    "Authorization": "Bearer " + SUPABASE_ANON_KEY,
  };
  btn.disabled = true;
  try {
    const existRes = await fetch(
      SUPABASE_URL + `/rest/v1/tracked_items?product_code=eq.${encodeURIComponent(p.code)}&select=product_code,keywords`,
      { headers });
    const exist = existRes.ok ? await existRes.json() : [];
    if (exist.length) {
      const keywords = Array.isArray(exist[0].keywords) ? exist[0].keywords : [];
      if (!keywords.includes(p.keyword)) {
        await fetch(SUPABASE_URL + `/rest/v1/tracked_items?product_code=eq.${encodeURIComponent(p.code)}`, {
          method: "PATCH",
          headers: { ...headers, "Prefer": "return=minimal" },
          body: JSON.stringify({ keywords: [...keywords, p.keyword], updated_at: new Date().toISOString() }),
        });
      }
    } else {
      await fetch(SUPABASE_URL + "/rest/v1/tracked_items", {
        method: "POST",
        headers: { ...headers, "Prefer": "return=minimal" },
        body: JSON.stringify([{
          product_code: p.code,
          product_name: p.name || "", product_image: p.image || "",
          product_link: p.link || "", mall_name: p.mall || "",
          is_mine: !!p.isMine, keywords: [p.keyword],
        }]),
      });
    }
    // 이미 알고 있는 오늘의 순위·가격을 첫 이력으로 저장 (수집 버튼을 기다릴 필요 없음)
    await fetch(SUPABASE_URL + "/rest/v1/tracked_item_history?on_conflict=product_code,keyword,collected_date", {
      method: "POST",
      headers: { ...headers, "Prefer": "resolution=merge-duplicates,return=minimal" },
      body: JSON.stringify([{
        product_code: p.code, keyword: p.keyword,
        rank: p.rank ?? null, price: Number(p.price) || 0, mall_name: p.mall || "",
        collected_date: todayKstDate(), checked_at: new Date().toISOString(),
      }]),
    });
    btn.classList.add("added");
    btn.title = "추적 중 (누르면 이 키워드 추가)";
    const tip = btn.querySelector(".track-tip");
    if (tip) tip.textContent = "추적 중";
  } catch (e) {
    alert("아이템 추적 등록 실패: " + (e.message || "오류"));
  } finally {
    btn.disabled = false;
  }
}

async function saveWatchedRows(keyword, collectedDate, watched) {
  if (!watched.length) return;
  try {
    const rows = watched.map(w => ({
      product_code: String(w.productId), keyword,
      rank: w.rank, price: Number(w.price) || 0, mall_name: w.mallName || "",
      collected_date: collectedDate, checked_at: new Date().toISOString(),
    }));
    await fetch(SUPABASE_URL + "/rest/v1/tracked_item_history?on_conflict=product_code,keyword,collected_date", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": "Bearer " + SUPABASE_ANON_KEY,
        "Prefer": "resolution=merge-duplicates,return=minimal",
      },
      body: JSON.stringify(rows),
    });
  } catch (_) { /* 피기백 저장 실패는 무시 */ }
}

/* 상품별로 한 행씩 저장. 매칭 상품이 없으면(이탈) rank/product 정보 없는 행 1개만 남긴다 */
/* 같은 스토어+키워드+상품+날짜 조합이면 새 행을 추가하지 않고 그 날짜의 행을 덮어쓴다(upsert).
   오늘 여러 번 수집해도 오늘자 행만 갱신되고, 날짜가 바뀌면 새 행이 생긴다.
   volume이 있으면 search_volume_pc/mobile/total도 같이 저장 — 랭킹추적에서 조인 없이 바로 읽을 수 있게. */
async function saveRankRows(keyword, mainKeyword, isSub, collectedDate, rows, volume) {
  const uniqueRows = [];
  const seenProductCodes = new Set();
  rows.forEach(r => {
    const code = String(r.productId || "").trim();
    if (!code || seenProductCodes.has(code)) return;
    seenProductCodes.add(code);
    uniqueRows.push(r);
  });

  const volumeFields = volume
    ? { search_volume_pc: volume.pc, search_volume_mobile: volume.mobile, search_volume_total: volume.total }
    : {};

  const payload = uniqueRows.length
      ? uniqueRows.map(r => ({
        store_name: selectedStore, keyword, main_keyword: mainKeyword, is_sub: isSub,
        rank: r.rank, max_rank: 1000, product_code: r.productId || "", product_name: r.title || "",
        product_image: r.image || "",
        product_link: r.link || "",
        product_price: Number(r.price) || 0,
        collected_date: collectedDate,
        ...volumeFields,
      }))
    : [{
        store_name: selectedStore, keyword, main_keyword: mainKeyword, is_sub: isSub,
        rank: null, max_rank: 1000, product_code: "", product_name: "", product_image: "", product_link: "", product_price: 0, collected_date: collectedDate,
        ...volumeFields,
      }];
  try {
    let res = await fetch(
      SUPABASE_URL + "/rest/v1/keyword_rank_history?on_conflict=store_name,keyword,product_code,collected_date",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "apikey": SUPABASE_ANON_KEY,
          "Authorization": "Bearer " + SUPABASE_ANON_KEY,
          "Prefer": "resolution=merge-duplicates,return=minimal",
        },
        body: JSON.stringify(payload),
      }
    );
    if (!res.ok) {
      const errorText = await res.text();
      if (errorText.includes("product_link") || errorText.includes("product_price") || errorText.includes("search_volume")) {
        const fallbackPayload = payload.map(row => {
          const next = { ...row };
          if (errorText.includes("product_link")) delete next.product_link;
          if (errorText.includes("product_price")) delete next.product_price;
          if (errorText.includes("search_volume")) {
            delete next.search_volume_pc; delete next.search_volume_mobile; delete next.search_volume_total;
          }
          return next;
        });
        res = await fetch(
          SUPABASE_URL + "/rest/v1/keyword_rank_history?on_conflict=store_name,keyword,product_code,collected_date",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "apikey": SUPABASE_ANON_KEY,
              "Authorization": "Bearer " + SUPABASE_ANON_KEY,
              "Prefer": "resolution=merge-duplicates,return=minimal",
            },
            body: JSON.stringify(fallbackPayload),
          }
        );
        if (!res.ok) throw new Error(await res.text());
        return;
      }
      throw new Error(errorText);
    }
  } catch (e) {
    console.error("순위 저장 실패", e);
    throw e;
  }
}

async function runBatchCollect() {
  const list = [...batchSelected].map(kw => ({ keyword: kw, ...keywordMeta(kw) }));
  if (!list.length) return;
  const btn = document.getElementById("batchRunBtn");
  const statusEl = document.getElementById("batchStatus");
  const listEl = document.getElementById("batchList");
  const collectedDate = todayKstDate(); // 한국 날짜(YYYY-MM-DD) — 이 값 기준으로 하루 1행 유지
  btn.disabled = true;
  statusEl.style.display = "block";
  listEl.innerHTML = "";

  const watchCodes = await fetchTrackedItemCodes(); // 아이템 추적 대상 — 같은 스캔에서 겸사겸사 수집

  for (let i = 0; i < list.length; i++) {
    const { keyword, mainKeyword, isSub } = list[i];
    statusEl.innerHTML = `[${esc(selectedStore)}] <b>${i + 1}/${list.length}</b> "${esc(keyword)}" 확인 중...`;

    let rows = [];
    let volume = null;
    try {
      const fetched = await fetchRankRows(keyword, watchCodes);
      rows = fetched.rows;
      volume = fetched.volume;
      await saveWatchedRows(keyword, collectedDate, fetched.watched);
    } catch (e) {
      rows = [];
    }

    try {
      await saveRankRows(keyword, mainKeyword, isSub, collectedDate, rows, volume);
    } catch (e) {
      statusEl.innerHTML = `[${esc(selectedStore)}] "${esc(keyword)}" 저장 실패: ${esc(e.message || "오류")}`;
      btn.disabled = false;
      return;
    }

    const best = rows[0]; // results는 이미 rank 오름차순
    const row = document.createElement("div");
    row.className = "batch-item";
    const rankLabel = best ? `${best.rank}위${rows.length > 1 ? ` 외 ${rows.length - 1}개` : ""}` : "이탈";
    row.innerHTML = `
      <span class="kw${isSub ? " sub" : ""}">${esc(keyword)}</span>
      <span class="rk ${!best ? "none" : best.rank <= 40 ? "good" : ""}">${rankLabel}</span>`;
    listEl.prepend(row);
  }

  statusEl.innerHTML =
    `[${esc(selectedStore)}] ${list.length}개 키워드 수집 완료 · ` +
    `<a href="rank-tracker.html" style="color:var(--accent);font-weight:700;">랭킹추적에서 보기 →</a>`;
  btn.disabled = false;
}

window.nrRestoreAnalysis = function nrRestoreAnalysis(keyword, store, data) {
  const kw = String(keyword || "").trim();
  if (!kw) return;
  if (store && store !== selectedStore) selectStore(store);
  document.getElementById("keyword").value = kw;
  if (data) {
    statusLine.style.display = "none";
    render(data);
    return;
  }
  runSearch();
};

/* URL 쿼리스트링으로 들어온 키워드 자동 실행 (홈 화면/분석 내역 연동) */
const _params = new URLSearchParams(location.search);
const _historyIdParam = _params.get("restoreHistoryId");
const _kwParam = _params.get("restoreKeyword") || _params.get("keyword");
const _storeParam = _params.get("restoreStore");
if (_historyIdParam || _kwParam) {
  (async () => {
    let entry = null;
    if (_historyIdParam && typeof window.nrLoadAnalysisById === "function") {
      entry = await window.nrLoadAnalysisById(_historyIdParam);
    }
    if (!entry && _kwParam && _params.has("restoreKeyword") && typeof window.nrFindAnalysis === "function") {
      entry = await window.nrFindAnalysis(_kwParam, _storeParam);
    }
    const keyword = entry?.keyword || _kwParam;
    const store = entry?.store || _storeParam;
    window.nrRestoreAnalysis(keyword, store, entry?.data || null);
  })();
}
